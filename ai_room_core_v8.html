<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.1.6 (Internal 4.3)</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 25px rgba(0, 242, 255, 0.4);
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: contain;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
        }

        .brand-logo {
            color: var(--gold);
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 5px;
        }

        /* Общий стиль для надписей — теперь они в одной плоскости */
        .screen-label {
            position: absolute;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-transform: lowercase;
            /* Убрали rotateY, теперь текст плоский относительно экрана монитора */
            transform: rotateX(0deg); 
        }

        /* VERSES: Выровнен в один ряд по высоте с techpark */
        #verses-zone {
            top: 44%; /* Такая же высота, как у techpark */
            left: 30.5%;
            width: 10%;
            height: 8%;
            font-size: 1.6vw;
        }

        /* TECHPARK: Центральный экран */
        #techpark-zone {
            top: 44%; 
            left: 44.5%;
            width: 11%;
            height: 10%;
            font-size: 1.6vw;
        }

        .screen-label:hover {
            filter: brightness(1.5);
            transform: scale(1.1);
            cursor: pointer;
        }

        .bottom-nav {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            align-items: flex-end;
        }

        .btn-back {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .meta-data {
            text-align: right;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
        }

        #digital-trace { color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="viewport">
    <div class="top-bar">
        <div id="google_translate_element"></div>
        <div class="brand-logo">GY-GY</div>
    </div>

    <a href="verses.html" class="screen-label" id="verses-zone">verses</a>
    <a href="techpark.html" class="screen-label" id="techpark-zone">techpark</a>

    <div class="bottom-nav">
        <button class="btn-back" onclick="history.back()">← RETURN</button>
        <div class="meta-data">
            CORE_VER: 4.3 (Build 8.1.6)<br>
            TRACE_ID: <span id="digital-trace">...</span>
        </div>
    </div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    (function() {
        let id = localStorage.getItem('gy_trace') || 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('gy_trace', id);
        document.getElementById('digital-trace').innerText = id;
    })();
</script>

</body>
</html>
