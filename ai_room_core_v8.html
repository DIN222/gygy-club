<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.1.6 (Internal 4.3)</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 25px rgba(0, 242, 255, 0.4);
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Фон с твоим интерьером */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя панель: Языки и GY-GY */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            z-index: 10;
        }

        .lang-selector {
            visibility: visible; /* Видна от входа */
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .lang-selector:hover { background: var(--gold); color: #000; }

        .brand {
            color: var(--gold);
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* Активные зоны экранов */
        .tv-screen {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: var(--neon-glow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tv-screen:hover {
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        #screen-1 { top: 25%; left: 14%; width: 20%; height: 35%; font-size: 2.2vw; }
        #screen-2 { top: 22%; left: 37.5%; width: 25%; height: 42%; font-size: 3vw; }
        #screen-3 { top: 25%; left: 66%; width: 20%; height: 35%; cursor: default; }

        /* Нижняя панель: Назад и версия */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-sizing: border-box;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 25px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .btn-back:hover { background: #fff; color: #000; }

        .meta-info {
            text-align: right;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            line-height: 1.4;
        }

        /* Скрытый цифровой след (ID) */
        #digital-trace { display: none; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="top-bar">
        <button class="lang-selector">Language: RU</button>
        <div class="brand">GY-GY</div>
    </div>

    <a href="verses.html" class="tv-screen" id="screen-1">verses</a>
    <a href="techpark.html" class="tv-screen" id="screen-2">techpark</a>
    <div class="tv-screen" id="screen-3"></div>

    <div class="bottom-bar">
        <button class="btn-back" onclick="window.history.back()">← BACK</button>
        <div class="meta-info">
            CORE_VER: 4.3 (Build 8.1.6)<br>
            TRACE_ID: <span id="user-id">GENERATING...</span>
        </div>
    </div>
</div>

<div id="digital-trace"></div>

<script>
    // Cookie-recognition & Digital Trace Logic
    (function() {
        function getUniqueTrace() {
            let id = localStorage.getItem('gy_trace_id');
            if (!id) {
                id = 'TR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('gy_trace_id', id);
                // Здесь можно добавить логику присвоения дефолтного аватара/ника
            }
            return id;
        }

        document.getElementById('user-id').innerText = getUniqueTrace();
        
        // Логика автоматического входа (имитация)
        console.log("Cookie-recognition active. Version 4.3 ready.");
    })();
</script>

</body>
</html>
