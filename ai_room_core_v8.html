<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: 'Share Tech Mono', monospace; }

        /* КАРТИНКА УВЕЛИЧЕНА */
        .room-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover; 
            z-index: 1;
        }

        .header-core {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
            background: rgba(255,255,255,0.8); /* Легкая прозрачность для стиля */
        }

        .tv-grid {
            position: absolute; top: 58%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 40px; z-index: 500;
        }

        .tv-unit {
            width: 25px; height: 18px; background: #000; border: 1px solid #fff;
            cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center;
        }

        .tv-unit:hover { background: var(--gold); transform: scale(8); z-index: 1000; }

        .footer-core {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px 10px 30px; box-sizing: border-box; z-index: 1000;
        }

        .club-logo { color: var(--gold); font-size: 28px; font-weight: bold; letter-spacing: 5px; text-shadow: 2px 2px 2px #000; }
        .tech-label { font-size: 9px; color: #000; font-weight: bold; background: rgba(255,255,255,0.7); padding: 2px 5px; }
    </style>
</head>
<body>
    <div class="room-bg"></div>

    <header class="header-core">
        <div id="google_translate_element"></div>
        <div class="club-logo">GY-GY</div>
    </header>

    <div class="tv-grid">
        <a href="verses.html" class="tv-unit" title="VERSES">
            <span style="font-size:4px; color:var(--gold)">V</span>
        </a>
        <div class="tv-unit" style="opacity: 0.5;"></div>
        <div class="tv-unit" style="opacity: 0.5;"></div>
    </div>

    <footer class="footer-core">
        <div class="tech-label">CORE_V8.1 // SECTOR_07</div>
        <div class="tech-label">VERSION: 8.1.0 [7.1.53-LH]</div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
