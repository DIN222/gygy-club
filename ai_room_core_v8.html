<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.0.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000;
            --dim-gold: #7a6200;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #fff; overflow: hidden; 
            font-family: 'Share Tech Mono', monospace;
        }

        /* ФОН: УМЕНЬШЕН, ЧТОБЫ ОСВОБОДИТЬ МЕСТО ПАНЕЛЯМ */
        .room-bg {
            position: fixed; top: 50%; left: 50%;
            width: 90%; height: 85%; /* Уменьшили масштаб */
            transform: translate(-50%, -50%);
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: contain; 
            z-index: 1;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header-core {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-sizing: border-box; z-index: 1000; background: #fff;
        }

        #google_translate_element { border: 1px solid var(--black); padding: 2px; }

        /* ТВ-ЗОНА */
        .tv-grid {
            position: absolute; top: 58%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 40px; z-index: 500;
        }

        .tv-unit {
            width: 20px; height: 15px; background: #000; border: 1px solid #fff;
            cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center;
        }

        .tv-unit:hover { background: var(--gold); border-color: #000; transform: scale(10); z-index: 1000; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .footer-core {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px 15px 30px; box-sizing: border-box; z-index: 1000; background: #fff;
        }

        .btn-back { background: #000; color: #fff; border: 1px solid #000; padding: 5px 15px; cursor: pointer; font-size: 10px; }
        .tech-label { font-size: 9px; color: #000; font-weight: bold; text-transform: uppercase; }
        .club-logo { color: var(--gold); font-size: 28px; font-weight: bold; letter-spacing: 5px; text-shadow: 1px 1px 1px #000; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="header-core">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="google_translate_element"></div>
            <span class="tech-label">CORE_LINK // SEMANTIC_GROUP_№1</span>
        </div>
        <div class="club-logo">GY-GY</div>
    </header>

    <div class="tv-grid">
        <a href="verses.html" class="tv-unit" title="VERSES"><span style="font-size:3px; color:var(--gold)">V</span></a>
        <div class="tv-unit" style="opacity: 0.3;"></div>
        <div class="tv-unit" style="opacity: 0.3;"></div>
    </div>

    <footer class="footer-core">
        <div class="tech-label">
            <button class="btn-back" onclick="history.back()">Return</button><br><br>
            STABLE_CORE_V8 // SESSION_ACTIVE
        </div>
        <div class="tech-label" style="text-align: right;">
            VERSION: 8.0.0 [7.1.53-LH]<br>
            TRACE_ID: <span id="user-trace">ID_SYNCING</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-trace').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
