<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY CORE | v8.0.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* [1. ГЛОБАЛЬНЫЙ СВЕТ] */
        :root {
            --primary-gold: #ffcc00;
            --bg-bright: 1.1; /* Множитель яркости */
        }

        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #fff; overflow: hidden; 
            font-family: 'Share Tech Mono', monospace;
        }

        /* [2. ФОН ИЗ РЕПОЗИТОРИЯ] */
        .viewport-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
            filter: brightness(var(--bg-bright));
        }

        /* [3. HEADER: ВЕРХНИЙ ЭШЕЛОН] */
        .core-header {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 60px; display: flex; justify-content: space-between; 
            align-items: center; z-index: 10000;
            padding: 0 25px; box-sizing: border-box;
        }
        
        .club-logo { 
            color: var(--primary-gold); font-size: 32px; font-weight: bold; 
            letter-spacing: 7px; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); 
        }

        #google_translate_element { 
            background: rgba(255,255,255,0.95); border: 1px solid #000; 
            padding: 3px 8px; border-radius: 2px;
        }

        /* [4. ТВ-МОДУЛИ: ГЛУБОКАЯ ПЕРСПЕКТИВА] */
        .tv-grid {
            position: absolute; top: 56%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 30px; z-index: 500;
        }

        .tv-unit {
            /* РАЗМЕР "ТОЧКИ" */
            width: 18px; height: 13px;
            background: #000; border: 1px solid #fff;
            cursor: pointer; transition: 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }

        .tv-unit:hover {
            transform: scale(15); /* Всплытие из глубины */
            background: var(--primary-gold); border-color: #000; z-index: 1000;
            box-shadow: 0 0 20px rgba(255,204,0,0.6);
        }

        .tv-id { font-size: 3px; color: var(--primary-gold); font-weight: bold; }

        /* [5. FOOTER: СИСТЕМНЫЙ СЛОЙ] */
        .core-footer {
            position: fixed; bottom: 15px; left: 25px; right: 25px;
            display: flex; justify-content: space-between; align-items: flex-end; 
            z-index: 2000;
        }
        
        .btn-action { 
            background: #000; color: #fff; border: 1px solid #fff; 
            padding: 6px 16px; cursor: pointer; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .meta-info { color: #000; font-size: 10px; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="viewport-bg"></div>

    <header class="core-header">
        <div id="google_translate_element"></div>
        <div class="club-logo">GY-GY</div>
    </header>

    <div class="tv-grid">
        <a href="techpark.html" class="tv-unit" title="TECHPARK"><span class="tv-id">T</span></a>
        <a href="verses.html" class="tv-unit" title="VERSES"><span class="tv-id">V</span></a>
        <div class="tv-unit" style="opacity: 0.2;"><span class="tv-id">R</span></div>
    </div>

    <footer class="core-footer">
        <div>
            <button class="btn-action" onclick="history.back()">← BACK</button>
            <div class="meta-info" style="margin-top: 8px;">BRANCH: AI_ROOM | VERSION: 8.0.0</div>
        </div>
        <div class="meta-info" style="text-align: right;">
            <span style="font-size: 8px; opacity: 0.7;">UNIQUE DIGITAL TRACE</span><br>
            <span id="user-trace">ID_INITIALIZING...</span>
        </div>
    </footer>

    <script type="text/javascript">
        // ИНИЦИАЛИЗАЦИЯ ПЕРЕВОДЧИКА
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }

        // ЦИФРОВОЙ СЛЕД (COOKIE + LOCAL STORAGE)
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 
                        'GY8-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-trace').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
