<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROOM CORE | v8.1.6 (Internal 4.3)</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 25px rgba(0, 242, 255, 0.4);
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Фоновое изображение с широким углом */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* Обязательные атрибуты: Языковая панель и GY-GY */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            z-index: 10;
        }

        .lang-panel {
            visibility: visible;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--gold);
            padding: 5px 15px;
        }

        .lang-panel button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .brand-logo {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        /* Активные зоны экранов (координаты под широкий угол) */
        .screen-link {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            text-shadow: var(--neon-glow);
            transition: transform 0.3s ease, filter 0.3s ease;
            /* border: 1px solid rgba(0, 242, 255, 0.2); // Раскомментировать для отладки */
        }

        .screen-link:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        /* Позиции для "отдаленной" картинки */
        #verses-zone {
            top: 32%;
            left: 21%;
            width: 14%;
            height: 18%;
            font-size: 1.8vw;
        }

        #techpark-zone {
            top: 30%;
            left: 42%;
            width: 16%;
            height: 22%;
            font-size: 2.2vw;
        }

        #empty-zone {
            top: 32%;
            left: 65%;
            width: 14%;
            height: 18%;
        }

        /* Нижняя панель: Назад и мета-данные */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-sizing: border-box;
        }

        .back-nav button {
            background: rgba(0,0,0,0.5);
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 30px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .system-meta {
            text-align: right;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            line-height: 1.5;
        }

        #trace-id { color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="viewport">
    <div class="top-bar">
        <div class="lang-panel">
            <button>Язык: RU</button>
        </div>
        <div class="brand-logo">GY-GY</div>
    </div>

    <a href="verses.html" class="screen-link" id="verses-zone">verses</a>
    <a href="techpark.html" class="screen-link" id="techpark-zone">techpark</a>
    <div class="screen-link" id="empty-zone"></div>

    <div class="bottom-bar">
        <div class="back-nav">
            <button onclick="window.history.back()">← НАЗАД</button>
        </div>
        <div class="system-meta">
            CORE: 4.3 | BUILD: 8.1.6<br>
            USER_ID: <span id="trace-id">IDENTIFYING...</span>
        </div>
    </div>
</div>

<script>
    // Cookie-recognition & ID Trace Logic
    (function initUser() {
        let traceId = localStorage.getItem('gy_digital_trace');
        if (!traceId) {
            traceId = 'ID-' + Math.random().toString(36).substring(2, 11).toUpperCase();
            localStorage.setItem('gy_digital_trace', traceId);
        }
        document.getElementById('trace-id').innerText = traceId;
        console.log("System 4.3: Unique trace confirmed.");
    })();
</script>

</body>
</html>
