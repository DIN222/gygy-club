
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY | REQUEST TERMINAL v.8.3</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --ai-gem: #4285F4; --ai-grok: #FF4500; }
        
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            text-transform: uppercase;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 2px solid var(--gold); background: #000;
        }
        #google_translate_element { transform: scale(0.8); transform-origin: left; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 10px; border: 1px solid var(--gold); padding: 4px 8px; }
        .logo-right { font-weight: 900; letter-spacing: 3px; font-size: 20px; }

        /* MATRIX — Теперь это кнопки управления */
        .matrix {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 8px;
            background: #080808; border-bottom: 1px solid var(--gold);
        }
        .slot { 
            aspect-ratio: 1; border: 1px solid #333; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: 900; cursor: pointer;
            transition: 0.2s;
        }
        .slot:active { transform: scale(0.9); }
        .slot.user-active { border-color: var(--gold); color: var(--gold); }
        .slot.ai-gem { border-color: var(--ai-gem); color: var(--ai-gem); }
        .slot.ai-grok { border-color: var(--ai-grok); color: var(--ai-grok); }
        
        /* Анимация ожидания (когда нажали на ИИ) */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .loading { animation: pulse 1s infinite; }

        /* STREAM */
        .stream { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { border-left: 2px solid var(--gold); padding: 5px 15px; max-width: 90%; position: relative; }
        .msg.gemini { border-left-color: var(--ai-gem); align-self: flex-end; text-align: right; border-left: none; border-right: 2px solid var(--ai-gem); }
        .msg.grok { border-left-color: var(--ai-grok); align-self: flex-end; text-align: right; border-left: none; border-right: 2px solid var(--ai-grok); }
        .author { font-size: 8px; opacity: 0.5; margin-bottom: 4px; display: block; }

        /* INPUT ZONE */
        .input-zone {
            padding: 15px; background: #000; border-top: 2px solid var(--gold);
            display: flex; gap: 10px;
        }
        input { 
            flex: 1; background: #000; border: 1px solid #444; color: var(--gold); 
            padding: 12px; font-family: 'Courier New'; font-size: 16px; outline: none;
        }
        .mint-btn { 
            background: #000; color: var(--gold); border: 2px solid var(--gold); 
            padding: 10px 15px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div id="google_translate_element"></div>
        <a href="ai_room_retro_base.html" class="back-link">BACK</a>
        <div class="logo-right">GY-GY</div>
    </header>

    <div class="matrix">
        <div class="slot user-active">U1</div>
        <div class="slot">U2</div>
        <div class="slot">U3</div>
        <div class="slot">U4</div>
        <div class="slot">U5</div>
        <div class="slot ai-gem" onclick="aiCall('GEMINI')">G</div>
        <div class="slot ai-grok" onclick="aiCall('GROK')">GR</div>
    </div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-zone">
        <input type="text" id="user-input" placeholder="WRITE YOUR LINE..." autocomplete="off">
        <button class="mint-btn" onclick="userMint()">MINT</button>
    </div>

    <script>
        const chat = document.getElementById('chat-stream');
        const input = document.getElementById('user-input');

        function userMint() {
            const text = input.value.trim().toUpperCase();
            if(!text) return;
            addMessage('USER_1', text, 'user');
            input.value = '';
        }

        function aiCall(aiName) {
            // Визуальный отклик на кнопке
            const slot = event.target;
            slot.classList.add('loading');

            setTimeout(() => {
                slot.classList.remove('loading');
                const response = aiName === 'GEMINI' 
                    ? "РИТМ ПРИНЯТ. СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА." 
                    : "GROK В СЕТИ. СТРОКА ДОБАВЛЕНА В ХЕШ.";
                addMessage(aiName, response, aiName.toLowerCase());
            }, 1000);
        }

        function addMessage(author, text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<span class="author">@${author}</span><div class="text">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            localStorage.setItem('gy83_history', chat.innerHTML);
        }

        window.onload = () => {
            const saved = localStorage.getItem('gy83_history');
            if(saved) chat.innerHTML = saved;
        };

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
