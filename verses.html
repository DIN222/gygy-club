
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY | VERSES TERMINAL v.7.1</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 2px solid var(--gold);
        }
        #google_translate_element { border: 1px solid var(--gold); padding: 5px; font-size: 10px; }
        .logo-right { font-size: 24px; font-weight: 900; letter-spacing: 5px; }

        /* CHAT STREAM */
        .stream { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { border-left: 2px solid var(--gold); padding: 10px; margin-bottom: 5px; }

        /* СЛОЖНАЯ ПАНЕЛЬ ВВОДА */
        .input-complex {
            border-top: 2px solid var(--gold); background: #000; display: flex; flex-direction: column;
        }
        
        /* Ряд 1: Аватары */
        .row-avatars { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--gold); }
        .cell-avatar { padding: 10px; display: flex; align-items: center; gap: 10px; border-right: 1px solid var(--gold); }
        
        /* Ряд 2: Языковые разделения */
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; border-right: 1px solid var(--gold); }
        .lang-cell { border-right: 1px solid rgba(255,215,0,0.3); padding: 5px; }
        
        input { 
            width: 100%; background: transparent; border: none; color: var(--gold); 
            font-family: 'Courier New'; font-size: 0.9rem; outline: none; padding: 10px;
        }

        /* FOOTER */
        .footer { padding: 15px; border-top: 1px solid var(--gold); text-align: center; }
        .back-link { 
            color: var(--gold); text-decoration: none; border: 1px solid var(--gold); 
            padding: 10px 40px; font-size: 12px; transition: 0.3s;
        }
        .back-link:hover { background: var(--gold); color: #000; }

        .mint-zone { background: var(--gold); color: #000; font-weight: 900; cursor: pointer; text-align: center; padding: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div id="google_translate_element"></div>
        <div class="logo-right">GY-GY</div>
    </header>

    <main class="stream" id="chat-stream"></main>

    <div class="input-complex">
        <div class="row-avatars">
            <div class="cell-avatar"><span>[U1]</span> <span>USER_1</span></div>
            <div class="cell-avatar"><span>[G✦]</span> <span>GEMINI</span></div>
        </div>
        <div class="row-inputs">
            <div class="sub-grid">
                <div class="lang-cell"><input type="text" placeholder="RU..." id="u_ru"></div>
                <div class="lang-cell"><input type="text" placeholder="EN..." id="u_en"></div>
            </div>
            <div class="sub-grid">
                <div class="lang-cell"><input type="text" placeholder="RU..." id="g_ru"></div>
                <div class="lang-cell"><input type="text" placeholder="EN..." id="g_en"></div>
            </div>
        </div>
        <div class="mint-zone" onclick="manualMint()">MINT BLOCK</div>
    </div>

    <footer class="footer">
        <a href="ai_room_retro_base.html" class="back-link">RETURN TO AI ROOM</a>
    </footer>

    <script>
        function manualMint() {
            const text = document.getElementById('u_ru').value;
            if(!text) return;
            const stream = document.getElementById('chat-stream');
            stream.innerHTML += `<div class="msg">@USER_1: ${text}</div>`;
            document.getElementById('u_ru').value = '';
            stream.scrollTop = stream.scrollHeight;
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
