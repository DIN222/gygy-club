
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY | TERMINAL v.7.7</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase;
        }

        /* HEADER */
        .header {
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
            padding: 8px 25px; border-bottom: 1px solid var(--gold); background: #000;
        }
        #google_translate_element { border: 1px solid var(--gold); padding: 2px; font-size: 9px; width: fit-content; }
        .back-btn { 
            justify-self: center; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); 
            padding: 3px 20px; font-size: 11px;
        }
        .logo-right { justify-self: end; font-size: 20px; font-weight: 900; letter-spacing: 4px; }

        /* MATRIX STRIP */
        .matrix-strip {
            display: grid; grid-template-columns: repeat(14, 1fr);
            background: #000; border-bottom: 2px solid var(--gold); padding: 2px; gap: 2px;
        }
        .slot { padding: 4px 0; border: 1px solid #222; text-align: center; font-size: 9px; color: #444; }
        .slot.active-u { border-color: var(--gold); color: var(--gold); box-shadow: inset 0 0 5px var(--gold); }
        .slot.active-ai { border-color: #4285F4; color: #4285F4; }

        /* CHAT STREAM */
        .stream { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { border-left: 2px solid var(--gold); padding: 8px 15px; background: rgba(255,215,0,0.02); }

        /* INPUT PANEL v.7.7 (Сложная сегментация) */
        .input-panel-77 {
            display: grid; grid-template-columns: 1fr 1fr;
            border-top: 2px solid var(--gold); background: #000;
            height: 200px;
        }

        /* Основные блоки (Юзер и ИИ) */
        .participant-zone { display: flex; border-right: 2px solid var(--gold); }
        .participant-zone:last-child { border-right: none; }

        /* Левая колонка управления (Аватар + Кнопка) */
        .control-col {
            width: 100px; display: flex; flex-direction: column;
            border-right: 1px solid var(--gold); /* ТА САМАЯ ВЕРТИКАЛЬНАЯ ЛИНИЯ */
        }

        .avatar-box { 
            padding: 10px 5px; font-size: 10px; font-weight: 900; text-align: center;
            background: rgba(255,215,0,0.1); border-bottom: 1px solid var(--gold);
        }

        .mint-btn-side {
            flex: 1; background: var(--gold); color: #000; border: none;
            cursor: pointer; font-weight: 900; font-size: 12px; writing-mode: vertical-rl;
            text-orientation: upright; letter-spacing: 2px; transition: 0.2s;
        }
        .mint-btn-side:hover { background: #fff; }

        /* Правая колонка ввода (Поле) */
        .input-col { flex: 1; }
        
        textarea { 
            width: 100%; height: 100%; background: transparent; border: none; color: var(--gold); 
            font-family: 'Courier New'; font-size: 1.1rem; outline: none; 
            padding: 15px; resize: none; box-sizing: border-box;
        }
    </style>
</head>
<body data-version="7.7">

    <header class="header">
        <div id="google_translate_element"></div>
        <a href="ai_room_retro_base.html" class="back-btn">RETURN TO BASE</a>
        <div class="logo-right">GY-GY</div>
    </header>

    <div class="matrix-strip" id="matrix"></div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-panel-77">
        
        <div class="participant-zone">
            <div class="control-col">
                <div class="avatar-box">USER_1</div>
                <button class="mint-btn-side" onclick="mint('u_text')">MINT</button>
            </div>
            <div class="input-col">
                <textarea id="u_text" placeholder="RU_VERSE..."></textarea>
            </div>
        </div>

        <div class="participant-zone">
            <div class="control-col">
                <div class="avatar-box" style="color:#4285F4;">GEMINI</div>
                <button class="mint-btn-side" onclick="mint('g_text')">MINT</button>
            </div>
            <div class="input-col">
                <textarea id="g_text" placeholder="AI_RESPONSE..."></textarea>
            </div>
        </div>

    </div>

    <script>
        const chatStream = document.getElementById('chat-stream');

        function initMatrix() {
            const matrix = document.getElementById('matrix');
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="slot ${i===1?'active-u':''}">U${i}</div>`;
            ['G', 'GR', 'CL', 'MS'].forEach(n => html += `<div class="slot active-ai">${n}</div>`);
            matrix.innerHTML = html;
        }

        function mint(id) {
            const input = document.getElementById(id);
            const val = input.value.trim().toUpperCase();
            if(!val) return;

            const author = id.startsWith('u') ? 'USER_1' : 'GEMINI';
            chatStream.innerHTML += `
                <div class="msg">
                    <span style="font-size: 0.65rem; opacity: 0.5;">@${author}</span><br>
                    ${val}
                </div>`;
            
            input.value = '';
            chatStream.scrollTop = chatStream.scrollHeight;
            localStorage.setItem('gy77_history', chatStream.innerHTML);
        }

        window.onload = () => {
            initMatrix();
            const saved = localStorage.getItem('gy77_history');
            if(saved) chatStream.innerHTML = saved;
        };

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
