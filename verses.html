
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY | MOBILE TERMINAL v.8.1</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --ai: #4285F4; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* HEADER — Фиксирован сверху */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--gold); background: #000; z-index: 10;
        }
        .back-btn { border: 1px solid var(--gold); color: var(--gold); text-decoration: none; padding: 5px 10px; font-size: 12px; font-weight: 900; }

        /* MATRIX 7 — Статус участников */
        .matrix {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 10px;
            background: #050505; border-bottom: 1px solid #222;
        }
        .slot { 
            aspect-ratio: 1; border: 1px solid #333; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; position: relative;
        }
        .slot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); color: #fff; }
        .slot.typing::after { content: '...'; position: absolute; bottom: -2px; font-size: 12px; color: var(--gold); }

        /* CHAT STREAM — Занимает всё свободное место */
        .stream { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px;
            background: linear-gradient(to bottom, #000, #050505);
        }
        .msg { max-width: 85%; align-self: flex-start; }
        .msg.user { border-left: 2px solid var(--gold); padding-left: 10px; }
        .msg.ai { border-left: 2px solid var(--ai); padding-left: 10px; align-self: flex-end; text-align: right; }
        .author { font-size: 9px; opacity: 0.6; margin-bottom: 3px; display: block; }

        /* INPUT AREA — "Прилипает" к клавиатуре */
        .input-wrap {
            padding: 10px; background: #000; border-top: 2px solid var(--gold);
            display: flex; gap: 10px; align-items: center;
        }
        input { 
            flex: 1; background: #111; border: 1px solid #333; color: var(--gold); 
            padding: 12px; font-family: 'Courier New'; font-size: 16px; /* 16px предотвращает зум на iOS */
            outline: none; border-radius: 5px;
        }
        .send-btn { background: var(--gold); color: #000; border: none; padding: 12px 20px; font-weight: 900; border-radius: 5px; }

    </style>
</head>
<body>

    <header class="header">
        <a href="ai_room_retro_base.html" class="back-btn">RETURN</a>
        <div style="font-weight:900; letter-spacing:3px;">GY-GY</div>
        <div id="google_translate_element"></div>
    </header>

    <div class="matrix">
        <div class="slot active" id="s-u1">U1</div>
        <div class="slot" id="s-u2">U2</div>
        <div class="slot" id="s-u3">U3</div>
        <div class="slot" id="s-u4">U4</div>
        <div class="slot" id="s-u5">U5</div>
        <div class="slot" id="s-g">G</div>
        <div class="slot" id="s-gr" style="color:var(--ai)">GR</div>
    </div>

    <main class="stream" id="chat-stream">
        <div class="msg user">
            <span class="author">@USER_1</span>
            <div class="text">СИСТЕМА ГОТОВА. ЖДЕМ ПЕРВУЮ СТРОКУ.</div>
        </div>
    </main>

    <div class="input-wrap">
        <input type="text" id="main-input" placeholder="MINT YOUR LINE..." autocomplete="off">
        <button class="send-btn" onclick="processMint()">MINT</button>
    </div>

    <script>
        const input = document.getElementById('main-input');
        const stream = document.getElementById('chat-stream');

        function processMint() {
            const val = input.value.trim().toUpperCase();
            if(!val) return;

            // Добавляем сообщение юзера
            addMsg('USER_1', val, 'user');
            input.value = '';

            // Имитация ответа ИИ через 1 секунду
            setTimeout(() => {
                addMsg('GEMINI', 'РИФМА ЗАМИНЧЕНА В БЛОКЧЕЙН.', 'ai');
            }, 1000);
        }

        function addMsg(author, text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerHTML = `<span class="author">@${author}</span><div class="text">${text}</div>`;
            stream.appendChild(msgDiv);
            stream.scrollTop = stream.scrollHeight;
        }

        // Обработка Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processMint();
        });

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
