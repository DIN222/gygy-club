<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY VERSES v6.0 | Web3 Poetry Hub</title>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --accent-glow: #00ff41; /* GY-GY Green */
            --grok-blue: #00baec;
            --text-main: #e0e0e0;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Постоянные атрибуты v6.0 */
        .header-v6 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--accent-glow);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand-logo { font-size: 1.5rem; font-weight: bold; color: var(--accent-glow); letter-spacing: 2px; }

        .lang-panel-v6 {
            display: flex;
            gap: 10px;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .lang-btn {
            background: none; border: none; color: #666; cursor: pointer; font-weight: bold;
        }
        .lang-btn.active { color: var(--accent-glow); }

        /* Чат-зона */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .stanza-group {
            border-left: 2px solid #333;
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .line {
            margin: 8px 0;
            padding: 10px;
            border-radius: 4px;
            animation: fadeIn 0.5s ease;
        }

        .line.human { background: rgba(255,255,255,0.03); border-left: 3px solid #fff; }
        .line.ai { background: rgba(0, 255, 65, 0.05); border-left: 3px solid var(--accent-glow); }
        .line.grok { border-left-color: var(--grok-blue); color: var(--grok-blue); }

        .author-meta { font-size: 0.7rem; opacity: 0.6; display: block; margin-bottom: 4px; }

        /* Панель ввода */
        .input-area-v6 {
            padding: 20px;
            background: var(--panel-bg);
            border-top: 1px solid #333;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: var(--accent-glow);
            padding: 15px;
            font-size: 1rem;
            outline: none;
        }

        input:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-bar {
            max-width: 900px;
            margin: 10px auto 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-version="6.0">

    <header class="header-v6">
        <div class="brand-logo">GY-GY</div>
        
        <div class="lang-panel-v6" id="main-lang-ctrl">
            <button class="lang-btn active">RU</button>
            <button class="lang-btn">EN</button>
            <button class="lang-btn">CN</button>
        </div>

        <button class="back-btn" onclick="location.href='index.html'" style="background:none; color:white; border:1px solid #444; cursor:pointer;">← EXIT</button>
    </header>

    <div class="chat-container" id="chat-flow">
        <div class="stanza-group" id="current-stanza-container">
            </div>
    </div>

    <div class="input-area-v6">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Введите первую строчку GY-GY стиха...">
            <button id="send-btn" onclick="processStep()" style="padding:0 25px; background:var(--accent-glow); border:none; font-weight:bold; cursor:pointer;">MINT</button>
        </div>
        <div class="status-bar">
            <span id="queue-status">Очередь: Участник 1 (из 10)</span>
            <span id="step-counter">Строка: 1/16</span>
            <span id="digital-trace">ID: <span id="my-id">...loading</span></span>
        </div>
    </div>

    <script>
        // Конфигурация v6.0
        let currentLine = 1;
        const aiNames = ["Gemini", "Grok", "Claude", "Mistral"];
        const chatFlow = document.getElementById('chat-flow');
        const currentStanzaContainer = document.getElementById('current-stanza-container');
        const userInput = document.getElementById('user-input');
        const queueStatus = document.getElementById('queue-status');

        // Имитация Digital Trace (Cookie-recognition)
        window.onload = () => {
            const myId = "GY-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            document.getElementById('my-id').innerText = myId;
        };

        async function processStep() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Добавляем строку пользователя
            addLine(text, "human", "Participant_" + (Math.floor(Math.random() * 10) + 1));
            userInput.value = "";
            userInput.disabled = true;
            
            // 2. Логика очереди ИИ
            updateStatus();
            
            // Имитация задержки "раздумья" ИИ
            setTimeout(() => {
                const aiIndex = (Math.ceil(currentLine / 2) - 1) % 4;
                const aiName = aiNames[aiIndex];
                const aiType = aiName === "Grok" ? "ai grok" : "ai";
                
                addLine("GY-GY Response: [Сгенерированный контекст для " + text + "]", aiType, aiName);
                
                userInput.disabled = false;
                updateStatus();
                userInput.placeholder = "Ваша очередь...";
            }, 1500);
        }

        function addLine(text, type, author) {
            const lineDiv = document.createElement('div');
            lineDiv.className = `line ${type}`;
            lineDiv.innerHTML = `<span class="author-meta">@${author}</span><p class="line-text">${text}</p>`;
            
            currentStanzaContainer.appendChild(lineDiv);
            currentLine++;

            // Создаем новый куплет каждые 4 строки
            if ((currentLine - 1) % 4 === 0 && currentLine < 16) {
                const newStanza = document.createElement('div');
                newStanza.className = "stanza-group";
                chatFlow.appendChild(newStanza);
                // Переключаем контейнер
            }
            
            chatFlow.scrollTop = chatFlow.scrollHeight;

            if (currentLine > 16) {
                finishPoem();
            }
        }

        function updateStatus() {
            document.getElementById('step-counter').innerText = `Строка: ${currentLine}/16`;
            const isAiTurn = currentLine % 2 === 0;
            queueStatus.innerText = isAiTurn ? `Очередь: ${aiNames[(Math.ceil(currentLine/2)-1)%4]} (AI)` : `Очередь: Участник`;
        }

        function finishPoem() {
            userInput.disabled = true;
            queueStatus.innerText = "Стих завершен и отправлен в архив!";
            // Здесь будет вызов функции сохранения в каталог по датам
        }
    </script>
</body>
</html>
