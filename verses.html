
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | VERSES v.6.3</title>
    <style>
        :root {
            --gold: #FFD700;
            --gemini: #4285F4;
            --bg: #030303;
            --panel: #0a0a0a;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* HEADER (Стандарт клуба) */
        .universal-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background: #000; border-bottom: 2px solid var(--gold);
        }
        .logo-gold { color: var(--gold); font-size: 26px; font-weight: 900; letter-spacing: 4px; text-decoration: none; }

        /* МАТРИЦА 14 */
        .matrix-container {
            display: grid; grid-template-columns: repeat(14, 1fr);
            gap: 4px; padding: 8px; background: var(--panel); border-bottom: 1px solid #222;
        }
        .slot {
            aspect-ratio: 1; background: #000; border: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.2s; cursor: pointer;
        }
        .slot.user-active { border-color: var(--gold); box-shadow: inset 0 0 8px var(--gold); }
        .slot.ai-active { border-bottom: 2px solid var(--gemini); }
        .slot:hover { background: #111; }

        .avatar-box { width: 28px; height: 28px; border-radius: 4px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .label { font-size: 7px; color: #555; text-transform: uppercase; }

        /* ЧАТ */
        .verses-stream { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 2px; max-width: 80%; line-height: 1.5; font-size: 1.1rem; border-left: 4px solid #333; }
        .msg.human { border-color: #fff; background: rgba(255,255,255,0.02); }
        .msg.gemini { border-color: var(--gemini); background: rgba(66, 133, 244, 0.05); }

        /* ИНПУТ */
        .mint-panel { padding: 25px; background: #000; border-top: 1px solid #222; display: flex; gap: 15px; }
        input { flex: 1; background: #050505; border: 1px solid #333; color: var(--gold); padding: 15px; }
        .btn-mint { background: var(--gold); color: #000; border: none; padding: 0 40px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body data-version="6.3">

    <header class="universal-nav">
        <div id="google_translate_element" style="color:#444; font-size:10px;">LANGUAGES GOOGLE</div>
        <div style="display: flex; align-items: center; gap: 25px;">
            <a href="#" class="logo-gold">GY-GY</a>
            <button onclick="history.back()" style="background:none; border:1px solid #444; color:#888; cursor:pointer; padding:5px 12px; font-size:10px;">← RETURN</button>
        </div>
    </header>

    <div class="matrix-container" id="matrix">
        </div>

    <main class="verses-stream" id="stream">
        <div class="msg" style="border:none; color:#555;">[SYSTEM v6.3] Матрица готова. User 1, введите 1-ю строку...</div>
    </main>

    <div class="mint-panel">
        <input type="text" id="poemInput" placeholder="Напишите строку и нажмите MINT..." autocomplete="off">
        <button class="btn-mint" onclick="handleMint()">MINT</button>
    </div>

    <script>
        const aiList = [
            { name: 'GEMINI', color: '#4285F4', url: 'https://gemini.google.com' },
            { name: 'GROK', color: '#fff', url: 'https://grok.com' },
            { name: 'CLAUDE', color: '#d97757', url: 'https://claude.ai' },
            { name: 'MISTRAL', color: '#ff5e1a', url: 'https://mistral.ai' }
        ];

        // Инициализация Матрицы 14
        const matrix = document.getElementById('matrix');
        for(let i=1; i<=10; i++) {
            matrix.innerHTML += `<div class="slot ${i===1?'user-active':''}" title="User ${i}"><div class="avatar-box" style="background:#222;">U${i}</div><div class="label">User</div></div>`;
        }
        aiList.forEach(ai => {
            matrix.innerHTML += `<a href="${ai.url}" target="_blank" class="slot ai-active" onclick="copyContext('${ai.name}')">
                <div class="avatar-box" style="background:${ai.color}; color:#000;">${ai.name[0]}</div>
                <div class="label">${ai.name}</div>
            </a>`;
        });

        // Функция копирования контекста для Grok/Claude/Mistral
        function copyContext(aiName) {
            const lastLine = document.querySelector('.msg:last-child').innerText;
            const prompt = `Мы пишем GY-GY стих. Последняя строка: "${lastLine}". Твоя задача: напиши ОДНУ следующую строку строго в рифму. Стиль: Web3, ирония. Только текст строки.`;
            navigator.clipboard.writeText(prompt);
            console.log(`Контекст для ${aiName} скопирован в буфер.`);
        }

        function handleMint() {
            const input = document.getElementById('poemInput');
            const stream = document.getElementById('stream');
            if(!input.value) return;

            // Строка юзера
            stream.innerHTML += `<div class="msg human"><strong>User 1:</strong> ${input.value}</div>`;
            
            // Ответ Gemini (имитация с попыткой в рифму)
            setTimeout(() => {
                stream.innerHTML += `<div class="msg gemini"><strong>Gemini [✦]:</strong> Хеш-код прописан, блокчейн оживает,<br>Клуб GY-GY новые смыслы вплавляет!</div>`;
                stream.scrollTop = stream.scrollHeight;
            }, 800);

            input.value = "";
            stream.scrollTop = stream.scrollHeight;
        }
    </script>
</body>
</html>
