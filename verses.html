
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY | TERMINAL v.7.8</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase;
        }

        /* HEADER */
        .header {
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
            padding: 8px 25px; border-bottom: 1px solid var(--gold); background: #000;
        }
        #google_translate_element { border: 1px solid var(--gold); padding: 2px; font-size: 9px; width: fit-content; }
        .back-btn { 
            justify-self: center; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); 
            padding: 3px 20px; font-size: 11px;
        }
        .logo-right { justify-self: end; font-size: 20px; font-weight: 900; letter-spacing: 4px; }

        /* MATRIX STRIP */
        .matrix-strip {
            display: grid; grid-template-columns: repeat(14, 1fr);
            background: #000; border-bottom: 2px solid var(--gold); padding: 2px; gap: 2px;
        }
        .slot { padding: 4px 0; border: 1px solid #222; text-align: center; font-size: 9px; color: #444; }
        .slot.active-u { border-color: var(--gold); color: var(--gold); box-shadow: inset 0 0 5px var(--gold); }
        .slot.active-ai { border-color: #4285F4; color: #4285F4; }

        /* CHAT STREAM (Где рождается шедевр) */
        .stream { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { border-left: 2px solid var(--gold); padding: 10px 20px; background: rgba(255,215,0,0.03); }

        /* INPUT PANEL v.7.8 (Оптимизированная) */
        .input-panel-78 {
            display: grid; grid-template-columns: 1fr 1fr;
            border-top: 2px solid var(--gold); background: #000;
            height: 80px; /* Компактная высота для одной строки */
        }

        .participant-zone { display: flex; border-right: 2px solid var(--gold); }
        .participant-zone:last-child { border-right: none; }

        /* Колонна управления */
        .control-col {
            width: 120px; display: flex; flex-direction: column;
            border-right: 1px solid var(--gold); justify-content: space-around;
            padding: 5px; background: rgba(255,215,0,0.05);
        }

        .avatar-label { font-size: 10px; font-weight: 900; text-align: center; }

        .mint-btn-std {
            background: var(--gold); color: #000; border: none;
            cursor: pointer; font-weight: 900; font-size: 10px;
            padding: 4px 0; border-radius: 2px; transition: 0.2s;
        }
        .mint-btn-std:hover { background: #fff; }

        /* Колонна ввода */
        .input-col { flex: 1; display: flex; align-items: center; }
        
        input { 
            width: 100%; background: transparent; border: none; color: var(--gold); 
            font-family: 'Courier New'; font-size: 1.2rem; outline: none; 
            padding: 0 20px; box-sizing: border-box;
        }
    </style>
</head>
<body data-version="7.8">

    <header class="header">
        <div id="google_translate_element"></div>
        <a href="ai_room_retro_base.html" class="back-btn">RETURN TO BASE</a>
        <div class="logo-right">GY-GY</div>
    </header>

    <div class="matrix-strip" id="matrix"></div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-panel-78">
        <div class="participant-zone">
            <div class="control-col">
                <div class="avatar-label">USER_1</div>
                <button class="mint-btn-std" onclick="mint('u_line')">MINT</button>
            </div>
            <div class="input-col">
                <input type="text" id="u_line" placeholder="TYPE YOUR LINE..." onkeydown="if(event.key==='Enter') mint('u_line')">
            </div>
        </div>

        <div class="participant-zone">
            <div class="control-col">
                <div class="avatar-label" style="color:#4285F4;">GEMINI</div>
                <button class="mint-btn-std" onclick="mint('g_line')">MINT</button>
            </div>
            <div class="input-col">
                <input type="text" id="g_line" placeholder="AI RESPONSE..." onkeydown="if(event.key==='Enter') mint('g_line')">
            </div>
        </div>
    </div>

    <script>
        const chatStream = document.getElementById('chat-stream');

        function initMatrix() {
            const matrix = document.getElementById('matrix');
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="slot ${i===1?'active-u':''}">U${i}</div>`;
            ['G', 'GR', 'CL', 'MS'].forEach(n => html += `<div class="slot active-ai">${n}</div>`);
            matrix.innerHTML = html;
        }

        function mint(id) {
            const input = document.getElementById(id);
            const val = input.value.trim().toUpperCase();
            if(!val) return;

            const author = id.startsWith('u') ? 'USER_1' : 'GEMINI';
            chatStream.innerHTML += `
                <div class="msg">
                    <span style="font-size: 0.7rem; opacity: 0.5;">@${author}</span><br>
                    ${val}
                </div>`;
            
            input.value = '';
            chatStream.scrollTop = chatStream.scrollHeight;
            localStorage.setItem('gy78_history', chatStream.innerHTML);
        }

        window.onload = () => {
            initMatrix();
            const saved = localStorage.getItem('gy78_history');
            if(saved) chatStream.innerHTML = saved;
        };

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
