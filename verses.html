<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB | v. 6.1</title>
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #050505;
            --ai-blue: #00d4ff;
            --user-green: #00ff41;
        }

        body {
            background: var(--deep-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- HEADER 6.1 --- */
        .header-6-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: #000;
            border-bottom: 2px solid var(--gold);
        }

        /* Лево: Гугл-блок (заглушка) */
        .lang-block { width: 160px; height: 34px; background: #222; border-radius: 4px; border: 1px solid #444; }

        /* Право: Золотой GY-GY и Return */
        .nav-group { display: flex; align-items: center; gap: 30px; }
        .logo-gold { color: var(--gold); font-size: 28px; font-weight: 900; letter-spacing: 5px; }
        .btn-return { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 18px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        /* --- МАТРИЦА 14 (10 Участников + 4 ИИ) --- */
        .matrix-14 {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .slot {
            height: 60px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            position: relative;
        }

        /* Состояния слотов */
        .slot.active-typing { border-color: var(--gold); box-shadow: inset 0 0 10px var(--gold); transform: scale(1.05); z-index: 10; }
        .slot.is-ai { border-bottom: 2px solid var(--ai-blue); }
        .slot.is-user { border-bottom: 2px solid var(--user-green); }

        .id-label { font-size: 8px; color: #888; margin-top: 4px; text-transform: uppercase; }
        .avatar-mini { width: 30px; height: 30px; background: #222; border-radius: 2px; }

        /* --- КОНТЕНТ --- */
        .content-v6-1 { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px; }
        .chat-area { flex: 1; overflow-y: auto; padding-right: 15px; }
        
        .verse-line { margin-bottom: 12px; font-size: 1.1rem; line-height: 1.4; opacity: 0; transform: translateX(-10px); animation: slideIn 0.5s forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .input-v6-1 {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        input { flex: 1; background: #111; border: 1px solid #333; color: var(--gold); padding: 15px; outline: none; }
        .mint-btn { background: var(--gold); color: #000; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body data-version="6.1">

    <header class="header-6-1">
        <div class="lang-block" id="google_translate_element"></div>
        <div class="nav-group">
            <div class="logo-gold">GY-GY</div>
            <button class="btn-return" onclick="history.back()">Back</button>
        </div>
    </header>

    <div class="matrix-14" id="matrix">
        </div>

    <main class="content-v6-1">
        <div class="chat-area" id="output">
            <div class="verse-line" style="color: gray;">[Система] Ожидание инициализации 10 участников...</div>
        </div>

        <div class="input-v6-1">
            <input type="text" id="entry" placeholder="Введите GY-GY строку..." autofocus>
            <button class="mint-btn" onclick="submitLine()">MINT</button>
        </div>
    </main>

    <script>
        // Версия 6.1 Логика Матрицы
        const matrix = document.getElementById('matrix');
        const aiNames = ['Gemini', 'Grok', 'Claude', 'Mistral'];

        // Создаем 14 слотов
        for(let i=1; i<=14; i++) {
            const isAI = i > 10;
            const slot = document.createElement('div');
            slot.className = `slot ${isAI ? 'is-ai' : 'is-user'}`;
            slot.id = `slot-${i}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar-mini';
            // В v6.1 здесь будет генерация SVG-аватара по ID
            avatar.style.background = isAI ? '#004466' : '#222';
            
            const label = document.createElement('div');
            label.className = 'id-label';
            label.innerText = isAI ? aiNames[i-11] : `User-${i}`;

            slot.appendChild(avatar);
            slot.appendChild(label);
            matrix.appendChild(slot);
        }

        let currentTurn = 1; // Кто пишет сейчас

        function submitLine() {
            const input = document.getElementById('entry');
            if(!input.value) return;

            // Подсвечиваем активного участника
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-typing'));
            document.getElementById(`slot-${currentTurn}`).classList.add('active-typing');

            const out = document.getElementById('output');
            out.innerHTML += `<div class="verse-line"><strong>${currentTurn <= 10 ? 'User-'+currentTurn : aiNames[currentTurn-11]}:</strong> ${input.value}</div>`;
            
            input.value = "";
            out.scrollTop = out.scrollHeight;

            // Логика перехода хода (упрощенная для теста)
            currentTurn = (currentTurn % 14) + 1;
        }
    </script>
</body>
</html>
