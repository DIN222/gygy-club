
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY | MOBILE TERMINAL v.7.9</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-bottom: 1px solid var(--gold);
        }
        #google_translate_element { transform: scale(0.8); transform-origin: left; }
        .logo-small { font-weight: 900; letter-spacing: 2px; font-size: 18px; }

        /* MATRIX SCROLL (Верхние аватары) */
        .matrix-scroll {
            display: flex; overflow-x: auto; gap: 10px; padding: 10px;
            border-bottom: 2px solid var(--gold); background: #050505;
            -webkit-overflow-scrolling: touch;
        }
        .matrix-scroll::-webkit-scrollbar { display: none; } /* Скрываем скроллбар для эстетики */
        
        .avatar-circle {
            min-width: 45px; height: 45px; border-radius: 50%;
            border: 1px solid #333; display: flex; align-items: center;
            justify-content: center; font-size: 10px; flex-shrink: 0;
        }
        .avatar-circle.active-u { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); color: var(--gold); }
        .avatar-circle.active-ai { border-color: #4285F4; color: #4285F4; }

        /* CHAT STREAM */
        .stream { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { border-left: 2px solid var(--gold); padding: 5px 12px; font-size: 0.9rem; }

        /* MOBILE INPUT PANEL (Стек) */
        .input-panel-mobile {
            border-top: 2px solid var(--gold); background: #000;
            display: flex; flex-direction: column; padding: 5px;
        }

        .input-row {
            display: flex; align-items: center; gap: 8px; padding: 5px 0;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .input-row:last-child { border-bottom: none; }

        /* Мини-аватар и кнопка в один столбик */
        .control-mini { display: flex; flex-direction: column; gap: 4px; align-items: center; min-width: 50px; }
        .mini-id { font-size: 9px; font-weight: 900; }
        .mint-btn-sm { 
            background: var(--gold); color: #000; border: none; 
            font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 2px;
        }

        input { 
            flex: 1; background: #111; border: 1px solid #333; color: var(--gold); 
            padding: 10px; font-family: 'Courier New'; font-size: 0.9rem; border-radius: 4px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div id="google_translate_element"></div>
        <div class="logo-small">GY-GY</div>
        <a href="ai_room_retro_base.html" style="color:var(--gold); font-size:10px; text-decoration:none; border:1px solid var(--gold); padding:4px 8px;">BACK</a>
    </header>

    <div class="matrix-scroll" id="matrix">
        </div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-panel-mobile">
        <div class="input-row">
            <div class="control-mini">
                <span class="mini-id">U1</span>
                <button class="mint-btn-sm" onclick="mint('u_line')">MINT</button>
            </div>
            <input type="text" id="u_line" placeholder="ТВОЯ СТРОКА..." onkeydown="if(event.key==='Enter') mint('u_line')">
        </div>

        <div class="input-row">
            <div class="control-mini">
                <span class="mini-id" style="color:#4285F4;">G✦</span>
                <button class="mint-btn-sm" onclick="mint('g_line')">MINT</button>
            </div>
            <input type="text" id="g_line" placeholder="ОТВЕТ ИИ...">
        </div>
    </div>

    <script>
        function initMatrix() {
            const matrix = document.getElementById('matrix');
            let html = '';
            for(let i=1; i<=10; i++) {
                html += `<div class="avatar-circle ${i===1?'active-u':''}">U${i}</div>`;
            }
            ['G', 'GR', 'CL', 'MS'].forEach(n => {
                html += `<div class="avatar-circle active-ai">${n}</div>`;
            });
            matrix.innerHTML = html;
        }

        function mint(id) {
            const input = document.getElementById(id);
            const val = input.value.trim().toUpperCase();
            if(!val) return;
            const author = id.startsWith('u') ? 'USER_1' : 'GEMINI';
            document.getElementById('chat-stream').innerHTML += `<div class="msg"><span style="font-size:0.7rem; opacity:0.5;">@${author}</span><br>${val}</div>`;
            input.value = '';
            document.getElementById('chat-stream').scrollTop = document.getElementById('chat-stream').scrollHeight;
        }

        window.onload = initMatrix;

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
