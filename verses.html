
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY | VERSES TERMINAL v.7.3</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase;
        }

        /* HEADER — Триада */
        .header {
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
            padding: 8px 25px; border-bottom: 1px solid var(--gold); background: #000;
        }
        #google_translate_element { border: 1px solid var(--gold); padding: 2px; font-size: 9px; width: fit-content; }
        .back-btn { 
            justify-self: center; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); 
            padding: 3px 20px; font-size: 11px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .logo-right { justify-self: end; font-size: 20px; font-weight: 900; letter-spacing: 4px; }

        /* MICRO-MATRIX 14 (Компактная) */
        .matrix-strip {
            display: grid; grid-template-columns: repeat(14, 1fr);
            background: #000; border-bottom: 2px solid var(--gold); padding: 2px; gap: 2px;
        }
        .slot {
            padding: 4px 0; border: 1px solid #222; text-align: center; font-size: 9px;
            color: #444; cursor: pointer; transition: 0.3s;
        }
        .slot.active-u { border-color: var(--gold); color: var(--gold); box-shadow: inset 0 0 5px var(--gold); }
        .slot.active-ai { border-color: #4285F4; color: #4285F4; }
        .slot:hover { background: #111; }

        /* CHAT STREAM */
        .stream { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { border-left: 2px solid var(--gold); padding: 8px 15px; background: rgba(255,215,0,0.02); }

        /* INPUT BLOCK — Дуэльная Рамка */
        .input-complex {
            border-top: 2px solid var(--gold); background: #000; display: grid; grid-template-columns: 1fr 1fr;
        }
        .user-block { border-right: 1px solid var(--gold); display: flex; flex-direction: column; }
        .block-header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 10px; background: rgba(255,215,0,0.1); border-bottom: 1px solid var(--gold);
            font-size: 9px; font-weight: 900;
        }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .lang-cell { border-right: 1px solid rgba(255,215,0,0.2); }
        .lang-cell:last-child { border-right: none; }
        
        input { 
            width: 100%; background: transparent; border: none; color: var(--gold); 
            font-family: 'Courier New'; font-size: 0.8rem; outline: none; padding: 10px;
        }
        .mint-inline { 
            background: var(--gold); color: #000; border: none; font-size: 9px; 
            font-weight: 900; padding: 1px 6px; cursor: pointer;
        }
    </style>
</head>
<body data-version="7.3">

    <header class="header">
        <div id="google_translate_element"></div>
        <a href="ai_room_retro_base.html" class="back-btn">RETURN TO BASE</a>
        <div class="logo-right">GY-GY</div>
    </header>

    <div class="matrix-strip" id="matrix">
        </div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-complex">
        <div class="user-block">
            <div class="block-header">
                <span>[U1] USER_1</span>
                <button class="mint-inline" onclick="mint('u_ru')">MINT RU</button>
            </div>
            <div class="lang-grid">
                <div class="lang-cell"><input type="text" id="u_ru" placeholder="RU_VERSE..."></div>
                <div class="lang-cell"><input type="text" id="u_en" placeholder="EN_VERSE..."></div>
            </div>
        </div>

        <div class="ai-block">
            <div class="block-header" style="border-bottom: 1px solid var(--gold);">
                <span style="color:#4285F4;">[G✦] GEMINI</span>
                <button class="mint-inline" onclick="mint('g_ru')">MINT RU</button>
            </div>
            <div class="lang-grid">
                <div class="lang-cell"><input type="text" id="g_ru" placeholder="RU_RESPONSE..."></div>
                <div class="lang-cell"><input type="text" id="g_en" placeholder="EN_RESPONSE..."></div>
            </div>
        </div>
    </div>

    <script>
        const chatStream = document.getElementById('chat-stream');

        function initMatrix() {
            const matrix = document.getElementById('matrix');
            let html = '';
            for(let i=1; i<=10; i++) {
                html += `<div class="slot ${i===1?'active-u':''}">U${i}</div>`;
            }
            const ai = ['G', 'GR', 'CL', 'MS'];
            ai.forEach(n => {
                html += `<div class="slot active-ai">${n}</div>`;
            });
            matrix.innerHTML = html;
        }

        function mint(id) {
            const input = document.getElementById(id);
            const val = input.value.trim().toUpperCase();
            if(!val) return;

            const author = id.startsWith('u') ? 'USER_1' : 'GEMINI';
            chatStream.innerHTML += `
                <div class="msg">
                    <span style="font-size: 0.65rem; opacity: 0.5;">@${author}</span><br>
                    ${val}
                </div>`;
            
            input.value = '';
            chatStream.scrollTop = chatStream.scrollHeight;
            localStorage.setItem('gy73_history', chatStream.innerHTML);
        }

        window.onload = () => {
            initMatrix();
            const saved = localStorage.getItem('gy73_history');
            if(saved) chatStream.innerHTML = saved;
        };

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
