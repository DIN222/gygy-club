
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY | VERSES v.8.2</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        
        body { 
            background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            text-transform: uppercase;
        }

        /* HEADER — Возврат к истокам */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 2px solid var(--gold); background: #000;
        }
        #google_translate_element { transform: scale(0.8); transform-origin: left; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 10px; border: 1px solid var(--gold); padding: 4px 8px; }
        .logo-right { font-weight: 900; letter-spacing: 3px; font-size: 20px; }

        /* MATRIX 7 — Компактные аватары */
        .matrix {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 8px;
            background: #080808; border-bottom: 1px solid var(--gold);
        }
        .slot { 
            aspect-ratio: 1; border: 1px solid #333; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: 900;
        }
        .slot.active-u { border-color: var(--gold); box-shadow: inset 0 0 5px var(--gold); color: var(--gold); }
        .slot.active-ai { border-color: #4285F4; color: #4285F4; }

        /* CHAT STREAM — Место рождения шедевра */
        .stream { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
        }
        .msg { border-left: 2px solid var(--gold); padding: 5px 15px; max-width: 90%; }
        .msg.ai { border-left-color: #4285F4; align-self: flex-end; text-align: right; border-left: none; border-right: 2px solid #4285F4; }
        .author { font-size: 9px; opacity: 0.6; margin-bottom: 4px; display: block; }

        /* INPUT BLOCK — Золотая рамка */
        .input-zone {
            padding: 15px; background: #000; border-top: 2px solid var(--gold);
            display: flex; gap: 10px; align-items: center;
        }
        input { 
            flex: 1; background: #000; border: 1px solid #444; color: var(--gold); 
            padding: 12px; font-family: 'Courier New'; font-size: 16px; outline: none;
        }
        
        /* КНОПКА MINT — ЗОЛОТО НА ЧЕРНОМ */
        .mint-btn { 
            background: #000; color: var(--gold); 
            border: 2px solid var(--gold); 
            padding: 10px 18px; font-weight: 900; 
            font-size: 12px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            transition: 0.3s;
        }
        .mint-btn:active { background: var(--gold); color: #000; }

    </style>
</head>
<body>

    <header class="header">
        <div id="google_translate_element"></div>
        <a href="ai_room_retro_base.html" class="back-link">BACK</a>
        <div class="logo-right">GY-GY</div>
    </header>

    <div class="matrix">
        <div class="slot active-u">U1</div>
        <div class="slot">U2</div>
        <div class="slot">U3</div>
        <div class="slot">U4</div>
        <div class="slot">U5</div>
        <div class="slot active-ai">G</div>
        <div class="slot active-ai" style="color:#FF4500;">GR</div>
    </div>

    <main class="stream" id="chat-stream"></main>

    <div class="input-zone">
        <input type="text" id="user-input" placeholder="MINT YOUR VERSE..." autocomplete="off">
        <button class="mint-btn" onclick="sendVerse()">MINT</button>
    </div>

    <script>
        const chat = document.getElementById('chat-stream');
        const input = document.getElementById('user-input');

        function sendVerse() {
            const text = input.value.trim().toUpperCase();
            if(!text) return;

            // User msg
            addMessage('USER_1', text, 'user');
            input.value = '';

            // AI response delay
            setTimeout(() => {
                addMessage('GEMINI', 'РИТМ ПОДХВАЧЕН. БЛОК ЗАКРЫТ.', 'ai');
            }, 800);
        }

        function addMessage(author, text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<span class="author">@${author}</span><div class="text">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            localStorage.setItem('gy82_history', chat.innerHTML);
        }

        window.onload = () => {
            const saved = localStorage.getItem('gy82_history');
            if(saved) chat.innerHTML = saved;
        };

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendVerse(); });

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
