
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY MINTING ENGINE v.6.5</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --panel: #111; --gemini: #4285F4; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 2px solid var(--gold); background: #000; }
        .logo { color: var(--gold); font-size: 24px; font-weight: 900; letter-spacing: 5px; }

        /* MATRIX 14 */
        .matrix { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; padding: 10px; background: var(--panel); }
        .slot { border: 1px solid #333; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; cursor: pointer; position: relative; transition: 0.3s; }
        .slot.active { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .slot:hover { background: #222; }
        .invoke-btn { position: absolute; bottom: 2px; font-size: 7px; background: var(--gold); color: #000; border: none; padding: 1px 3px; border-radius: 2px; opacity: 0; }
        .slot:hover .invoke-btn { opacity: 1; }

        /* CHAT AREA */
        .chat-flow { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .stanza { border-left: 2px solid #222; padding-left: 20px; margin-bottom: 20px; }
        .line { font-size: 1.2rem; margin: 5px 0; display: flex; gap: 10px; }
        .author { color: var(--gold); font-weight: bold; width: 100px; font-size: 0.8rem; }

        /* INPUT */
        .input-zone { padding: 30px; background: #000; border-top: 1px solid #222; display: flex; gap: 20px; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--gold); padding: 15px; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 0 40px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body data-version="6.5">

    <header class="header">
        <div id="google_translate_element">LANG</div>
        <div class="logo">GY-GY</div>
        <button onclick="resetAll()" style="background:none; border:1px solid #444; color:#444; cursor:pointer;">RESET</button>
    </header>

    <div class="matrix" id="matrix"></div>

    <main class="chat-flow" id="flow"></main>

    <div class="input-zone">
        <input type="text" id="userInput" placeholder="START MINTING..." autofocus>
        <button class="btn-main" onclick="pushLine('User 1')">MINT</button>
    </div>

    <script>
        const flow = document.getElementById('flow');
        const input = document.getElementById('userInput');
        const models = ['GEMINI', 'GROK', 'CLAUDE', 'MISTRAL'];

        // Инициализация Матрицы
        function init() {
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="slot" id="u${i}">U${i}<div class="slot-label">USER</div></div>`;
            models.forEach(m => {
                html += `<div class="slot" style="color:var(--gemini)" onclick="invokeAI('${m}')">
                            ${m[0]}<div class="slot-label">${m}</div>
                            <button class="invoke-btn">INVOKE</button>
                         </div>`;
            });
            document.getElementById('matrix').innerHTML = html;
            load();
        }

        function pushLine(author) {
            const val = input.value.trim();
            if(!val) return;
            renderLine(author, val);
            input.value = '';
            save();
        }

        function renderLine(author, text) {
            if(flow.children.length === 0 || flow.lastChild.children.length >= 4) {
                const stanza = document.createElement('div');
                stanza.className = 'stanza';
                flow.appendChild(stanza);
            }
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="author">@${author}:</span><span>${text}</span>`;
            flow.lastChild.appendChild(line);
            flow.scrollTop = flow.scrollHeight;
        }

        function invokeAI(name) {
            const lines = Array.from(document.querySelectorAll('.line'));
            const context = lines.map(l => l.innerText).join('\n');
            const prompt = `GY-GY PROTOCOL v6.5\nCONTEXT:\n${context}\n\nTASK: Write 1 next rhyming line. NO prose. NO chat. Just 1 line of poetry.`;
            
            navigator.clipboard.writeText(prompt);
            alert(`${name} INVOKED! Prompt copied to clipboard. Paste it in their chat.`);
        }

        function save() { localStorage.setItem('gy65', flow.innerHTML); }
        function load() { 
            const data = localStorage.getItem('gy65');
            if(data) flow.innerHTML = data; 
        }
        function resetAll() { localStorage.removeItem('gy65'); location.reload(); }

        init();
    </script>
</body>
</html>
