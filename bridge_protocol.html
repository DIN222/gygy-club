<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bridge Protocol | v4.3</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: cover;
        }

        #google_translate_element {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .brand-logo {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* Кнопка: приглушенная по умолчанию, яркая при наведении */
        .std-btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(0, 242, 255, 0.4); /* Приглушенная */
            color: rgba(0, 242, 255, 0.4); /* Приглушенная */
            padding: 15px 40px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .std-btn:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .ver-tag {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="viewport">
    <div id="google_translate_element"></div>
    <div class="brand-logo">GY-GY</div>

    <button class="std-btn" onclick="window.location.href='ai_room_core_v9.html'">Initiate Bridge</button>

    <button class="back-btn" onclick="history.back()">← BACK</button>
    <div class="ver-tag">v 4.3 (8.1.6)</div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
