<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bridge Protocol | v4.3</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ДЛЯ ФОНА */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: cover; /* Заполняет весь экран */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Блок Google Translate */
        #google_translate_element {
            position: absolute;
            top: 25px;
            left: 30px;
            z-index: 1000;
        }

        /* Логотип GY-GY */
        .brand-logo {
            position: absolute;
            top: 25px;
            right: 40px;
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 5px;
            z-index: 1000;
        }

        /* КНОПКА: Приглушенная, без заливки, становится яркой при наведении */
        .std-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 242, 255, 0.4); /* Приглушенный неон */
            color: rgba(0, 242, 255, 0.5);
            padding: 18px 50px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100;
        }

        .std-btn:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        /* Кнопка возврата */
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: none;
            border: 1px solid rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.5);
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .version-tag {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="viewport">
    <div id="google_translate_element"></div>
    <div class="brand-logo">GY-GY</div>

    <button class="std-btn" onclick="window.location.href='ai_room_core_v9.html'">Initiate Bridge</button>

    <button class="back-btn" onclick="history.back()">← BACK</button>
    <div class="version-tag">v 4.3 | BRIDGE PROTOCOL</div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
