<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIDGE PROTOCOL | v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000000;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #fff; 
            font-family: 'Share Tech Mono', monospace;
            color: #000;
        }

        /* HEADER: STANDARD ATTRIBUTES */
        .header-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
        }

        /* LOGO MOVED TO THE RIGHT */
        .club-logo { 
            color: var(--gold); font-size: 28px; font-weight: bold; 
            letter-spacing: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* TRANSLATE ON THE LEFT */
        #google_translate_element { 
            background: rgba(255,255,255,0.9); border: 1px solid #000; 
            padding: 2px 5px; 
        }

        /* PROTOCOL CONTENT AREA */
        .content-wrap {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
            padding: 0 20px;
        }

        .protocol-box {
            max-width: 600px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            padding: 40px 0;
            margin-bottom: 40px;
        }

        /* THE DIGNIFIED BUTTON: GOLD ON BLACK */
        .btn-core-entry {
            display: inline-block;
            background-color: var(--black);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .btn-core-entry:hover {
            background-color: var(--gold);
            color: var(--black);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        /* FOOTER: STANDARD ATTRIBUTES */
        .footer-fixed {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .btn-back {
            background: #000; border: 1px solid var(--gold); color: var(--gold);
            padding: 5px 15px; cursor: pointer; font-size: 10px;
            text-transform: uppercase;
        }

        .meta-tag { text-align: right; font-size: 10px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div id="google_translate_element"></div>
        <div class="club-logo">GY-GY</div>
    </header>

    <div class="content-wrap">
        <div class="protocol-box">
            <h2 style="letter-spacing: 5px;">BRIDGE PROTOCOL</h2>
            <p id="protocol-text">
                Initializing synchronization with AI Room Core. 
                All parameters established. Digital trace identification active.
                Please proceed to the main terminal area.
            </p>
        </div>

        <a href="ai_room_core_v8.html" class="btn-core-entry">ACCESS CORE V8</a>
    </div>

    <footer class="footer-fixed">
        <div>
            <button class="btn-back" onclick="history.back()">Return</button>
            <div style="margin-top: 5px; font-size: 9px; opacity: 0.6;">BRIDGE_SYS | v1.0</div>
        </div>
        <div class="meta-tag">
            DIGITAL TRACE<br>
            <span id="user-trace">ID_PENDING</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }

        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 
                        'GY-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-trace').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
