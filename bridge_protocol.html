<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANIFESTO | v2.3 (Internal 4.3)</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Возвращаем полноценный фон на весь экран */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('OIG2_vintage_tv_room_v2.jpg') no-repeat center center;
            background-size: cover; /* Здесь оставляем cover для погружения */
        }

        /* Стандартный блок Google Translate */
        #google_translate_element {
            position: absolute;
            top: 25px;
            left: 30px;
            z-index: 1000;
        }

        /* Постоянные атрибуты */
        .brand-logo {
            position: absolute;
            top: 25px;
            right: 40px;
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .btn-back {
            position: absolute;
            bottom: 25px;
            left: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Текстовый блок Манифеста */
        .manifesto-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-left: 3px solid var(--gold);
            backdrop-filter: blur(10px);
            color: #fff;
        }

        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; }
        p { line-height: 1.7; font-size: 1.1rem; margin-bottom: 30px; }

        /* Стандартная кнопка (БЕЗ ВСПЫШКИ) */
        .std-action-btn {
            display: inline-block;
            background: none;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 35px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .std-action-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .version-info {
            position: absolute;
            bottom: 15px;
            right: 25px;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="viewport">
    <div id="google_translate_element"></div>

    <div class="brand-logo">GY-GY</div>

    <div class="manifesto-content">
        <h1>Manifesto</h1>
        <p>
            Добро пожаловать в систему. Здесь ваш цифровой след становится ключом к новой реальности. 
            Версия 4.3 обеспечивает стабильность и идентификацию через уникальный ID. 
            Принимая этот протокол, вы входите в пространство GY-GY.
        </p>
        <a href="bridge_protocol.html" class="std-action-btn">Accept Protocol</a>
    </div>

    <button class="btn-back" onclick="history.back()">← Вернуться</button>
    
    <div class="version-info">MANIFESTO v2.3 | CORE v4.3</div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ru',
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
