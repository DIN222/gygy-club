
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; color: white; overflow: hidden; }

        /* --- GATEKEEPER --- */
        #entry-layer { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; transition: 0.5s; }
        .charlie-card { border: 1px solid var(--violet); padding: 40px; text-align: center; background: #050505; box-shadow: 0 0 30px rgba(138, 43, 226, 0.2); }
        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; cursor: pointer; margin-top: 20px; font-family: inherit; letter-spacing: 2px; }
        .reg-btn:hover { background: var(--gold); color: #000; }

        /* --- MAIN HALL --- */
        #hall-layer { 
            position: absolute; inset: 0; 
            background-color: #111; 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: cover; 
            display: none; 
        }

        #fortune-zone { position: absolute; top: 62%; left: 43%; width: 180px; height: 130px; cursor: pointer; z-index: 100; border: 1px solid rgba(212, 175, 55, 0.1); }
        #fortune-zone:hover { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* --- HUD & UI --- */
        #hud { position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 1500; opacity: 0; transition: 1s; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; }
        .lang-footer { position: fixed; bottom: 20px; right: 20px; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-card">
            <div style="font-size: 10px; color: var(--gold); margin-bottom: 15px;">BUILD v1.2.5</div>
            <p>Чарли: "Кхм... Оцифровка ID обязательна."</p>
            <button class="reg-btn" onclick="Core.register()">Оцифровать</button>
        </div>
    </div>

    <div id="hud">
        <img id="user-avatar" class="avatar" src="" alt="?">
        <span id="user-id" style="color: var(--gold)"></span>
    </div>

    <div id="hall-layer">
        <div id="fortune-zone" onclick="alert('Модуль Азарт-Фортуна: Калибровка...')"></div>
        <div class="lang-footer">RU | EN | BUILD v1.2.5</div>
    </div>

    <script>
        const Core = {
            // ФУНКЦИЯ ОПРЕДЕЛЕНИЯ ПУТИ
            getImgPath() {
                // Если мы на GitHub Pages, берем путь относительно текущей страницы
                const loc = window.location.pathname;
                const dir = loc.substring(0, loc.lastIndexOf('/'));
                return (dir ? dir + '/' : '') + 'lounge.jpg';
            },

            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter(id, avatar);
            },

            enter(id, avatar) {
                const hall = document.getElementById('hall-layer');
                const imgPath = this.getImgPath();

                // Принудительная загрузка через JS
                const bgImg = new Image();
                bgImg.src = imgPath;

                bgImg.onload = () => {
                    hall.style.backgroundImage = `url('${imgPath}')`;
                    this.transition();
                };

                bgImg.onerror = () => {
                    console.warn("Ошибка пути. Пробую запасной вариант...");
                    hall.style.backgroundImage = "url('lounge.jpg')";
                    this.transition();
                };

                // Данные пользователя
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-id').innerText = id;
            },

            transition() {
                document.getElementById('entry-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('entry-layer').style.display = 'none';
                    document.getElementById('hall-layer').style.display = 'block';
                    document.getElementById('hud').style.opacity = '1';
                }, 500);
            }
        };

        window.onload = () => {
            const id = localStorage.getItem('gygy_id');
            if (id) Core.enter(id, localStorage.getItem('gygy_avatar'));
        };
    </script>
</body>
</html>
