<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --violet: #8A2BE2;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            color: white;
            overflow: hidden;
        }

        /* --- LAYER 1: GATEKEEPER (CHARLIE) --- */
        #entry-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease-in-out;
        }

        .charlie-box {
            text-align: center;
            border: 1px solid var(--violet);
            padding: 30px;
            background: rgba(138, 43, 226, 0.05);
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: -12px; left: 20px;
            background: #000;
            color: var(--gold);
            font-size: 10px;
            padding: 0 10px;
            border: 1px solid var(--gold);
        }

        .reg-btn {
            margin-top: 25px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 35px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .reg-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* --- LAYER 2: MAIN LOUNGE --- */
        #hall-layer {
            position: relative;
            width: 100%; height: 100%;
            background: url('lounge_main_v1.jpg') no-repeat center center;
            background-size: cover;
            display: none; /* Ждем авторизации */
        }

        /* Интерактивная зона столика */
        #fortune-zone {
            position: absolute;
            top: 62%; left: 43%;
            width: 180px; height: 120px;
            cursor: pointer;
            z-index: 10;
        }

        #fortune-zone:hover::after {
            content: "АЗАРТ — ФОРТУНА";
            position: absolute;
            top: -35px; left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            font-size: 14px;
        }

        /* --- USER INTERFACE (HUD) --- */
        #hud {
            position: fixed;
            top: 20px; left: 20px;
            display: flex; align-items: center; gap: 12px;
            z-index: 1500;
            opacity: 0;
            transition: opacity 1s;
        }

        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: white;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* --- OVERLAY STUB --- */
        #modal {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center; align-items: center;
            z-index: 3000;
        }

        .modal-box {
            border: 1px solid var(--gold);
            padding: 40px;
            background: #050505;
            text-align: center;
        }

        .lang-footer {
            position: fixed; bottom: 20px; right: 25px;
            font-size: 11px; color: var(--gold);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-box">
            <span class="version-badge">v1.2.1</span>
            <p id="charlie-speech">Кхм-кхм... Кто это у нас тут? <br> Сначала регистрация ID, потом отдых.</p>
            <button class="reg-btn" onclick="Core.register()">ОЦИФРОВАТЬ ID</button>
        </div>
    </div>

    <div id="hud">
        <img id="hud-avatar" class="avatar" src="" alt="?">
        <span id="hud-id" style="color: var(--gold);"></span>
    </div>

    <div id="hall-layer">
        <div id="fortune-zone" onclick="Core.openModal()"></div>
        <div class="lang-footer">RU | EN | BUILD v1.2.1</div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box">
            <h2 style="color: var(--gold); margin-top:0;">АЗАРТ — ФОРТУНА</h2>
            <p>Ваш цифровой след распознан.<br>Модуль игры находится в разработке.</p>
            <small style="color: var(--violet); cursor:pointer;">[ ВЕРНУТЬСЯ В ЛАУНЖ ]</small>
        </div>
    </div>

    <script>
        const Core = {
            register() {
                const newID = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const newAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${newID}`;
                
                localStorage.setItem('gygy_id', newID);
                localStorage.setItem('gygy_avatar', newAvatar);
                
                this.enter(newID, newAvatar);
            },

            enter(id, avatar) {
                document.getElementById('entry-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('entry-layer').style.display = 'none';
                    document.getElementById('hall-layer').style.display = 'block';
                    document.getElementById('hud').style.opacity = '1';
                    document.getElementById('hud-avatar').src = avatar;
                    document.getElementById('hud-id').innerText = id;
                }, 800);
            },

            openModal() {
                document.getElementById('modal').style.display = 'flex';
            },

            checkAuth() {
                const id = localStorage.getItem('gygy_id');
                const avatar = localStorage.getItem('gygy_avatar');
                if (id) this.enter(id, avatar);
            }
        };

        window.onload = () => Core.checkAuth();
    </script>
</body>
</html>
