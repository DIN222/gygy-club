

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        /* --- ПОСТОЯННАЯ ПАНЕЛЬ ЯЗЫКОВ --- */
        #ui-lang-panel {
            position: fixed; bottom: 20px; right: 25px;
            z-index: 5000; color: var(--gold);
            font-size: 11px; letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px; border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer; transition: 0.3s;
        }
        #ui-lang-panel:hover { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* --- GATEKEEPER (ЧАРЛИ) --- */
        #entry-layer { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; 
        }
        .charlie-card { border: 1px solid var(--violet); padding: 40px; text-align: center; background: #0a0a0a; }

        /* --- LOUNGE HALL --- */
        #hall-layer { 
            width: 100vw; height: 100vh; 
            background: url('lounge.jpg') no-repeat center bottom / contain #000;
            position: relative; display: none;
        }

        /* ОБЩИЙ СТИЛЬ АБАЖУРОВ-КНОПОК */
        .lamp-zone {
            position: absolute;
            width: 40px; height: 40px; /* Уменьшено до размера абажура */
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: 0.4s;
        }
        .lamp-zone:hover {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.8) 0%, transparent 80%);
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }

        /* КООРДИНАТЫ 6 СТОЛИКОВ (АБАЖУРЫ) */
        #table-1 { bottom: 38%; left: 24%; } /* Риск-Фортуна (Ближний левый) */
        #table-2 { bottom: 42%; left: 38%; }
        #table-3 { bottom: 45%; left: 52%; }
        #table-4 { bottom: 48%; left: 15%; }
        #table-5 { bottom: 52%; left: 32%; }
        #table-6 { bottom: 55%; left: 48%; }

        /* --- HUD & NAVIGATION --- */
        #hud { 
            position: fixed; top: 20px; left: 20px; 
            display: flex; align-items: center; gap: 15px; 
            z-index: 1500; 
        }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; }
        
        .exit-btn {
            background: transparent; border: 1px solid var(--violet);
            color: var(--violet); font-family: inherit; font-size: 10px;
            padding: 5px 10px; cursor: pointer; margin-left: 10px;
            transition: 0.3s;
        }
        .exit-btn:hover { color: white; border-color: white; box-shadow: 0 0 10px white; }

        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; cursor: pointer; margin-top: 20px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="ui-lang-panel">ЯЗЫК: RU | EN</div>

    <div id="entry-layer">
        <div class="charlie-card">
            <div style="font-size: 9px; color: var(--gold); margin-bottom: 10px; opacity: 0.7;">GY-GY SYSTEM v1.3.0</div>
            <p>Чарли: "Кхм... Оцифруйте ваш след."</p>
            <button class="reg-btn" onclick="Core.register()">Оцифровать</button>
        </div>
    </div>

    <div id="hall-layer">
        <div id="hud">
            <img id="user-avatar" class="avatar" src="" alt="?">
            <div>
                <span id="user-id" style="color: var(--gold); display: block;"></span>
                <button class="exit-btn" onclick="Core.logout()">[ ВЫХОД / DE-ID ]</button>
            </div>
        </div>

        <div id="table-1" class="lamp-zone" onclick="alert('МОДУЛЬ: РИСК-ФОРТУНА (АКТИВЕН)')"></div>
        <div id="table-2" class="lamp-zone" onclick="alert('Стол 02: Подключение...')"></div>
        <div id="table-3" class="lamp-zone" onclick="alert('Стол 03: Подключение...')"></div>
        <div id="table-4" class="lamp-zone" onclick="alert('Стол 04: Подключение...')"></div>
        <div id="table-5" class="lamp-zone" onclick="alert('Стол 05: Подключение...')"></div>
        <div id="table-6" class="lamp-zone" onclick="alert('Стол 06: Подключение...')"></div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter(id, avatar);
            },

            enter(id, avatar) {
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-id').innerText = id;
                document.getElementById('entry-layer').style.display = 'none';
                document.getElementById('hall-layer').style.display = 'block';
            },

            logout() {
                localStorage.removeItem('gygy_id');
                localStorage.removeItem('gygy_avatar');
                location.reload(); // Полный сброс системы
            },

            checkAuth() {
                const savedId = localStorage.getItem('gygy_id');
                const savedAvatar = localStorage.getItem('gygy_avatar');
                if (savedId) this.enter(savedId, savedAvatar);
                else document.getElementById('entry-layer').style.display = 'flex';
            }
        };

        window.onload = () => Core.checkAuth();
    </script>
</body>
</html>
