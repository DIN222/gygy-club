<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --violet: #8A2BE2;
            --bg-dark: #050505;
            --table-bg: rgba(138, 43, 225, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Контейнер зала */
        .hall-interior {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            grid-gap: 80px;
            perspective: 1000px;
        }

        /* Общая логика столика */
        .table-unit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .table-unit:hover {
            transform: scale(1.1) translateY(-5px);
        }

        /* Лампы над столами */
        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-bottom: 15px;
            transition: box-shadow 0.3s ease;
        }

        .lamp.violet {
            background: var(--violet);
            box-shadow: 0 0 10px var(--violet), 0 0 20px rgba(138, 43, 226, 0.2);
        }

        .lamp.gold-glow {
            background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
            animation: pulse-gold 2.5s infinite;
        }

        /* Поверхность стола */
        .table-top {
            width: 120px;
            height: 60px;
            background: var(--table-bg);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 10px;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .special .table-top {
            border: 1px solid var(--gold);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* Всплывающая надпись при наведении */
        .hint-text {
            position: absolute;
            bottom: -35px;
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            text-shadow: 0 0 5px var(--gold);
        }

        .table-unit:hover .hint-text {
            opacity: 1;
        }

        /* Анимация для "Фортуны" */
        @keyframes pulse-gold {
            0% { opacity: 0.6; box-shadow: 0 0 10px var(--gold); }
            50% { opacity: 1; box-shadow: 0 0 25px var(--gold), 0 0 40px rgba(212,175,55,0.3); }
            100% { opacity: 0.6; box-shadow: 0 0 10px var(--gold); }
        }

        /* Окно-заглушка (Модалка) */
        #stub-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
        }

        #stub-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .stub-content {
            border: 1px solid var(--gold);
            background: #111;
            padding: 40px;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }

        .stub-content p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .close-hint {
            color: var(--violet);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Кнопки языков (по техпаспорту) */
        #lang-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 14px;
        }

        .lang-btn {
            background: none; border: none; color: #555;
            cursor: pointer; font-family: inherit; transition: 0.3s;
        }

        .lang-btn.active { color: var(--gold); text-shadow: 0 0 5px var(--gold); }
    </style>
</head>
<body>

    <div class="hall-interior">
        <div class="table-unit" onclick="openStub('Здесь ведутся важные переговоры. Не беспокоить.')">
            <div class="lamp violet"></div>
            <div class="table-top"></div>
        </div>

        <div class="table-unit special" onclick="openStub('Модуль «Азарт — Фортуна» в процессе калибровки рандома. Ожидайте v1.3.0')">
            <div class="lamp gold-glow"></div>
            <div class="table-top"></div>
            <div class="hint-text">Азарт — Фортуна</div>
        </div>

        <div class="table-unit" onclick="openStub('Столик забронирован Чарли для особых гостей.')">
            <div class="lamp violet"></div>
            <div class="table-top"></div>
        </div>

        <div class="table-unit" onclick="openStub('Этот терминал временно отключен от сети.')">
            <div class="lamp violet"></div>
            <div class="table-top"></div>
        </div>

        <div class="table-unit" onclick="openStub('Пусто. Только пыль и цифровые тени.')">
            <div class="lamp violet"></div>
            <div class="table-top"></div>
        </div>

        <div class="table-unit" onclick="openStub('Зарезервировано под склад Тренажера Миллионера.')">
            <div class="lamp violet"></div>
            <div class="table-top"></div>
        </div>
    </div>

    <div id="lang-panel">
        <button class="lang-btn active">RU</button>
        <span style="color: #333;">/</span>
        <button class="lang-btn">EN</button>
    </div>

    <div id="stub-overlay" onclick="closeStub()">
        <div class="stub-content">
            <p id="stub-text">Системное сообщение</p>
            <div class="close-hint">[ Нажмите, чтобы выйти ]</div>
        </div>
    </div>

    <script>
        function openStub(message) {
            const overlay = document.getElementById('stub-overlay');
            const text = document.getElementById('stub-text');
            text.innerText = message;
            overlay.classList.add('active');
        }

        function closeStub() {
            document.getElementById('stub-overlay').classList.remove('active');
        }

        // Лог в консоль для порядка
        console.log("GY-GY Club OS: v1.2.0 [Fortune Genesis] Loaded.");
    </script>
</body>
</html>
