<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --violet: #8A2BE2;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            color: white;
            overflow: hidden;
        }

        /* --- СЛОЙ 1: ЧАРЛИ (ВХОД) --- */
        #entry-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease-in-out;
        }

        .charlie-box {
            text-align: center;
            border: 1px solid var(--violet);
            padding: 40px;
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2);
        }

        /* --- СЛОЙ 2: ЗАЛ (ВИЗУАЛ) --- */
        #hall-layer {
            position: relative;
            width: 100vw; 
            height: 100vh;
            /* ВАЖНО: Прямое указание файла */
            background-image: url('lounge.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            display: none; 
        }

        /* Кликабельный столик Фортуна */
        #fortune-zone {
            position: absolute;
            top: 60%; left: 42%;
            width: 180px; height: 140px;
            cursor: pointer;
            z-index: 100;
            /* border: 1px dashed var(--gold); // Раскомментируй для отладки, если не видишь зону */
        }

        #fortune-zone:hover::after {
            content: "АЗАРТ — ФОРТУНА";
            position: absolute;
            top: -30px; left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            white-space: nowrap;
        }

        /* --- HUD УЧАСТНИКА --- */
        #hud {
            position: fixed;
            top: 20px; left: 20px;
            display: flex; align-items: center; gap: 12px;
            z-index: 1500;
            opacity: 0;
            transition: 1s;
        }

        .avatar-frame {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            overflow: hidden;
            background: #fff;
        }

        /* --- МОДАЛКА --- */
        #modal {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center; align-items: center;
            z-index: 3000;
        }

        .modal-box {
            border: 1px solid var(--gold);
            padding: 40px;
            background: #000;
            text-align: center;
        }

        .reg-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 30px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-box">
            <div style="color:var(--gold); font-size:10px; margin-bottom:10px;">BUILD v1.2.2</div>
            <p>Кхм-кхм... Нужно оцифровать <br> ваш цифровой след.</p>
            <button class="reg-btn" onclick="Core.register()">ОЦИФРОВАТЬ ID</button>
        </div>
    </div>

    <div id="hud">
        <div class="avatar-frame"><img id="hud-avatar" src="" style="width:100%"></div>
        <span id="hud-id" style="color: var(--gold);"></span>
    </div>

    <div id="hall-layer">
        <div id="fortune-zone" onclick="Core.openModal()"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box">
            <h2 style="color: var(--gold)">АЗАРТ — ФОРТУНА</h2>
            <p>Доступ подтвержден. Модуль в разработке.</p>
            <small style="color: var(--violet)">[ ВЕРНУТЬСЯ ]</small>
        </div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter(id, avatar);
            },
            enter(id, avatar) {
                document.getElementById('entry-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('entry-layer').style.display = 'none';
                    document.getElementById('hall-layer').style.display = 'block';
                    document.getElementById('hud').style.opacity = '1';
                    document.getElementById('hud-avatar').src = avatar;
                    document.getElementById('hud-id').innerText = id;
                }, 800);
            },
            openModal() { document.getElementById('modal').style.display = 'flex'; },
            check() {
                const id = localStorage.getItem('gygy_id');
                if (id) this.enter(id, localStorage.getItem('gygy_avatar'));
            }
        };
        window.onload = () => Core.check();
    </script>
</body>
</html>
