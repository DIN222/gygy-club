<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --violet: #8A2BE2;
            --version-tag: "v1.2.0";
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            color: white;
            overflow: hidden;
        }

        /* --- СЛОЙ 1: ВХОД И РЕГИСТРАЦИЯ (ЧАРЛИ) --- */
        #entry-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1s ease;
        }

        .charlie-gatekeeper {
            text-align: center;
            margin-bottom: 30px;
        }

        .speech-bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--violet);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin-bottom: 20px;
            position: relative;
        }

        /* Метка версии у Чарли */
        .version-label {
            position: absolute;
            top: -10px; right: 10px;
            font-size: 10px;
            color: var(--violet);
            background: #000;
            padding: 0 5px;
        }

        .reg-button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            cursor: pointer;
            font-family: 'Share Tech Mono', sans-serif;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .reg-button:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* --- СЛОЙ 2: ИНТЕРЬЕР ЗАЛА (ВИЗУАЛ) --- */
        #hall-layer {
            position: relative;
            width: 100%; height: 100%;
            background: url('https://files.catbox.moe/p9p66u.jpg') no-repeat center center;
            background-size: cover;
            display: none;
        }

        #fortune-table-zone {
            position: absolute;
            top: 60%; left: 42%;
            width: 160px; height: 120px;
            cursor: pointer;
            z-index: 10;
        }

        #fortune-table-zone:hover::after {
            content: "Азарт — Фортуна";
            position: absolute;
            top: -30px; left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        /* --- СИСТЕМНЫЕ ЭЛЕМЕНТЫ --- */
        #user-hud {
            position: fixed;
            top: 20px; left: 20px;
            display: flex; align-items: center; gap: 10px;
            z-index: 1500;
            visibility: hidden;
        }

        .avatar-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            background: #fff;
        }

        #stub-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center; align-items: center;
            z-index: 3000;
        }

        .stub-box {
            border: 1px solid var(--gold);
            padding: 30px;
            text-align: center;
            background: #0a0a0a;
        }

        .lang-btn {
            position: fixed; bottom: 20px; right: 20px;
            color: var(--gold); font-size: 12px; z-index: 1500;
        }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-gatekeeper">
            <div class="speech-bubble">
                <span class="version-label">v1.2.0</span>
                <div id="charlie-text">
                    Кхм-кхм... Протокол входа активен. Для доступа в Lounge Fortune необходимо зафиксировать ваш цифровой след.
                </div>
            </div>
            <button class="reg-button" onclick="Identity.register()">ОЦИФРОВАТЬ ID</button>
        </div>
    </div>

    <div id="user-hud">
        <img id="user-avatar" class="avatar-circle" src="" alt="ID">
        <span id="user-id-label" style="color: var(--gold); font-size: 12px;"></span>
    </div>

    <div id="hall-layer">
        <div id="fortune-table-zone" onclick="openStub()"></div>
        <div class="lang-btn">RU
