
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; color: white; overflow: hidden; }

        /* --- GATEKEEPER --- */
        #entry-layer { 
            position: fixed; inset: 0; background: #000; 
            display: none; /* Скрыто по умолчанию, включается если нет ID */
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; 
        }
        .charlie-card { border: 1px solid var(--violet); padding: 40px; text-align: center; background: #050505; }
        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; cursor: pointer; margin-top: 20px; font-family: inherit; letter-spacing: 2px; }

        /* --- MAIN HALL --- */
        #hall-layer { 
            position: absolute; inset: 0; 
            background-image: url('lounge.jpg'); 
            background-repeat: no-repeat; background-position: center center; background-size: cover; 
            display: none; 
        }

        #fortune-zone { position: absolute; top: 62%; left: 43%; width: 180px; height: 130px; cursor: pointer; z-index: 100; border: 1px solid rgba(212, 175, 55, 0.1); }
        #fortune-zone:hover { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* --- UI ELEMENTS --- */
        #hud { position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 1500; display: none; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; }
        .lang-footer { position: fixed; bottom: 20px; right: 20px; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-card">
            <div style="font-size: 10px; color: var(--gold); margin-bottom: 15px;">BUILD v1.2.6</div>
            <p>Чарли: "Кхм... Кто здесь? Оцифруйте ID."</p>
            <button class="reg-btn" onclick="Core.register()">Оцифровать</button>
        </div>
    </div>

    <div id="hud">
        <img id="user-avatar" class="avatar" src="" alt="?">
        <span id="user-id" style="color: var(--gold)"></span>
    </div>

    <div id="hall-layer">
        <div id="fortune-zone" onclick="alert('Модуль Азарт-Фортуна в калибровке...')"></div>
        <div class="lang-footer">RU | EN | BUILD v1.2.6</div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter(id, avatar);
            },

            enter(id, avatar) {
                // Мгновенная подготовка данных
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-id').innerText = id;
                
                // Переключение слоев
                document.getElementById('entry-layer').style.display = 'none';
                document.getElementById('hall-layer').style.display = 'block';
                document.getElementById('hud').style.display = 'flex';
            },

            checkAuth() {
                const savedId = localStorage.getItem('gygy_id');
                const savedAvatar = localStorage.getItem('gygy_avatar');

                if (savedId) {
                    // ЕСЛИ ID ЕСТЬ: Сразу в зал
                    this.enter(savedId, savedAvatar);
                } else {
                    // ЕСЛИ ID НЕТ: Показываем Чарли
                    document.getElementById('entry-layer').style.display = 'flex';
                }
            }
        };

        // Запуск проверки при загрузке
        window.onload = () => Core.checkAuth();
    </script>
</body>
</html>
