
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.3.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* ПОСТОЯННЫЕ АТРИБУТЫ */
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 6000; }
        #ui-logo { position: fixed; top: 15px; right: 25px; z-index: 5000; color: var(--gold); font-size: 24px; font-weight: bold; letter-spacing: 5px; }

        #hall-layer { 
            width: 100vw; height: 100vh; 
            background: url('lounge.jpg') no-repeat center bottom / contain #000; 
            position: relative; display: none; 
        }
        
        /* ФИОЛЕТОВЫЕ СВЕТЛЯЧКИ (УНИФИЦИРОВАННЫЕ) */
        .lamp-zone { 
            position: absolute; width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; z-index: 100; 
            background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); 
            border: 1px solid var(--violet); 
            box-shadow: 0 0 15px var(--neon-glow);
            transition: all 0.3s ease-in-out;
            transform: translate(-50%, -50%); 
        }
        .lamp-zone:hover { 
            background: radial-gradient(circle, var(--violet) 0%, transparent 80%);
            box-shadow: 0 0 25px var(--violet);
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* КОРРЕКТИРОВКА: -5% ВНИЗ ОТ ПРЕДЫДУЩИХ ЗНАЧЕНИЙ */
        #table-1 { bottom: 52.2%; left: 49.9%; } /* РИСКИ (-5%) */
        #table-2 { bottom: 25.1%; left: 35.7%; } 
        #table-3 { bottom: 36.1%; left: 43.1%; } 
        #table-4 { bottom: 39.1%; left: 44.5%; } 
        #table-5 { bottom: 38.7%; left: 56.2%; } 
        #table-6 { bottom: 24.9%; left: 63.8%; } 
        #mic-zone { bottom: 35.4%; left: 58.3%; border-width: 2px; }

        #hud { position: fixed; top: 70px; left: 20px; display: flex; align-items: center; gap: 12px; z-index: 1500; }
        .back-btn { background: transparent; border: 1px solid var(--violet); color: var(--violet); padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 10px; }

        #entry-layer { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; cursor: pointer; margin-top: 20px; font-family: inherit; }
    </style>
</head>
<body>
    <div id="google_translate_element"></div>
    <div id="ui-logo">GY-GY</div>

    <div id="entry-layer">
        <div style="border: 1px solid var(--violet); padding: 40px; text-align: center; background: #050505;">
            <p id="charlie-msg">Чарли: "Оцифруйте ID для входа в Lounge."</p>
            <button id="gate-btn" class="reg-btn" onclick="Core.register()">Оцифровать</button>
        </div>
    </div>

    <div id="hall-layer">
        <div id="hud">
            <img id="user-avatar" style="width:40px; height:40px; border-radius:50%; border:1px solid var(--gold); background:#fff;">
            <button class="back-btn" onclick="Core.backToBar()">← В БАР</button>
        </div>
        <div id="table-1" class="lamp-zone" onclick="location.href='risk.html'"></div>
        <div id="table-2" class="lamp-zone"></div>
        <div id="table-3" class="lamp-zone"></div>
        <div id="table-4" class="lamp-zone"></div>
        <div id="table-5" class="lamp-zone"></div>
        <div id="table-6" class="lamp-zone"></div>
        <div id="mic-zone" class="lamp-zone"></div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`);
                this.enter();
            },
            enter() {
                if(!localStorage.getItem('gygy_id')) return;
                document.getElementById('user-avatar').src = localStorage.getItem('gygy_avatar');
                document.getElementById('entry-layer').style.display = 'none';
                document.getElementById('hall-layer').style.display = 'block';
            },
            backToBar() {
                document.getElementById('hall-layer').style.display = 'none';
                document.getElementById('entry-layer').style.display = 'flex';
                document.getElementById('gate-btn').innerText = 'К СТОЛАМ';
                document.getElementById('gate-btn').onclick = () => Core.enter();
            }
        };
        window.onload = () => { if(localStorage.getItem('gygy_id')) Core.enter(); };
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element'); }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
