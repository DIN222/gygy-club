

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* --- ПАНЕЛЬ ЯЗЫКОВ (ФИКС) --- */
        #ui-lang-panel {
            position: fixed; bottom: 20px; right: 25px;
            z-index: 9999; color: var(--gold);
            font-size: 11px; letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px; border: 1px solid var(--gold);
            cursor: pointer;
        }

        /* --- LAYER 1: БАР / ЧАРЛИ --- */
        #entry-layer { 
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; 
        }
        .charlie-card { border: 1px solid var(--violet); padding: 40px; text-align: center; background: #050505; }
        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; cursor: pointer; margin-top: 20px; font-family: inherit; }

        /* --- LAYER 2: ЛАУНЖ --- */
        #hall-layer { 
            width: 100vw; height: 100vh; 
            background: url('lounge.jpg') no-repeat center bottom / contain #000;
            position: relative; display: none;
        }

        /* ФОНАРИКИ (7 ЗОН) */
        .lamp-zone {
            position: absolute; width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; z-index: 100;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
            border: 1px solid rgba(212, 175, 55, 0.2); transition: 0.3s;
        }
        .lamp-zone:hover { background: radial-gradient(circle, rgba(212, 175, 55, 0.7) 0%, transparent 80%); border: 1px solid var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* Координаты (Калибровка v1.3.1) */
        #table-1 { bottom: 44%; left: 19%; } /* Риск-Фортуна */
        #table-2 { bottom: 45%; left: 35%; }
        #table-3 { bottom: 47%; left: 47%; }
        #table-4 { bottom: 50%; left: 14%; }
        #table-5 { bottom: 53%; left: 28%; }
        #table-6 { bottom: 55%; left: 42%; }
        #mic-zone { bottom: 52%; left: 58%; border-color: var(--violet); } /* МИКРОФОН */

        /* --- HUD --- */
        #hud { position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 1500; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; }
        .back-btn { background: transparent; border: 1px solid var(--violet); color: var(--violet); font-size: 10px; padding: 4px 8px; cursor: pointer; font-family: inherit; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-lang-panel">RU | EN</div>

    <div id="entry-layer">
        <div class="charlie-card">
            <div style="font-size: 9px; color: var(--gold); margin-bottom: 10px;">GY-GY SYSTEM v1.3.1</div>
            <p id="charlie-msg">Чарли: "Кхм... Оцифруйте ID для входа."</p>
            <button id="main-reg-btn" class="reg-btn" onclick="Core.register()">Оцифровать</button>
            <button id="return-hall-btn" class="reg-btn" style="display:none;" onclick="Core.enter()">Вернуться к столам</button>
        </div>
    </div>

    <div id="hall-layer">
        <div id="hud">
            <img id="user-avatar" class="avatar" src="" alt="?">
            <div>
                <span id="user-id" style="color: var(--gold); font-size: 12px;"></span><br>
                <button class="back-btn" onclick="Core.backToBar()">← В БАР К ЧАРЛИ</button>
            </div>
        </div>

        <div id="table-1" class="lamp-zone" title="РИСК-ФОРТУНА" onclick="alert('МОДУЛЬ: РИСК-ФОРТУНА')"></div>
        <div id="table-2" class="lamp-zone"></div>
        <div id="table-3" class="lamp-zone"></div>
        <div id="table-4" class="lamp-zone"></div>
        <div id="table-5" class="lamp-zone"></div>
        <div id="table-6" class="lamp-zone"></div>
        <div id="mic-zone" class="lamp-zone" title="МИКРОФОН" onclick="alert('СЦЕНА: Ожидание артиста...')"></div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter();
            },

            enter() {
                const id = localStorage.getItem('gygy_id');
                const avatar = localStorage.getItem('gygy_avatar');
                
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-id').innerText = id;
                document.getElementById('entry-layer').style.display = 'none';
                document.getElementById('hall-layer').style.display = 'block';
            },

            backToBar() {
                // Возвращаемся к Чарли, но не удаляем ID
                document.getElementById('hall-layer').style.display = 'none';
                document.getElementById('entry-layer').style.display = 'flex';
                
                // Меняем интерфейс Чарли для "своих"
                document.getElementById('charlie-msg').innerText = 'Чарли: "С возвращением к стойке. Чего желаете?"';
                document.getElementById('main-reg-btn').style.display = 'none';
                document.getElementById('return-hall-btn').style.display = 'inline-block';
            },

            checkAuth() {
                const id = localStorage.getItem('gygy_id');
                if (id) this.enter();
                else document.getElementById('entry-layer').style.display = 'flex';
            }
        };

        window.onload = () => Core.checkAuth();
    </script>
</body>
</html>
