

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club | Tables v1.2.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --violet: #8A2BE2; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        /* --- GATEKEEPER --- */
        #entry-layer { 
            position: fixed; inset: 0; background: #000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; 
        }
        .charlie-card { border: 1px solid var(--violet); padding: 40px; text-align: center; background: #0a0a0a; }

        /* --- LOUNGE HALL (FULL VIEW) --- */
        #hall-layer { 
            width: 100vw; 
            height: 100vh; 
            /* МЕНЯЕМ ЛОГИКУ: Вмещаем всё фото целиком */
            background-image: url('lounge.jpg'); 
            background-repeat: no-repeat; 
            background-position: center bottom; /* Прижимаем к низу, чтобы видеть пол */
            background-size: contain; /* Картинка сжимается, чтобы влезть в экран полностью */
            background-color: #000;
            position: relative;
            display: none;
        }

        /* ИНТЕРАКТИВНАЯ ЗОНА: ПЕРВЫЙ СТОЛИК (Пересчитано под новый масштаб) */
        #fortune-zone { 
            position: absolute; 
            bottom: 12%; left: 22%; /* Смещено ниже и правее согласно перспективе пола */
            width: 140px; height: 100px; 
            cursor: pointer; 
            z-index: 100; 
            border: 1px dashed rgba(212, 175, 55, 0.4); 
            transition: 0.3s;
        }
        #fortune-zone:hover { 
            border: 1px solid var(--gold); 
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px var(--gold);
        }

        /* --- UI ELEMENTS --- */
        #hud { 
            position: fixed; top: 20px; left: 20px; 
            display: flex; align-items: center; gap: 12px; 
            z-index: 1500; 
        }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; }
        .lang-footer { position: fixed; bottom: 15px; right: 20px; font-size: 10px; color: var(--gold); letter-spacing: 2px; }
        
        .reg-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; cursor: pointer; margin-top: 15px; font-family: inherit; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div class="charlie-card">
            <div style="font-size: 9px; color: var(--gold); margin-bottom: 10px; opacity: 0.7;">GY-GY SYSTEM v1.2.8</div>
            <p>Чарли: "Оцифровка ID завершена. Проходите."</p>
            <button class="reg-btn" onclick="Core.register()">Войти в зал</button>
        </div>
    </div>

    <div id="hall-layer">
        <div id="hud">
            <img id="user-avatar" class="avatar" src="" alt="?">
            <span id="user-id" style="color: var(--gold); font-size: 13px;"></span>
        </div>

        <div id="fortune-zone" onclick="alert('Стол: Азарт-Фортуна. Модуль v1.3 в очереди на запуск.')"></div>

        <div class="lang-footer">RU | EN | BUILD v1.2.8</div>
    </div>

    <script>
        const Core = {
            register() {
                const id = 'GY-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const avatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${id}`;
                localStorage.setItem('gygy_id', id);
                localStorage.setItem('gygy_avatar', avatar);
                this.enter(id, avatar);
            },

            enter(id, avatar) {
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-id').innerText = id;
                
                document.getElementById('entry-layer').style.display = 'none';
                document.getElementById('hall-layer').style.display = 'block';
            },

            checkAuth() {
                const savedId = localStorage.getItem('gygy_id');
                const savedAvatar = localStorage.getItem('gygy_avatar');
                if (savedId) this.enter(savedId, savedAvatar);
                else document.getElementById('entry-layer').style.display = 'flex';
            }
        };

        window.onload = () => Core.checkAuth();
    </script>
</body>
</html>
