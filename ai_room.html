<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY BACKSTAGE v5.6 - MULTI-AGENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050505; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg); margin: 0; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; }

        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* ВЕРХ: МОНИТОРЫ (СЕРЬЕЗНЫЙ ДИЗАЙН) */
        .tv-area { height: 45%; display: flex; gap: 12px; padding: 12px; background: #000; border-bottom: 1px solid #222; }
        .tv-box { 
            flex: 1; border: 1px solid #222; background: var(--panel); position: relative; 
            transition: all 0.4s ease; overflow: hidden; display: flex; flex-direction: column; 
            border-radius: 2px;
        }
        .tv-box.active { flex: 60; border: 1px solid var(--gold); box-shadow: 0 0 30px rgba(197, 160, 89, 0.15); }
        .tv-box.hidden { flex: 0; opacity: 0; pointer-events: none; margin: 0; border: none; }

        /* ТРЕНАЖЕР МУЛЬТИ-АГЕНТ */
        .trainer-ui { display: flex; width: 100%; height: 100%; opacity: 0; }
        .active .trainer-ui { opacity: 1; }

        /* Левая панель: Выбор ИИ */
        .ai-switcher { width: 70px; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 20px; background: #080808; }
        .ai-logo { 
            width: 45px; height: 45px; border: 1px solid #333; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        /* Иконки-заглушки (в реальности заменим на SVG) */
        .ai-logo.gemini { background: linear-gradient(135deg, #4285f4, #9b72cb); }
        .ai-logo.grok { background: #000; border-color: #555; font-weight: bold; color: #fff; }
        .ai-logo.copilot { background: linear-gradient(135deg, #3bb2d0, #3bd0a4); }
        
        .ai-logo.selected { border: 2px solid var(--gold); transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        .ai-logo::after { content: attr(data-label); position: absolute; bottom: -15px; font-size: 8px; color: #555; }

        /* Центр: Экран диалога */
        .dialog-core { flex: 1; display: flex; flex-direction: column; position: relative; background: #050505; }
        .tv-label-fixed { position: absolute; top: 10px; left: 10px; font-size: 10px; color: #333; letter-spacing: 2px; }
        
        .chat-half { flex: 1; padding: 20px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .chat-ai { color: #fff; font-size: 16px; border-bottom: 1px solid #1a1a1a; }
        .chat-user { color: var(--gold); font-size: 18px; font-style: italic; }

        /* Табло */
        .stats-table { width: 140px; border-left: 1px solid #222; font-size: 11px; display: flex; flex-direction: column; background: #0a0a0a; }
        .st-head { background: #1a1a1a; color: #666; padding: 8px; text-align: center; border-bottom: 1px solid var(--gold); }
        .st-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid #1a1a1a; padding: 6px 2px; text-align: center; }

        /* НИЗ: КОНСОЛЬ */
        .work-area { height: 55%; display: flex; flex-direction: column; padding: 20px; background: #000; }
        .main-display { flex: 1; background: #050505; border: 1px solid #151515; margin-bottom: 15px; padding: 15px; overflow-y: auto; box-shadow: inset 0 0 30px #000; }
        .input-wrap { display: flex; height: 60px; gap: 10px; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 0 15px; font-family: inherit; font-size: 16px; outline: none; }
        .btn-exe { background: var(--gold); color: #000; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .close-mon { position: absolute; top: 40px; right: 10px; background: #000; border: 1px solid var(--gold); color: var(--gold); width: 30px; height: 30px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tv-area">
        <div class="tv-box" id="m1" onclick="focusMon('m1')">
            <div class="tv-header">PUNCHLINE v5.6</div>
            <button class="close-mon" onclick="event.stopPropagation(); resetMon()">✕</button>
            <div style="text-align:center; padding-top:40px; font-size:40px; opacity:0.1;">🎭</div>
        </div>

        <div class="tv-box" id="m2" onclick="focusMon('m2')">
            <div class="tv-header">MILLIONAIRE TRAINER</div>
            <button class="close-mon" onclick="event.stopPropagation(); resetMon()">✕</button>
            
            <div class="trainer-ui">
                <div class="ai-switcher">
                    <div class="ai-logo gemini selected" onclick="switchAI('gemini')" data-label="GEMINI">✧</div>
                    <div class="ai-logo grok" onclick="switchAI('grok')" data-label="GROK">/</div>
                    <div class="ai-logo copilot" onclick="switchAI('copilot')" data-label="PILOT">∞</div>
                </div>
                <div class="dialog-core">
                    <div class="tv-label-fixed" id="ai-name">AGENCY: GEMINI</div>
                    <div class="chat-half chat-ai" id="box-ai">ГОТОВ К ТОРГАМ. ЧТО ПРОДАЕМ СЕГОДНЯ?</div>
                    <div class="chat-half chat-user" id="box-user">...</div>
                </div>
                <div class="stats-table">
                    <div class="st-head">BALANCE</div>
                    <div id="log-rows" style="flex:1; overflow-y:auto;"></div>
                    <div class="st-row" style="color:#fff; font-weight:bold; border-top:1px solid #333;">
                        <div>Σ</div><div id="total-val">0</div><div>$</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tv-box" id="m3" onclick="focusMon('m3')">
            <div class="tv-header">TUNER v5.6</div>
            <button class="close-mon" onclick="event.stopPropagation(); resetMon()">✕</button>
            <div style="text-align:center; padding-top:40px; font-size:40px; opacity:0.1;">💎</div>
        </div>
    </div>

    <div class="work-area">
        <div class="main-display" id="terminal">
            <span style="color:#555;">> ИНИЦИАЛИЗАЦИЯ УСТРОЙСТВА... OK</span><br>
            > СИСТЕМА МУЛЬТИ-АГЕНТ АКТИВНА.
        </div>
        <div class="input-wrap">
            <input type="text" id="user-in" placeholder="Введите ваше предложение или лот...">
            <button class="btn-exe" onclick="send()">ВВОД</button>
        </div>
    </div>
</div>

<script>
    let activeMon = null;
    let currentAI = 'gemini';
    let balance = 0;

    const aiVoices = {
        'gemini': { name: 'GEMINI', color: '#9b72cb', greet: 'Приветствую. Я готов проанализировать стоимость вашего лота.' },
        'grok': { name: 'GROK', color: '#fff', greet: 'О, еще один бизнесмен? Ну давай, попробуй впарить мне свой хлам.' },
        'copilot': { name: 'COPILOT', color: '#3bd0a4', greet: 'Я помогу вам оптимизировать эту сделку. Какова ваша цена?' }
    };

    function focusMon(id) {
        activeMon = id;
        ['m1', 'm2', 'm3'].forEach(m => {
            const el = document.getElementById(m);
            el.classList.remove('active', 'hidden');
            if (m === id) el.classList.add('active'); else el.classList.add('hidden');
        });
    }

    function resetMon() {
        activeMon = null;
        ['m1', 'm2', 'm3'].forEach(m => document.getElementById(m).classList.remove('active', 'hidden'));
    }

    function switchAI(type) {
        currentAI = type;
        document.querySelectorAll('.ai-logo').forEach(l => l.classList.remove('selected'));
        document.querySelector('.' + type).classList.add('selected');
        
        const ai = aiVoices[type];
        document.getElementById('ai-name').innerText = 'AGENCY: ' + ai.name;
        document.getElementById('ai-name').style.color = ai.color;
        document.getElementById('box-ai').innerText = ai.greet;
        document.getElementById('terminal').innerHTML += `<br><span style="color:${ai.color}">> ПЕРЕКЛЮЧЕНИЕ НА ${ai.name}... DONE.</span>`;
    }

    function send() {
        const txt = document.getElementById('user-in').value;
        if (!activeMon || !txt) return;

        if (activeMon === 'm2') {
            document.getElementById('box-user').innerText = txt;
            document.getElementById('terminal').innerHTML += `<br>> ВЫ: ${txt}`;
            
            // Простейшая симуляция ответа в зависимости от ИИ
            setTimeout(() => {
                let reply = "";
                if (currentAI === 'grok') reply = "Серьезно? " + txt + " за это? Ты меня за дурака держишь?";
                else if (currentAI === 'gemini') reply = "Цена " + txt + " кажется завышенной на 15%. Мое контрпредложение...";
                else reply = "Интересно. Давайте обсудим детали за " + txt;
                
                document.getElementById('box-ai').innerText = reply;
                document.getElementById('terminal').innerHTML += `<br><span style="color:${aiVoices[currentAI].color}">> ${aiVoices[currentAI].name}: ${reply}</span>`;
            }, 600);
        }
        document.getElementById('user-in').value = '';
    }
</script>

</body>
</html>
