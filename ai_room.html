<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v6.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --bg-main: #1c1c1c; --bg-chat: #151515; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg-main); margin: 0; color: var(--text); font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* ВЕРХНЯЯ НАВИГАЦИЯ */
        .outer-nav { position: absolute; top: 20px; right: 25px; display: flex; gap: 15px; z-index: 2000; }
        .btn-outer { 
            background: #333; border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; text-decoration: none;
        }

        /* КАРТОЧКИ (ХАБ) */
        .folder-hub { display: flex; height: 100vh; justify-content: center; align-items: center; gap: 30px; }
        .folder {
            width: 280px; height: 400px; border: 2px solid #444; background: #2a2a2a;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .folder:hover { border-color: var(--gold); transform: translateY(-10px); }
        .folder .artifact { font-size: 70px; margin-bottom: 20px; }
        .folder-title { font-size: 16px; text-align: center; color: var(--gold); text-transform: uppercase; }

        /* ИНТЕРФЕЙС ТРЕНАЖЕРА */
        .active-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1500; background: #111; display: none; flex-direction: column; }
        .active-overlay.show { display: flex; }

        /* ШАПКА */
        .trainer-header {
            height: 110px; background: #000; border-bottom: 2px solid var(--gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 25px; position: relative;
        }
        .hint-text { font-size: 11px; color: #777; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .header-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        
        /* СЕЛЕКТОР ИИ */
        .ai-selector { display: flex; gap: 12px; }
        .ai-av { 
            width: 45px; height: 45px; border: 1px solid #444; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; 
            cursor: pointer; background: #222; position: relative; transition: 0.2s;
        }
        .ai-av:hover::after { 
            content: attr(data-name); position: absolute; bottom: -25px; font-size: 10px; color: var(--gold); background: #000; padding: 2px 5px; border-radius: 3px; white-space: nowrap;
        }
        .ai-av.active { border-color: var(--gold); background: #332b00; }
        .user-av { border: 1px dashed var(--gold); color: var(--gold); }

        .trainer-stats { display: flex; gap: 15px; }
        .stat-box { text-align: center; font-family: 'Share Tech Mono', monospace; min-width: 50px; }
        .stat-box span { display: block; font-size: 8px; color: #555; }
        .stat-box b { font-size: 16px; color: #fff; }

        /* ЧАТ */
        .chat-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: var(--bg-chat); }
        .m-line { display: flex; gap: 15px; max-width: 80%; align-items: flex-start; animation: fadeIn 0.3s ease; }
        .m-line.ai { align-self: flex-start; }
        .m-line.user { align-self: flex-end; flex-direction: row-reverse; }

        .m-icon { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; border: 1px solid rgba(255,255,255,0.1); }
        .m-text { background: #262626; padding: 12px 18px; border-radius: 10px; font-size: 15px; line-height: 1.5; color: #ddd; }
        .user .m-text { background: #3d341f; border: 1px solid var(--gold); color: #fff; }

        /* ВВОД */
        .input-bar { height: 75px; background: #000; display: flex; padding: 15px 25px; gap: 15px; }
        input { flex: 1; background: #151515; border: 1px solid #444; color: #fff; padding: 0 15px; border-radius: 8px; outline: none; font-family: inherit; }
        .btn-send { background: var(--gold); color: #000; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .btn-close { position: absolute; right: 20px; top: 40px; background: #441111; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="outer-nav">
        <div class="btn-outer">🌐 RU</div>
        <a href="index.html" class="btn-outer" style="border-color: #ff4444;">В ХОЛЛ</a>
    </div>

    <div class="folder-hub">
        <div class="folder" onclick="alert('In Dev')"><div class="artifact">✧</div><div class="folder-title">PUNCHLINE</div></div>
        <div class="folder" onclick="openTrainer()"><div class="artifact">$</div><div class="folder-title">ТРЕНАЖЕР<br>МИЛЛИОНЕРА</div></div>
        <div class="folder" onclick="alert('In Dev')"><div class="artifact">🎭</div><div class="folder-title">TUNER</div></div>
    </div>

    <div class="active-overlay" id="trainer-view">
        <div class="trainer-header">
            <div class="hint-text">Здесь мы весело торгуемся. Выбери оппонента и начинай тренинг!</div>
            <div class="header-row">
                <div class="ai-selector">
                    <div class="ai-av" data-name="Gemini" onclick="selAI('gemini','✧','#4285f4',this)">✧</div>
                    <div class="ai-av" data-name="Grok" onclick="selAI('grok','/','#fff',this)">/</div>
                    <div class="ai-av" data-name="Copilot" onclick="selAI('copilot','∞','#3bd0a4',this)">∞</div>
                    <div class="ai-av user-av" data-name="Вы">👤</div>
                </div>

                <div class="trainer-stats">
                    <div class="stat-box"><span>Старт</span><b>100$</b></div>
                    <div class="stat-box"><span>Текущая</span><b id="c-val">0$</b></div>
                    <div class="stat-box"><span>Итого</span><b id="i-val">0$</b></div>
                </div>
            </div>
            <button class="btn-close" onclick="closeTrainer()">ЗАКРЫТЬ X</button>
        </div>

        <div class="chat-area" id="chat-b">
            </div>

        <div class="input-bar">
            <input type="text" id="inp-b" placeholder="Напишите что-нибудь..." onkeydown="if(event.keyCode==13) send()">
            <button class="btn-send" onclick="send()">ВВОД</button>
        </div>
    </div>

<script>
    let curAI = { id: '', icon: '✧', color: '#444' };

    function openTrainer() { document.getElementById('trainer-view').classList.add('show'); }
    function closeTrainer() { document.getElementById('trainer-view').classList.remove('show'); }

    function selAI(id, icon, color, el) {
        curAI = { id, icon, color };
        document.querySelectorAll('.ai-av').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
        
        // Появление иконки слева при вступлении в диалог
        addMsg('ai', `Агент <b>${id.toUpperCase()}</b> готов к сделке. Жду твой оффер.`);
    }

    function addMsg(side, text) {
        const chat = document.getElementById('chat-b');
        const icon = side === 'ai' ? curAI.icon : '👤';
        const bg = side === 'ai' ? curAI.color : '#ffcc00';
        const color = (side === 'ai' && curAI.id === 'grok') ? '#000' : '#fff';

        const html = `
            <div class="m-line ${side}">
                <div class="m-icon" style="background:${bg}; color:${color}">${icon}</div>
                <div class="m-text">${text}</div>
            </div>`;
        chat.insertAdjacentHTML('beforeend', html);
        chat.scrollTop = chat.scrollHeight;
    }

    function send() {
        const val = document.getElementById('inp-b').value;
        if(!val || !curAI.id) { if(!curAI.id) alert('Сначала выбери оппонента сверху!'); return; }
        
        addMsg('user', val);
        document.getElementById('inp-b').value = '';

        // Арифметика для табло
        const num = val.match(/\d+/);
        if(num) document.getElementById('c-val').innerText = num[0] + '$';

        setTimeout(() => {
            addMsg('ai', "Интересно. Но в 2026-м за такие деньги даже 'Пупсика' не купишь. Поднимай ставки!");
        }, 800);
    }
</script>
</body>
</html>
