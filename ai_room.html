<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v6.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; 
            --gold-dim: #d4af37;
            --bg-main: #1c1c1c; 
            --bg-panel: #2a2a2a;
            --text: #ffffff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg-main); margin: 0; color: var(--text); font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* ВЕРХНЯЯ ПАНЕЛЬ УПРАВЛЕНИЯ (ВСЕГДА ВИДНА) */
        .outer-nav {
            position: absolute; top: 20px; right: 25px; display: flex; gap: 15px; z-index: 2000;
        }
        .btn-outer { 
            background: #333; border: 2px solid var(--gold-dim); color: var(--gold);
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
            text-decoration: none; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-outer:hover { background: var(--gold); color: #000; }

        /* ХАБ КАРТОЧЕК */
        .folder-hub {
            display: flex; height: 100vh; width: 100vw; gap: 30px; padding: 50px; 
            justify-content: center; align-items: center; transition: 0.5s;
        }

        .folder {
            width: 300px; height: 420px; border: 3px solid #444; background: var(--bg-panel);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 20px; cursor: pointer; transition: 0.4s; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .folder:hover { border-color: var(--gold); transform: translateY(-15px); box-shadow: 0 20px 50px rgba(255, 204, 0, 0.2); }
        
        .artifact { font-size: 80px; text-shadow: 0 0 20px var(--gold-dim); }
        .folder-title { 
            font-size: 18px; text-align: center; color: var(--gold); 
            text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;
        }

        /* ПОЛНОЭКРАННЫЙ ИНТЕРФЕЙС ТРЕНАЖЕРА */
        .active-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 1500; background: #111; display: none; flex-direction: column;
        }
        .active-overlay.show { display: flex; }

        /* ШАПКА ТРЕНАЖЕРА */
        .trainer-header {
            height: 90px; background: #000; border-bottom: 3px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
        }
        
        .ai-selector { display: flex; gap: 15px; align-items: center; }
        .ai-av { 
            width: 50px; height: 50px; border: 2px solid #555; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            cursor: pointer; background: #222; transition: 0.3s;
        }
        .ai-av.active { border-color: var(--gold); background: #443300; box-shadow: 0 0 15px var(--gold); }
        .ai-av.user-av { border: 2px dashed var(--gold); color: var(--gold); opacity: 1; }

        .trainer-stats { display: flex; gap: 20px; background: #1a1a1a; padding: 10px 20px; border-radius: 10px; border: 1px solid #333; }
        .stat-box { text-align: center; font-family: 'Share Tech Mono', monospace; min-width: 60px; }
        .stat-box span { display: block; font-size: 10px; color: #777; margin-bottom: 2px; }
        .stat-box b { font-size: 20px; color: #fff; }

        /* ЗОНА ЧАТА */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; 
            gap: 25px; background: #1e1e1e; /* Светлее чем раньше */
        }
        .m-line { max-width: 75%; padding: 18px 25px; border-radius: 15px; font-size: 17px; line-height: 1.6; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .m-ai { align-self: flex-start; background: #333; border: 1px solid #444; color: #fff; border-left: 5px solid var(--gold); }
        .m-user { align-self: flex-end; background: #4d3d1a; border: 1px solid var(--gold); color: #fff; }

        /* ПАНЕЛЬ ВВОДА */
        .input-bar { height: 90px; background: #000; border-top: 2px solid #333; display: flex; padding: 20px 30px; gap: 20px; }
        .input-bar input { 
            flex: 1; background: #151515; border: 2px solid #444; color: #fff; 
            padding: 0 20px; border-radius: 10px; outline: none; font-size: 18px; font-family: inherit;
        }
        .input-bar input:focus { border-color: var(--gold); }
        .btn-send { background: var(--gold); color: #000; border: none; padding: 0 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .btn-close-mode { background: #552222; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="outer-nav">
        <div class="btn-outer" onclick="toggleLang()" id="lang-btn">🌐 RU</div>
        <a href="index.html" class="btn-outer" style="border-color: #ff4444;">В ХОЛЛ v4.3</a>
    </div>

    <div class="folder-hub" id="hub">
        
        <div class="folder" onclick="alert('Режим PUNCHLINE в разработке')">
            <div class="artifact">✧</div>
            <div class="folder-title">CH-A:<br>PUNCHLINE</div>
        </div>

        <div class="folder" onclick="openTrainer()">
            <div class="artifact">$</div>
            <div class="folder-title" style="color: #fff; text-shadow: 0 0 10px var(--gold);">ТРЕНАЖЕР<br>МИЛЛИОНЕРА</div>
        </div>

        <div class="folder" onclick="alert('Режим TUNER в разработке')">
            <div class="artifact">🎭</div>
            <div class="folder-title">CH-V:<br>TUNER</div>
        </div>

    </div>

    <div class="active-overlay" id="trainer-view">
        <div class="trainer-header">
            <div class="ai-selector">
                <div class="ai-av active" onclick="selAI('gemini', this)">✧</div>
                <div class="ai-av" onclick="selAI('grok', this)">/</div>
                <div class="ai-av" onclick="selAI('copilot', this)">∞</div>
                <div class="ai-av user-av" title="Вы">👤</div>
            </div>

            <div class="trainer-stats">
                <div class="stat-box"><span>Старт</span><b>100$</b></div>
                <div class="stat-box"><span>Текущая</span><b id="c-val">0$</b></div>
                <div class="stat-box"><span>Итого</span><b id="i-val">0$</b></div>
            </div>

            <button class="btn-close-mode" onclick="closeTrainer()">ЗАКРЫТЬ X</button>
        </div>

        <div class="chat-area" id="chat-b">
            <div class="m-line m-ai">
                <b>Здесь мы весело торгуемся.</b><br>
                Выбери оппонента сверху и начинай тренинг!
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="inp-b" placeholder="Что вы продаете и по чем?" onkeydown="if(event.keyCode==13) sendB()">
            <button class="btn-send" onclick="sendB()">ВВОД</button>
        </div>
    </div>

<script>
    let currentLang = 'RU';

    function toggleLang() {
        currentLang = currentLang === 'RU' ? 'EN' : 'RU';
        document.getElementById('lang-btn').innerText = '🌐 ' + currentLang;
        alert('Язык переключен на ' + currentLang);
    }

    function openTrainer() {
        document.getElementById('trainer-view').classList.add('show');
    }

    function closeTrainer() {
        document.getElementById('trainer-view').classList.remove('show');
    }

    function selAI(name, el) {
        document.querySelectorAll('.ai-av').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
        const chat = document.getElementById('chat-b');
        chat.innerHTML += `<div class="m-line m-ai"><i>Агент ${name.toUpperCase()} вступил в переговоры...</i></div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function sendB() {
        const val = document.getElementById('inp-b').value;
        if(!val) return;
        
        const chat = document.getElementById('chat-b');
        chat.innerHTML += `<div class="m-line m-user">${val}</div>`;
        document.getElementById('inp-b').value = '';
        
        // Поиск цифры для табло
        const match = val.match(/(\d+)/);
        if(match) document.getElementById('c-val').innerText = match[0] + '$';

        setTimeout(() => {
            chat.innerHTML += `<div class="m-line m-ai">Неплохо задвинул! Но давай-ка добавим жару. Моя цена — на 20% выше!</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 800);
    }
</script>

</body>
</html>
