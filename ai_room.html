
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY BACKSTAGE v5.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --panel: #141414; --border: #2a1f19; }
        
        body, html { 
            background: #000; margin: 0; padding: 0; width: 100%; height: 100%; 
            color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden;
        }

        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* ВЕРХНЯЯ ЗОНА: ЭКРАНЫ ИИ (50% экрана) */
        .tv-section { 
            flex: 1; display: flex; gap: 8px; padding: 10px; 
            background: linear-gradient(to bottom, #1a1310, #000);
            border-bottom: 1px solid var(--border);
            transition: all 0.4s ease;
        }

        .tv-unit {
            flex: 1; border: 1px solid #3d2b1f; background: var(--dark);
            display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden; cursor: pointer; position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .tv-unit.active { flex: 20; border-color: var(--gold); box-shadow: 0 0 25px rgba(197, 160, 89, 0.15); }
        .tv-unit.hidden { flex: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }

        .tv-label { 
            background: #1d1510; font-size: 10px; padding: 6px; text-align: center; 
            color: #666; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222;
        }
        .active .tv-label { background: var(--gold); color: #000; font-weight: bold; }

        .tv-content { flex: 1; padding: 12px; font-size: 13px; color: #aaa; overflow-y: auto; }
        .active .tv-content { color: #fff; font-size: 15px; }

        .close-btn {
            position: absolute; top: 35px; right: 10px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--gold); color: var(--gold); 
            width: 25px; height: 25px; display: none; cursor: pointer; z-index: 10;
        }
        .active .close-btn { display: block; }

        /* НИЖНЯЯ ЗОНА: КОНСОЛЬ (50% экрана) */
        .control-section { flex: 1; display: flex; flex-direction: column; padding: 15px; background: #000; }

        .output-box { 
            flex: 1; background: var(--panel); border: 1px solid var(--border); 
            margin-bottom: 12px; padding: 15px; font-size: 14px; color: var(--gold);
            overflow-y: auto; box-shadow: inset 0 0 20px #000;
        }

        .input-area { display: flex; gap: 8px; margin-bottom: 15px; }
        input { 
            flex: 1; background: #050505; border: 1px solid #222; color: #fff; 
            padding: 14px; font-family: inherit; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--gold); }
        .btn-run { 
            background: var(--gold); border: none; padding: 0 25px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; }
        .bar-btn { 
            color: #555; border: 1px solid #222; padding: 6px 12px; 
            font-size: 10px; cursor: pointer; text-decoration: none; text-transform: uppercase;
        }
        .bar-btn:hover { color: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body>

            <div class="tv-label">CHANNEL A: PUNCHLINES</div>
