
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY AI ROOM v4.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            color: var(--gold); font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; opacity: 0; transition: opacity 1.5s ease-in-out;
        }

        /* Плавное появление при входе */
        body.loaded { opacity: 1; }

        /* Фон как в Холле, но чуть темнее (эффект закулисья) */
        .backstage-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('hall_bg_jpg.jpg') center/cover;
            z-index: -1; filter: grayscale(0.5) blur(3px);
        }

        /* ШАПКА */
        .header {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0,0,0,0.9);
        }

        .back-btn {
            font-size: 10px; border: 1px solid var(--gold); padding: 8px 15px;
            color: var(--gold); text-decoration: none; text-transform: uppercase;
        }

        /* ОКНО ЧАТА */
        #chat-window {
            height: calc(100vh - 150px); overflow-y: auto;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }

        .msg { max-width: 80%; padding: 15px; border-radius: 2px; font-size: 14px; line-height: 1.4; }
        .msg.ai { align-self: flex-start; border-left: 3px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .msg.user { align-self: flex-end; border-right: 3px solid var(--cyan); background: rgba(0, 229, 255, 0.1); color: #fff; text-align: right; }

        /* ИНПУТ */
        .input-area {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            display: flex; padding: 15px; gap: 10px; background: #000;
        }

        input {
            flex: 1; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 0 15px; font-family: 'Share Tech Mono'; outline: none;
        }

        button {
            width: 60px; background: var(--gold); border: none; color: #000;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body onload="document.body.classList.add('loaded')">

    <div class="backstage-bg"></div>

    <div class="header">
        <div style="font-family: 'Playfair Display'; font-weight: 900; letter-spacing: 2px;">AI BACKSTAGE</div>
        <a href="index.html" class="back-btn">↩ В ХОЛЛ</a>
    </div>

    <div id="chat-window">
        <div class="msg ai">
            Система активна. Световые панели v4.3 прогреты. <br>
            Добро пожаловать в Гримерку. Что планируем создать сегодня?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-msg" placeholder="ВАША МЫСЛЬ..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>

    <script>
        function send() {
            const input = document.getElementById('user-msg');
            const win = document.getElementById('chat-window');
            if(!input.value.trim()) return;

            // Сообщение пользователя
            const u = document.createElement('div');
            u.className = 'msg user';
            u.innerText = input.value;
            win.appendChild(u);

            const val = input.value;
            input.value = '';
            win.scrollTop = win.scrollHeight;

            // Ответ Архивариуса
            setTimeout(() => {
                const a = document.createElement('div');
                a.className = 'msg ai';
                a.innerHTML = `Анализирую: "<i>${val}</i>"<br>Добавляю 15% виски и 30% сарказма... Готово.`;
                win.appendChild(a);
                win.scrollTop = win.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
