<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v7.0.1-LH</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; 
            --neon: #00f2ff;
            --bg-main: #0a0a0a; /* Еще чернее для контраста */
            --bg-chat: rgba(15, 15, 15, 0.95); 
        }
        * { box-sizing: border-box; }
        body, html { background: var(--bg-main); margin: 0; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* ВИНТАЖНЫЙ ЭФФЕКТ ЭКРАНА */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 1000;
        }

        .outer-nav { position: absolute; top: 20px; right: 25px; display: flex; gap: 15px; z-index: 2000; }
        .btn-outer { background: #222; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 10px; text-decoration: none; text-transform: uppercase; }

        /* ГЛАВНЫЙ ХАБ МОДУЛЕЙ */
        .folder-hub { display: flex; height: 100vh; justify-content: center; align-items: center; gap: 40px; }
        .module { 
            width: 280px; height: 380px; border: 1px solid #333; 
            background: linear-gradient(135deg, #111 0%, #050505 100%); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .module:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .module .icon { font-size: 50px; margin-bottom: 25px; filter: drop-shadow(0 0 10px var(--neon)); }
        .module-title { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--neon); letter-spacing: 2px; }

        /* ИНТЕРФЕЙС ТЕХНОПАРКА */
        .active-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1500; background: #050505; display: none; flex-direction: column; }
        .active-overlay.show { display: flex; }

        .header-lunar { 
            height: 100px; border-bottom: 1px solid #222; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
        }
        .stats-lunar { display: flex; gap: 30px; font-family: 'Share Tech Mono', monospace; }
        .stat-item { color: #555; font-size: 11px; }
        .stat-item b { color: var(--neon); font-size: 18px; display: block; }

        .chat-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 70%; display: flex; flex-direction: column; gap: 5px; animation: fadeIn 0.4s ease; }
        .msg.ai { align-self: flex-start; }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        
        .m-meta { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; }
        .m-bubble { padding: 15px 20px; border-radius: 5px; font-size: 15px; border: 1px solid #222; background: rgba(255,255,255,0.02); }
        .user .m-bubble { border-color: var(--gold); color: var(--gold); background: rgba(255, 204, 0, 0.03); }

        .input-lunar { height: 80px; border-top: 1px solid #222; display: flex; padding: 15px 40px; gap: 20px; }
        input { flex: 1; background: transparent; border: 1px solid #333; color: #fff; padding: 0 20px; font-family: 'Share Tech Mono', monospace; outline: none; }
        input:focus { border-color: var(--neon); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="outer-nav">
        <div class="btn-outer">Build: v7.0.1-LH</div>
        <a href="index.html" class="btn-outer" style="border-color: #ff4444;">В ХОЛЛ</a>
    </div>

    <div class="folder-hub">
        <div class="module" onclick="openBase()">
            <div class="icon">🚀</div>
            <div class="module-title">LUNAR TECHPARK</div>
        </div>
        <div class="module" onclick="alert('Module Arch-Archive Locked')">
            <div class="icon">📦</div>
            <div class="module-title">ARCHIVE (v6.3)</div>
        </div>
    </div>

    <div class="active-overlay" id="base-view">
        <div class="header-lunar">
            <div class="module-title" style="font-size: 20px;">L-Hacker Terminal</div>
            <div class="stats-lunar">
                <div class="stat-item">OXYGEN<b>98%</b></div>
                <div class="stat-item">ENERGY<b>MAX</b></div>
                <div class="stat-item">OBJECTS<b>001</b></div>
            </div>
            <button class="btn-outer" onclick="location.reload()">CLOSE</button>
        </div>
        <div class="chat-area" id="chat-lunar">
            <div class="msg ai">
                <span class="m-meta">System Info</span>
                <div class="m-bubble">Связь установлена. Модератор, группа "Лунный Хакер" готова к проектированию. Ждем ваших указаний.</div>
            </div>
        </div>
        <div class="input-lunar">
            <input type="text" id="inp-l" placeholder="Введите команду или идею..." onkeydown="if(event.keyCode==13) sendMsg()">
        </div>
    </div>

<script>
    function openBase() { document.getElementById('base-view').classList.add('show'); }

    function sendMsg() {
        const inp = document.getElementById('inp-l');
        const val = inp.value;
        if(!val) return;

        const chat = document.getElementById('chat-lunar');
        chat.innerHTML += `
            <div class="msg user">
                <span class="m-meta">Moderator</span>
                <div class="m-bubble">${val}</div>
            </div>`;
        
        inp.value = '';
        chat.scrollTop = chat.scrollHeight;

        // Имитация ответа от ИИ-Монстров
        setTimeout(() => {
            chat.innerHTML += `
                <div class="msg ai">
                    <span class="m-meta" style="color:var(--neon)">Grok [Audit]</span>
                    <div class="m-bubble">Идея принята в работу. Кибербуль уже навострил уши. Начинаю проверку на "духоустойчивость"...</div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
    }
</script>
</body>
</html>
