<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v7.0.5-LH</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; --neon: #00f2ff; --wood: #3d2b1f; --bg: #050505; 
        }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            overflow: hidden; /* Фикс выхода за рамки */
        }

        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; pointer-events: none;
            transition: opacity 2.5s ease; opacity: 1;
        }

        /* НАВИГАЦИЯ */
        .top-nav {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 4000;
        }
        .nav-group { display: flex; gap: 10px; }
        .ui-btn { 
            background: rgba(20,20,20,0.8); border: 1px solid var(--gold); 
            color: var(--gold); padding: 8px 15px; cursor: pointer; 
            font-family: 'Share Tech Mono'; font-size: 11px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s;
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* ТЕЛЕВИЗОРЫ (ОДИНАКОВЫЕ) */
        .room-scene {
            display: flex; justify-content: center; align-items: center;
            gap: 2vw; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }
        
        .tv-case {
            width: 28vw; height: 22vw; max-width: 350px; max-height: 280px;
            background: var(--wood); border: 8px solid #2a1d15; border-radius: 10px;
            position: relative; cursor: pointer; transition: 0.4s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .tv-case:hover { transform: translateY(-5px); border-color: var(--gold); }

        .screen {
            position: absolute; top: 10%; left: 8%; right: 15%; bottom: 15%;
            background: #080808; border-radius: 50% / 10%;
            border: 2px solid #000; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Share Tech Mono'; font-size: 0.8vw; color: var(--neon);
        }

        /* ТЕРМИНАЛ И ЧАТ */
        #techpark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 5000; display: none; 
            flex-direction: column; opacity: 0; transition: opacity 2s ease;
        }

        /* ПАНЕЛЬ АВАТАРОК (SCROLLABLE) */
        .avatar-shelf {
            display: flex; gap: 15px; padding: 15px 40px;
            background: #0a0a0a; border-bottom: 1px solid #222;
            overflow-x: auto; scrollbar-width: thin;
        }
        .avatar-shelf::-webkit-scrollbar { height: 4px; }
        .avatar-shelf::-webkit-scrollbar-thumb { background: var(--gold); }
        
        .user-trace {
            min-width: 50px; height: 50px; border: 1px solid #333;
            border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; font-size: 20px; background: #111;
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px 40px; }
        #chat-logs { flex: 1; overflow-y: auto; margin-bottom: 20px; font-family: 'Share Tech Mono'; }
        
        .m-line { margin-bottom: 12px; font-size: 14px; }
        .m-ai { color: var(--neon); }
        .m-user { color: var(--gold); }

        .input-wrap { display: flex; gap: 10px; border-top: 1px solid #222; padding-top: 20px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; outline: none; }
    </style>
</head>
<body onload="initRoom()">

    <div id="fade-overlay"></div>

    <div class="top-nav">
        <div class="nav-group">
            <a href="index.html" class="ui-btn" onclick="return exitScene(this.href)">← BACK</a>
            <div class="ui-btn" onclick="toggleAudio()" id="audio-ctrl">⏸ STOP AUDIO</div>
        </div>
        <div class="nav-group">
            <div class="ui-btn">🌐 LANGUAGE</div>
        </div>
    </div>

    <div class="room-scene">
        <div class="tv-case" onclick="alert('Retro Archive')"><div class="screen">PUNCHLINE</div></div>
        <div class="tv-case" onclick="openTechPark()"><div class="screen" style="color:var(--gold)">🚀 TECHPARK</div></div>
        <div class="tv-case" onclick="alert('Frequency Tuner')"><div class="screen">AI TUNER</div></div>
    </div>

    <div id="techpark-overlay">
        <div class="avatar-shelf" id="user-traces">
            <div class="user-trace" title="User ID: 001">🤖</div>
            <div class="user-trace" title="User ID: 002">🐱</div>
            <div class="user-trace" title="User ID: 003">🦊</div>
            <div class="user-trace" title="User ID: 004">💀</div>
            <div class="user-trace" title="User ID: 005">👽</div>
            <div class="user-trace" title="User ID: 006">🚀</div>
            <div class="user-trace" title="User ID: 007">🍀</div>
        </div>

        <div class="chat-area">
            <div id="chat-logs">
                <div class="m-ai">> Система активна. Лунный джаз v7.0.4 в режиме Loop.</div>
            </div>
            <div class="input-wrap">
                <input type="text" id="user-msg" placeholder="Сообщение..." onkeydown="if(event.keyCode==13) send()">
                <div class="ui-btn" style="border-color: red;" onclick="closeTechPark()">[ CLOSE ]</div>
            </div>
        </div>
    </div>

    <audio id="lunar-jazz" src="lunar_jazz_loop_v7.0.4.mp3" loop></audio>

    <script>
        const jazz = document.getElementById('lunar-jazz');
        const fade = document.getElementById('fade-overlay');

        function initRoom() {
            fade.style.opacity = 0;
        }

        function exitScene(url) {
            fade.style.opacity = 1;
            fadeAudio(0, 2000);
            setTimeout(() => window.location.href = url, 2500);
            return false;
        }

        function toggleAudio() {
            const btn = document.getElementById('audio-ctrl');
            if (jazz.paused) {
                jazz.play();
                btn.innerText = "⏸ STOP AUDIO";
                fadeAudio(0.5, 1000);
            } else {
                btn.innerText = "▶ PLAY AUDIO";
                fadeAudio(0, 1000);
            }
        }

        function fadeAudio(target, duration) {
            const startVol = jazz.volume;
            const steps = 20;
            const delta = (target - startVol) / steps;
            let i = 0;
            const interval = setInterval(() => {
                i++;
                jazz.volume = Math.max(0, Math.min(1, startVol + delta * i));
                if (i >= steps) {
                    clearInterval(interval);
                    if (target === 0) jazz.pause();
                }
            }, duration / steps);
        }

        function openTechPark() {
            const tp = document.getElementById('techpark-overlay');
            tp.style.display = 'flex';
            setTimeout(() => tp.style.opacity = 1, 50);
            jazz.play();
            fadeAudio(0.5, 2500);
        }

        function closeTechPark() {
            const tp = document.getElementById('techpark-overlay');
            tp.style.opacity = 0;
            fadeAudio(0, 2000);
            setTimeout(() => tp.style.display = 'none', 2000);
        }

        function send() {
            const inp = document.getElementById('user-msg');
            const logs = document.getElementById('chat-logs');
            if(!inp.value) return;
            logs.innerHTML += `<div class="m-user">> ${inp.value}</div>`;
            inp.value = '';
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
