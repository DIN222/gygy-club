<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM v7.0.3-LH</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; --neon: #00f2ff; --wood: #3d2b1f; --bg: #050505; 
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
        }

        /* ПРИНЦИП №1: ПЛАВНОСТЬ (ЗАТЕМНЕНИЕ) */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; pointer-events: none;
            transition: opacity 1.5s ease; opacity: 1;
        }

        /* ПРИНЦИП №3 и №4: КНОПКИ УПРАВЛЕНИЯ */
        .top-nav {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 4000;
        }
        .nav-group { display: flex; gap: 15px; }
        .ui-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--gold); 
            color: var(--gold); padding: 8px 15px; cursor: pointer; 
            font-family: 'Share Tech Mono'; font-size: 12px; text-decoration: none;
            transition: 0.3s; border-radius: 4px;
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* ИНТЕРФЕЙС ТРЕХ ТЕЛЕВИЗОРОВ (БОЛЬШЕ РЕТРО) */
        .room-scene {
            display: flex; justify-content: center; align-items: center;
            gap: 40px; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }
        .tv-case {
            width: 280px; height: 240px; background: var(--wood);
            border: 8px solid #2a1d15; border-radius: 10px;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            cursor: pointer; transition: transform 0.4s;
        }
        .tv-case:hover { transform: translateY(-10px); }
        .tv-case.main { width: 420px; height: 320px; }

        .screen {
            position: absolute; top: 10%; left: 8%; right: 15%; bottom: 15%;
            background: #080808; border-radius: 50% / 10%;
            border: 3px solid #111; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .screen::before { /* Помехи */
            content: ""; position: absolute; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent 0, rgba(0,0,0,0.1) 1px, transparent 2px);
            pointer-events: none;
        }

        /* ТЕРМИНАЛ ТЕХНОПАРКА (ЧАТ) */
        #techpark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; display: none; flex-direction: column;
            opacity: 0; transition: opacity 1s ease;
        }
        .chat-header { padding: 20px 40px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-family: 'Share Tech Mono'; }
        .chat-body { flex: 1; overflow-y: auto; padding: 40px; background: #050505; display: flex; flex-direction: column; gap: 15px; }
        .input-bar { padding: 20px 40px; background: #000; display: flex; gap: 20px; }
        input { flex: 1; background: transparent; border: 1px solid #333; color: var(--neon); padding: 15px; font-family: 'Share Tech Mono'; outline: none; }

        .m-line { max-width: 80%; padding: 10px 20px; border-radius: 4px; font-size: 14px; border: 1px solid #1a1a1a; }
        .m-line.ai { align-self: flex-start; border-left: 3px solid var(--neon); background: rgba(0,242,255,0.02); }
        .m-line.user { align-self: flex-end; border-right: 3px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body onload="initRoom()">

    <div id="fade-overlay"></div>

    <div class="top-nav">
        <div class="nav-group">
            <a href="index.html" class="ui-btn" onclick="return transitionTo(this.href)">← BACK</a>
        </div>
        <div class="nav-group">
            <div class="ui-btn">🌐 LANGUAGE</div>
        </div>
    </div>

    <div class="room-scene">
        <div class="tv-case" onclick="alert('Punchline: Off-air')"><div class="screen"><span style="color:var(--gold)">PUNCHLINE</span></div></div>
        
        <div class="tv-case main" onclick="openTechPark()">
            <div class="screen">
                <div style="font-size: 40px; filter: grayscale(1)">🚀</div>
                <div style="font-family:'Share Tech Mono'; color:var(--neon); margin-top:10px;">LUNAR TECHPARK</div>
                <div style="font-size: 9px; opacity: 0.5;">[ PRESS TO START ]</div>
            </div>
        </div>

        <div class="tv-case" onclick="alert('Tuner: Scanning...')"><div class="screen"><span style="color:var(--gold)">AI TUNER</span></div></div>
    </div>

    <div id="techpark-overlay">
        <div class="chat-header">
            <span style="color:var(--neon)">> LUNAR_HACKER_PROTOCOL.v7.0.3</span>
            <span style="color:red; cursor:pointer;" onclick="closeTechPark()">[ SHUTDOWN ]</span>
        </div>
        <div class="chat-body" id="chat-logs">
            <div class="m-line ai">Модератор, Технопарк развернут. Лунный джаз включен. Системы в норме.</div>
        </div>
        <div class="input-bar">
            <input type="text" id="user-inp" placeholder="Команда..." onkeydown="if(event.keyCode==13) send()">
        </div>
    </div>

    <audio id="snd-room" src="https://www.soundjay.com/nature/sounds/cricket-chirp-1.mp3" loop></audio> <audio id="snd-jazz" src="https://www.soundjay.com/free-music/sounds/jazz-piano-1.mp3" loop></audio>

    <script>
        const roomSnd = document.getElementById('snd-room');
        const jazzSnd = document.getElementById('snd-jazz');
        const fade = document.getElementById('fade-overlay');

        function initRoom() {
            fade.style.opacity = 0; // Плавное появление видео
            roomSnd.volume = 0;
            roomSnd.play();
            fadeAudio(roomSnd, 0.4, 2000); // Плавное появление аудио
        }

        function transitionTo(url) {
            fade.style.opacity = 1;
            fadeAudio(roomSnd, 0, 1500);
            setTimeout(() => window.location.href = url, 1500);
            return false;
        }

        function openTechPark() {
            const tp = document.getElementById('techpark-overlay');
            tp.style.display = 'flex';
            setTimeout(() => tp.style.opacity = 1, 50);
            
            fadeAudio(roomSnd, 0.1, 1000); // Приглушаем фон
            jazzSnd.volume = 0;
            jazzSnd.play();
            fadeAudio(jazzSnd, 0.4, 2000); // Плавный джаз
        }

        function closeTechPark() {
            const tp = document.getElementById('techpark-overlay');
            tp.style.opacity = 0;
            fadeAudio(jazzSnd, 0, 1000);
            fadeAudio(roomSnd, 0.4, 1000);
            setTimeout(() => { tp.style.display = 'none'; jazzSnd.pause(); }, 1000);
        }

        function fadeAudio(audio, targetVol, duration) {
            const startVol = audio.volume;
            const diff = targetVol - startVol;
            const steps = 20;
            const stepTime = duration / steps;
            let i = 0;
            const timer = setInterval(() => {
                i++;
                audio.volume = startVol + (diff * i / steps);
                if (i >= steps) clearInterval(timer);
            }, stepTime);
        }

        function send() {
            const inp = document.getElementById('user-inp');
            if(!inp.value) return;
            const logs = document.getElementById('chat-logs');
            logs.innerHTML += `<div class="m-line user">${inp.value}</div>`;
            inp.value = '';
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
