
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY BACKSTAGE v5.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #000; --panel: #111; --border: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); margin: 0; padding: 0; width: 100%; height: 100%; 
            color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* ВЕРХ: ТЕЛЕВИЗОРЫ (45% высоты) */
        .tv-area { 
            height: 45%; display: flex; gap: 4px; padding: 8px; 
            background: #0a0a0a; border-bottom: 2px solid var(--gold);
        }

        .tv-box {
            flex: 1; border: 1px solid var(--border); background: #050505;
            display: flex; flex-direction: column; position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }

        /* Состояния ТВ */
        .tv-box.active { flex: 50; border-color: var(--gold); box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .tv-box.hidden { flex: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }

        .tv-header { 
            background: #1a1a1a; font-size: 11px; padding: 6px; text-align: center; 
            color: #666; text-transform: uppercase; border-bottom: 1px solid var(--border);
        }
        .active .tv-header { background: var(--gold); color: #000; font-weight: bold; }

        .tv-body { flex: 1; padding: 12px; font-size: 12px; color: #555; overflow-y: auto; }
        .active .tv-body { color: #fff; font-size: 14px; }

        .close-x {
            position: absolute; top: 30px; right: 10px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); width: 28px; height: 28px;
            display: none; cursor: pointer; z-index: 100; font-weight: bold;
        }
        .active .close-x { display: block; }

        /* НИЗ: ФУНКЦИОНАЛ (55% высоты) */
        .work-area { height: 55%; display: flex; flex-direction: column; padding: 12px; background: var(--bg); }

        .console-output { 
            flex: 1; background: var(--panel); border: 1px solid #1a1a1a; 
            margin-bottom: 10px; padding: 12px; font-size: 14px; overflow-y: auto;
            box-shadow: inset 0 0 10px #000; line-height: 1.5;
        }

        .input-group { display: flex; height: 50px; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { 
            flex: 1; background: #050505; border: 1px solid var(--border); color: #fff; 
            padding: 0 12px; font-family: inherit; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--gold); }
        .run-cmd { 
            background: var(--gold); color: #000; border: none; padding: 0 20px; 
            font-weight: bold; text-transform: uppercase; cursor: pointer;
        }

        /* ПОДВАЛ */
        .footer-nav { display: flex; justify-content: space-between; align-items: center; }
        .f-btn { 
            border: 1px solid #222; padding: 6px 12px; font-size: 11px; 
            color: #444; text-decoration: none; cursor: pointer;
        }
        .f-btn:hover { color: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tv-area">
        <div class="tv-box" id="t-a" onclick="selectMode('a')">
            <div class="tv-header">A: PUNCHLINE</div>
            <button class="close-x" onclick="event.stopPropagation(); deselect()">✕</button>
            <div class="tv-body">РЕЖИМ ДОБИВОК. Острота и юмор.</div>
        </div>
        <div class="tv-box" id="t-b" onclick="selectMode('b')">
            <div class="tv-header">B: SCENARIO</div>
            <button class="close-x" onclick="event.stopPropagation(); deselect()">✕</button>
            <div class="tv-body">РЕЖИМ ШТУРМА. Идеи и сюжеты.</div>
        </div>
        <div class="tv-box" id="t-v" onclick="selectMode('v')">
            <div class="tv-header">V: GY-GY STYLE</div>
            <button class="close-x" onclick="event.stopPropagation(); deselect()">✕</button>
            <div class="tv-body">РЕЖИМ ТЮНИНГА. Пафос клуба.</div>
        </div>
    </div>

    <div class="work-area">
        <div class="console-output" id="screen">
            <span style="color:#444;">> GY-GY BACKSTAGE v5.2 CONNECTED...</span><br>
            ВЫБЕРИТЕ ОДИН ИЗ ТРЕХ ЭКРАНОВ ВЕРХНЕЙ ПАНЕЛИ.
        </div>
        
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Введите текст...">
            <button class="run-cmd" onclick="process()">RUN</button>
        </div>
