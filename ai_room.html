
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v5.0 [ELEVATED]</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --wood: #1e140f; --glow: rgba(212, 175, 55, 0.3); }
        
        body, html { 
            background: #000; margin: 0; padding: 0; width: 100%; height: 100%; 
            color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden;
        }

        /* ИНТЕРЬЕР 5.0 */
        .club-room {
            width: 100%; height: 100%;
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                repeating-linear-gradient(90deg, #111 0px, #111 1px, transparent 1px, transparent 100px); /* Эффект обоев */
            display: flex; flex-direction: column; align-items: center;
        }

        .top-bar {
            width: 100%; padding: 15px 30px; display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--gold); background: rgba(0,0,0,0.8); z-index: 100;
        }

        /* ТЕЛЕВИЗОРЫ (МОНИТОРЫ) */
        .tv-wall {
            display: flex; gap: 20px; width: 95%; height: 50%;
            perspective: 1000px; margin-top: 30px;
        }

        .monitor {
            flex: 1; height: 260px; background: #000;
            border: 10px solid #2a2a2a; border-radius: 5px;
            box-shadow: 0 0 0 2px #111, 0 10px 20px #000;
            display: flex; flex-direction: column; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .monitor.active { 
            transform: translateZ(30px) scale(1.05); 
            border-color: var(--gold); 
            box-shadow: 0 0 40px var(--glow);
        }

        .screen {
            flex: 1; padding: 15px; font-size: 13px; color: var(--cyan);
            overflow-y: auto; background: #050505;
            position: relative;
        }

        /* Эффект старого ТВ */
        .screen::before {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .label { background: #2a2a2a; color: #888; text-align: center; font-size: 10px; padding: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .active .label { background: var(--gold); color: #000; font-weight: bold; }

        /* КОНСОЛЬ-СТОЛ */
        .desk {
            width: 100%; height: 40%; background: var(--wood);
            border-top: 5px solid #111; position: relative;
            display: flex; justify-content: center; padding-top: 40px;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.8);
        }

        .control-panel {
            width: 500px; height: 120px; background: #0a0a0a;
            border: 2px solid #333; padding: 20px; border-radius: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        input {
            width: 80%; background: #000; border: 1px solid var(--gold);
            color: var(--gold); padding: 12px; font-family: 'Share Tech Mono'; outline: none;
        }
        
        .btn-launch {
            width: 18%; background: var(--gold); border: none; height: 43px;
            vertical-align: top; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="club-room">
    <div class="top-bar">
        <div style="font-family: 'Playfair Display'; font-weight: 900; font-style: italic; font-size: 20px;">GY-GY SYSTEM 5.0</div>
        <div onclick="window.location.href='index.html'" style="cursor:pointer; border:1px solid var(--gold); padding: 5px 15px; font-size: 10px;">↩ EXIT TO v4.3</div>
    </div>

    <div class="tv-wall">
        <div class="monitor active" id="mon-a" onclick="setTV('a')">
            <div class="label">TV-1: ДОБИВКИ</div>
            <div class="screen" id="scr-a">СИСТЕМА ГОТОВА. ЖДУ ПАНЧЛАЙН...</div>
        </div>
        <div class="monitor" id="mon-b" onclick="setTV('b')">
            <div class="label">TV-2: ШТУРМ</div>
            <div class="screen" id="scr-b">КАНАЛ Б: СЦЕНАРНЫЙ ОТДЕЛ НА СВЯЗИ.</div>
        </div>
        <div class="monitor" id="mon-v" onclick="setTV('v')">
            <div class="label">TV-3: ТЮНИНГ</div>
            <div class="screen" id="scr-v">КАНАЛ В: ПРИЕМ ТЕКСТА ДЛЯ ОГРАНКИ.</div>
        </div>
    </div>

    <div class="desk">
        <div class="control-panel">
            <div style="font-size: 9px; margin-bottom: 10px; color: var(--gold);">ACTIVE CHANNEL: <span id="cur-name">ДОБИВКИ</span></div>
            <input type="text" id="cmd" placeholder="ВВЕДИТЕ ДАННЫЕ ДЛЯ АНАЛИЗА...">
            <button class="btn-launch" onclick="launch()">RUN</button>
        </div>
    </div>
</div>

<script>
    let mode = 'a';
    const names = { 'a': 'ДОБИВКИ', 'b': 'ШТУРМ', 'v': 'ТЮНИНГ' };

    function setTV(m) {
        mode = m;
        document.querySelectorAll('.monitor').forEach(el => el.classList.remove('active'));
        document.getElementById('mon-' + m).classList.add('active');
        document.getElementById('cur-name').innerText = names[m];
    }

    function launch() {
        const val = document.getElementById('cmd').value;
        if(!val) return;
        const scr = document.getElementById('scr-' + mode);
        scr.innerHTML = "> ANALYZING...<br>> BOOTING LOGIC 5.0...";

        setTimeout(() => {
            if(mode === 'a') scr.innerHTML = `ШУТКА: ${val}<br>--<br>PUNCHLINE: Ну, за это в нашем клубе наливают штрафную!`;
            if(mode === 'b') scr.innerHTML = `ТЕМА: ${val}<br>--<br>IDEA: Сделать из этого номер с чечеткой и ИИ.`;
            if(mode === 'v') scr.innerHTML = `INPUT: ${val}<br>--<br>STYLE: "Дамы и господа, этот шедевр (${val}) стоит вашего внимания..."`;
            document.getElementById('cmd').value = '';
        }, 1000);
    }
</script>

</body>
</html>
