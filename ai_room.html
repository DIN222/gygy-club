<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY BACKSTAGE v5.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #121212; 
            --panel: #1e1e1e;
            --border: #333;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            background: var(--bg); margin: 0; padding: 0; width: 100%; height: 100%; 
            color: var(--gold); font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* КОНТЕЙНЕР ТРЕХ ПАПОК */
        .folder-container {
            display: flex; height: 100vh; width: 100vw; gap: 15px; padding: 20px;
            transition: 0.5s ease;
        }

        .folder {
            flex: 1; border: 2px solid var(--border); background: var(--panel);
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .folder:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* АРТЕФАКТЫ В ПАПКАХ */
        .artifact { font-size: 80px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); margin-bottom: 20px; }
        .folder-title { font-family: 'Share Tech Mono', monospace; font-size: 14px; letter-spacing: 2px; color: #888; }

        /* АКТИВНОЕ СОСТОЯНИЕ (РАСКРЫТАЯ ПАПКА) */
        .folder.active { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; flex: none; border-radius: 0; border: none; cursor: default;
            transform: none !important;
        }

        /* ВНУТРЕННИЙ ИНТЕРФЕЙС ЧАТА (СКРЫТ ПО УМОЛЧАНИЮ) */
        .interface { display: none; width: 100%; height: 100%; flex-direction: column; background: var(--bg); }
        .folder.active .interface { display: flex; }
        .folder.active .artifact, .folder.active .folder-title { display: none; }

        /* ШАПКА РАСКРЫТОЙ ПАПКИ */
        .header { 
            height: 70px; background: #000; border-bottom: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .close-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; border-radius: 4px; }

        /* ТАБЛО (ТОЛЬКО ДЛЯ ТРЕНАЖЕРА) */
        .scoreboard { display: flex; gap: 20px; background: #0a0a0a; padding: 5px 15px; border-radius: 5px; font-family: 'Share Tech Mono', monospace; }
        .score-item { text-align: center; }
        .score-item span { display: block; font-size: 9px; color: #555; }
        .score-item b { font-size: 16px; color: #fff; }

        /* ЗОНА ЧАТА */
        .chat-zone { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 10px; line-height: 1.5; font-size: 15px; animation: fadeInUp 0.3s ease; }
        .msg.ai { align-self: flex-start; background: #262626; border: 1px solid #333; color: #eee; }
        .msg.user { align-self: flex-end; background: #3d341f; border: 1px solid var(--gold); color: #fff; }

        /* ПАНЕЛЬ ВВОДА */
        .input-bar { height: 80px; background: #000; border-top: 1px solid #222; display: flex; padding: 15px; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 0 15px; border-radius: 6px; outline: none; font-size: 16px; }
        .send-btn { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="folder-container" id="container">
    
    <div class="folder" onclick="openFolder(this, 'A')">
        <div class="artifact">✧</div>
        <div class="folder-title">CH-A: PUNCHLINE</div>
        <div class="interface">
            <div class="header">
                <b>PUNCHLINE v5.9</b>
                <button class="close-btn" onclick="closeFolder(event)">ЗАКРЫТЬ X</button>
            </div>
            <div class="chat-zone">
                <div class="msg ai">Система v4.3. Канал Кристалла активен. Жду шутку для добивки.</div>
            </div>
            <div class="input-bar"><input type="text" placeholder="Текст..."><button class="send-btn">ВВОД</button></div>
        </div>
    </div>

    <div class="folder" onclick="openFolder(this, 'B')">
        <div class="artifact">$</div>
        <div class="folder-title">CH-B: MILLIONAIRE</div>
        <div class="interface">
            <div class="header">
                <div class="scoreboard">
                    <div class="score-item"><span>Старт</span><b>100$</b></div>
                    <div class="score-item"><span>Текущая</span><b>0$</b></div>
                    <div class="score-item"><span>Итого</span><b>0$</b></div>
                </div>
                <button class="close-btn" onclick="closeFolder(event)">ЗАКРЫТЬ X</button>
            </div>
            <div class="chat-zone">
                <div class="msg ai">Тренажер Миллионера. Торгуемся здесь. Что продаете сегодня?</div>
            </div>
            <div class="input-bar"><input type="text" placeholder="Ваша цена..."><button class="send-btn">ВВОД</button></div>
        </div>
    </div>

    <div class="folder" onclick="openFolder(this, 'V')">
        <div class="artifact">🎭</div>
        <div class="folder-title">CH-V: TUNER</div>
        <div class="interface">
            <div class="header">
                <b>TUNING v5.9</b>
                <button class="close-btn" onclick="closeFolder(event)">ЗАКРЫТЬ X</button>
            </div>
            <div class="chat-zone">
                <div class="msg ai">Режим масок. Настройка пафоса и стиля GY-GY.</div>
            </div>
            <div class="input-bar"><input type="text" placeholder="Текст для тюнинга..."><button class="send-btn">ВВОД</button></div>
        </div>
    </div>

</div>

<script>
    function openFolder(el, type) {
        if (el.classList.contains('active')) return;
        el.classList.add('active');
        document.getElementById('container').style.gap = '0';
    }

    function closeFolder(e) {
        e.stopPropagation();
        const activeFolder = document.querySelector('.folder.active');
        if (activeFolder) {
            activeFolder.classList.remove('active');
            document.getElementById('container').style.gap = '15px';
        }
    }
</script>

</body>
</html>
