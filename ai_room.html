<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v4.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --cyan: #00E5FF; 
            --bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); 
            color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
        }

        /* Фоновое свечение */
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 25% 50%, rgba(212, 175, 55, 0.05), transparent 40%),
                        radial-gradient(circle at 75% 50%, rgba(0, 229, 255, 0.05), transparent 40%);
            pointer-events: none; z-index: 1;
        }

        /* Контейнер выбора режима */
        .mode-selector {
            position: relative; z-index: 10;
            display: flex; width: 100vw; height: 100vh;
        }

        .mode-box {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer; position: relative;
            background: rgba(0,0,0,0.2);
        }

        /* Ховер-эффекты для зон */
        .mode-box:hover { background: rgba(212, 175, 55, 0.03); border-color: var(--gold); }
        .mode-box.dual:hover { background: rgba(0, 229, 255, 0.03); border-color: var(--cyan); }

        .mode-box h2 { 
            font-family: 'Playfair Display', serif; font-size: 32px; 
            letter-spacing: 5px; margin-bottom: 15px; transition: 0.4s;
        }
        
        .mode-box .desc { font-size: 10px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }

        /* ИНТЕРФЕЙС ТЕРМИНАЛА (Скрыт по умолчанию) */
        #terminal-wrap {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100;
            display: none; flex-direction: column; padding: 30px;
            opacity: 0; transition: opacity 0.8s;
        }

        #log {
            flex: 1; overflow-y: auto; margin-bottom: 20px;
            padding-right: 10px; font-size: 14px; line-height: 1.6;
        }

        .ai-msg { color: var(--gold); margin-bottom: 15px; border-left: 2px solid var(--gold); padding-left: 10px; }
        .ai-msg.dual { color: var(--cyan); border-left-color: var(--cyan); }
        .user-msg { color: #fff; text-align: right; opacity: 0.7; margin-bottom: 15px; }

        .input-area {
            display: flex; border: 1px solid var(--gold); padding: 5px; background: rgba(255,255,255,0.05);
        }

        #user-input {
            flex: 1; background: none; border: none; color: var(--gold);
            padding: 10px; font-family: inherit; font-size: 16px; outline: none;
        }

        .close-btn { 
            position: absolute; top: 20px; right: 20px; 
            cursor: pointer; font-size: 12px; opacity: 0.5; 
        }
        .close-btn:hover { opacity: 1; color: red; }

        /* Анимация "печати" текста */
        .typing::after { content: "|"; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="mode-selector" id="selector">
        <div class="mode-box" onclick="activateAI('mono')">
            <div class="desc">Communication Type: Ч-ИИ</div>
            <h2>MONOLOGUE</h2>
            <div style="font-size: 24px;">👤 → 🤖</div>
        </div>

        <div class="mode-box dual" onclick="activateAI('dual')">
            <div class="desc" style="color: var(--cyan);">Communication Type: Ч-ИИ-ИИ</div>
            <h2 style="color: var(--cyan);">CONSILIUM</h2>
            <div style="font-size: 24px;">👤 → 🤖+🤖</div>
        </div>
    </div>

    <div id="terminal-wrap">
        <div class="close-btn" onclick="exitAI()">[ ESC - ВЕРНУТЬСЯ В БАР ]</div>
        <div id="log"></div>
        <div class="input-area" id="input-container">
            <input type="text" id="user-input" placeholder="Введите ваш тезис..." onkeypress="handleKey(event)">
        </div>
    </div>

    <script>
        let currentMode = '';

        function activateAI(mode) {
            currentMode = mode;
            const wrap = document.getElementById('terminal-wrap');
            const log = document.getElementById('log');
            
            document.getElementById('selector').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('selector').style.display = 'none';
                wrap.style.display = 'flex';
                setTimeout(() => wrap.style.opacity = '1', 50);
                
                // Стартовое сообщение
                if(mode === 'mono') {
                    typeWriter("Система Ч-ИИ активирована. Чарли готов слушать. О чем поспорим?", "ai-msg");
                } else {
                    typeWriter("Консилиум Ч-ИИ-ИИ запущен. Две сущности ждут искру для начала дискуссии.", "ai-msg dual");
                }
            }, 600);
        }

        function typeWriter(text, className) {
            const log = document.getElementById('log');
            const p = document.createElement('p');
            p.className = className + " typing";
            log.appendChild(p);
            
            let i = 0;
            function type() {
                if (i < text.length) {
                    p.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 30);
                    log.scrollTop = log.scrollHeight;
                } else {
                    p.classList.remove('typing');
                }
            }
            type();
        }

        function handleKey(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('user-input');
                const val = input.value.trim();
                if(!val) return;

                // Печатаем текст пользователя
                const uMsg = document.createElement('p');
                uMsg.className = "user-msg";
                uMsg.innerText = val;
                document.getElementById('log').appendChild(uMsg);
                input.value = '';

                // Имитация ответа
                setTimeout(() => {
                    if(currentMode === 'mono') {
                        typeWriter("Чарли обдумывает ваш тезис... Впрочем, в этом есть доля виски.", "ai-msg");
                    } else {
                        typeWriter("Агент 1: Это любопытно. Агент 2: Я бы поспорил с этим утверждением.", "ai-msg dual");
                    }
                }, 1000);
            }
        }

        function exitAI() {
            location.reload(); // Пока просто перезагрузка для возврата
        }
    </script>
</body>
</html>
