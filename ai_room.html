<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY BACKSTAGE v5.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f1d592;
            --bg-dark: #1a1a1a; 
            --bg-panel: #262626;
            --text-main: #ffffff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            background: var(--bg-dark); margin: 0; padding: 0; width: 100%; height: 100%; 
            color: var(--text-main); font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* ТИТУЛЬНЫЙ ЭКРАН (WELCOME) */
        #welcome-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c2c2c 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.8s ease;
        }
        #welcome-screen.fade { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .crystal-dollar {
            font-size: 120px; color: var(--gold); cursor: pointer;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            animation: pulse 2s infinite ease-in-out;
        }
        .masks-overlay { display: flex; gap: 40px; margin-top: 30px; font-size: 40px; opacity: 0.5; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header { 
            height: 85px; background: var(--bg-panel); border-bottom: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .ai-avatars { display: flex; gap: 15px; }
        .av-box { 
            width: 48px; height: 48px; border: 2px solid #444; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; cursor: pointer; transition: 0.3s; background: #111;
        }
        .av-box.active { border-color: var(--gold); background: #332b1a; box-shadow: 0 0 15px var(--gold); }
        .av-box.user { border-style: dashed; color: var(--gold); }

        .scoreboard { 
            display: flex; gap: 20px; background: #000; padding: 8px 20px; 
            border-radius: 8px; border: 1px solid #444;
        }
        .score-item { text-align: center; }
        .score-item span { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .score-item b { font-size: 18px; color: var(--gold-light); font-family: 'Share Tech Mono', monospace; }

        .top-nav { display: flex; flex-direction: column; gap: 5px; }
        .nav-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: 4px; font-weight: bold;
            text-decoration: none; text-align: center;
        }

        /* ЧАТ */
        .chat-zone { 
            height: calc(100vh - 170px); overflow-y: auto; padding: 25px; 
            background: #222; display: flex; flex-direction: column; gap: 20px;
        }
        .msg { display: flex; gap: 15px; max-width: 80%; animation: slide 0.3s ease; }
        .msg.ai { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-icon { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .msg-text { 
            background: #2d2d2d; color: #fff; padding: 15px 20px; border-radius: 12px; 
            line-height: 1.6; font-size: 16px; border: 1px solid #3d3d3d; box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
        .user .msg-text { background: #3d341f; border-color: var(--gold); color: #fff; }

        @keyframes slide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ВВОД */
        .input-zone { 
            height: 85px; background: var(--bg-panel); border-top: 1px solid #444;
            display: flex; padding: 15px 25px; gap: 15px; align-items: center;
        }
        input { 
            flex: 1; background: #111; border: 1px solid #555; color: #fff; 
            padding: 15px; font-size: 16px; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: #000; }
        .send-btn { 
            background: var(--gold); color: #000; border: none; padding: 0 35px; 
            height: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="welcome-screen" onclick="this.classList.add('fade')">
    <div class="crystal-dollar">$</div>
    <div class="masks-overlay">🎭 🎬 💎</div>
    <p style="color: #666; margin-top: 40px;">НАЖМИТЕ НА КРИСТАЛЛ, ЧТОБЫ ВОЙТИ</p>
</div>

<div class="header">
    <div class="ai-avatars">
        <div class="av-box active" onclick="sel('gemini', '✧', '#4285f4', this)">✧</div>
        <div class="av-box" onclick="sel('grok', '/', '#ffffff', this)">/</div>
        <div class="av-box" onclick="sel('copilot', '∞', '#3bd0a4', this)">∞</div>
        <div class="av-box user">👤</div>
    </div>

    <div class="scoreboard">
        <div class="score-item"><span>Старт</span><b id="s-val">100$</b></div>
        <div class="score-item"><span>Текущая</span><b id="c-val">0$</b></div>
        <div class="score-item"><span>Итого</span><b id="i-val">0$</b></div>
    </div>

    <div class="top-nav">
        <div class="nav-btn" style="border-color: #555; color: #888;">🌐 RU</div>
        <a href="index.html" class="nav-btn">В БАР ↩</a>
    </div>
</div>

<div class="chat-zone" id="chat">
    <div class="msg ai">
        <div class="msg-icon" style="background:#4285f4">✧</div>
        <div class="msg-text"><b>Система v4.3 готова.</b><br>Это тренажер миллионера. Здесь торгуются и смеются. Нажми на любой аватар выше и спроси: "Что вы продаете?"</div>
    </div>
</div>

<div class="input-zone">
    <input type="text" id="inp" placeholder="Предложите цену или задайте вопрос..." onkeydown="if(event.keyCode==13) push()">
    <button class="send-btn" onclick="push()">ВВОД</button>
</div>

<script>
    let curAI = 'gemini';
    let curIcon = '✧';
    let curColor = '#4285f4';
    let total = 0;

    function sel(id, icon, color, el) {
        curAI = id; curIcon = icon; curColor = color;
        document.querySelectorAll('.av-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        addMsg('ai', `Внимание! В торги вступает агент <b>${id.toUpperCase()}</b>. Посмотрим, на что вы способны.`);
    }

    function addMsg(type, text) {
        const zone = document.getElementById('chat');
        const m = document.createElement('div');
        m.className = `msg ${type}`;
        const icon = type === 'ai' ? curIcon : '👤';
        const bg = type === 'ai' ? curColor : '#d4af37';
        
        m.innerHTML = `<div class="msg-icon" style="background:${bg}; color:${type==='ai'&&curAI==='grok'?'#000':'#fff'}">${icon}</div>
                       <div class="msg-text">${text}</div>`;
        zone.appendChild(m);
        zone.scrollTop = zone.scrollHeight;

        // Авто-арифметика $
        const money = text.match(/(\d+)\$/);
        if(money) {
            document.getElementById('c-val').innerText = money[1] + '$';
            if(text.includes("ПО РУКАМ") || text.includes("БЕРУ")) {
                total += parseInt(money[1]);
                document.getElementById('i-val').innerText = total + '$';
            }
        }
    }

    function push() {
        const val = document.getElementById('inp').value;
        if(!val) return;
        addMsg('user', val);
        document.getElementById('inp').value = '';

        setTimeout(() => {
            let res = "";
            if(curAI === 'grok') res = `Ты серьезно думаешь купить это за ${val}? Я продаю за 900$ и ни центом меньше!`;
            else res = `Ваше предложение "${val}" зарегистрировано. Но мой анализ говорит, что 450$ — более честная цена.`;
            addMsg('ai', res);
        }, 1000);
    }
</script>

</body>
</html>
