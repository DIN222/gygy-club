
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM v4.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Жесткий сброс, чтобы ничего не вылезло белым */
        html, body { 
            background-color: #000 !important; 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; color: #d4af37;
        }

        :root { --gold: #d4af37; --cyan: #00E5FF; }

        /* Главный контейнер, который точно будет поверх всего */
        #main-stage {
            position: relative;
            z-index: 999;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            height: 60px;
            border-bottom: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: #000;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #050505; /* Почти черный, для объема */
        }

        .bubble {
            max-width: 80%;
            padding: 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .ai { align-self: flex-start; border-left: 4px solid var(--gold); }
        .user { align-self: flex-end; border-right: 4px solid var(--cyan); color: #fff; }

        .input-bar {
            height: 70px;
            background: #000;
            display: flex;
            padding: 10px;
            border-top: 1px solid var(--gold);
        }

        input {
            flex: 1;
            background: #111;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px;
            font-family: 'Share Tech Mono';
            outline: none;
        }

        button {
            width: 50px;
            background: var(--gold);
            border: none;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Убираем мусор от Google Translate, если он лезет */
        .skiptranslate, iframe { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>
<body>

    <div id="main-stage">
        <div class="header">
            <div style="font-family: 'Playfair Display'; font-weight: 900;">BACKSTAGE</div>
            <div onclick="window.location.href='index.html'" style="cursor:pointer; font-size:12px; border:1px solid var(--gold); padding:5px;">В ХОЛЛ</div>
        </div>

        <div id="chat-window">
            <div class="bubble ai">Коннект установлен. Тьма рассеяна. Вижу тебя, Резидент.</div>
        </div>

        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Введите текст..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        function send() {
            const inp = document.getElementById('m-input');
            const win = document.getElementById('chat-window');
            if(!inp.value.trim()) return;

            const u = document.createElement('div');
            u.className = 'bubble user';
            u.innerText = inp.value;
            win.appendChild(u);
            
            const text = inp.value;
            inp.value = '';
            win.scrollTop = win.scrollHeight;

            setTimeout(() => {
                const a = document.createElement('div');
                a.className = 'bubble ai';
                a.innerText = `Архивариус принял запрос по теме: "${text}". Работаю над ответом...`;
                win.appendChild(a);
                win.scrollTop = win.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
