<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Retro | v6.2 [7.1.32-LH_]</title>
    <style>
        :root {
            --gold-leaf: #d4af37;
            --crt-white: #fafafa;
            --glass-dark: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* [ФОН] Обязательный визуал OIG2 */
        #tv-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            filter: contrast(1.1) brightness(0.5);
            z-index: -2;
        }

        /* [АТРИБУТ] GY-GY & ЯЗЫКИ (Верхний эшелон) */
        header {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 30px 45px; box-sizing: border-box; z-index: 1000;
        }
        .gy-gy { font-size: 26px; font-weight: 900; letter-spacing: 6px; }
        
        .lang-panel { display: flex; gap: 15px; }
        .lang-node {
            background: var(--glass-dark); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 5px 12px; cursor: pointer; font-size: 11px;
            backdrop-filter: blur(4px);
        }

        /* [ЦЕНТР] Основной монитор и счетчик */
        .hub-center {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .monitor-output {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }
        .build-id {
            font-size: 11px; color: var(--gold-leaf);
            letter-spacing: 4px; margin-top: 15px;
            text-transform: uppercase;
        }

        /* [АТРИБУТ] ВОЗВРАТ (Нижний левый) */
        .back-node {
            position: fixed; bottom: 40px; left: 45px;
            background: var(--glass-dark); border: 1px solid #fff;
            color: #fff; padding: 12px 24px; font-size: 10px;
            letter-spacing: 2px; cursor: pointer; z-index: 1000;
        }

        /* [АТРИБУТ] IDENTITY (Нижний правый) */
        .identity-hub {
            position: fixed; bottom: 40px; right: 45px;
            display: flex; align-items: center; gap: 20px; z-index: 1000;
        }
        .trace-data { text-align: right; }
        .trace-data small { font-size: 9px; opacity: 0.4; display: block; }
        .trace-data strong { color: var(--gold-leaf); font-size: 14px; }

        .magic-key-box {
            width: 55px; height: 55px;
            border: 1px solid var(--gold-leaf);
            background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
    </style>
</head>
<body>

    <div id="tv-background"></div>

    <header>
        <div class="gy-gy">GY-GY</div>
        <nav class="lang-panel">
            <button class="lang-node">RU</button>
            <button class="lang-node">EN</button>
        </nav>
    </header>

    <main class="hub-center">
        <div class="monitor-output">
            <h1 style="font-size: 3rem; font-weight: 100; letter-spacing: 20px; margin: 0;">AI ROOM</h1>
            <div class="build-id" id="version-counter">v6.2 [7.1.32-LH_]</div>
            <div style="width: 150px; height: 1px; background: var(--gold-leaf); margin: 20px auto; opacity: 0.3;"></div>
        </div>
    </main>

    <button class="back-node" onclick="history.back()">LEVEL_RETURN</button>

    <section class="identity-hub">
        <div class="trace-data">
            <span>UNIQUE DIGITAL TRACE</span>
            <strong id="user-trace-display">INITIALIZING...</strong>
        </div>
        <div class="magic-key-box" id="magic-key">
            <span style="font-size: 10px; color: var(--gold-leaf);">M.K.</span>
        </div>
    </section>

    <script>
        /**
         * v6.2 [7.1.32-LH_] 
         * Logic: Version Counter + Cookie Recognition
         */
        document.addEventListener('DOMContentLoaded', () => {
            const VERSION_BASE = "7.1.32";
            const SUFFIX = "LH_";

            // 1. Динамический счетчик (через LocalStorage)
            let buildVersion = localStorage.getItem('gy_build_idx') || 0;
            buildVersion++;
            localStorage.setItem('gy_build_idx', buildVersion);

            // Обновление отображения версии
            document.getElementById('version-counter').innerText = `v6.2 [${VERSION_BASE}.${buildVersion}-${SUFFIX}]`;

            // 2. Cookie-recognition (Digital Trace)
            let trace = localStorage.getItem('gy_digital_trace_v7');
            if (!trace) {
                trace = 'UX-' + Math.random().toString(36).substr(2, 7).toUpperCase();
                localStorage.setItem('gy_digital_trace_v7', trace);
            }
            document.getElementById('user-trace-display').innerText = trace;

            console.log(`System Build ${VERSION_BASE}.${buildVersion} Synchronized.`);
        });

        document.getElementById('magic-key').onclick = () => {
            alert("Magic Key Status: Active\nSession saved via Cookie-recognition.");
        };
    </script>
</body>
</html>
