
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY CLUB v7.1.0 | GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; --neon: #00f2ff; --bg: #000;
        }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
        }

        /* ОБЯЗАТЕЛЬНЫЕ АТРИБУТЫ (Принцип 2026-03-07) */
        .top-ui {
            position: fixed; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; font-family: 'Share Tech Mono';
        }
        .brand { color: var(--gold); font-weight: 700; letter-spacing: 5px; font-size: 20px; }
        .lang-panel { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold);
            padding: 8px 15px; cursor: pointer; color: var(--gold);
            transition: 0.3s; font-size: 12px;
        }
        .lang-panel:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* АНИМАЦИЯ ДВЕРЕЙ (Принцип 2026-03-07: плавно уплывают) */
        .gate-system {
            position: relative; width: 100vw; height: 100vh;
            background: #000; overflow: hidden;
        }
        .door {
            position: absolute; width: 50%; height: 100%;
            background: #111; z-index: 1000;
            transition: transform 3s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex; justify-content: center; align-items: center;
            border: 1px solid #222;
        }
        .door-left { left: 0; border-right: 2px solid var(--gold); }
        .door-right { right: 0; border-left: 2px solid var(--gold); }

        .gate-open .door-left { transform: translateX(-100%); }
        .gate-open .door-right { transform: translateX(100%); }

        /* ИНТЕРФЕЙС ЧАРЛИ НА ФОНЕ ТЕЛЕВИЗОРОВ (Принцип 2026-02-06) */
        .charlie-stage {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 500;
        }
        .vintage-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.5; /* Затемняем, чтобы кнопки читались */
        }

        .charlie-ui {
            position: relative; z-index: 600; text-align: center;
            font-family: 'Share Tech Mono';
        }
        .scanner {
            width: 200px; height: 2px; background: var(--neon);
            margin: 0 auto 30px; box-shadow: 0 0 15px var(--neon);
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .status-msg { color: var(--gold); margin-bottom: 40px; letter-spacing: 2px; font-size: 14px; }

        /* КНОПКИ */
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .ui-btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--gold);
            color: var(--gold); padding: 15px 50px; cursor: pointer;
            font-family: 'Share Tech Mono'; text-transform: uppercase;
            transition: 0.5s; backdrop-filter: blur(5px);
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
        
        #reg-btn { display: none; border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body onload="startGateway()">

    <div class="top-ui">
        <div class="brand">GY-GY</div> <div class="lang-panel">🌐 LANGUAGE [cite: 2026-03-05]</div>
    </div>

    <div class="gate-system" id="gate">
        <div class="door door-left"></div>
        <div class="door door-right"></div>

        <div class="charlie-stage">
            <img src="OIG2_vintage_tv_room.jpg" class="vintage-bg" alt="Charlie Screen">
            
            <div class="charlie-ui">
                <div class="scanner"></div>
                <div id="status" class="status-msg">SYSTEM: SCANNING FOR DIGITAL TRACE...</div>
                
                <div class="btn-group">
                    <button id="main-btn" class="ui-btn" onclick="checkIdentity()">ПРОХОДИТЕ</button>
                    <button id="reg-btn" class="ui-btn" onclick="goReg()">ОСТАВЬТЕ СВОЙ АВТОГРАФ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isMember = false;

        function startGateway() {
            // 1. Двери плавно открываются [cite: 2026-03-07]
            setTimeout(() => {
                document.getElementById('gate').classList.add('gate-open');
            }, 500);

            // 2. Чарли проверяет куки [cite: 2026-02-06]
            const trace = getCookie("digital_trace_id"); [cite: 2026-02-06]
            const statusLabel = document.getElementById('status');
            
            setTimeout(() => {
                if (trace) {
                    isMember = true;
                    statusLabel.innerText = "CHARLIE: WELCOME BACK, USER_" + trace.substring(0,4);
                } else {
                    statusLabel.innerText = "CHARLIE: IDENTIFICATION REQUIRED";
                }
            }, 2000);
        }

        function checkIdentity() {
            if (isMember) {
                // Своих Чарли пускает в Холл [cite: 2026-02-06]
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = 'hall.html'; }, 1000);
            } else {
                // Новеньким гасим кнопку и просим автограф [cite: 2026-02-06]
                const mBtn = document.getElementById('main-btn');
                const rBtn = document.getElementById('reg-btn');
                mBtn.style.opacity = '0';
                setTimeout(() => {
                    mBtn.style.display = 'none';
                    rBtn.style.display = 'block';
                }, 400);
            }
        }

        function goReg() {
            document.body.style.opacity = '0';
            // Переход за цифровым следом (Magic Key) [cite: 2026-02-06]
            setTimeout(() => { window.location.href = 'registration.html'; }, 1000);
        }

        function getCookie(name) {
            let matches = document.cookie.match(new RegExp(
                "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
            ));
            return matches ? decodeURIComponent(matches[1]) : undefined; [cite: 2026-02-06]
        }
    </script>
</body>
</html>
