<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.46-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }

        /* ФОН: OIG2_vintage_tv_room.jpg */
        .room-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* [HEADER] */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10000;
        }
        .logo-club { color: #ffcc00; font-size: 24px; font-weight: bold; letter-spacing: 5px; }
        #google_translate_element { background: rgba(0,0,0,0.8); padding: 4px; border: 1px solid #444; border-radius: 4px; }

        /* [TV SYSTEM] - РАДИКАЛЬНОЕ УМЕНЬШЕНИЕ И ПРИНУДИТЕЛЬНЫЙ СДВИГ */
        .tv-station {
            position: absolute;
            top: 55%; /* Глубина */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; /* Весь блок теперь всего 100 пикселей в ширину */
            height: 20px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
        }

        .nano-monitor {
            width: 18px !important; /* Жестко фиксируем микро-размер */
            height: 12px !important;
            background: rgba(0, 255, 255, 0.2); /* Легкое свечение для поиска */
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: block;
        }

        .nano-monitor:hover {
            background: #ffcc00;
            transform: scale(8); /* Огромный зум, чтобы понять, что это ОНО */
            z-index: 1000;
            box-shadow: 0 0 20px #ffcc00;
        }

        /* [FOOTER] */
        .footer {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end; z-index: 2000;
        }
        .btn-back { background: rgba(0,0,0,0.8); border: 1px solid #fff; color: #fff; padding: 5px 15px; cursor: pointer; font-size: 9px; }
        .id-trace { text-align: right; color: #ffcc00; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo-club">GY-GY</div>
    </header>

    <div class="tv-station">
        <a href="techpark.html" class="nano-monitor" title="TECHPARK"></a>
        <a href="verses.html" class="nano-monitor" title="VERSES"></a>
        <div class="nano-monitor" style="opacity: 0.3;" title="RESERVE"></div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-back" onclick="history.back()">← RETURN</button>
            <div style="font-size: 10px; color: rgba(255,204,0,0.3); margin-top: 5px;">BUILD: 7.1.46-LH | v6.2</div>
        </div>
        <div class="id-trace">
            <span style="font-size: 8px; opacity: 0.5; display: block;">DIGITAL TRACE</span>
            <span id="user-id">ID_LOAD</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
