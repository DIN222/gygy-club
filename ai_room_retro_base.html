<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v5.7 [7.1.25-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Полный сброс всех блокировок для работы Google Translate */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
        }

        /* КОРНЕВОЙ ФОН (без оберток) */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; /* На самом заднем плане */
        }

        /* НАВИГАЦИЯ: ПРОСТО И НАДЕЖНО */
        .top-nav {
            position: absolute; top: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 9999;
        }

        .logo { 
            color: #ffcc00; font-weight: bold; font-size: 32px; 
            text-transform: uppercase; letter-spacing: 5px;
            order: 2; /* Лого справа */
        }
        
        #google_translate_element { 
            order: 1; /* Язык слева */
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px;
        }

        /* ТЕЛЕВИЗОРЫ: ГЕОМЕТРИЯ "ОТОДВИНУТО" */
        .tv-grid {
            position: absolute; top: 32%; left: 50%;
            transform: translateX(-50%);
            width: 55%; height: 16%;
            display: flex; gap: 30px;
            z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4); transition: 0.3s;
        }

        .tv-screen:hover { 
            border-color: #ffcc00; background: rgba(255,204,0,0.1); 
        }

        .tv-label {
            color: #fff; font-weight: bold; text-align: center; 
            font-size: 16px; text-transform: uppercase;
        }

        .footer-info { 
            position: fixed; bottom: 20px; left: 40px; 
            font-size: 11px; color: rgba(255,204,0,0.5);
        }
    </style>
</head>
<body>

    <img src="OIG2_vintage_tv_room.jpg" class="main-bg" alt="HQ BACKGROUND">

    <div class="top-nav">
        <div class="logo">GY-GY</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="tv-grid">
        <a href="techpark.html" class="tv-screen">
            <div class="tv-label">TECHPARK</div>
        </a>
        <a href="verses.html" class="tv-screen">
            <div class="tv-label">GY-GY VERSES</div>
        </a>
        <div class="tv-screen">
            <div class="tv-label">RESERVE</div>
        </div>
    </div>

    <div class="footer-info">BUILD: 7.1.25-LH | v5.7</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
