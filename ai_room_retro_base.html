<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.45-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* BACKGROUND - ТВОЙ ФАЙЛ */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* [HEADER] ЯЗЫКОВАЯ ПАНЕЛЬ И ЛОГО */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10000;
        }
        .logo-club { color: #ffcc00; font-size: 26px; font-weight: bold; letter-spacing: 5px; }
        #google_translate_element { 
            background: rgba(0,0,0,0.85); padding: 5px; border: 1px solid #444; border-radius: 4px;
        }

        /* [TV SYSTEM] - РАДИКАЛЬНОЕ УДАЛЕНИЕ И СДВИГ */
        .tv-container {
            position: relative;
            z-index: 500;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .tv-cluster {
            /* СДВИГ: толкаем их вниз, чтобы они "легли" на стол в перспективе */
            margin-top: 120px; 
            width: 120px; /* Очень узко */
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .tv-pixel-box {
            width: 20px; /* Размер "точки" на горизонте */
            height: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.9);
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        .tv-pixel-box:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.4);
            transform: scale(6); /* Увеличение для клика */
            z-index: 1000;
        }

        .tv-mini-label { font-size: 3px; color: #ffcc00; font-weight: bold; }

        /* [FOOTER] */
        .footer {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 2000;
        }
        .btn-back {
            background: rgba(0,0,0,0.8); border: 1px solid #fff;
            color: #fff; padding: 5px 15px; cursor: pointer; font-size: 9px;
        }
        .id-trace { text-align: right; color: #ffcc00; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo-club">GY-GY</div>
    </header>

    <div class="tv-container">
        <div class="tv-cluster">
            <a href="techpark.html" class="tv-pixel-box"><div class="tv-mini-label">T</div></a>
            <a href="verses.html" class="tv-pixel-box"><div class="tv-mini-label">V</div></a>
            <div class="tv-pixel-box" style="opacity: 0.3;"><div class="tv-mini-label">R</div></div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-back" onclick="history.back()">← RETURN</button>
            <div style="font-size: 10px; color: rgba(255,204,0,0.3); margin-top: 5px;">BUILD: 7.1.45-LH | v6.2</div>
        </div>
        <div class="id-trace">
            <span style="font-size: 8px; opacity: 0.5; display: block;">DIGITAL TRACE</span>
            <span id="user-id">ID_LOAD</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
