<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.44-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* СИСТЕМНЫЙ СБРОС */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* ФОН: OIG2_vintage_tv_room.jpg */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* ВЕРХ: КЛАССИЧЕСКАЯ ПАНЕЛЬ ЯЗЫКА (v41-42 style) */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10000;
        }
        .logo-club { color: #ffcc00; font-size: 26px; font-weight: bold; letter-spacing: 4px; }
        #google_translate_element { 
            background: rgba(0,0,0,0.8);
            padding: 5px; border: 1px solid #444;
            border-radius: 4px;
        }

        /* ТЕЛЕВИЗОРЫ: МАКСИМАЛЬНОЕ УДАЛЕНИЕ (BUILD 44 SPECIAL) */
        .tv-cluster {
            position: absolute;
            top: 54%; /* Точная привязка к "столу" в глубине фото */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; /* Сверх-узкий контейнер */
            display: flex; justify-content: space-between;
            z-index: 500;
        }

        .tv-pixel-unit {
            width: 24px; /* ТОЧКА В ГЛУБИНЕ */
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.95);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .tv-pixel-unit:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.3);
            transform: scale(5); /* Мощный зум при наведении, чтобы можно было попасть */
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255,204,0,0.5);
        }

        .tv-label { 
            color: #ffcc00; font-size: 3px; /* Почти невидимый текст до наведения */
            font-weight: bold; pointer-events: none;
        }

        /* НИЗ: ВОЗВРАТ И TRACE */
        .footer {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 2000;
        }
        .btn-back {
            background: rgba(0,0,0,0.8); border: 1px solid #fff;
            color: #fff; padding: 4px 12px; cursor: pointer;
            font-size: 9px; text-transform: uppercase;
        }
        .build-tag { font-size: 10px; color: rgba(255,204,0,0.3); margin-top: 5px; }
        .id-val { color: #ffcc00; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo-club">GY-GY</div>
    </header>

    <div class="tv-cluster">
        <a href="techpark.html" class="tv-pixel-unit"><div class="tv-label">T</div></a>
        <a href="verses.html" class="tv-pixel-unit"><div class="tv-label">V</div></a>
        <div class="tv-pixel-unit" style="opacity: 0.3;"><div class="tv-label">R</div></div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-back" onclick="history.back()">← RETURN</button>
            <div class="build-tag">BUILD: 7.1.44-LH | v6.2</div>
        </div>
        <div style="text-align: right;">
            <span style="font-size: 8px; opacity: 0.5; display: block;">DIGITAL TRACE</span>
            <span class="id-val" id="user-id">ID_LOAD</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
