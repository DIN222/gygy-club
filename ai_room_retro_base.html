<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.42-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ЧИСТАЯ БАЗА */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* ТВОЙ ФОН */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* ХЕДЕР: ПОЛНОСТЬЮ ПРОЗРАЧНЫЙ, БЕЗ ГРАДИЕНТОВ */
        .nav-top {
            position: fixed; top: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .logo { 
            color: #ffcc00; font-size: 22px; font-weight: bold; 
            letter-spacing: 5px; text-transform: uppercase;
        }

        /* ТЕЛЕВИЗОРЫ: МИКРО-МАСШТАБ (УДАЛЕНИЕ) */
        .tv-horizon {
            position: absolute;
            top: 52%; /* Точка горизонта на фото */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; /* Еще уже для эффекта дали */
            display: flex; 
            justify-content: space-between;
            z-index: 500;
        }

        .tv-micro-unit {
            width: 60px; /* Микро-размер */
            height: 45px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.85);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.4s;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .tv-micro-unit:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            transform: scale(1.5); /* Приближение при фокусе */
            z-index: 600;
        }

        .tv-text { 
            color: #ffcc00; font-size: 7px; /* Мелкий текст для мелких экранов */
            font-weight: bold; text-align: center; line-height: 1;
        }

        /* ФУТЕР */
        .footer {
            position: fixed; bottom: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 1000;
        }
        .btn-ret { 
            background: none; border: 1px solid rgba(255,255,255,0.2); 
            color: #ccc; padding: 4px 12px; cursor: pointer; font-size: 9px; 
        }
        .build { font-size: 9px; color: rgba(255, 204, 0, 0.3); }
        .trace { color: #ffcc00; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo">GY-GY</div>
    </header>

    <div class="tv-horizon">
        <a href="techpark.html" class="tv-micro-unit">
            <div class="tv-text">TECH<br>PARK</div>
        </a>
        <a href="verses.html" class="tv-micro-unit">
            <div class="tv-text">VERSES</div>
        </a>
        <div class="tv-micro-unit" style="opacity: 0.3;">
            <div class="tv-text">RES</div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-ret" onclick="history.back()">RETURN</button>
            <div class="build" style="margin-top:5px;">BUILD: 7.1.42-LH | v6.2</div>
        </div>
        <div class="trace">
            <span style="font-size: 7px; opacity: 0.5; display: block; text-align: right;">USER_TRACE</span>
            <span id="user-id">ID_SYNCING</span>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
