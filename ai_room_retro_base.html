<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v5.0 [7.1.18-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --neon: #00f2ff;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ: МАКСИМАЛЬНЫЙ ОТСТУП ОТ ЭКРАНОВ */
        .nav-header {
            position: fixed; top: 30px; left: 50px; right: 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse;
        }

        /* ЧИСТОЕ ЛОГО СПРАВА */
        .logo { 
            color: var(--gold); 
            font-weight: bold; 
            letter-spacing: 10px; 
            font-size: 34px; 
            text-shadow: 0 0 20px rgba(255,204,0,0.6);
            text-transform: uppercase;
        }
        
        /* БЛОК ГУГЛ-ЯЗЫКА СЛЕВА (ФИКСИРОВАННЫЙ) */
        #google_translate_element {
            background: rgba(255,255,255,0.08);
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            min-height: 40px;
        }

        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.7;
        }

        /* ТЕЛЕВИЗОРЫ: ВИЗУАЛ ОТОДВИНУТ ОТ ЗРИТЕЛЯ */
        .tv-grid {
            position: absolute; 
            top: 45%;    /* Камера отошла назад, опускаем сетку */
            left: 18%;   /* Сужаем поле зрения */
            width: 64%;  /* Компактные экраны для эффекта удаления */
            height: 22%; /* Уменьшенная высота */
            display: flex; 
            gap: 6%; 
            z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .tv-screen:hover { 
            background: rgba(0, 242, 255, 0.08); 
            box-shadow: inset 0 0 50px var(--neon), 0 0 20px rgba(0, 242, 255, 0.2);
            transform: scale(1.08);
            border-color: var(--neon);
        }

        .tv-label {
            color: #fff; 
            font-weight: 900; 
            text-align: center; 
            font-size: 18px; /* Соразмерно уменьшенным экранам */
            text-transform: uppercase;
            text-shadow: 2px 2px 10px #000; 
            line-height: 1.4;
            letter-spacing: 1px;
        }

        /* ТЕХНИЧЕСКИЙ ФУТЕР v5.0 */
        .build-footer { 
            position: fixed; bottom: 20px; left: 50px; 
            font-size: 11px; color: rgba(255,204,0,0.3); 
            z-index: 2000;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>

        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ v5.0 Build 18" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v5.0</div>
            </a>
            <a href="tables.html" class="tv-screen">
                <div class="tv-label">TABLES<br>DATA</div>
            </a>
            <div class="tv-screen" onclick="alert('BUILD 18 | v5.0: SECURE')">
                <div class="tv-label">RESERVE<br>LINK</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.18-LH | INTERFACE: v5.0</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                includedLanguages: 'en,de,fr,es,it,zh-CN,ar',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
