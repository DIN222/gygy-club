
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v4.4 [7.1.15-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffcc00;
            --neon: #00f2ff;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ v4.4 [cite: 2026-03-07] */
        .nav-header {
            position: fixed; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
        }
        .brand-zone { display: flex; gap: 15px; align-items: center; }
        .logo { color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }
        
        .ui-btn { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            color: var(--gold); padding: 8px 16px; cursor: pointer; 
            text-decoration: none; font-size: 11px; transition: 0.3s;
            text-transform: uppercase;
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* КОНТЕЙНЕР ШТАБА */
        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #050505;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.85;
        }

        /* ТЕЛЕВИЗОРЫ [cite: 2026-03-05] */
        .tv-grid {
            position: absolute; top: 25%; left: 6%; width: 88%; height: 32%;
            display: flex; gap: 4%; z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.4s ease;
            position: relative;
        }

        .tv-screen:hover { 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: inset 0 0 30px var(--neon);
        }

        .tv-label {
            color: #fff; font-weight: bold; text-align: center; 
            font-size: 1.1vw; text-transform: uppercase;
            text-shadow: 2px 2px 5px #000; pointer-events: none;
        }

        /* МЕТКА БИЛДА 7.1.15-LH */
        .build-footer { 
            position: fixed; bottom: 10px; right: 15px; 
            font-size: 10px; color: rgba(255,204,0,0.4); 
            z-index: 2000; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="brand-zone">
            <a href="index.html" class="ui-btn">← RETURN</a>
            <div class="logo">GY-GY v4.4</div>
        </div>
        <div class="ui-btn">🌐 LANGUAGE [7.1.15-LH]</div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ Build 7.1.15-LH" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v4.4</div>
            </a>

            <div class="tv-screen" onclick="alert('BUILD 7.1.15-LH: СИСТЕМА СТАБИЛЬНА')">
                <div class="tv-label" style="font-size: 1.4vw;">ВЕРШИ<br>С ПРИКОЛОМ</div>
            </div>

            <div class="tv-screen" onclick="alert('ABSURD v4.4: СЛОТ 15 АКТИВИРОВАН')">
                <div class="tv-label">ABSURD<br>RESERVE</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD ID: 7.1.15-LH | INTERFACE: v4.4</div>

</body>
</html>
