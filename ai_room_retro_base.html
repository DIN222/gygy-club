<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.36-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* БАЗА */
        html { overflow-y: scroll !important; }
        body { 
            margin: 0; padding: 0; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
        }

        /* ТВОЙ ФАЙЛ: OIG2_vintage_tv_room.jpg */
        .room-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            filter: brightness(0.85);
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ: ЯЗЫК СЛЕВА, ЛОГО СПРАВА */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10000;
        }

        .logo-club { 
            color: #ffcc00; font-size: 28px; font-weight: bold; 
            letter-spacing: 4px; text-transform: uppercase;
        }

        #google_translate_element { 
            background: rgba(0,0,0,0.8);
            padding: 5px; border: 1px solid #444;
            border-radius: 4px;
        }

        /* ТЕЛЕВИЗОРЫ: МАКСИМАЛЬНОЕ УДАЛЕНИЕ (Scale 0.3) */
        .tv-perspective-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            perspective: 1200px; /* Эффект глубины */
            z-index: 500;
            pointer-events: none;
        }

        .tv-wrapper {
            transform: translateY(-5%) scale(0.3); /* Сильно отодвинуто */
            width: 80%; 
            display: flex; gap: 40px;
            pointer-events: auto;
        }
        
        .tv-slot {
            flex: 1; aspect-ratio: 4/3;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.6); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .tv-slot:hover { 
            border-color: #ffcc00; 
            background: rgba(255,204,0,0.1);
            transform: translateZ(50px); /* Приближается только при наведении */
            box-shadow: 0 0 60px rgba(255,204,0,0.2);
        }

        .tv-label {
            color: #fff; font-size: 24px; text-align: center; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* НИЖНЯЯ ПАНЕЛЬ (ПОСТОЯННАЯ) */
        .footer-bar {
            position: fixed; bottom: 15px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 2000;
        }

        .build-footer { font-size: 11px; color: rgba(255,204,0,0.4); }

        .id-trace {
            text-align: right;
            color: #ffcc00; font-size: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
