<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v5.4 [7.1.22-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ: ЖЕСТКАЯ ФИКСАЦИЯ */
        .nav-header {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse;
        }

        .logo { 
            color: var(--gold); font-weight: bold; letter-spacing: 4px; 
            font-size: 30px; text-transform: uppercase;
        }
        
        #google_translate_element {
            background: rgba(255,255,255,0.1);
            padding: 5px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center;
        }

        /* ФОНОВАЯ КАРТИНКА (ПРЯМОЙ ТЕГ ДЛЯ СТАБИЛЬНОСТИ) */
        .hq-bg {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; z-index: 10;
        }

        /* СЕТКА ТЕЛЕВИЗОРОВ: ТОЧНОЕ НАЛОЖЕНИЕ НА ОБРАЗЕЦ */
        .tv-grid {
            position: absolute; 
            top: 26%;     /* Уровень белых экранов на фото */
            width: 86.5%; 
            height: 22%;  
            display: flex; 
            gap: 2.2%;    
            z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.3s;
            background: rgba(255, 255, 255, 0.01); 
            border-radius: 10px;
        }

        .tv-screen:hover { 
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .tv-label {
            color: #fff; /* Вернул белый, чтобы не терялся на черном фоне */
            font-weight: 900; 
            text-align: center; 
            font-size: 20px; 
            text-transform: uppercase;
            text-shadow: 2px 2px 8px #000;
            transition: 0.3s;
        }

        .build-footer { 
            position: fixed; bottom: 15px; left: 30px; 
            font-size: 11px; color: rgba(255,204,0,0.5); z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="image_a8801d.png" class="hq-bg" alt="HQ" onerror="console.error('Картинка не найдена');">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v5.4</div>
            </a>
            <a href="verses.html" class="tv-screen">
                <div class="tv-label">GY-GY<br>POETRY</div>
            </a>
            <div class="tv-screen" onclick="alert('BUILD 22')">
                <div class="tv-label">RESERVE<br>SLOT</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.22-LH | v5.4</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
