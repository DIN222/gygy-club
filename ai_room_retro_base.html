<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v4.8 [7.1.17-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --neon: #00f2ff;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ: ЛОГО СПРАВА, ЯЗЫК СЛЕВА */
        .nav-header {
            position: fixed; top: 30px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse; 
        }

        /* ЛОГОТИП СПРАВА */
        .logo { 
            color: var(--gold); 
            font-weight: bold; 
            letter-spacing: 8px; 
            font-size: 38px; /* Максимальная четкость */
            text-shadow: 0 0 20px rgba(255,204,0,0.7);
            text-transform: uppercase;
        }
        
        /* БЛОК ГУГЛ-ПЕРЕВОДЧИКА СЛЕВА */
        #google_translate_element {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            min-width: 150px;
        }

        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.8;
        }

        /* ТЕЛЕВИЗОРЫ: БОЛЬШИЕ БУКВЫ v4.8 */
        .tv-grid {
            position: absolute; top: 25%; left: 6%; width: 88%; height: 32%;
            display: flex; gap: 4%; z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.4s ease;
        }

        .tv-screen:hover { 
            background: rgba(0, 242, 255, 0.15); 
            box-shadow: inset 0 0 70px var(--neon);
            transform: scale(1.02);
        }

        .tv-label {
            color: #fff; 
            font-weight: 900; 
            text-align: center; 
            font-size: 30px; /* КРУПНЫЕ БУКВЫ */
            text-transform: uppercase;
            text-shadow: 4px 4px 12px #000; 
            line-height: 1.4;
        }

        /* ТЕХНИЧЕСКИЙ ФУТЕР v4.8 */
        .build-footer { 
            position: fixed; bottom: 20px; left: 35px; 
            font-size: 13px; color: rgba(255,204,0,0.5); 
            z-index: 2000;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>

        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ v4.8" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">ТЕХНОПАРК<br>v4.8</div>
            </a>
            <a href="tables.html" class="tv-screen">
                <div class="tv-label">ТАБЛИЦЫ<br>ДАННЫХ</div>
            </a>
            <div class="tv-screen" onclick="alert('BUILD 17 | v4.8: СИСТЕМА СТАБИЛЬНА')">
                <div class="tv-label">ЗАПАСНОЙ<br>ВЫХОД</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.17-LH | INTERFACE: v4.8</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                includedLanguages: 'en,de,fr,es,it,zh-CN,ar',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
