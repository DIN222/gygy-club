
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v4.4 [7.1.15-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --neon: #00f2ff;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ ОБНОВЛЕНА: КНОПКА ВОЗВРАТА УДАЛЕНА */
        .nav-header {
            position: fixed; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
        }
        .brand-zone { display: flex; align-items: center; }
        .logo { 
            color: var(--gold); 
            font-weight: bold; 
            letter-spacing: 2px; 
            font-size: 24px; /* КРУПНЫЕ БУКВЫ */
            text-shadow: 0 0 10px rgba(255,204,0,0.5);
        }
        
        .ui-btn { 
            background: rgba(0,0,0,0.8); border: 2px solid var(--gold); 
            color: var(--gold); padding: 10px 20px; cursor: pointer; 
            text-decoration: none; font-size: 14px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s;
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* КОНТЕЙНЕР ШТАБА */
        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #050505;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.85;
        }

        /* ТЕЛЕВИЗОРЫ [cite: 2026-03-05] */
        .tv-grid {
            position: absolute; top: 25%; left: 6%; width: 88%; height: 32%;
            display: flex; gap: 4%; z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.4s ease;
            position: relative;
        }

        .tv-screen:hover { 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: inset 0 0 40px var(--neon);
        }

        .tv-label {
            color: #fff; 
            font-weight: bold; 
            text-align: center; 
            font-size: 22px; /* НОРМАЛЬНЫЕ КРУПНЫЕ БУКВЫ */
            text-transform: uppercase;
            text-shadow: 2px 2px 6px #000; 
            pointer-events: none;
            line-height: 1.2;
        }

        /* МЕТКА БИЛДА */
        .build-footer { 
            position: fixed; bottom: 10px; right: 20px; 
            font-size: 12px; color: rgba(255,204,0,0.4); 
            z-index: 2000; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="brand-zone">
            <div class="logo">GY-GY v4.4</div>
        </div>
        <div class="ui-btn">🌐 LANGUAGE [7.1.15-LH]</div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ Build 7.1.15-LH" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">ТЕХНОПАРК<br>v4.4</div>
            </a>

            <a href="tables.html" class="tv-screen">
                <div class="tv-label">ТАБЛИЦЫ<br>ДАННЫХ</div>
            </a>

            <div class="tv-screen" onclick="alert('РЕЗЕРВНЫЙ КАНАЛ 7.1.15-LH')">
                <div class="tv-label">ЗАПАСНОЙ<br>ВЫХОД</div>
            </div>
        </div>
    </div>

    <div class="build-footer">7.1.15-LH | INTERFACE: v4.4</div>

</body>
</html>
