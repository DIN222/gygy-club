
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.41-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* СБРОС ВСЕХ ГРАДИЕНТОВ И ОТСТУПОВ */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* ФОН: OIG2_vintage_tv_room.jpg */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* ХЕДЕР: БЕЗ ГРАДИЕНТА, ПРОЗРАЧНЫЙ */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: none; /* УБРАНО */
        }
        .logo { color: #ffcc00; font-size: 24px; font-weight: bold; letter-spacing: 4px; }

        /* ТЕЛЕВИЗОРЫ: РЕАЛЬНОЕ УДАЛЕНИЕ ЧЕРЕЗ ГЕОМЕТРИЮ */
        .tv-system {
            position: absolute;
            top: 55%; /* Центровка чуть ниже горизонта */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; /* ФИКСИРОВАННАЯ УЗКАЯ ШИРИНА ДЛЯ ЭФФЕКТА ДАЛИ */
            display: flex; 
            justify-content: space-between;
            z-index: 500;
        }

        .tv-unit {
            width: 80px; /* МАЛЕНЬКИЙ РАЗМЕР ЭКРАНА */
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
            cursor: pointer;
        }

        .tv-unit:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            transform: scale(1.2); /* Увеличение при наведении для удобства */
        }

        .tv-title { color: #ffcc00; font-size: 9px; font-weight: bold; text-align: center; }

        /* ФУТЕР */
        .footer {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 1000;
        }
        .btn-back { background: none; border: 1px solid #444; color: #fff; padding: 4px 10px; cursor: pointer; font-size: 9px; }
        .build-tag { font-size: 9px; color: rgba(255, 204, 0, 0.4); }
        .trace-id { color: #ffcc00; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo">GY-GY</div>
    </header>

    <div class="tv-system">
        <a href="techpark.html" class="tv-unit">
            <div class="tv-title">TECH<br>PARK</div>
        </a>
        <a href="verses.html" class="tv-unit">
            <div class="tv-title">GY-GY<br>VERSES</div>
        </a>
        <div class="tv-unit" style="opacity: 0.4;">
            <div class="tv-title">RES</div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-back" onclick="history.back()">← RETURN</button>
            <div class="build-tag">BUILD: 7.1.41-LH | v6.2</div>
        </div>
        <div class="trace-id" id="user-id">ID_SYNC</div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
