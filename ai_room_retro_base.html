<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Retro | v6.2 [7.1.31-LH_]</title>
    <style>
        :root {
            --accent: #d4af37; /* Цвет латуни/старого освещения */
            --glass: rgba(0, 0, 0, 0.6);
            --font-main: 'Courier New', Courier, monospace;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            color: #fff;
            font-family: var(--font-main);
            overflow: hidden;
        }

        /* Фоновое изображение (image_1e07e4.png) */
        #room-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('image_1e07e4.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* Затемнение для фокуса на экранах */
        #mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* [Обязательно] GY-GY и Языковая панель: Видны от входа */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 30px 40px; box-sizing: border-box;
            z-index: 1000;
        }

        .brand {
            font-size: 24px; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .lang-panel { display: flex; gap: 15px; }
        .lang-node {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 5px 12px; cursor: pointer; font-size: 11px;
            backdrop-filter: blur(5px);
        }

        /* [Обязательно] Кнопка возврата: Нижний уровень */
        .btn-back {
            position: fixed;
            bottom: 40px; left: 40px;
            background: var(--glass); border: 1px solid #fff;
            color: #fff; padding: 10px 20px; font-size: 10px;
            letter-spacing: 2px; cursor: pointer; z-index: 1000;
        }

        /* [Обязательно] Identity: Cookie + Magic Key */
        .identity-sector {
            position: fixed;
            bottom: 40px; right: 40px;
            display: flex; align-items: center; gap: 20px;
            z-index: 1000;
        }

        .id-label { text-align: right; line-height: 1.2; }
        .id-label small { font-size: 9px; opacity: 0.5; display: block; }
        .id-label strong { font-size: 14px; color: var(--accent); }

        /* Magic Key ( download-avatar / QR ) */
        .magic-key-avatar {
            width: 55px; height: 55px;
            border: 1px solid var(--accent);
            background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .magic-key-avatar:hover { box-shadow: 0 0 15px var(--accent); }

        /* Центральный ТВ-интерфейс */
        .display-system {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .screen-text {
            text-align: center;
            transform: translateY(-20px); /* Центровка по среднему ТВ */
        }

        .version-info {
            font-size: 10px; color: var(--accent); letter-spacing: 4px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="room-bg"></div>
    <div id="mask"></div>

    <header>
        <div class="brand">GY-GY</div>
        <nav class="lang-panel">
            <button class="lang-node">RU</button>
            <button class="lang-node">EN</button>
        </nav>
    </header>

    <main class="display-system">
        <div class="screen-text">
            <h1 style="font-size: 3rem; font-weight: 200; letter-spacing: 15px; margin: 0;">AI ROOM</h1>
            <div class="version-info" id="sys-version">SYSTEM BOOTING...</div>
        </div>
    </main>

    <button class="btn-back" onclick="history.back()">LEVEL_UP</button>

    <section class="identity-sector">
        <div class="id-label">
            <small>UNIQUE DIGITAL TRACE</small>
            <strong id="user-id">ID_IDENTIFYING...</strong>
        </div>
        <div class="magic-key-avatar" id="magic-key" title="Magic Key: Continuity & Stability">
            <span style="font-size: 10px; color: var(--accent);">M.K.</span>
        </div>
    </section>

    <script>
        // v6.2 [7.1.31-LH_] Logic
        document.addEventListener('DOMContentLoaded', () => {
            const CURRENT_VERSION = "7.1.31-LH_";
            
            // 1. Установка версии
            document.getElementById('sys-version').innerText = `VER: ${CURRENT_VERSION}`;

            // 2. Cookie-recognition / Digital Trace
            let traceId = localStorage.getItem('gy_trace_v7');
            if (!traceId) {
                // Автоматическое создание уникального ID (Cookie-recognition)
                traceId = 'UX-' + Math.random().toString(36).substr(2, 7).toUpperCase();
                localStorage.setItem('gy_trace_v7', traceId);
            }
            document.getElementById('user-id').innerText = traceId;

            // 3. Magic Key (Логика аватара/QR будет здесь)
            document.getElementById('magic-key').onclick = () => {
                alert(`Magic Key [${traceId}] готов. Предлагаем скачать аватар или подключить Telegram для стабильности.`);
            };
        });
    </script>
</body>
</html>
