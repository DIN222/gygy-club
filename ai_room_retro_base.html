<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.35-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* БАЗА */
        html { overflow-y: scroll !important; }
        body { 
            margin: 0; padding: 0; 
            background: #111; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
        }

        /* ФОНОВАЯ КАРТИНКА - СТРОГО ТВОЙ ФАЙЛ */
        .room-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ: ЯЗЫК СЛЕВА, ЛОГО СПРАВА */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10000;
        }

        .logo-club { 
            color: #ffcc00; font-size: 28px; font-weight: bold; 
            letter-spacing: 4px; text-transform: uppercase;
        }

        #google_translate_element { 
            background: rgba(0,0,0,0.8);
            padding: 5px; border: 1px solid #444;
            border-radius: 4px;
        }

        /* ТЕЛЕВИЗОРЫ: УДАЛЕННЫЙ МАСШТАБ (ОТОДВИНУТЫ) */
        .tv-wrapper {
            position: absolute; top: 32%; left: 50%;
            transform: translateX(-50%) scale(0.4); /* Отодвинуты от зрителя */
            width: 50%; height: 16%;
            display: flex; gap: 20px;
            z-index: 500;
        }
        
        .tv-slot {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.5); transition: 0.3s;
            cursor: pointer;
        }

        .tv-slot:hover { 
            border-color: #ffcc00; background: rgba(255,204,0,0.1); 
        }

        .tv-label {
            color: #fff; font-size: 13px; text-align: center; font-weight: bold;
            text-transform: uppercase;
        }

        /* НИЖНЯЯ ПАНЕЛЬ (ПОСТОЯННАЯ) */
        .build-footer { 
            position: fixed; bottom: 15px; left: 30px; 
            font-size: 11px; color: rgba(255,204,0,0.4); z-index: 2000;
        }

        .id-trace {
            position: fixed; bottom: 15px; right: 30px;
            text-align: right; z-index: 2000;
            color: #ffcc00; font-size: 10px;
        }
    </style>
</head>
<body>

    <img src="OIG2_vintage_tv_room.jpg" class="room-bg" alt="BACKGROUND">

    <div class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo-club">GY-GY</div>
    </div>

    <div class="tv-wrapper">
        <a href="techpark.html" class="tv-slot">
            <div class="tv-label">ТЕХНОПАРК</div>
        </a>
        <a href="verses.html" class="tv-slot">
            <div class="tv-label">GY-GY<br>VERSES</div>
        </a>
        <div class="tv-slot">
            <div class="tv-label">RESERVE</div>
        </div>
    </div>

    <div class="build-footer" id="footer-tag">BUILD: 7.1.35-LH | v6.2</div>

    <div class="id-trace">
        DIGITAL TRACE: <span id="user-id">ID_SYNC</span>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }

        // Логика нумерации и следа
        document.addEventListener('DOMContentLoaded', () => {
            const VERSION = "7.1.35";
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
