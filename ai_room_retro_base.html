<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Retro | v6.2 [7.1.30-LH_]</title>
    <style>
        :root {
            --tv-glow: rgba(0, 243, 255, 0.4);
            --retro-amber: #ffb000;
            --crt-green: #33ff33;
            --panel-bg: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Визуальная база: Фоновое изображение комнаты */
        #background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6) contrast(1.1);
            z-index: -1;
        }

        /* Эффект мерцания ЭЛТ-монитора поверх всего */
        #crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10000;
        }

        /* [7.1.30-LH_] Постоянные атрибуты */
        #header {
            position: absolute;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
        }

        #gy-gy {
            font-size: 28px;
            font-weight: 900;
            color: var(--crt-green);
            text-shadow: 0 0 10px var(--crt-green);
            letter-spacing: 5px;
        }

        .language-gate {
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: var(--panel-bg);
            border: 1px solid var(--crt-green);
            color: var(--crt-green);
            padding: 5px 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Кнопка возврата */
        #back-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: var(--panel-bg);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Сектор идентификации (Magic Key) */
        #identity-hub {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #user-info {
            margin-bottom: 10px;
            text-align: right;
            font-size: 12px;
            color: var(--retro-amber);
        }

        .avatar-container {
            width: 60px;
            height: 60px;
            border: 2px solid var(--retro-amber);
            background: rgba(0,0,0,0.8);
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 15px var(--retro-amber);
        }

        /* Всплывающее меню Magic Key */
        .magic-key-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--panel-bg);
            border: 1px solid var(--retro-amber);
            padding: 15px;
            width: 200px;
            display: none;
            backdrop-filter: blur(10px);
        }

        .avatar-container:hover .magic-key-menu {
            display: block;
        }

        .menu-btn {
            display: block;
            width: 100%;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 5px;
            font-size: 10px;
            cursor: pointer;
            text-align: center;
        }

        .tg-btn { border-color: #24A1DE; color: #24A1DE; }
    </style>
</head>
<body>

    <div id="background-layer"></div>
    <div id="crt-overlay"></div>

    <header id="header">
        <div id="gy-gy">GY-GY</div>
        <div class="language-gate">
            <button class="lang-btn">RU</button>
            <button class="lang-btn">EN</button>
            <button class="lang-btn">ZH</button>
        </div>
    </header>

    <div style="height: 100%; display: flex; align-items: center; justify-content: center;">
        <div style="background: var(--panel-bg); padding: 40px; border: 1px solid var(--tv-glow); text-align: center;">
            <h1 style="margin: 0; font-size: 2.5rem; letter-spacing: 10px;">RETRO ROOM</h1>
            <p style="color: var(--crt-green);">v6.2 [7.1.30-LH_]</p>
        </div>
    </div>

    <button id="back-btn" onclick="history.back()">« RETURN</button>

    <section id="identity-hub">
        <div id="user-info">
            <div id="trace-id">TRACING DIGITAL ID...</div>
            <div style="font-size: 9px; opacity: 0.7;">STATUS: COOKIE-RECOGNIZED</div>
        </div>
        <div class="avatar-container">
            <div class="magic-key-menu">
                <strong style="font-size: 11px; color: var(--retro-amber);">MAGIC KEY SYSTEM</strong>
                <p style="font-size: 9px;">Download your unique avatar to keep progress across devices.</p>
                <button class="menu-btn" onclick="saveAvatar()">DOWNLOAD MAGIC KEY</button>
                <button class="menu-btn tg-btn">STABLE ACCESS VIA TELEGRAM</button>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("AI Room Retro v6.2 [7.1.30-LH_] Active");
            initTrace();
        });

        function initTrace() {
            // Реализация Cookie-recognition
            let trace = localStorage.getItem('gy_trace_id');
            if (!trace) {
                trace = 'RETRO-' + Math.random().toString(36).substr(2, 5).toUpperCase();
                localStorage.setItem('gy_trace_id', trace);
            }
            document.getElementById('trace-id').innerText = trace;
            // Здесь должна быть логика отрисовки аватара по ID
        }

        function saveAvatar() {
            alert("Генерация Magic Key (QR/Avatar)... Сохранение сессии инициировано.");
        }
    </script>
</body>
</html>
