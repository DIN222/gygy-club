<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Retro | v6.2.1 [7.1.30-LH_]</title>
    <style>
        :root {
            --accent: #ffffff;
            --sub-text: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(0, 0, 0, 0.4);
            --border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Фоновое изображение как глубокий слой */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(5px) brightness(0.4); /* Смягчаем визуал, чтобы он не мешал */
            transform: scale(1.1);
            z-index: -1;
        }

        /* GY-GY: Лево Верх (Постоянный атрибут) */
        .brand-layer {
            position: fixed;
            top: 30px; left: 40px;
            z-index: 100;
        }
        .brand-layer h1 {
            margin: 0; font-size: 20px; font-weight: 300; letter-spacing: 0.3em;
            color: var(--accent);
        }

        /* Языковая панель: Право Верх (Постоянный атрибут) */
        .lang-gate {
            position: fixed;
            top: 30px; right: 40px;
            display: flex; gap: 20px;
            z-index: 100;
        }
        .lang-node {
            background: none; border: none; color: var(--sub-text);
            font-size: 11px; cursor: pointer; letter-spacing: 0.1em;
            transition: 0.3s;
        }
        .lang-node:hover, .lang-node.active { color: var(--accent); }

        /* Кнопка возврата: Лево Низ (Постоянный атрибут) */
        .nav-reverse {
            position: fixed;
            bottom: 40px; left: 40px;
            background: none; border: 1px solid var(--border);
            color: var(--accent); padding: 10px 25px;
            font-size: 10px; letter-spacing: 0.2em; cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* Сектор Идентификации: Право Низ (Magic Key) */
        .id-sector {
            position: fixed;
            bottom: 40px; right: 40px;
            display: flex; align-items: center; gap: 20px;
        }
        .id-label { text-align: right; }
        .id-label span { display: block; font-size: 9px; color: var(--sub-text); margin-bottom: 4px; }
        .id-label strong { font-size: 13px; font-weight: 400; letter-spacing: 1px; }

        .magic-key-avatar {
            width: 50px; height: 50px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            border-radius: 4px; /* Квадрат со скруглением для серьезности */
            cursor: pointer;
            transition: 0.4s;
            position: relative;
        }
        .magic-key-avatar:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Контентная зона */
        .main-stage {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center;
        }
        .version-tag {
            font-size: 10px; color: var(--sub-text); margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="brand-layer">
        <h1>GY-GY</h1>
    </div>

    <nav class="lang-gate">
        <button class="lang-node active">RU</button>
        <button class="lang-node">EN</button>
        <button class="lang-node">ZH</button>
    </nav>

    <main class="main-stage">
        <div>
            <h2 style="font-weight: 200; font-size: 42px; letter-spacing: 15px;">AI ROOM</h2>
            <div class="version-tag">STABLE BUILD v6.2.1 [7.1.30-LH_]</div>
        </div>
    </main>

    <button class="nav-reverse" onclick="history.back()">BACK LEVEL</button>

    <section class="id-sector">
        <div class="id-label">
            <span>DIGITAL TRACE</span>
            <strong id="user-id-display">DETECTING...</strong>
        </div>
        <div class="magic-key-avatar" title="Magic Key & Telegram Settings">
            </div>
    </section>

    <script>
        // Архитектурная логика v6.2.1
        document.addEventListener('DOMContentLoaded', () => {
            // Cookie-recognition
            let trace = localStorage.getItem('gy_trace') || 'ID-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id-display').innerText = trace;
        });
    </script>
</body>
</html>
