<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v5.2 [7.1.20-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ СТАНДАРТ: ЛОГО СПРАВА, ЯЗЫК СЛЕВА */
        .nav-header {
            position: fixed; top: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse;
        }

        .logo { 
            color: var(--gold); font-weight: bold; letter-spacing: 5px; 
            font-size: 32px; text-transform: uppercase;
        }
        
        #google_translate_element {
            background: rgba(255,255,255,0.05);
            padding: 5px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* ВИЗУАЛ: ПЕРСПЕКТИВА (ОТОДВИНУТО ПО ОБРАЗЦУ) */
        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.8;
        }

        /* СЕТКА ТЕЛЕВИЗОРОВ: ЦЕНТРАЛЬНЫЙ ПЛАН (КАК НА КАРТИНКЕ) */
        .tv-grid {
            position: absolute; 
            top: 30%;    /* Высота расположения на стене */
            left: 50%;
            transform: translateX(-50%);
            width: 52%;  /* Узкая группа в центре */
            height: 14%; /* Малый масштаб для эффекта дистанции */
            display: flex; 
            gap: 25px; 
            z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.6);
        }

        .tv-screen:hover { 
            border-color: var(--gold);
            background: rgba(255, 204, 0, 0.05);
            transform: scale(1.05);
        }

        .tv-label {
            color: #fff; font-weight: bold; text-align: center; 
            font-size: 13px; /* Мелкий шрифт для удаленных объектов */
            text-transform: uppercase;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        /* ФУТЕР v5.2 */
        .build-footer { 
            position: fixed; bottom: 20px; left: 40px; 
            font-size: 11px; color: rgba(255,204,0,0.3); z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>

        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ v5.2" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v5.2</div>
            </a>
            <a href="verses.html" class="tv-screen">
                <div class="tv-label">GY-GY<br>VERSES</div>
            </a>
            <div class="tv-screen" onclick="alert('SYSTEM RESERVE')">
                <div class="tv-label">RESERVE<br>SLOT</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.20-LH | VERSION: 5.2</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
