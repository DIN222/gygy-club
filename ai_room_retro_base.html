<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.0 [7.1.28-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* СБРОС ВСЕХ БЛОКИРОВОК */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: visible !important; /* Критично для скролла языка */
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        /* ПАНЕЛЬ: ЯЗЫК СЛЕВА, ЛОГО СПРАВА */
        .admin-nav {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 10000; /* Выше всего остального */
        }

        .logo-text { 
            color: #ffcc00; font-size: 28px; font-weight: bold; 
            letter-spacing: 4px; text-transform: uppercase;
            text-decoration: none;
        }

        /* Контейнер языка без лишних фонов, мешающих скроллу */
        #google_translate_element { 
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 2px;
        }

        /* ТЕЛЕВИЗОРЫ: УМЕНЬШЕННЫЙ МАСШТАБ (УДАЛЕНИЕ) */
        .tv-cluster {
            position: absolute; top: 32%; left: 50%;
            transform: translateX(-50%);
            width: 50%; /* Снова компактно в центре */
            height: 15%; 
            display: flex; gap: 20px;
            z-index: 500;
        }
        
        .tv-unit {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); transition: 0.3s;
        }

        .tv-unit:hover { 
            border-color: #ffcc00; background: rgba(255,204,0,0.1); 
        }

        .tv-text {
            color: #fff; font-size: 14px; text-transform: uppercase;
            text-align: center; font-weight: bold;
        }

        .build-info { 
            position: fixed; bottom: 15px; left: 30px; 
            font-size: 11px; color: rgba(255,204,0,0.3);
        }
    </style>
</head>
<body>

    <img src="OIG2_vintage_tv_room.jpg" class="bg-layer" alt="ROOM">

    <div class="admin-nav">
        <div id="google_translate_element"></div>
        <div class="logo-text">GY-GY</div>
    </div>

    <div class="tv-cluster">
        <a href="techpark.html" class="tv-unit">
            <div class="tv-text">ТЕХНОПАРК<br>(ЧАТ)</div>
        </a>

        <a href="verses.html" class="tv-unit">
            <div class="tv-text">GY-GY<br>VERSES</div>
        </a>

        <div class="tv-unit">
            <div class="tv-text">RESERVE</div>
        </div>
    </div>

    <div class="build-info">BUILD: 7.1.28-LH | v6.0</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
