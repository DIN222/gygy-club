<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY MINTING ENGINE v.6.2 [7.1.33]</title>
    <style>
        :root { 
            --gold: #FFD700; 
            --bg: #050505; 
            --panel: rgba(17, 17, 17, 0.8); 
            --gemini: #4285F4; 
            --glass: rgba(0, 0, 0, 0.6);
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        /* ТЕ САМЫЕ ТЕЛЕВИЗОРЫ (ФОН) */
        #tv-viewport {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('image_1e07e4.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.4) contrast(1.2);
            z-index: -2;
        }

        /* HEADER (Постоянные атрибуты: Языки и GY-GY) */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 30px; 
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--gold);
            z-index: 1000;
        }
        .logo { color: var(--gold); font-size: 24px; font-weight: 900; letter-spacing: 5px; }
        .lang-zone { display: flex; gap: 10px; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-size: 10px; padding: 2px 8px; }

        /* MATRIX 14 (Интегрирована под хедер) */
        .matrix { 
            display: grid; 
            grid-template-columns: repeat(14, 1fr); 
            gap: 4px; 
            padding: 10px; 
            background: var(--panel); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }
        .slot { 
            border: 1px solid #333; 
            aspect-ratio: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 8px; 
            cursor: pointer; 
            position: relative; 
            transition: 0.3s; 
            background: rgba(0,0,0,0.4);
        }
        .slot.active { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .slot:hover { background: rgba(255, 215, 0, 0.1); }
        .invoke-btn { position: absolute; bottom: 2px; font-size: 7px; background: var(--gold); color: #000; border: none; padding: 1px 3px; border-radius: 2px; opacity: 0; }
        .slot:hover .invoke-btn { opacity: 1; }

        /* CHAT AREA (Проекция на центр комнаты) */
        .chat-flow { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scrollbar-width: thin;
            scrollbar-color: var(--gold) transparent;
        }
        .stanza { border-left: 2px solid var(--gold); padding-left: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.3); }
        .line { font-size: 1.1rem; margin: 5px 0; display: flex; gap: 10px; }
        .author { color: var(--gold); font-weight: bold; width: 100px; font-size: 0.8rem; }

        /* INPUT ZONE */
        .input-zone { padding: 20px 40px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; display: flex; gap: 20px; align-items: center; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--gold); padding: 15px; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px 40px; font-weight: 900; cursor: pointer; }

        /* FOOTER (Постоянные атрибуты: Возврат и Identity) */
        .footer-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: #000; border-top: 1px solid #333;
        }
        .btn-back { background: none; border: 1px solid #fff; color: #fff; padding: 5px 15px; cursor: pointer; font-size: 10px; letter-spacing: 2px; }
        
        .id-trace { text-align: right; font-size: 10px; }
        .id-trace strong { color: var(--gold); display: block; }
    </style>
</head>
<body data-version="7.1.33">

    <div id="tv-viewport"></div>

    <header class="header">
        <div class="lang-zone">
            <button class="lang-btn">RU</button>
            <button class="lang-btn">EN</button>
        </div>
        <div class="logo">GY-GY</div>
        <button onclick="resetAll()" style="background:none; border:1px solid #444; color:#444; cursor:pointer; font-size: 10px;">RESET</button>
    </header>

    <div class="matrix" id="matrix"></div>

    <main class="chat-flow" id="flow"></main>

    <div class="input-zone">
        <input type="text" id="userInput" placeholder="START MINTING..." autofocus>
        <button class="btn-main" onclick="pushLine('USER')">MINT</button>
    </div>

    <footer class="footer-nav">
        <button class="btn-back" onclick="history.back()">LEVEL RETURN</button>
        <div class="id-trace">
            <span>DIGITAL TRACE</span>
            <strong id="trace-display">ID_SYNCING...</strong>
        </div>
    </footer>

    <script>
        const flow = document.getElementById('flow');
        const input = document.getElementById('userInput');
        const models = ['GEMINI', 'GROK', 'CLAUDE', 'MISTRAL'];

        function init() {
            // Инициализация Матрицы 14
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="slot" id="u${i}">U${i}<div style="font-size:6px; opacity:0.5;">USER</div></div>`;
            models.forEach(m => {
                html += `<div class="slot" style="color:var(--gemini)" onclick="invokeAI('${m}')">
                            ${m[0]}<div style="font-size:6px;">${m}</div>
                            <button class="invoke-btn">INVOKE</button>
                         </div>`;
            });
            document.getElementById('matrix').innerHTML = html;

            // Cookie-recognition & Trace ID
            let trace = localStorage.getItem('gy_trace_33') || 'UX-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace_33', trace);
            document.getElementById('trace-display').innerText = trace;

            load();
        }

        function pushLine(author) {
            const val = input.value.trim();
            if(!val) return;
            renderLine(author, val);
            input.value = '';
            save();
        }

        function renderLine(author, text) {
            if(flow.children.length === 0 || flow.lastChild.children.length >= 4) {
                const stanza = document.createElement('div');
                stanza.className = 'stanza';
                flow.appendChild(stanza);
            }
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="author">@${author}:</span><span>${text}</span>`;
            flow.lastChild.appendChild(line);
            flow.scrollTop = flow.scrollHeight;
        }

        function invokeAI(name) {
            const lines = Array.from(document.querySelectorAll('.line'));
            const context = lines.map(l => l.innerText).join('\n');
            const prompt = `GY-GY PROTOCOL v6.2 [7.1.33]\nCONTEXT:\n${context}\n\nTASK: 1 rhyming line only. NO prose.`;
            navigator.clipboard.writeText(prompt);
            alert(`${name} INVOKED!\nPrompt copied to clipboard.`);
        }

        function save() { localStorage.setItem('gy_v7133_data', flow.innerHTML); }
        function load() { 
            const data = localStorage.getItem('gy_v7133_data');
            if(data) flow.innerHTML = data; 
        }
        function resetAll() { localStorage.removeItem('gy_v7133_data'); location.reload(); }

        init();
    </script>
</body>
</html>
