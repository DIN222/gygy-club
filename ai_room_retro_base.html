
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.38-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* [LAYER 1] BACKGROUND - СТРОГО ТВОЙ ФАЙЛ */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* [LAYER 2] ГРАДИЕНТ ДЛЯ ЧИТАЕМОСТИ */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* [LAYER 3] ИНТЕРФЕЙС ТЕЛЕВИЗОРОВ (УДАЛЕНИЕ 0.3) */
        .tv-console {
            position: absolute; 
            top: 30%; left: 50%;
            transform: translateX(-50%) scale(0.35); /* Отодвинуто */
            width: 80%;
            display: flex; gap: 30px;
            z-index: 100; /* Выше фона */
        }

        .tv-unit {
            flex: 1; aspect-ratio: 4/3;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
            cursor: pointer;
        }

        .tv-unit:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            transform: translateY(-5px);
        }

        .tv-title { color: #ffcc00; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .tv-meta { color: #888; font-size: 10px; text-transform: uppercase; }

        /* [LAYER 4] ПОСТОЯННЫЕ АТРИБУТЫ */
        .nav-top {
            position: fixed; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .logo { color: #ffcc00; font-size: 26px; font-weight: bold; letter-spacing: 5px; }

        .footer {
            position: fixed; bottom: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 1000;
        }
        .build-tag { font-size: 10px; color: rgba(255, 204, 0, 0.5); }
        .trace-id { text-align: right; color: #ffcc00; font-size: 11px; }
    </style>
</head>
<body>

    <div class="room-bg"></div>
    <div class="overlay"></div>

    <div class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo">GY-GY</div>
    </div>

    <div class="tv-console">
        <a href="#" class="tv-unit">
            <div class="tv-title">TECHPARK</div>
            <div class="tv-meta">MOON BASE ALPHA</div>
        </a>
        <a href="#" class="tv-unit">
            <div class="tv-title">VERSES</div>
            <div class="tv-meta">MINTING ENGINE</div>
        </a>
        <div class="tv-unit" style="opacity: 0.5;">
            <div class="tv-title">RESERVE</div>
            <div class="tv-meta">LOCKED</div>
        </div>
    </div>

    <div class="footer">
        <div>
            <button onclick="history.back()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; font-size: 9px; padding: 4px 10px; margin-bottom: 5px;">LEVEL_RETURN</button>
            <div class="build-tag" id="build-tag">BUILD: 7.1.38-LH | v6.2</div>
        </div>
        <div class="id-trace">
            TRACE_ID: <span id="user-id">...</span>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
