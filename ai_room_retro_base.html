<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.30-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* УБИРАЕМ ВСЕ ЖЕСТКИЕ ОГРАНИЧЕНИЯ ДЛЯ РАБОТЫ СКРОЛЛА */
        html, body { 
            margin: 0; padding: 0; 
            background: #0a0a0a; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            height: auto; 
            overflow-y: visible !important;
        }

        /* КОНТЕЙНЕР ДЛЯ РАЦИОНАЛЬНОЙ КОМПОНОВКИ */
        .page-structure {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 1. ПАНЕЛЬ НАВИГАЦИИ (ВЫШЕ ВСЕГО, В ПОТОКЕ) */
        .top-navigation {
            width: 95%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo-gy { 
            order: 2; /* GY-GY СПРАВА */
            color: #ffcc00; font-size: 30px; font-weight: bold; 
            letter-spacing: 5px; text-transform: uppercase;
        }

        #google_translate_element { 
            order: 1; /* ЯЗЫК СЛЕВА */
            background: rgba(255,255,255,0.05);
            padding: 5px; border: 1px solid #333;
            border-radius: 4px;
        }

        /* 2. БЛОК С КАРТИНКОЙ (УМЕНЬШЕННЫЙ МАСШТАБ) */
        .room-viewport {
            position: relative;
            width: 90%;      /* Не на весь экран по ширине */
            max-width: 1200px;
            height: 60vh;    /* СЖАТО ПО ВЕРТИКАЛИ (60% от экрана) */
            margin-top: 10px;
            border: 2px solid #222;
            overflow: hidden;
            background: #000;
        }

        .room-img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* 3. ИНТЕРАКТИВНЫЕ ТЕЛЕВИЗОРЫ (ВНУТРИ ВЬЮПОРТА) */
        .tv-grid-overlay {
            position: absolute;
            top: 25%; left: 50%;
            transform: translateX(-50%);
            width: 55%; height: 25%;
            display: flex; gap: 15px;
            z-index: 100;
        }

        .tv-trigger {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); transition: 0.3s;
        }

        .tv-trigger:hover { 
            border-color: #ffcc00; background: rgba(255,204,0,0.1); 
        }

        .tv-name {
            color: #fff; font-size: 12px; text-align: center; font-weight: bold;
            text-transform: uppercase; line-height: 1.2;
        }

        .build-footer { 
            margin-top: 30px; padding-bottom: 20px;
            font-size: 11px; color: rgba(255,204,0,0.3); 
        }

        /* КРИТИЧЕСКИЙ ФИКС ДЛЯ ВЫПАДАЮЩЕГО СПИСКА GOOGLE */
        .goog-te-menu-frame {
            position: absolute !important;
            top: 60px !important;
            z-index: 99999 !important;
        }
    </style>
</head>
<body>

    <div class="page-structure">
        
        <header class="top-navigation">
            <div id="google_translate_element"></div>
            <div class="logo-gy">GY-GY</div>
        </header>

        <main class="room-viewport">
            <img src="OIG2_vintage_tv_room.jpg" class="room-img" alt="HQ-ROOM">
            
            <div class="tv-grid-overlay">
                <a href="techpark.html" class="tv-trigger">
                    <div class="tv-name">TECHPARK</div>
                </a>
                <a href="verses.html" class="tv-trigger">
                    <div class="tv-name">GY-GY<br>VERSES</div>
                </a>
                <div class="tv-trigger">
                    <div class="tv-name">RESERVE</div>
                </div>
            </div>
        </main>

        <footer class="build-footer">BUILD: 7.1.30-LH | v6.2</footer>

    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
