<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v5.6 [7.1.24-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #000;
        }

        /* КОРРЕКЦИЯ СКРОЛЛА: Разрешаем видимость выпадающих элементов */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            overflow-y: visible !important; 
        }

        /* СТИЛЬ ГУГЛ-ПАНЕЛИ (ФИКС СКРОЛЛА) */
        #google_translate_element {
            background: rgba(255,255,255,0.07);
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            z-index: 3000;
        }

        .nav-header {
            position: fixed; top: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse;
        }

        .logo { 
            color: var(--gold); font-weight: bold; letter-spacing: 5px; 
            font-size: 32px; text-transform: uppercase;
        }

        .hq-wrapper {
            position: fixed; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }
        
        /* ВОЗВРАТ ОРИГИНАЛЬНОГО ФОНА */
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 5; opacity: 0.85;
        }

        /* СЕТКА ТЕЛЕВИЗОРОВ: ОТОДВИНУТАЯ ПЕРСПЕКТИВА (Build 24) */
        .tv-grid {
            position: absolute; 
            top: 30%;    /* Позиция по вертикали */
            width: 52%;  /* Узкая группа (удаление) */
            height: 14%; /* Масштаб 1:1 с образцом дистанции */
            display: flex; 
            gap: 25px; 
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.6);
        }

        .tv-screen:hover { 
            border-color: var(--gold);
            background: rgba(255, 204, 0, 0.05);
            transform: scale(1.05);
        }

        .tv-label {
            color: #fff; font-weight: bold; text-align: center; 
            font-size: 14px; text-transform: uppercase;
            text-shadow: 2px 2px 6px #000;
            line-height: 1.2;
        }

        .build-footer { 
            position: fixed; bottom: 20px; left: 40px; 
            font-size: 11px; color: rgba(255,204,0,0.3); z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="Base Room">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v5.6</div>
            </a>
            <a href="verses.html" class="tv-screen">
                <div class="tv-label">GY-GY<br>VERSES</div>
            </a>
            <div class="tv-screen" onclick="alert('BUILD 24: STANDBY')">
                <div class="tv-label">RESERVE<br>LINK</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.24-LH | v5.6</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
