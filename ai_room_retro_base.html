
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY AI ROOM | v6.2 [7.1.40-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* ФОН: OIG2_vintage_tv_room.jpg */
        .room-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('OIG2_vintage_tv_room.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ (ХЕДЕР) */
        .nav-top {
            position: fixed; top: 0; left: 0; right: 0;
            height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 1000;
        }
        .logo { color: #ffcc00; font-size: 28px; font-weight: bold; letter-spacing: 6px; }

        /* ТЕЛЕВИЗОРЫ: РАДИКАЛЬНЫЙ СДВИГ ВНИЗ И ВГЛУБЬ */
        .tv-system {
            position: absolute;
            bottom: 25%; /* Сдвинули от центра сильно вниз к "столу" */
            left: 50%;
            transform: translateX(-50%);
            width: 40%; /* Сузили контейнер, чтобы телевизоры стояли кучнее вдали */
            display: flex; gap: 20px;
            z-index: 500;
        }

        .tv-unit {
            flex: 1; aspect-ratio: 4/3;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; transition: 0.4s;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            /* Эффект удаления через масштаб конкретного блока */
            transform: scale(0.7); 
        }

        .tv-unit:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.15);
            transform: scale(0.8) translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }

        .tv-title { color: #ffcc00; font-size: 14px; font-weight: bold; text-align: center; }

        /* ФУТЕР */
        .footer {
            position: fixed; bottom: 20px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .btn-back { background: none; border: 1px solid #444; color: #888; padding: 5px 12px; cursor: pointer; font-size: 10px; }
        .build-tag { font-size: 10px; color: rgba(255, 204, 0, 0.2); }
        .trace-id { color: #ffcc00; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="room-bg"></div>

    <header class="nav-top">
        <div id="google_translate_element"></div>
        <div class="logo">GY-GY</div>
    </header>

    <div class="tv-system">
        <a href="techpark.html" class="tv-unit">
            <div class="tv-title">TECHPARK</div>
        </a>
        <a href="verses.html" class="tv-unit">
            <div class="tv-title">VERSES</div>
        </a>
        <div class="tv-unit" style="opacity: 0.4;">
            <div class="tv-title">RESERVE</div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <button class="btn-back" onclick="history.back()">← RETURN</button>
            <span class="build-tag" style="margin-left: 15px;">BUILD: 7.1.40-LH | v6.2</span>
        </div>
        <div class="trace-id" id="user-id">ID_SYNC</div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
        document.addEventListener('DOMContentLoaded', () => {
            let trace = localStorage.getItem('gy_trace') || 'GY-' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('gy_trace', trace);
            document.getElementById('user-id').innerText = trace;
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
