
<!DOCTYPE html>
<html lang="ru">
<head>

    <title>GY-GY AI ROOM | v4.3 [7.1.14-LH]</title>
    
    <style>
        /* Принудительный черный фон для исключения белого экрана */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* ПОСТОЯННЫЕ АТРИБУТЫ [cite: 2026-03-07] */
        .top-nav {
            position: fixed; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .brand-zone { display: flex; gap: 15px; align-items: center; }
        .logo { color: #ffcc00; font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }
        
        .ui-btn { 
            background: rgba(0,0,0,0.8); border: 1px solid #ffcc00; 
            color: #ffcc00; padding: 6px 14px; cursor: pointer; 
            text-decoration: none; font-size: 11px; transition: 0.2s;
            text-transform: uppercase;
        }
        .ui-btn:hover { background: #ffcc00; color: #000; box-shadow: 0 0 10px #ffcc00; }

        /* ОСНОВНОЙ КОНТЕЙНЕР БАЗЫ */
        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.9;
        }

        /* ТРИ ТЕЛЕВИЗОРА [cite: 2026-03-05] */
        .tv-grid {
            position: absolute; top: 24%; left: 5%; width: 90%; height: 36%;
            display: flex; gap: 4%; z-index: 500;
        }
        .tv-link {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; border-radius: 15px;
            transition: 0.4s;
        }
        .tv-link:hover { 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: inset 0 0 30px #00f2ff;
        }

        .tv-label {
            color: #fff; font-weight: 900; text-align: center; 
            font-size: 1.2vw; text-transform: uppercase;
            text-shadow: 2px 2px 5px #000; pointer-events: none;
        }

        /* ТЕХНИЧЕСКИЙ ФУТЕР БИЛДА 7.1.14-LH */
        .build-id { 
            position: fixed; bottom: 10px; right: 15px; 
            font-size: 10px; color: rgba(255,204,0,0.5); 
            letter-spacing: 1px; z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="top-nav">

        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ 7.1.14-LH" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-link">
                <div class="tv-label">TECHPARK<br>v4.3</div>
            </a>

            <div class="tv-link" onclick="openVerses()">
                <div class="tv-label" style="font-size: 1.5vw;">ВЕРШИ<br>GY-GY</div>
            </div>

            <div class="tv-link" onclick="alert('BUILD 7.1.14-LH: RESERVE SECTOR')">
                <div class="tv-label">ABSURD<br>RESERVE</div>
            </div>
        </div>
    </div>

    <div class="build-id">7.1.14-LH | v4.3</div>

    <script>
        function openVerses() {
            const rhymes = [
                "У Чарли в Шлюзе 7.1.14,\nПомехи стали размножаться.\nОн в Технопарк ID закинул,\nИ Клуб v4.3 не покинул!",
                "Банано в Баре пил коктейль,\nА на ТВ — ИИ-метель.\nБилд 7.1.14-LH,\nСмешнее, чем в «Поле чудес»!"
            ];
            alert(rhymes[Math.floor(Math.random()*rhymes.length)]);
        }
    </script>

</body>
</html>
