<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Retro | v6.2 [7.1.30-LH_]</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --retro-pink: #ff00ff;
            --deep-space: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--deep-space);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* [7.1.30-LH_] Постоянные атрибуты */
        #top-navigation {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 9999;
        }

        #gy-gy-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .language-gate {
            display: flex;
            gap: 15px;
        }

        .lang-node {
            background: var(--glass);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .lang-node:hover {
            box-shadow: 0 0 10px var(--neon-cyan);
            background: var(--neon-cyan);
            color: black;
        }

        /* Кнопка возврата (Level Up/Back) */
        #nav-return {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.3);
            background: var(--glass);
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 9999;
        }

        /* Identity & Magic Key Area */
        #identity-sector {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #user-trace-info {
            text-align: right;
        }

        .nick-label {
            font-size: 14px;
            color: var(--retro-pink);
            margin-bottom: 4px;
        }

        .avatar-frame {
            width: 55px;
            height: 55px;
            border: 2px solid var(--retro-pink);
            border-radius: 12px;
            background: #1a1a1a;
            position: relative;
            cursor: help;
        }

        .magic-key-overlay {
            position: absolute;
            top: -120px;
            right: 0;
            background: #111;
            border: 1px solid var(--neon-cyan);
            padding: 10px;
            display: none;
            width: 150px;
            font-size: 10px;
        }

        .avatar-frame:hover .magic-key-overlay {
            display: block;
        }
    </style>
</head>
<body>

    <header id="top-navigation">
        <div id="gy-gy-brand">GY-GY</div>
        <div class="language-gate">
            <button class="lang-node">EN</button>
            <button class="lang-node">RU</button>
            <button class="lang-node">ZH</button>
        </div>
    </header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <section id="app-core">
            <div style="text-align: center;">
                <h2 style="font-size: 3rem; margin-bottom: 0;">AI ROOM</h2>
                <p style="color: var(--neon-cyan);">System: [7.1.30-LH_] | Protocol: v6.2</p>
            </div>
        </section>
    </main>

    <button id="nav-return" onclick="goBack()">« REVERSE</button>

    <section id="identity-sector">
        <div id="user-trace-info">
            <div class="nick-label" id="display-nick">...detecting trace</div>
            <div style="font-size: 9px; opacity: 0.6;">Cookie-ID: AUTO_ACTIVE</div>
        </div>
        <div class="avatar-frame" id="main-avatar">
            <div class="magic-key-overlay" id="magic-key-panel">
                <p>MAGIC KEY AVAILABLE</p>
                <button onclick="downloadMagicKey()" style="width:100%; font-size:9px;">DOWNLOAD QR/AVATAR</button>
                <hr style="border:0; border-top:1px solid #333;">
                <button style="width:100%; font-size:9px; background:#24A1DE; color:white; border:none;">TELEGRAM STABILITY</button>
            </div>
        </div>
    </section>

    <script>
        // Инициализация системы v6.2 [7.1.30-LH_]
        window.onload = () => {
            initializeDigitalTrace();
        };

        function initializeDigitalTrace() {
            // Ищем скрытый ID в браузере
            let traceId = localStorage.getItem('gy_digital_trace');
            
            if (!traceId) {
                // Первичный вход - автоматическое присвоение
                traceId = 'UX-' + Math.random().toString(36).substr(2, 7).toUpperCase();
                localStorage.setItem('gy_digital_trace', traceId);
                assignNewAvatar();
            }
            
            document.getElementById('display-nick').innerText = traceId;
        }

        function assignNewAvatar() {
            const avatar = document.getElementById('main-avatar');
            // Здесь логика генерации уникального аватара
            avatar.style.background = `linear-gradient(45deg, #1a1a1a, ${Math.floor(Math.random()*16777215).toString(16)})`;
        }

        function downloadMagicKey() {
            alert("Generating Magic Key... Your unique avatar/QR is being prepared for download.");
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
