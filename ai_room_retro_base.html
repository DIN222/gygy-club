
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GY-GY AI ROOM | Build 7.1.3-LH</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --bg: #000; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            overflow: hidden; opacity: 0; transition: opacity 1s;
        }

        /* 1. ПОСТОЯННЫЕ АТРИБУТЫ [cite: 2026-03-07] */
        .top-nav {
            position: fixed; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; font-family: 'Share Tech Mono';
        }
        .nav-left { display: flex; gap: 15px; align-items: center; }
        .brand { color: var(--gold); font-weight: 700; letter-spacing: 3px; font-size: 18px; }
        
        .ui-btn { 
            background: rgba(0,0,0,0.7); border: 1px solid var(--gold); 
            color: var(--gold); padding: 8px 15px; cursor: pointer; 
            font-family: 'Share Tech Mono'; font-size: 12px; text-decoration: none;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .ui-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* 2. ВИЗУАЛ ШТАБА */
        .vintage-base {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .bg-img { width: 100%; height: 100%; object-fit: cover; }

        /* 3. ТРИ ТЕЛЕВИЗОРА [cite: 2026-03-05] */
        .tv-overlay-grid {
            position: absolute; top: 24%; left: 5%; width: 90%; height: 35%;
            display: flex; gap: 3.5%; z-index: 500;
        }
        .tv-screen {
            flex: 1; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.4s;
            border-radius: 20px; text-decoration: none;
        }
        .tv-screen:hover { 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: inset 0 0 30px var(--neon); 
        }

        .label {
            font-family: 'Share Tech Mono'; font-size: 1.3vw; text-align: center;
            color: rgba(0,0,0,0.7); font-weight: 900; text-transform: uppercase;
            line-height: 1.1; pointer-events: none;
        }

        /* 4. ГЕНЕРАТОР ВЕРШЕЙ (Центральный ТВ) */
        .poetry-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .verse-box {
            max-width: 500px; padding: 40px; border: 1px solid var(--neon);
            background: #0a0a0a; text-align: center; font-family: 'Share Tech Mono';
        }
        #text-target { color: var(--neon); font-size: 1.2rem; margin-bottom: 30px; min-height: 100px; }
    </style>
</head>
<body onload="document.body.style.opacity='1'">

    <div class="top-nav">
        <div class="nav-left">
            <a href="hall.html" class="ui-btn">← КУДА-ТО НАЗАД</a>
            <div class="brand">GY-GY AI</div>
        </div>
        <div class="nav-right">
            <div class="ui-btn">🌐 ЯЗЫК [cite: 2026-03-05]</div>
        </div>
    </div>

    <div class="vintage-base">
        <img src="OIG2_vintage_tv_room.jpg" class="bg-img" alt="Vintage Base">

        <div class="tv-overlay-grid">
            
            <a href="techpark.html" class="tv-screen">
                <div class="label">TECHPARK<br>01</div>
            </a>

            <div class="tv-screen" onclick="showVerses()">
                <div class="label" style="font-size: 1.6vw;">ВЕРШИ<br>С ПРИКОЛОМ</div>
            </div>

            <div class="tv-screen" onclick="alert('Чарли: Сектор в разработке...')">
                <div class="label">ABSURD<br>RESERVE</div>
            </div>

        </div>
    </div>

    <div id="poetry-modal" class="poetry-modal">
        <div class="verse-box">
            <h3 style="color:var(--gold)">ЛУННЫЕ ВЕРШИ</h3>
            <div id="text-target">Нажимай кнопку для генерации...</div>
            <button class="ui-btn" onclick="generate()">ЕЩЕ ПРИКОЛ</button>
            <button class="ui-btn" onclick="this.parentElement.parentElement.style.display='none'" style="margin-left:10px; border-color:red; color:red;">ВЫХОД</button>
        </div>
    </div>

    <script>
        function showVerses() {
            document.getElementById('poetry-modal').style.display = 'flex';
            generate();
        }

        function generate() {
            const list = [
                "Чарли куки воровал,\nВ Технопарк их относил.\nТам Банано их жевал,\nИ про версию спросил.",
                "Стиль v4.3 — это класс,\nБьет ИИ не в бровь, а в глаз.\nКто автограф не оставил,\nТот в Клубу не развлекался.",
                "Лунная база, телевизор мигает,\nЧарли в репозиторий файлы кидает.\nЕсли увидишь абсурдный стишок —\nЗначит, попал ты на наш огонек!"
            ];
            document.getElementById('text-target').innerText = list[Math.floor(Math.random()*list.length)];
        }
    </script>
</body>
</html>
