<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY AI ROOM | v5.1 [7.1.19-LH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; 
        }

        /* НАВИГАЦИЯ: СТАНДАРТ КЛУБА (СИНХРОНИЗИРОВАНО С ДРУГИМИ СТРАНИЦАМИ) */
        .nav-header {
            position: fixed; top: 25px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            flex-direction: row-reverse; /* ЛОГО СПРАВА, ЯЗЫК СЛЕВА */
        }

        .logo { 
            color: var(--gold); 
            font-weight: bold; 
            letter-spacing: 5px; 
            font-size: 32px; 
            text-transform: uppercase;
        }
        
        #google_translate_element {
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* ВИЗУАЛ: ПЕРСПЕКТИВА (ОТОДВИНУТО ОТ ЗРИТЕЛЯ) */
        .hq-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        .hq-bg { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 10; opacity: 0.8;
        }

        /* СЕТКА ТЕЛЕВИЗОРОВ: УМЕНЬШЕНА И ОПУЩЕНА */
        .tv-grid {
            position: absolute; 
            top: 48%;    /* Дистанция от панели */
            left: 22%;   /* Глубокая перспектива */
            width: 56%;  
            height: 18%; 
            display: flex; 
            gap: 45px; 
            z-index: 100;
        }
        
        .tv-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.6);
        }

        .tv-screen:hover { 
            border-color: var(--gold);
            background: rgba(255, 204, 0, 0.08);
            transform: scale(1.05);
        }

        .tv-label {
            color: #fff; 
            font-weight: bold; 
            text-align: center; 
            font-size: 18px; /* НОРМАЛЬНЫЕ БУКВЫ ДЛЯ УДАЛЕННЫХ ЭКРАНОВ */
            text-transform: uppercase;
            text-shadow: 2px 2px 6px #000; 
            line-height: 1.3;
        }

        /* ФУТЕР v5.1 */
        .build-footer { 
            position: fixed; bottom: 20px; left: 40px; 
            font-size: 11px; color: rgba(255,204,0,0.3); 
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">GY-GY</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="hq-wrapper">
        <img src="OIG2_vintage_tv_room.jpg" class="hq-bg" alt="HQ v5.1" onerror="this.style.display='none';">

        <div class="tv-grid">
            <a href="techpark.html" class="tv-screen">
                <div class="tv-label">TECHPARK<br>v5.1</div>
            </a>
            <a href="tables.html" class="tv-screen">
                <div class="tv-label">TABLES</div>
            </a>
            <div class="tv-screen" onclick="alert('BUILD 19: SECURE ACCESS')">
                <div class="tv-label">RESERVE</div>
            </div>
        </div>
    </div>

    <div class="build-footer">BUILD: 7.1.19-LH | VERSION: 5.1</div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
