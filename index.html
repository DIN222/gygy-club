
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.176</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; top: 0 !important; }

        /* 1 & 2. ГУГЛ ЯЗЫК - ФИКСАЦИЯ */
        #google_translate_element { position: fixed !important; top: 20px !important; left: 20px !important; z-index: 999999 !important; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .goog-te-banner-frame, .skiptranslate { display: none !important; }
        body { top: 0 !important; }

        /* 4. ПАСХАЛКА СТАТИСТИКИ (ПРАВЫЙ ВЕРХ) */
        #secret-trigger { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; z-index: 1000001; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #secret-trigger:after { content: '·'; color: var(--gold); font-size: 24px; opacity: 0.5; }
        #secret-monitor { position: fixed; top: 60px; right: 20px; background: rgba(0,0,0,0.95); border: 2px solid var(--gold); padding: 15px; font-family: 'Share Tech Mono'; font-size: 12px; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 1000000; color: #fff; border-radius: 10px; }
        #secret-trigger:hover + #secret-monitor, #secret-trigger:active + #secret-monitor { opacity: 1; }

        /* КНОПКИ */
        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 3px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; transition: 0.5s; margin-top: 10px; }
        .btn-gy:disabled { opacity: 0.1; border-color: rgba(212, 175, 55, 0.2); color: rgba(212, 175, 55, 0.2); pointer-events: none; }

        .block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; opacity: 0; transition: opacity 0.6s ease; z-index: 100; padding: 20px; }
        .block.active { display: flex !important; opacity: 1; }

        #main-door { width: 280px; cursor: pointer; z-index: 99999; transition: 1.5s; }

        /* ХОЛЛ */
        .hall-bg { position: absolute; width: 100%; height: 100%; background: url('hall_bg_jpg.jpg') center/cover no-repeat; z-index: -1; }
        .hall-title { position: absolute; top: 40px; width: 100%; text-align: center; font-size: 44px; color: #fff; text-shadow: 0 0 15px var(--gold); font-weight: 900; z-index: 10; }

        /* 3. КАРТОЧКА НАПРОТИВ ПРАВОЙ ДВЕРИ */
        .id-card { position: absolute; right: 10%; bottom: 30px; width: 250px; padding: 20px; border: 3px solid var(--gold); background: #fdf5e6; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 500; box-shadow: 0 15px 30px rgba(0,0,0,0.7); }
        
        .quote-box { font-family: 'Share Tech Mono'; font-size: 24px; text-align: center; margin-bottom: 25px; line-height: 1.2; font-weight: 900; }

        /* 3. QR РАМКА */
        .qr-gold-frame { width: 90px; height: 90px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .square-box { width: 100px; height: 100px; border: 3px solid var(--gold); background: #fff !important; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        /* 5. ФИКС ТЕКСТА "ФОТО" */
        .photo-label { color: #000; font-size: 10px; font-weight: 900; position: absolute; z-index: 1; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="secret-trigger"></div>
    <div id="secret-monitor">
        <div style="color:var(--gold); border-bottom:1px solid var(--gold); margin-bottom:8px; font-weight:900;">CLUB MONITOR</div>
        <div>USERS ONLINE: <span id="online-count">142</span></div>
        <div>SERVER: <span style="color:#0f0">ACTIVE</span></div>
        <div>VIBE: <span style="color:var(--gold)">GOLDEN</span></div>
    </div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:20px; margin-bottom:10px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 40vh; margin: 15px 0;">
        <h1 style="font-size:52px; font-weight:900;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-box">В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ</div>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent !important; color:var(--gold); font-size:11px; font-weight:900;">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="square-box" id="photo-container">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute; z-index:5;">
                <span class="photo-label" id="photo-text">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="actionSave()">СОХРАНИТЕ</button>
        <button id="btn-go-hall" class="btn-gy" disabled onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-bg"></div>
        <div class="hall-title">ВСЕ БУДЕТ GY-GY</div>
        <div class="id-card">
            <div style="display:flex; gap:12px; margin-bottom:15px;">
                <div class="square-box" style="width:90px; height:90px; border-width:2px;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="qr-gold-frame" style="width:90px; height:90px; border-width:2px;"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; color:#000; font-size:14px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; margin-top:0;" onclick="actionConfirm()">ПОДТВЕРДИТЕ</button>
            <button id="h-tobar" class="btn-gy" disabled style="min-width:100%;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div style="position:absolute; top:10%; width:100%; text-align:center; color:var(--gold); font-family:'Share Tech Mono'; font-size:22px; font-weight:900;">«ИСТИНА В КОЛИЧЕСТВЕ»</div>
        
        <div style="position:absolute; left:5%; bottom:40%; display:flex; flex-direction:column; gap:10px; z-index:500;">
            <button class="btn-gy" style="min-width:180px;" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
            <button class="btn-gy" style="min-width:180px; border-color:#fff; color:#fff;" onclick="alert('Entering AI Room...')">AI ROOM</button>
        </div>
        
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        let orderNum = localStorage.getItem('gy_order_num') || 1;
        const randomNum = Math.floor(1000 + Math.random() * 8999);
        const fullID = `#GY-${orderNum}-${randomNum}`;
        const sndAmbient = document.getElementById('snd-ambient');
        const sndJazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            document.getElementById('main-door').style.transform = "scale(15)"; 
            document.getElementById('main-door').style.opacity = "0";
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 80, height: 80 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                sndAmbient.play().catch(()=>{}); 
                portalTransition('block-welcome'); 
            }, 1500);
        }

        function actionSave() {
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').style.opacity = "0.2";
            document.getElementById('btn-save').innerText = "SAVED";
            document.getElementById('btn-go-hall').disabled = false;
        }

        function actionConfirm() {
            document.getElementById('h-confirm').style.opacity = "0.2";
            document.getElementById('h-confirm').innerText = "VERIFIED";
            document.getElementById('h-tobar').disabled = false;
        }

        function goToBar() { 
            let fadeOut = setInterval(() => {
                if (sndAmbient.volume > 0.1) { sndAmbient.volume -= 0.1; }
                else { clearInterval(fadeOut); sndAmbient.pause(); }
            }, 100);

            portalTransition('block-bar'); 
            const fx = new Audio('charlie_bar_fx.mp3');
            fx.play().catch(()=>{});
            fx.onended = () => { sndJazz.play().catch(()=>{}); };
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 500);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('photo-text').style.display = "none"; // 5. ФИКС
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
/* --- END OF CODE v4.3.176 --- */
