
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.141</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 10000; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 1.2s ease; z-index: 10;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ЭФФЕКТ ТУМАННОГО ХОЛЛА */
        .foggy-bg {
            position: absolute; width: 100%; height: 100%; 
            background: url('hall_bg_jpg.jpg') center/cover;
            filter: blur(8px) brightness(0.6) contrast(1.2); /* Туман и приглушенность */
            opacity: 0.8;
        }

        /* КРУПНАЯ НАДПИСЬ НАД ЧАРЛИ */
        .gy-brand-large {
            font-family: 'Share Tech Mono';
            letter-spacing: 12px;
            font-size: 32px; /* Увеличено */
            margin-bottom: 30px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            font-weight: 900;
        }

        /* ЦИТАТА ПРО ВИСКИ */
        .whiskey-quote {
            font-weight: 900;
            font-size: 24px; /* Увеличено */
            margin-bottom: 35px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.2;
        }

        /* БАР: ОБЛАКА-КНОПКИ */
        .bar-content { position: relative; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        .cloud-nav {
            position: absolute; z-index: 100; 
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid var(--gold); 
            padding: 15px 25px; 
            border-radius: 50px;
            font-family: 'Share Tech Mono'; 
            font-weight: 900; 
            font-size: 14px; /* Текст внутри облака */
            color: #000;
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            transition: transform 0.2s, background 0.2s;
        }
        .cloud-nav:active { transform: scale(0.9); background: var(--gold); }
        
        #btn-tables { bottom: 54%; left: 8%; border-bottom-left-radius: 5px; }
        #btn-ai { bottom: 60%; right: 8%; border-bottom-right-radius: 5px; }

        .door-img { width: 380px; transition: transform 3s ease-in, opacity 2.5s ease-out; cursor: pointer; }
        .door-dissolve { transform: scale(15); opacity: 0; }
        .square-box { width: 95px; height: 95px; border: 3px solid var(--gold); background: #fff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-gy { min-width: 240px; padding: 16px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="gy-brand-large">GY-GY PRIVAT</div>
        <div style="width:280px; height:280px; -webkit-mask-image:radial-gradient(circle, black 55%, transparent 95%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:50px; margin-top:20px; font-weight: 900;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')" style="margin-top:30px;">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div class="whiskey-quote">«В КАЖДОЙ ШУТКЕ ЕСТЬ<br>ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-weight:900; font-size: 18px;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <span style="color:#000; font-size:10px; font-weight:bold; position:absolute; z-index:1;">ФОТО</span>
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp" style="position:absolute; width:100%; height:100%; object-fit:cover; z-index:2; display:none;">
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy" style="opacity:0.1; pointer-events:none; margin-top:10px;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="foggy-bg"></div>
        <h2 style="font-size:36px; color:#fff; text-shadow:0 0 20px var(--violet); z-index:100; font-weight: 900;">ВСЕ БУДЕТ GY-GY</h2>
        <div style="position: absolute; right: 25px; bottom: 25px; width: 230px; padding: 20px; border: 4px solid var(--gold); background: #fff; border-radius: 20px; display: flex; flex-direction: column; align-items: center; z-index: 110; box-shadow: 0 0 30px rgba(0,0,0,0.8);">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <img id="h-photo" style="width:85px; height:85px; border:1px solid var(--gold); object-fit:cover;">
                <div id="h-qr" style="width:85px; height:85px; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; font-size: 16px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:12px; background:#000; padding:12px;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:12px; background:#000; padding:12px; display:none;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-content">
            <div style="position: absolute; top: 70px; font-weight: 900; color: var(--gold); font-size: 20px;">«Истина не в вине, а в его количестве»</div>
            
            <div id="btn-tables" class="cloud-nav" onclick="alert('Места забронированы!')">ЗА СТОЛИКИ</div>
            <div id="btn-ai" class="cloud-nav" onclick="window.location.href='ai_room.html'">В AI ROOM</div>
            
            <img src="charlie_bar.png" style="height: 88%; width: auto; pointer-events: none;">
        </div>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        const sndJazz = document.getElementById('snd-jazz');

        function handleDoor() {
            sndDoor.play();
            document.getElementById('main-door').classList.add('door-dissolve');
            
            // Запуск вашего аудио приветствия
            new Audio('charlie_welcome.mp3').play().catch(e => console.log("Welcome audio needed"));
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 95, height: 95 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 85, height: 85 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                sndAmbient.play(); 
                portalTransition('block-welcome'); 
            }, 2500); 
        }

        function goToBar() {
            sndAmbient.pause();
            sndAmbient.currentTime = 0;
            portalTransition('block-bar');
            
            const fx = new Audio('charlie_bar_fx.mp3');
            fx.play().catch(e => console.log("FX audio needed"));
            fx.onended = () => { sndJazz.play(); };
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const target = document.getElementById(id);
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }, 800);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                const img = document.getElementById('pp');
                img.src = e.target.result; 
                img.style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').style.opacity = '1';
            document.getElementById('btn-go-hall').style.pointerEvents = 'auto';
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
