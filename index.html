<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.115</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ФИКС СКРОЛЛА ЯЗЫКОВ */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 2000; opacity: 0.6; }
        .goog-te-menu-frame { max-height: 300px !important; overflow-y: auto !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 2s ease-in-out; 
        }
        /* Чарли появляется быстрее по твоему запросу, но механика та же */
        #block-welcome { transition: opacity 2s ease-in-out; }
        .block.active { display: flex !important; opacity: 1; }

        /* Дверь - СТРОГО v93 */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 150; }
        .zoom-in-open { transform: scale(18); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* Чарли - чуть меньше, чтобы не впритык */
        .charlie-wrap {
            width: 240px; height: 240px;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 85%);
            mask-image: radial-gradient(circle, black 40%, transparent 85%);
            margin-bottom: 5px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-size: 50px; font-weight: 900; letter-spacing: 10px; margin-bottom: 30px; }

        /* Кнопки */
        .btn-gy { 
            min-width: 210px; padding: 12px 30px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px;
            margin: 8px 0; outline: none;
        }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.5; }

        /* Регистрация - ЗОЛОТЫЕ РАМКИ */
        .square-box { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 1px solid var(--gold); }
        .photo-box { background: #fff; position: relative; color: #000; overflow: hidden; }

        /* Холл */
        .neon-text { 
            color: #fff; text-shadow: 0 0 15px var(--indigo), 0 0 30px var(--indigo); 
            letter-spacing: 5px; margin-bottom: 40px; font-size: 24px; font-weight: 900;
        }
        /* БЕЛЫЙ ФОН КАРТОЧКИ И ФОТО */
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 195px; padding: 15px; border: 1px solid var(--gold); 
            background: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .card-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .hall-mini-qr { width: 75px; height: 75px; background: #fff; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index: 200;">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px; opacity: 0.9;">GY-GY PRIVAT</p>
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-style: italic; margin-bottom: 35px; opacity: 0.8;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="color:var(--gold);">ID</div>
            <div id="qr-box-reg" class="square-box" style="background:#fff;"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1; opacity: 0.5;"></div>
        <h2 class="neon-text">ВСЕ БУДЕТ GY-GY</h2>
        
        <div class="hall-card">
            <div class="card-row">
                <img id="h-photo" style="width:75px; height:75px; background:#fff; object-fit:cover; border:1px solid var(--gold);">
                <div id="h-qr" class="hall-mini-qr"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:10px; margin-bottom:15px; text-align: center; font-weight: bold;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px; background: #000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; background: #000; border-color:var(--indigo); color:var(--indigo);" onclick="window.location.href='ai_room.html'">В АЙ-РУМ</button>
        </div>
    </div>

    <script>
        // Используем твой оригинальный скрипт из v93 без изменений логики
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }

        function handleDoor() {
            const door = document.getElementById('main-door');
            document.getElementById('snd-door').play();
            door.classList.add('zoom-in-open');
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2100); // Чуть быстрее вход
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const target = document.getElementById(id);

            blocks.forEach(b => { if(b.classList.contains('active')) b.style.opacity = '0'; });

            setTimeout(() => {
                blocks.forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
                target.style.display = 'flex';
                void target.offsetWidth; 
                target.classList.add('active');
                target.style.opacity = '1';
            }, 1000);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            const saveBtn = document.getElementById('btn-save');
            const goBtn = document.getElementById('btn-go-hall');
            saveBtn.style.opacity = '0.3';
            saveBtn.innerText = 'ГОТОВО';
            goBtn.classList.remove('btn-disabled');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display='none';
            document.getElementById('h-tobar').style.display='block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
