<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.118</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* GOOGLE FIX */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 2000; opacity: 0.7; }
        .goog-te-banner-frame.skiptranslate { display: none !important; } 
        body { top: 0 !important; }

        /* БЛОКИ */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 1.5s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ДВЕРЬ */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 150; }
        .zoom-in-open { transform: scale(18); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* ЧАРЛИ В ПРИВЕТСТВИИ */
        .charlie-wrap { width: 240px; height: 240px; -webkit-mask-image: radial-gradient(circle, black 40%, transparent 85%); margin-bottom: 5px; }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }

        /* ЗОНА РЕГИСТРАЦИИ */
        .square-box { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 1px solid var(--gold); }
        .photo-box { background: #fff; position: relative; color: #000; overflow: hidden; }

        /* БАР И ЧАРЛИ-БАРМЕН */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; justify-content: flex-end; }
        .bartender { width: 85vw; max-width: 400px; cursor: pointer; z-index: 5; margin-bottom: -20px; transition: transform 0.2s; }
        .bartender:active { transform: scale(0.95); }

        /* ОБЛАЧКО (BUBBLE) */
        .bubble {
            position: absolute; background: rgba(255, 255, 255, 0.95); color: #000;
            padding: 12px 18px; border-radius: 15px; font-family: 'Share Tech Mono';
            font-size: 13px; max-width: 180px; text-align: center;
            bottom: 45%; left: 50%; transform: translateX(-50%) translateY(20px);
            opacity: 0; transition: 0.4s; z-index: 10; pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .bubble:after { content: ''; position: absolute; bottom: -10px; left: 50%; margin-left: -10px; border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent; }

        /* КНОПКИ */
        .btn-gy { min-width: 210px; padding: 12px 30px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; letter-spacing: 2px; margin: 8px 0; outline: none; }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.4; }

        /* КАРТОЧКА ХОЛЛА */
        .hall-card { position: absolute; right: 25px; bottom: 25px; width: 195px; padding: 15px; border: 1px solid var(--gold); background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index: 200;">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 style="font-size:50px; letter-spacing:10px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box">ID</div>
            <div id="qr-box-reg" class="square-box" style="background:#fff;"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.5;"></div>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:75px; height:75px; background:#fff; object-fit:cover; border:1px solid var(--gold);">
                <div id="h-qr" style="width:75px; height:75px; background:#fff; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:10px; margin-bottom:15px; text-align: center; font-weight: bold;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px; background: #000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; background: #000;" onclick="portalTransition('block-bar')">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div id="bubble" class="bubble"></div>
        <img src="charlie.png" class="bartender" onclick="charlieTalk()">
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:100px; font-size:10px;" onclick="window.location.reload()">ВЫХОД</button>
    </div>

    <script>
        const jokes = [
            "В каждой шутке есть доля виски!",
            "Тут промпты наливают в чистом виде.",
            "Слушай, а ты точно не бот? Выглядишь слишком хорошо.",
            "Бармен не ошибается, он дебажит реальность.",
            "Коктейль 'Сингулярность' за счет заведения!",
            "Твоя аватарка сегодня просто GY-GY!"
        ];
        let jokeIdx = 0;
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2100); 
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const target = document.getElementById(id);
            blocks.forEach(b => { if(b.classList.contains('active')) b.style.opacity = '0'; });
            setTimeout(() => {
                blocks.forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
                target.style.display = 'flex';
                void target.offsetWidth; 
                target.classList.add('active');
                target.style.opacity = '1';
                if(id === 'block-bar') setTimeout(charlieTalk, 1000);
            }, 1000);
        }

        function charlieTalk() {
            const b = document.getElementById('bubble');
            b.innerText = jokes[jokeIdx];
            b.classList.add('show');
            jokeIdx = (jokeIdx + 1) % jokes.length;
            setTimeout(() => { b.classList.remove('show'); }, 3000);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.3';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
