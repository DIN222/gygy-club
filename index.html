<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.156</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        /* ГЛОБАЛЬНАЯ ЗОЛОТАЯ РАМКА */
        html::after {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid var(--gold); pointer-events: none; z-index: 2000000;
        }

        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫК (ВСЕГДА ВИДЕН ИЗ-ЗА z-index) */
        #google_translate_element { 
            position: fixed !important; top: 15px !important; left: 15px !important; 
            z-index: 999999 !important; background: rgba(0,0,0,0.6); border-radius: 5px;
        }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 10; padding: 40px;
        }
        .block.active { display: flex !important; opacity: 1; }

        #main-door { width: 280px; cursor: pointer; transition: transform 2s ease, opacity 1.5s ease; z-index: 100; }

        /* ХОЛЛ: КОНТРАСТ И ВОЗДУХ */
        .hall-bg {
            position: absolute; width: 100%; height: 100%; 
            background: url('hall_bg_jpg.jpg') center/cover;
            filter: contrast(1.2) brightness(0.25); z-index: -1;
        }

        /* УВЕЛИЧЕННАЯ ЦИТАТА */
        .whiskey-quote-huge {
            font-weight: 900; font-size: 56px; text-align: center; line-height: 0.85; 
            text-transform: uppercase; color: var(--gold); 
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4); margin-bottom: 40px;
        }

        /* ОБЛАКА-КНОПКИ В БАРЕ */
        .cloud-bubble {
            position: absolute; z-index: 500; background: #fff; border: 2px solid var(--gold); 
            padding: 16px 24px; border-radius: 40px; font-family: 'Share Tech Mono'; 
            font-weight: 900; font-size: 14px; color: #000; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); white-space: nowrap; transition: 0.2s;
        }
        .cloud-bubble:active { transform: scale(0.92); background: #f0f0f0; }
        .cloud-bubble:after {
            content: ''; position: absolute; bottom: -10px; width: 18px; height: 18px;
            background: #fff; border-right: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
        }
        #btn-to-tables { bottom: 52%; left: 8%; border-bottom-left-radius: 2px; }
        #btn-to-tables:after { left: 18px; transform: rotate(45deg); }
        
        #btn-to-ai { bottom: 60%; right: 8%; border-bottom-right-radius: 2px; }
        #btn-to-ai:after { right: 18px; transform: rotate(-45deg); }

        .btn-gy { min-width: 240px; padding: 18px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; }
        .square-box { width: 95px; height: 95px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:20px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 45vh; -webkit-mask-image: radial-gradient(circle, black 65%, transparent 98%); margin: 20px 0;">
        <h1 style="font-size:52px; font-weight: 900; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div class="whiskey-quote-huge">«В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-weight:900;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <span style="color:#000; font-size:10px; font-weight:bold; position:absolute; z-index:1;">ФОТО</span>
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp" style="position:absolute; width:100%; height:100%; object-fit:cover; z-index:2; display:none;">
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy" style="opacity:0.1; pointer-events:none; margin-top:15px;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-bg"></div>
        <h2 style="font-size:42px; color:#fff; text-shadow:0 0 25px var(--violet); font-weight: 900; text-transform: uppercase; letter-spacing: 5px;">ВСЕ БУДЕТ GY-GY</h2>
        
        <div style="position: absolute; right: 30px; bottom: 30px; width: 250px; padding: 25px; border: 3px solid var(--gold); background: #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
            <div style="display:flex; gap:12px; margin-bottom:15px;">
                <img id="h-photo" style="width:90px; height:90px; border:1px solid var(--gold); object-fit:cover; background:#f0f0f0;">
                <div id="h-qr" style="width:90px; height:90px; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; font-size: 18px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:12px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:12px; background:#000; display:none;" onclick="goToBar()">НАЛИТЬ & ВОЙТИ</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div style="position: absolute; top: 70px; font-weight: 900; color: var(--gold); text-align: center; width:100%; z-index:100;">«Истина не в вине, а в его количестве»</div>
        
        <div id="btn-to-tables" class="cloud-bubble" onclick="alert('Все столики забронированы!')">ЗА СТОЛИКИ</div>
        <div id="btn-to-ai" class="cloud-bubble" onclick="window.location.href='ai_room.html'">В AI ROOM</div>
        
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        const sndAmbient = document.getElementById('snd-ambient');
        const sndJazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }

        function handleDoor() {
            const door = document.getElementById('main-door');
            document.getElementById('snd-door').play().catch(()=>{});
            door.style.transform = "scale(15)";
            door.style.opacity = "0";
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 95, height: 95 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 90, height: 90 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { sndAmbient.play().catch(()=>{}); portalTransition('block-welcome'); }, 1800); 
        }

        function goToBar() {
            const charlieFX = new Audio('charlie_bar_fx.mp3');
            charlieFX.play().catch(()=>{});
            let fadeOut = setInterval(() => {
                if (sndAmbient.volume > 0.1) { sndAmbient.volume -= 0.1; }
                else { clearInterval(fadeOut); sndAmbient.pause(); sndAmbient.volume = 1.0; }
            }, 50);
            portalTransition('block-bar');
            charlieFX.onended = () => {
                sndJazz.volume = 0; sndJazz.play().catch(()=>{});
                let fadeIn = setInterval(() => {
                    if (sndJazz.volume < 0.7) { sndJazz.volume += 0.05; }
                    else { clearInterval(fadeIn); }
                }, 200);
            };
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const target = document.getElementById(id);
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').style.opacity = '1';
            document.getElementById('btn-go-hall').style.pointerEvents = 'auto';
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
