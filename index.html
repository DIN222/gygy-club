<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.12 | FINAL-FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            -webkit-touch-callout: none !important; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            outline: none !important; 
        }

        a, button, input { -webkit-appearance: none; outline: none !important; pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; pointer-events: none; border: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; position: fixed; }
        
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 1000001; pointer-events: auto !important; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000000; font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; letter-spacing: 5px; color: var(--gold); pointer-events: none; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .block.active { display: flex !important; opacity: 1; }

        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; pointer-events: auto !important; }
        
        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; margin: 8px 0; z-index: 1001; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        /* НАДПИСЬ В ХОЛЛЕ */
        .motto-hall { 
            position: absolute; 
            top: 8%; 
            width: 100%; 
            text-align: center; 
            color: var(--door-wood); 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            font-weight: 900; 
            font-style: italic; 
            z-index: 20; 
            pointer-events: none;
        }

        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; }
        #h-photo { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="checkReturn()" oncontextmenu="return false;">

    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; margin-bottom:10px; font-size:14px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 32vh; width: auto; margin-bottom: 15px;">
        <div style="font-family: 'Inter', sans-serif; font-size:44px; font-weight:900; margin-bottom:15px; color:var(--gold);">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:12px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-family:'Share Tech Mono'; font-size:11px;" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold);"></div>
            <div class="box-final" style="border-color:var(--gold); position:relative;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div class="motto-hall">«Всё будет GY-GY»</div>
        <div style="position:absolute; top:72%; left:50%; transform:translate(-50%,-50%); width:260px; padding:15px; border:2px solid var(--gold); background:#F5F5DC; border-radius:12px; display:flex; flex-direction:column; align-items:center; color:#000;">
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:14px; margin-bottom:12px;">#ID</div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:4px 0;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:4px 0;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div style="font-family:'Share Tech Mono'; font-size:18px; font-weight:900; position:absolute; top:8%; text-align:center; width:100%; z-index:100; font-style:italic; color:var(--gold); pointer-events:none;">«Истина не в вине, а в его количестве»</div>
        <div style="position:absolute; bottom:30%; z-index:1000; width:100%; display:flex; justify-content:space-around; padding:0 10px;">
            <button class="btn-gy" style="min-width:145px; font-size:12px; background:rgba(0,0,0,0.6);" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
            <button class="btn-gy" style="min-width:145px; font-size:12px; background:rgba(0,0,0,0.6);" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
        </div>
        <img src="charlie_bar.png" style="height: 82vh; width: auto; object-fit: contain;">
    </div>

    <div id="block-ai-room" class="block" style="background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important;">
        <button class="btn-gy" style="position:absolute; bottom:10%; background:rgba(0,0,0,0.85);" onclick="portalTransition('block-bar')">НАЗАД В БАР</button>
    </div>

    <script>
        let currentID = "";

        function checkReturn() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('back') === 'bar') {
                const bar = document.getElementById('block-bar');
                bar.style.display = 'flex'; bar.classList.add('active'); bar.style.opacity = '1';
                const amb = document.getElementById('snd-ambient'); amb.play(); amb.volume = 1;
            } else {
                const ent = document.getElementById('block-entrance');
                ent.style.display = 'flex'; setTimeout(() => { ent.classList.add('active'); ent.style.opacity = '1'; }, 50);
            }
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            const d = document.getElementById('main-door');
            d.style.transform = "scale(5)"; d.style.opacity = "0";
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            document.getElementById('qr-box-reg').innerHTML = "";
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            setTimeout(() => { portalTransition('block-welcome'); const amb = document.getElementById('snd-ambient'); amb.volume=0; amb.play(); fadeAudio(amb, 1, 2000); }, 1800);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if (nextId === 'block-ai-room') fadeAudio(document.getElementById('snd-ambient'), 0, 1000);
            if (nextId === 'block-bar' && current && current.id === 'block-ai-room') {
                const amb = document.getElementById('snd-ambient'); amb.play(); fadeAudio(amb, 1, 1000);
            }
            if(current) current.style.opacity = "0";
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { 
                    next.classList.add('active'); next.style.opacity = "1";
                    if(nextId === 'block-bar') {
                        setTimeout(() => { document.getElementById('snd-khe').play(); }, 800);
                        setTimeout(() => { document.getElementById('snd-pour').play(); }, 2200);
                    }
                }, 50);
            }, 800);
        }

        function fadeAudio(audio, target, duration, cb) {
            const start = audio.volume;
            const startTime = Date.now();
            const interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                audio.volume = start + (target - start) * progress;
                if (progress === 1) { clearInterval(interval); if (target === 0) audio.pause(); if (cb) cb(); }
            }, 50);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; document.getElementById('pp').style.display = "block";
                    document.getElementById('txt-photo').style.display = "none";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }
        function swapButtons(a, s) { document.getElementById(a).classList.add('btn-sleep'); document.getElementById(s).classList.remove('btn-sleep'); }
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element'); }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
