<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.132</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 10000; }
        .goog-te-menu-frame { pointer-events: auto !important; max-height: 80vh !important; overflow: auto !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 1.2s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ДВЕРЬ */
        .door-img { width: 280px; transition: transform 3s, opacity 2.5s, filter 2.5s; }
        .door-dissolve { transform: scale(20); opacity: 0; filter: blur(40px); pointer-events: none; }

        /* БАР */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; }
        .bar-charlie-talk {
            position: absolute; top: 120px; background: rgba(0,0,0,0.85);
            border: 1px solid var(--gold); padding: 12px 25px; border-radius: 12px;
            font-size: 14px; color: #fff; text-align: center; opacity: 0;
            transition: 1.5s; z-index: 100; font-family: 'Share Tech Mono';
        }

        .bubble-btn {
            position: absolute; z-index: 150; cursor: pointer;
            background: rgba(255, 255, 255, 0.95); border: 2.2px solid var(--gold);
            border-radius: 40px; padding: 12px 20px; font-family: 'Share Tech Mono';
            font-weight: 900; font-size: 11px; color: #000;
            box-shadow: 0 0 15px var(--gold);
        }
        #btn-tables { bottom: 50%; left: 8%; }
        #btn-ai { bottom: 56%; right: 8%; }

        /* КНОПКИ И РАМКИ */
        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; }
        .btn-inactive { opacity: 0.2; pointer-events: none; }
        .square-box { width: 85px; height: 85px; border: 3px solid var(--gold); background: #fff; overflow: hidden; position: relative; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio> <audio id="snd-cough"><source src="cough.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_wine.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="width:240px; height:240px; -webkit-mask-image:radial-gradient(circle, black 50%, transparent 95%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:40px; letter-spacing: 5px; margin-top:20px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')" style="margin-top:20px;">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-weight:900; font-size:18px; margin-bottom:25px;">«В КАЖДОЙ ШУТКЕ ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:900;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span style="color:#000; font-size:10px; font-weight:bold; position:absolute; top:35px; left:22px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-inactive" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.8;"></div>
        <h2 style="font-size:32px; color:#fff; text-shadow:0 0 20px var(--violet); z-index:100;">ВСЕ БУДЕТ GY-GY</h2>
        <div style="position: absolute; right: 20px; bottom: 20px; width: 210px; padding: 15px; border: 3.2px solid var(--gold); background: #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 110;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:75px; height:75px; border:2px solid var(--gold); object-fit:cover;">
                <div id="h-qr" style="width:75px; height:75px; border:2px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:12px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:11px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:11px; background:#000; display:none;" onclick="jazzTransition()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div id="charlie-speech" class="bar-charlie-talk">Пройдете за столики или заглянете в AI Room?</div>
        <div style="z-index: 100; position: absolute; top: 60px; font-weight: 900; color: var(--gold); text-transform: uppercase;">«Истина не в вине, а в его количестве»</div>
        <div style="position: relative; width: 100%; height: 80vh; display: flex; align-items: flex-end; justify-content: center;">
            <div id="btn-tables" class="bubble-btn" onclick="alert('Места забронированы!')">ЗА СТОЛИКИ</div>
            <div id="btn-ai" class="bubble-btn" onclick="window.location.href='ai_room.html'">ПОБОЛТАТЬ С ИИ</div>
            <img src="charlie_bar.png" style="height: 90%; width: auto; z-index: 5; pointer-events: none;">
        </div>
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        const ambient = document.getElementById('snd-ambient');
        const jazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        // ПЕРЕХОД С ПЕРЕМЕНОЙ ТРЕКОВ
        function jazzTransition() {
            // 1. Плавное затухание AMBIENT
            let vol = 1.0;
            let fadeOut = setInterval(() => {
                if (vol > 0.05) { vol -= 0.05; ambient.volume = vol; }
                else { clearInterval(fadeOut); ambient.pause(); ambient.volume = 0; }
            }, 50);

            document.getElementById('block-hall').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('block-hall').style.display = 'none';
                document.getElementById('block-bar').style.display = 'flex';
                
                // 2. Перформанс Чарли в тишине
                document.getElementById('snd-cough').play();
                
                setTimeout(() => {
                    document.getElementById('snd-pour').play(); 
                    
                    setTimeout(() => {
                        document.getElementById('block-bar').style.opacity = '1';
                        document.getElementById('charlie-speech').style.opacity = '1';
                        
                        // 3. Плавно нарастает JAZZ DUET
                        jazz.volume = 0;
                        jazz.play();
                        let volIn = 0;
                        let fadeIn = setInterval(() => {
                            if (volIn < 0.9) { volIn += 0.05; jazz.volume = volIn; }
                            else { clearInterval(fadeIn); jazz.volume = 1; }
                        }, 150);
                    }, 1500);
                }, 1000);
            }, 1500);
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('door-dissolve');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { ambient.play(); portalTransition('block-welcome'); }, 2200); 
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 800);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').classList.remove('btn-inactive');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
