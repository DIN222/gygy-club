<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.103</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* --- ФИКС ПЕРЕВОДЧИКА И СКРОЛЛА --- */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 5000; opacity: 0.7; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        /* Принудительный скролл для выпадающего меню Google */
        .goog-te-menu-frame { max-height: 350px !important; overflow-y: auto !important; display: block !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* Дверь */
        #block-entrance { z-index: 1000; }
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-in-open { transform: scale(20); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* Чарли (УМЕНЬШЕН ДО 210px) */
        .charlie-wrap {
            width: 210px; height: 210px;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 85%);
            mask-image: radial-gradient(circle, black 40%, transparent 85%);
            margin-bottom: 10px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-size: 45px; font-weight: 900; letter-spacing: 10px; margin-bottom: 25px; }

        /* Кнопки */
        .btn-gy { 
            min-width: 210px; padding: 12px 30px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px;
            margin: 8px 0; outline: none;
        }
        .btn-disabled { border-color: #333; color: #333; pointer-events: none; opacity: 0.5; }

        /* Регистрация */
        .square-box { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 9px; background: #fff; border: 1px solid var(--gold); }
        .photo-box { position: relative; color: #000; overflow: hidden; }

        /* Холл и Бар */
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 200px; padding: 15px; border: 1px solid var(--gold); 
            background: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .bar-bg { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-intro"><source src="bar_intro.mp3" type="audio/mpeg"></audio> <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px;">GY-GY PRIVAT</p>
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="color:#000; font-weight:bold;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1; opacity: 0.5;"></div>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:75px; height:75px; background:#eee; object-fit:cover; border:1px solid #ccc;">
                <div id="h-qr" style="width:75px; height:75px; background:#fff; border:1px solid #ccc;"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:10px; margin-bottom:15px; font-weight:bold;"></div>
            <button class="btn-gy" style="min-width:100%; font-size:11px; background:#000;" onclick="startBarTransition()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <img src="charlie_bar.png" class="bar-bg">
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
                document.getElementById('block-entrance').style.zIndex = "1"; // Убираем на задний план
            }, 2000);
        }

        function portalTransition(id) {
            const current = document.querySelector('.block.active');
            if(current) current.style.opacity = '0';

            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
                const target = document.getElementById(id);
                target.style.display = 'flex';
                void target.offsetWidth; 
                target.classList.add('active');
                target.style.opacity = '1';
            }, 1000);
        }

        function startBarTransition() {
            const amb = document.getElementById('snd-ambient');
            const intro = document.getElementById('snd-intro');
            const jazz = document.getElementById('snd-jazz');

            // 1. Плавно гасим амбиент холла
            let vol = 1.0;
            const fadeOut = setInterval(() => {
                if (vol > 0.05) { vol -= 0.05; amb.volume = vol; } 
                else { clearInterval(fadeOut); amb.pause(); }
            }, 100);

            // 2. Переходим в бар
            portalTransition('block-bar');

            // 3. Эффект "кхе-кхе"
            setTimeout(() => { intro.play(); }, 1500);

            // 4. Плавно нарастает джаз
            setTimeout(() => {
                jazz.volume = 0; jazz.play();
                let jVol = 0;
                const fadeIn = setInterval(() => {
                    if (jVol < 0.6) { jVol += 0.05; jazz.volume = jVol; }
                    else { clearInterval(fadeIn); }
                }, 200);
            }, 7000);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'OK';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
