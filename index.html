<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.244</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --rich-brown: #8B4513; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 10000000 !important; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 4px; }
        #fade-overlay { position: fixed; inset: 0; background: #000 !important; z-index: 999999; pointer-events: none; opacity: 0; transition: opacity 0.4s; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000 !important; z-index: 10; opacity: 0; }
        .block.active { display: flex !important; opacity: 1; transition: opacity 0.6s ease-in; }

        #main-door { width: 280px; cursor: pointer; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease-out; }

        /* СТАНДАРТ КНОПОК GY-GY */
        .btn-gy { min-width: 260px; padding: 12px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; margin: 6px 0; transition: 0.3s; }
        .btn-sleep { opacity: 0.1 !important; pointer-events: none !important; }
        
        /* КНОПКИ ВНУТРИ ПРОПУСКА */
        .id-btn { 
            width: 100%; padding: 10px; background: #000; color: var(--gold); 
            border: 1px solid var(--gold); font-family: 'Share Tech Mono'; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 5px;
        }

        /* ХОЛЛ: УВЕЛИЧЕННАЯ НАДПИСЬ */
        .hall-slogan { 
            position: absolute; top: 10%; width: 100%; text-align: center;
            font-family: 'Playfair Display'; font-style: italic; font-weight: 900; 
            font-size: 32px; color: var(--rich-brown); 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3); z-index: 100;
        }

        .id-card { 
            position: absolute; left: 50%; top: 70%; transform: translate(-50%, -50%); 
            width: 260px; padding: 15px; border: 2px solid var(--gold); 
            background: #F5F5DC; border-radius: 0; display: flex; flex-direction: column; 
            align-items: center; color: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .hall-frame { width: 85px; height: 85px; border: 1px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .bar-btn-simple { position: absolute; z-index: 1000; background: transparent; border: 2px solid var(--gold); padding: 12px 20px; color: var(--gold); font-family: 'Share Tech Mono'; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>
    <div id="fade-overlay"></div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <img src="charlie.png" style="max-height: 30vh; margin-bottom: 20px;">
        <h1 style="font-size:38px; font-weight: 900;">WELCOME</h1>
        <button id="btn-welcome-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div style="width:90px; height:90px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-size:10px;" id="id-label">ID</div>
            <div style="width:90px; height:90px; border:2px solid var(--gold); background:#fff; padding:4px;" id="qr-box-reg"></div>
            <div style="width:90px; height:90px; border:2px solid var(--gold); background:#fff; position:relative; overflow:hidden;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span style="color:#000; position:absolute; top:40%; left:25%; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button class="btn-gy" onclick="saveReg()">СОХРАНИТЬ ДАННЫЕ</button>
        <button id="btn-go-hall-reg" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div class="hall-slogan">«Все будет GY-GY»</div>
        <div class="id-card">
            <div style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:8px; font-size:14px; text-decoration:underline;">PASS CONTROL</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div class="hall-frame"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="hall-frame" id="h-qr"></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:13px; margin-bottom:10px; background:#fff; border:1px solid #000; width:100%; text-align:center; padding:2px;"></div>
            <button class="id-btn" onclick="confirmHall(this)">ПОДТВЕРДИТЬ</button>
            <button id="btn-go-bar" class="id-btn btn-sleep" onclick="goToBar()">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button style="bottom: 15%; left: 8%;" class="bar-btn-simple" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
        <button style="bottom: 15%; right: 8%;" class="bar-btn-simple" onclick="smoothLeave('ai_room_retro_base.html')">В AI ROOM</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto;">
    </div>

    <script>
        let currentID = "";

        function handleDoor() {
            const s = document.getElementById('snd-door');
            s.currentTime = 0; s.play().catch(()=>{});
            const door = document.getElementById('main-door');
            door.style.transform = "scale(2)"; door.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            
            setTimeout(() => {
                new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 80, height: 80 });
                new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
                document.getElementById('id-label').innerText = currentID;
                document.getElementById('h-id').innerText = currentID;
            }, 100);

            setTimeout(() => { 
                portalTransition('block-welcome'); 
                const amb = document.getElementById('snd-ambient');
                amb.currentTime = 0; amb.play().catch(()=>{});
            }, 1300);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(current) {
                current.style.opacity = "0";
                setTimeout(() => {
                    current.classList.remove('active');
                    current.style.display = "none";
                    const next = document.getElementById(nextId);
                    next.style.display = "flex";
                    setTimeout(() => { next.classList.add('active'); }, 50);
                }, 600);
            }
        }

        function saveReg() {
            document.querySelectorAll('.btn-sleep').forEach(b => b.classList.remove('btn-sleep'));
        }

        function confirmHall(btn) {
            btn.style.background = "#d4af37";
            btn.style.color = "#000";
            btn.innerText = "OK";
            document.getElementById('btn-go-bar').classList.remove('btn-sleep');
        }

        function goToBar() { portalTransition('block-bar'); }

        function smoothLeave(url) {
            document.getElementById('fade-overlay').style.opacity = "1";
            setTimeout(() => { window.location.href = url; }, 400);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
</body>
</html>
