<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.111</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ И СКРОЛЛ */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 5000; }
        .goog-te-menu-frame { 
            max-height: 250px !important; 
            overflow-y: auto !important; 
            box-shadow: 0 0 10px var(--gold) !important;
        }
        body { top: 0 !important; }
        .goog-te-banner-frame { display: none !important; }

        /* ГЛОБАЛЬНЫЕ БЛОКИ */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; pointer-events: none;
            transition: opacity 1.2s ease-in-out; 
            z-index: 10;
        }
        /* Тот, кто активен — сверху и виден */
        .block.active { opacity: 1; pointer-events: auto; z-index: 100; }

        /* ДВЕРЬ (Блок 1) */
        #block-entrance { opacity: 1; pointer-events: auto; z-index: 1000; }
        .door-img { width: 65vw; max-width: 320px; cursor: pointer; transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-in-open { transform: scale(15); opacity: 0; filter: blur(10px); }

        /* ЧАРЛИ */
        .charlie-wrap {
            width: 220px; height: 220px;
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 95%);
            mask-image: radial-gradient(circle, black 50%, transparent 95%);
            margin-bottom: 10px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }

        /* КНОПКИ */
        .btn-gy { 
            min-width: 210px; padding: 12px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0;
        }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.5; }

        /* РЕГИСТРАЦИЯ */
        .square-box { 
            width: 75px; height: 75px; border: 1px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 9px; position: relative; overflow: hidden;
        }
        .qr-white { background: #fff !important; }
        #pp { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; z-index: 5; }

        /* ХОЛЛ */
        .hall-card { 
            position: absolute; right: 20px; bottom: 20px; width: 190px; padding: 15px; 
            border: 1px solid var(--gold); background: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 style="font-size: 40px; letter-spacing: 8px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="font-family:'Share Tech Mono';">ID</div>
            <div id="qr-box-reg" class="square-box qr-white"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp">
                <span id="p-label" style="font-family:'Share Tech Mono';">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.5;"></div>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:70px; height:70px; background:#fff; object-fit:cover; border:1px solid var(--gold);">
                <div id="h-qr" style="width:70px; height:70px; background:#fff; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:10px; font-weight:bold; margin-bottom:10px;"></div>
            <button class="btn-gy" style="min-width:100%; font-size:10px; background:#000;" onclick="window.location.href='ai_room.html'">В АЙ-РУМ</button>
        </div>
    </div>

    <script>
        let vCount = localStorage.getItem('vCount') || 1;
        const fullID = `№${vCount}-${Math.floor(1000 + Math.random() * 8999)}`;
        localStorage.setItem('vCount', parseInt(vCount) + 1);
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 70, height: 70 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            // Переход к Чарли происходит через смену Z-INDEX
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2000);
        }

        function portalTransition(targetId) {
            // У всех убираем статус активного
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            // Целевому блоку даем активный статус (opacity 1 и z-index 100)
            document.getElementById(targetId).classList.add('active');
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').classList.add('btn-disabled');
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
