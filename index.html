<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.307</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --brown-dark: #3E2723; }
        
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            -webkit-focus-ring-color: transparent !important;
            outline: none !important; 
            box-sizing: border-box; margin: 0; padding: 0; 
            user-select: none !important; 
            -webkit-user-select: none !important; 
        }

        html, body { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; position: fixed; }
        img { pointer-events: none !important; -webkit-user-drag: none !important; -webkit-touch-callout: none !important; }

        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 1000001; max-width: 120px; overflow-x: auto; }
        #google_translate_element::-webkit-scrollbar { display: none; }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; 
            letter-spacing: 5px; color: var(--gold); pointer-events: none; 
        }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000 !important; z-index: 10; opacity: 0; transition: opacity 0.6s ease-in-out; }
        .block.active { display: flex !important; opacity: 1; }

        .btn-gy { min-width: 270px; padding: 15px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; margin: 10px 0; z-index: 1001; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        .pass-card {
            position: absolute; top: 72%; left: 50%; transform: translate(-50%, -50%); 
            width: 260px; padding: 15px; border: 2px solid var(--gold); 
            background: #F5F5DC; border-radius: 12px; display: flex; 
            flex-direction: column; align-items: center; color: #000;
        }
        .pass-media-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .pass-box { width: 85px; height: 85px; border: 2px solid #000; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="black-veil" style="position:fixed; inset:0; background:#000; z-index:2147483647; display:none; pointer-events:none;"></div>
    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" style="width:280px; cursor:pointer; pointer-events:auto;" onclick="handleDoor()">
    </div>
    
    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        
        <div style="position:absolute; top:20%; width:100%; text-align:center; color:var(--brown-dark); font-family:'Playfair Display', serif; font-size:36px; font-weight:900; font-style:italic; letter-spacing:2px; text-shadow: 1px 1px 0px rgba(255,255,255,0.1);">
            «Всё будет GY-GY»
        </div>

        <div class="pass-card">
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:14px; margin-bottom:12px;">#GY-ID-PENDING</div>
            <div class="pass-media-row">
                <div class="pass-box"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="pass-box" id="h-qr" style="padding:5px;"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:4px 0; font-size:14px;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:4px 0; font-size:14px;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div style="font-family:'Share Tech Mono'; font-size:20px; font-weight:900; position:absolute; top:8%; text-align:center; width:100%; z-index:100; font-style:italic; padding: 0 10px; pointer-events:none;">«Истина не в вине, а в его количестве»</div>
        
        <div style="position:absolute; bottom:30%; z-index:1000; width:100%; display:flex; justify-content:space-around; padding:0 10px;">
            <button class="btn-gy" style="min-width:145px; font-size:12px; background:rgba(0,0,0,0.6);" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
            <button class="btn-gy" style="min-width:145px; font-size:12px; background:rgba(0,0,0,0.6);" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
        </div>
        <img src="charlie_bar.png" style="height: 82vh; width: auto; object-fit: contain;">
    </div>

    <div id="block-ai-room" class="block" style="background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important;">
        <button class="btn-gy" style="position:absolute; bottom:10%; background:rgba(0,0,0,0.85);" onclick="portalTransition('block-bar')">НАЗАД В БАР</button>
    </div>

    <script>
        let currentID = "";

        function fadeAudio(audio, targetVolume, duration) {
            const startVolume = audio.volume;
            const startTime = Date.now();
            const interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                audio.volume = startVolume + (targetVolume - startVolume) * progress;
                if (progress === 1) {
                    clearInterval(interval);
                    if (targetVolume === 0) audio.pause();
                }
            }, 50);
        }

        function handleDoor() {
            const d = document.getElementById('main-door');
            d.style.transition = "transform 1.8s, opacity 1.8s";
            d.style.transform = "scale(4.5)";
            d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('h-id').innerText = currentID;
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            
            setTimeout(() => { 
                portalTransition('block-hall'); 
                const amb = document.getElementById('snd-ambient');
                amb.volume = 0; amb.play(); fadeAudio(amb, 1, 2000);
            }, 1400);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            
            // Звуки при входе в AI Room (затихание)
            if (nextId === 'block-ai-room') {
                fadeAudio(document.getElementById('snd-ambient'), 0.1, 1000);
                document.getElementById('snd-khe').pause();
                document.getElementById('snd-pour').pause();
            } 
            // Возврат звуков при выходе из AI Room в Бар
            else if (nextId === 'block-bar' && current.id === 'block-ai-room') {
                fadeAudio(document.getElementById('snd-ambient'), 1, 1000);
            }

            if(current) current.style.opacity = "0";
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { 
                    next.classList.add('active'); next.style.opacity = "1";
                    if(nextId === 'block-bar') {
                        setTimeout(() => { document.getElementById('snd-khe').play(); }, 600);
                        setTimeout(() => { document.getElementById('snd-pour').play(); }, 1800);
                    }
                }, 50);
            }, 600);
        }

        function smoothLeave(url) {
            const veil = document.getElementById('black-veil');
            veil.style.display = "block";
            setTimeout(() => { window.location.href = url; }, 500);
        }

        function swapButtons(a, s) { 
            document.getElementById(a).classList.add('btn-sleep'); 
            document.getElementById(s).classList.remove('btn-sleep'); 
        }
    </script>
</body>
</html>
