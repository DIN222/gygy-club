
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.191</title>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        /* ГУГЛ И СКРОЛЛ */
        #google_translate_element { position: fixed !important; top: 15px !important; left: 15px !important; z-index: 10000; }
        .goog-te-menu-frame { max-height: 250px !important; overflow-y: auto !important; }
        .skiptranslate { opacity: 1 !important; }

        /* КНОПКА ВОЗВРАТА (BACK) - ОБЯЗАТЕЛЬНЫЙ АТРИБУТ */
        .btn-back { 
            position: fixed; top: 70px; left: 20px; z-index: 10000; 
            color: var(--gold); font-family: 'Share Tech Mono'; font-size: 24px; 
            cursor: pointer; text-decoration: none; display: none;
        }

        body { top: 0 !important; background: var(--black); color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; width: 100vw; height: 100vh; }

        #main-door { width: 260px; cursor: pointer; transition: transform 2.5s ease-in, opacity 2s ease-in-out; display: block; margin: 0 auto; }

        .btn-gy { 
            min-width: 220px; padding: 14px; background: var(--black); border: 2px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; letter-spacing: 1px; transition: 0.5s; margin: 8px;
        }

        .block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: var(--black); opacity: 0; transition: opacity 0.8s ease; z-index: 100; }
        .block.active { display: flex !important; opacity: 1; }

        #charlie-img { max-height: 35vh; width: auto; margin: 10px 0; object-fit: contain; }

        /* ХОЛЛ */
        .hall-bg { position: absolute; width: 100%; height: 100%; background: url('hall_bg_jpg.jpg') center/cover no-repeat; z-index: -1; }
        .hall-header { position: absolute; top: 8%; width: 100%; text-align: center; z-index: 600; }
        .hall-title { font-size: 38px; color: #fff; font-weight: 900; text-shadow: 0 0 15px var(--gold); }
        .hall-motto { font-family: 'Share Tech Mono'; font-size: 16px; color: var(--gold); letter-spacing: 3px; margin-top: 5px; font-weight: 900; }

        .id-card { position: relative; margin-top: 38vh; width: 260px; padding: 20px; border: 3px solid var(--gold); background: #fdf5e6; border-radius: 12px; display: flex; flex-direction: column; align-items: center; z-index: 500; }

        /* БАР */
        .bar-controls { position: absolute; bottom: 35%; display: flex; flex-direction: column; gap: 15px; z-index: 700; }
        
        .qr-gold-frame { width: 90px; height: 90px; border: 3px solid #d4af37 !important; background: #fff; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .square-box { width: 100px; height: 100px; border: 2px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>
    <div id="gy-back-btn" class="btn-back" onclick="goBack()">←</div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:8px; font-size:16px;">GY-GY PRIVAT</div>
        <img src="charlie.png" id="charlie-img">
        <h1 style="font-size:36px; margin-bottom:10px; font-weight:900;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">АВТОГРАФ, ПОЖАЛУЙСТА</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:18px; text-align:center; margin-bottom:20px; font-weight:900;">В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ</div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-size:10px;">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                <span id="photo-txt" style="color:#000; font-size:9px; font-weight:900;">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="actionSave()">СОХРАНИТЕ</button>
        <button id="btn-final-go" class="btn-gy" disabled onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-bg"></div>
        <div class="hall-header">
            <div class="hall-title">ЭТО ВЫ?</div>
            <div class="hall-motto">ВСЁ БУДЕТ GY-GY</div>
        </div>
        
        <div class="id-card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div class="square-box" style="width:80px; height:80px;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="qr-gold-frame" style="width:80px; height:80px;"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; color:#000; font-size:12px; margin-bottom:15px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; border-width:2px;" onclick="actionConfirm()">ПОДТВЕРЖДАЮ</button>
            <button id="h-tobar" class="btn-gy" disabled style="min-width:100%; border-width:2px; margin-top:10px;" onclick="transitionToBar()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="bar-controls" style="left:3%;">
            <button class="btn-gy" style="min-width:130px; font-size:11px;" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        </div>
        <div class="bar-controls" style="right:3%;">
            <button class="btn-gy" style="min-width:130px; font-size:11px;" onclick="alert('Entering AI Room...')">AI ROOM</button>
        </div>
        <img src="charlie_bar.png" style="height: 80vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        let historyStack = ['block-entrance'];
        const orderNum = localStorage.getItem('gy_order_num') || 1;
        const fullID = `#GY-${orderNum}-${Math.floor(1000 + Math.random() * 8999)}`;

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            const door = document.getElementById('main-door');
            door.style.transform = "scale(10)"; 
            door.style.opacity = "0";
            
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            setupProfile();
            setTimeout(() => { 
                document.getElementById('snd-ambient').play().catch(()=>{});
                portalTransition('block-welcome'); 
            }, 2200);
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => {
                    t.classList.add('active');
                    historyStack.push(id);
                    updateBackBtn();
                }, 50);
            }, 600);
        }

        function goBack() {
            if (historyStack.length > 1) {
                historyStack.pop(); 
                const prevId = historyStack[historyStack.length - 1];
                document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
                setTimeout(() => {
                    document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                    const t = document.getElementById(prevId);
                    t.style.display = 'flex';
                    setTimeout(() => t.classList.add('active'), 50);
                    updateBackBtn();
                }, 600);
            }
        }

        function updateBackBtn() {
            const btn = document.getElementById('gy-back-btn');
            btn.style.display = (historyStack.length > 1 && historyStack[historyStack.length-1] !== 'block-entrance') ? 'block' : 'none';
        }

        function setupProfile() {
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 80, height: 80 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
        }

        function actionSave() {
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').innerText = "АКЦЕПТ";
            document.getElementById('btn-save').style.opacity = "0.3";
            document.getElementById('btn-final-go').disabled = false;
        }

        function actionConfirm() {
            document.getElementById('h-confirm').innerText = "ГОТОВО";
            document.getElementById('h-confirm').style.opacity = "0.3";
            document.getElementById('h-tobar').disabled = false;
        }

        function transitionToBar() {
            document.getElementById('snd-ambient').volume = 0.4;
            portalTransition('block-bar');
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('photo-txt').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
    </script>
</body>
</html>
