<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.31</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        a, button, input { -webkit-appearance: none; outline: none !important; pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; pointer-events: none; border: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* Постоянные атрибуты согласно регламенту 2026-03-07 */
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 1000001; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000000; font-size: 24px; letter-spacing: 5px; font-weight: bold; pointer-events: none; color: var(--gold); }
        
        /* Плавная кнопка возврата (Back-to-Bar) */
        .ui-back-to-bar { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005;
            background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; cursor: pointer; font-family: 'Share Tech Mono'; 
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            opacity: 0; pointer-events: none; display: block;
            border-radius: 4px; transition: opacity 1.5s ease-in-out;
        }
        .ui-back-to-bar.visible { opacity: 1; pointer-events: auto; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .block.active { display: flex !important; opacity: 1; }

        .btn-gy { min-width: 130px; padding: 12px; background: rgba(0,0,0,0.7); border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; font-family: 'Share Tech Mono'; transition: 0.3s; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        /* БАР: ПРЕДЕЛЬНОЕ СБЛИЖЕНИЕ КНОПОК К ЧАРЛИ */
        .bar-ui-container { 
            position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 360px; /* Кнопки стоят почти вплотную к телу */
            z-index: 1000; pointer-events: none; display: flex; flex-direction: column; align-items: center; 
        }
        .bar-side-buttons { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; pointer-events: none; }
        .bar-side-buttons button, .bar-bottom-button button { pointer-events: auto; background: rgba(0,0,0,0.8); }

        .motto-bar { position: absolute; top: 8%; width: 100%; text-align: center; color: var(--gold); font-size: 18px; font-weight: 900; font-style: italic; z-index: 100; pointer-events: none; }
        
        /* КАРТОЧКА ПРОФИЛЯ */
        .id-card-hall { width: 210px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .box-final img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
        
        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; pointer-events: auto !important; z-index: 1000; }
        
        /* ФОНЫ ЗАЛОВ */
        #block-tables { background: url('lounge.jpg') no-repeat center bottom / contain #000; }
        #block-ai-room { background: url('OIG2_vintage_tv_room.jpg') no-repeat center bottom / contain #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>
    <button class="ui-back-to-bar" id="btn-global-back" onclick="portalTransition('block-bar')">Назад в бар</button>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1; z-index: 2000;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block">
        <div style="letter-spacing:10px; margin-bottom:10px; font-size:14px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 32vh; width: auto; margin-bottom: 15px;">
        <div style="font-family: 'Inter', sans-serif; font-size:44px; font-weight:900; margin-bottom:15px; color:var(--gold);">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" style="width:270px; margin-bottom:10px;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" style="width:270px;" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:12px; margin-bottom:25px; align-items:center;">
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold);"></div>
            <div class="box-final" style="border-color:var(--gold); position:relative;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none;">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" style="width:270px;" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" style="width:270px;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:15; opacity:0.6;"></div>
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; margin-bottom:12px; font-family:'Share Tech Mono';">#ID</div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="width:100%; border-color:#000; color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="width:100%; border-color:#000; color:#000;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="motto-bar">«Истина не в вине, а в его количестве»</div>
        <div class="bar-ui-container">
            <div class="bar-side-buttons">
                <button class="btn-gy" style="font-size:10px; min-width:110px;" onclick="portalTransition('block-tables')">СТОЛИКИ</button>
                <button class="btn-gy" style="font-size:10px; min-width:110px;" onclick="portalTransition('block-ai-room')">AI ROOM</button>
            </div>
            <div class="bar-bottom-button">
                <button class="btn-gy" style="font-size:10px; min-width:110px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
            </div>
        </div>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; object-fit: contain;">
    </div>

    <div id="block-tables" class="block"></div>
    <div id="block-ai-room" class="block"></div>

    <script>
        let currentID = "";

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            const backBtn = document.getElementById('btn-global-back');
            const amb = document.getElementById('snd-ambient');

            if(current) current.style.opacity = "0";

            // Логика кнопки возврата и аудио
            if (nextId === 'block-tables' || nextId === 'block-ai-room') {
                fadeAudio(amb, 0, 1000);
                setTimeout(() => { backBtn.classList.add('visible'); }, 600); 
            } else {
                if (amb.paused && nextId !== 'block-entrance') { 
                    amb.volume = 0; amb.play(); fadeAudio(amb, 1, 2000); 
                } else if (!amb.paused) {
                    fadeAudio(amb, 1, 800);
                }
                backBtn.classList.remove('visible');
            }

            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { next.classList.add('active'); next.style.opacity = "1"; }, 50);
            }, 800);
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            const d = document.getElementById('main-door');
            d.style.pointerEvents = "none";
            d.style.transform = "scale(5)"; d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('h-id').innerText = currentID;
            
            document.getElementById('qr-box-reg').innerHTML = "";
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            
            setTimeout(() => { portalTransition('block-welcome'); }, 1800);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result;
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result;
                    document.getElementById('txt-photo').style.display = "none";
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function fadeAudio(audio, target, duration) {
            let start = audio.volume;
            let step = (target - start) / (duration / 50);
            let interval = setInterval(() => {
                audio.volume = Math.max(0, Math.min(1, Math.min(audio.volume + step, 1)));
                if (Math.abs(audio.volume - target) < 0.05) {
                    audio.volume = target;
                    clearInterval(interval);
                    if (target === 0) audio.pause();
                }
            }, 50);
        }

        function swapButtons(a, s) { document.getElementById(a).classList.add('btn-sleep'); document.getElementById(s).classList.remove('btn-sleep'); }
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element'); }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
