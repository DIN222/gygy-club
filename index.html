<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.135</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫК - ФОРСИРОВАНИЕ КЛИКА */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 10000 !important; touch-action: manipulation; }
        .goog-te-gadget-simple { background: rgba(20,20,20,0.9) !important; border: 1px solid var(--gold) !important; padding: 6px 10px !important; border-radius: 4px; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 1s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ДВЕРЬ */
        .door-img { width: 380px; transition: transform 3.5s, opacity 2s, filter 2s; cursor: pointer; }
        .door-dissolve { transform: scale(15); opacity: 0; filter: blur(40px); }

        /* ФИРМЕННАЯ НАДПИСЬ НАД ЧАРЛИ */
        .gy-brand-header { 
            font-family: 'Share Tech Mono', monospace; 
            font-size: 18px; 
            letter-spacing: 8px; 
            color: var(--gold); 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* БАР: ОБЛАКА */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; }
        .cloud-trigger {
            position: absolute; z-index: 150; cursor: pointer;
            background: rgba(255, 255, 255, 0.85); border: 2px solid var(--gold);
            color: #000; font-family: 'Share Tech Mono'; font-weight: 900;
            padding: 12px 18px; border-radius: 30px 30px 30px 5px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            transition: 0.2s; font-size: 11px; text-align: center;
        }
        #cloud-tables { bottom: 54%; left: 8%; }
        #cloud-ai { bottom: 59%; right: 8%; border-radius: 30px 30px 5px 30px; }

        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; transition: 0.3s; }
        .btn-gy:active { filter: brightness(1.8); }
        .btn-inactive { opacity: 0.1; pointer-events: none; }

        .square-box { width: 90px; height: 90px; border: 3px solid var(--gold); background: #fff; position: relative; overflow: hidden; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>
    <audio id="snd-cough"><source src="cough.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_wine.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="gy-brand-header">GY-GY PRIVAT</div>
        <div style="width:260px; height:260px; -webkit-mask-image:radial-gradient(circle, black 55%, transparent 95%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:48px; margin-top:15px; letter-spacing: 4px; font-weight: 900;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')" style="margin-top:20px;">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-weight:900; font-size:18px; margin-bottom:25px; text-align:center;">«В КАЖДОЙ ШУТКЕ ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:35px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:900;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label" style="color:#000; font-size:10px; font-weight:bold; position:absolute; top:38px; left:25px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-inactive" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.85;"></div>
        <h2 style="font-size:34px; color:#fff; text-shadow:0 0 20px var(--violet); z-index:100; text-transform:uppercase;">ВСЕ БУДЕТ GY-GY</h2>
        <div style="position: absolute; right: 20px; bottom: 20px; width: 220px; padding: 15px; border: 3.5px solid var(--gold); background: #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 110;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:80px; height:80px; border:1.5px solid var(--gold); object-fit:cover;">
                <div id="h-qr" style="width:80px; height:80px; border:1.5px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:12px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:11px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:11px; background:#000; display:none;" onclick="thePerfectJazzTransition()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div style="position: absolute; top: 60px; width: 100%; text-align: center; font-size: 20px; font-weight: 900; z-index: 200; color: var(--gold); text-shadow: 2px 2px 4px #000;">«Истина не в вине, а в его количестве»</div>
        <div style="position: relative; width: 100%; height: 85vh; display: flex; align-items: flex-end; justify-content: center;">
            <div id="cloud-tables" class="cloud-trigger" onclick="alert('Забронировано!')">ЗА СТОЛИКИ</div>
            <div id="cloud-ai" class="cloud-trigger" onclick="window.location.href='ai_room.html'">В AI ROOM</div>
            <img src="charlie_bar.png" style="height: 92%; width: auto; z-index: 5; pointer-events: none;">
        </div>
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        const ambient = document.getElementById('snd-ambient');
        const jazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        function thePerfectJazzTransition() {
            let vol = 1.0;
            let fadeOut = setInterval(() => {
                if (vol > 0.1) { vol -= 0.1; ambient.volume = vol; }
                else { clearInterval(fadeOut); ambient.pause(); }
            }, 60);

            document.getElementById('block-hall').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('block-hall').style.display = 'none';
                document.getElementById('block-bar').style.display = 'flex';
                
                // Эффект Чарли
                setTimeout(() => {
                    document.getElementById('snd-cough').play();
                    setTimeout(() => {
                        document.getElementById('snd-pour').play(); 
                        setTimeout(() => {
                            document.getElementById('block-bar').style.opacity = '1';
                            jazz.volume = 0;
                            jazz.play();
                            let volIn = 0;
                            let fadeIn = setInterval(() => {
                                if (volIn < 0.9) { volIn += 0.05; jazz.volume = volIn; }
                                else { clearInterval(fadeIn); }
                            }, 200);
                        }, 1800);
                    }, 800);
                }, 500);
            }, 1200);
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('door-dissolve');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { ambient.play(); portalTransition('block-welcome'); }, 2500); 
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 700);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').classList.remove('btn-inactive');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
