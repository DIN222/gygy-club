<style>
    .cloud-btn {
        position: absolute; 
        z-index: 500; 
        background: #fff; 
        border: 2px solid var(--gold); 
        padding: 14px 22px; 
        border-radius: 40px; 
        font-family: 'Share Tech Mono'; 
        font-weight: 900; 
        font-size: 14px; 
        color: #000; 
        cursor: pointer; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.7); 
        white-space: nowrap; 
        transition: 0.2s;
    }
    .cloud-btn:active { transform: scale(0.95); }
    .cloud-btn:after {
        content: ''; position: absolute; bottom: -8px; width: 15px; height: 15px;
        background: #fff; border-right: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
    }
    
    /* ЛЕВОЕ ОБЛАКО: ЗА СТОЛИКИ */
    #btn-tables { 
        bottom: 50%; 
        left: 5%; 
        border-bottom-left-radius: 2px; 
    }
    #btn-tables:after { left: 15px; transform: rotate(45deg); }
    
    /* ПРАВОЕ ОБЛАКО: В AI ROOM */
    #btn-ai { 
        bottom: 58%; 
        right: 5%; 
        border-bottom-right-radius: 2px; 
    }
    #btn-ai:after { right: 15px; transform: rotate(-45deg); }
</style>

<div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
    <div style="position: absolute; top: 80px; font-weight: 900; color: var(--gold); text-align: center; width:100%; z-index:100; font-size: 24px;">«Истина не в вине, а в его количестве»</div>
    
    <button id="btn-tables" class="cloud-btn" onclick="alert('Чарли: Все столики забронированы!')">ЗА СТОЛИКИ</button>
    <button id="btn-ai" class="cloud-btn" onclick="window.location.href='ai_room.html'">В AI ROOM</button>
    
    <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
</div>
