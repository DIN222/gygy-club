<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.299</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #000000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; outline: none !important; user-select: none !important; -webkit-user-select: none !important; -webkit-touch-callout: none !important; }
        html, body { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; position: fixed; }

        /* UI */
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 10000001; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 10000001; font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; letter-spacing: 5px; color: var(--gold); pointer-events: none; }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000 !important; z-index: 10; opacity: 0; transition: opacity 0.8s ease; }
        .block.active { display: flex !important; opacity: 1; }

        /* Защита от оцифровки */
        .shield { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }
        .bg-img { position: absolute; inset: 0; pointer-events: none; z-index: 1; -webkit-user-drag: none; }

        /* Кнопки v4.3 */
        .btn-gy { min-width: 270px; padding: 15px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; margin: 10px 0; z-index: 1000; position: relative; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        /* Холл */
        .hall-card { position: relative; z-index: 1000; width: 260px; padding: 18px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; margin-top: 50px; }
        
        #main-door { width: 280px; height: 380px; background: url('door_1.jpg') center/contain no-repeat; cursor: pointer; z-index: 1000; transition: transform 1.8s ease, opacity 1.8s ease; }
        #black-veil { position: fixed; inset: 0; background: #000 !important; z-index: 2147483647; display: none; }
        .bar-quote { font-family: 'Share Tech Mono'; font-size: 20px; font-weight: 900; position: absolute; top: 10%; text-align: center; width: 100%; z-index: 100; font-style: italic; pointer-events: none; }
        .nav-bar-btns { position: absolute; bottom: 12%; z-index: 2000; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="black-veil"></div>
    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <div class="shield" style="pointer-events: all;"></div>
        <div id="main-door" onclick="handleDoor()"></div>
    </div>
    
    <div id="block-welcome" class="block">
        <div class="bg-img" style="background: url('charlie.png') center/contain no-repeat; height: 35vh; top: 20%;"></div>
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; margin-bottom:280px; font-size:16px; z-index:100;">GY-GY PRIVAT</div>
        <div style="font-size:48px; font-weight:900; margin-bottom:20px; font-style:italic; z-index:100;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:18px; margin-bottom:30px; font-weight:900; z-index:100;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:12px; margin-bottom:30px; z-index:100;">
            <div style="width:90px; height:90px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-size:11px;" id="id-label">#ID</div>
            <div style="width:90px; height:90px; border:2px solid var(--gold); background:#fff; padding:5px;" id="qr-box-reg"></div>
            <div style="width: 90px; height: 90px; border: 2px solid var(--gold); background: #fff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:3000; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="bg-img" style="background:url('hall_bg_jpg.jpg') center/cover;"></div>
        <div style="position:absolute; top:75px; width:100%; text-align:center; z-index:100; font-family:'Share Tech Mono'; font-size:24px; font-weight:900; letter-spacing: 4px;">ВСЁ БУДЕТ GY-GY</div>
        <div class="hall-card">
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:14px; margin-bottom:10px;">#GY-ID-PENDING</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div style="width:80px; height:80px; border:2px solid #000; background:#fff; overflow:hidden;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div id="h-qr" style="width:80px; height:80px; border:2px solid #000; background:#fff;"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:5px 0;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000; padding:10px; margin:5px 0;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="justify-content: flex-end;">
        <div class="bg-img" style="background: url('charlie_bar.png') bottom center/contain no-repeat;"></div>
        <div class="bar-quote">«Истина не в вине, а в его количестве»</div>
        <div class="nav-bar-btns">
            <button class="btn-gy" style="min-width:140px; font-size:11px;" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
            <button class="btn-gy" style="min-width:140px; font-size:11px;" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
        </div>
    </div>

    <div id="block-ai-room" class="block" style="background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important;">
        <button class="btn-gy" style="margin-top: auto; margin-bottom: 80px;" onclick="portalTransition('block-bar')">ВЕРНУТЬСЯ К СТОЙКЕ</button>
    </div>

    <script>
        let currentID = "";
        function handleDoor() {
            document.getElementById('snd-door').play();
            const d = document.getElementById('main-door');
            setTimeout(() => { d.style.transform = "scale(4.5)"; d.style.opacity = "0"; }, 50);
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 80, height: 80 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 80, height: 80 });
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play(); }, 1400);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(current) current.style.opacity = "0";
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { 
                    next.classList.add('active'); next.style.opacity = "1";
                    if(nextId === 'block-bar' && current.id === 'block-hall') {
                        setTimeout(() => { document.getElementById('snd-khe').play(); }, 500);
                        setTimeout(() => { document.getElementById('snd-pour').play(); }, 1600);
                    }
                }, 50);
            }, 700);
        }

        function smoothLeave(url) {
            document.getElementById('black-veil').style.display = "block";
            setTimeout(() => { window.location.href = url; }, 800);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }
        function swapButtons(a, s) { document.getElementById(a).classList.add('btn-sleep'); document.getElementById(s).classList.remove('btn-sleep'); }
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element'); }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
