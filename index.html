
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.231</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* СТАНДАРТНЫЙ ГУГЛ - БЕЗ ЭКСПЕРИМЕНТОВ */
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 10000000; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; }
        #ui-logo-top { position: fixed; top: 15px; right: 25px; z-index: 5000; color: var(--gold); font-size: 24px; font-weight: bold; letter-spacing: 5px; font-family: 'Share Tech Mono', monospace; }

        /* ЭФФЕКТ ПЕРЕХОДА */
        #fade-overlay { position: fixed; inset: 0; background: #000; z-index: 999999; pointer-events: none; opacity: 0; transition: opacity 0.8s ease; }

        /* БЛОКИ */
        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 10; padding: 15px; }
        .block.active { display: flex !important; opacity: 1; }

        /* КНОПКИ С ЗОЛОТЫМ КОНТУРОМ */
        .btn-gy { min-width: 280px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; margin: 6px 0; transition: 0.3s; }
        .btn-gy:hover { background: rgba(212, 175, 55, 0.1); }
        .btn-sleep { opacity: 0.1 !important; pointer-events: none !important; }

        /* ЗОЛОТЫЕ РАМКИ */
        .qr-gold-frame { 
            width: 105px; height: 105px; border: 2px solid var(--gold); 
            padding: 4px; background: #fff; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; position: relative; 
        }

        /* КАРТОЧКА В ХОЛЛЕ */
        .id-card { 
            position: absolute; left: 50%; top: 60%; transform: translate(-50%, -50%); 
            width: 300px; padding: 20px; border: 3px solid var(--gold); 
            background: #F5F5DC; border-radius: 15px; display: flex; flex-direction: column; 
            align-items: center; color: #000; z-index: 500; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        /* КНОПКИ У ЧАРЛИ (БЕЗ ЗАЛИВКИ) */
        .bar-btn-simple { 
            position: absolute; z-index: 500; background: transparent; 
            border: 2px solid var(--gold); padding: 12px 20px; color: var(--gold);
            font-family: 'Share Tech Mono'; font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .bar-btn-simple:hover { background: rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>
    <div id="google_translate_element"></div>
    <div id="ui-logo-top">GY-GY</div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" style="width:280px; cursor:pointer; transition: 2.5s ease-in-out;" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:8px; font-size:16px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 30vh; margin: 20px 0;">
        <h1 style="font-size:38px; font-weight: 900; color: var(--gold);">WELCOME</h1>
        <button id="btn-welcome-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div style="width:105px; height:105px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-weight:900;" id="id-box">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="qr-gold-frame">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="photo-label" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ ДАННЫЕ</button>
        <button id="btn-go-hall-reg" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div class="id-card">
            <div style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:10px; color:#000;">ID VERIFICATION</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div class="qr-gold-frame" style="border-color:#000;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="qr-gold-frame" style="border-color:#000;"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:18px; margin-bottom:15px; color:#000;"></div>
            <button id="btn-confirm-hall" class="btn-gy" style="min-width:100%; border-color:#000; color:#000;" onclick="confirmHall()">ПОДТВЕРДИТЬ</button>
            <button id="btn-go-bar" class="btn-gy btn-sleep" style="min-width:100%; background:#000; color:var(--gold);" onclick="goToBar()">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button style="bottom: 15%; left: 8%;" class="bar-btn-simple" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
        <button style="bottom: 15%; right: 8%;" class="bar-btn-simple" onclick="smoothLeave('ai_room_retro_base.html')">В AI ROOM</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none;">
    </div>

    <script>
        let currentID = "";

        function handleDoor() {
            try { document.getElementById('snd-door').play(); } catch(e){}
            const door = document.getElementById('main-door');
            door.style.transform = "scale(15)"; 
            door.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
            
            setTimeout(() => {
                new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 90, height: 90 });
                new QRCode(document.getElementById("h-qr"), { text: currentID, width: 90, height: 90 });
                document.getElementById('id-box').innerText = currentID;
                document.getElementById('h-id').innerText = currentID;
            }, 300);

            setTimeout(() => { 
                try { document.getElementById('snd-ambient').play(); } catch(e){} 
                portalTransition('block-welcome'); 
            }, 2500);
        }

        function saveReg() { 
            try { document.getElementById('snd-pour').play(); } catch(e){}
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall-reg').classList.remove('btn-sleep');
            document.getElementById('btn-welcome-hall').classList.remove('btn-sleep');
            localStorage.setItem('gygy_id', currentID);
        }

        function confirmHall() {
            try { document.getElementById('snd-pour').play(); } catch(e){}
            document.getElementById('btn-confirm-hall').innerText = 'ПОДТВЕРЖДЕНО';
            document.getElementById('btn-go-bar').classList.remove('btn-sleep');
        }

        function goToBar() { portalTransition('block-bar'); }

        function smoothLeave(url) {
            const overlay = document.getElementById('fade-overlay');
            const amb = document.getElementById('snd-ambient');
            if (amb) sessionStorage.setItem('gyambient_pos', amb.currentTime);
            overlay.style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                if(t) { t.style.display = 'flex'; setTimeout(() => t.classList.add('active'), 50); }
            }, 600);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('photo-label').style.display = "none";
                    document.getElementById('h-photo').src = e.target.result;
                    localStorage.setItem('gygy_avatar', e.target.result);
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
</body>
</html>
