<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.140</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 10000; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 1.2s ease; z-index: 10;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ДВЕРИ */
        .door-img { width: 350px; transition: transform 3s ease-in, opacity 2.5s ease-out; cursor: pointer; }
        .door-dissolve { transform: scale(15); opacity: 0; }

        /* РЕГИСТРАЦИЯ: ИСПРАВЛЕНИЕ ФОТО */
        .square-box { width: 90px; height: 90px; border: 3px solid var(--gold); background: #fff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .photo-label { color: #000; font-size: 10px; font-weight: bold; position: absolute; z-index: 1; pointer-events: none; }
        #pp { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }

        /* БАР: СОВМЕЩЕНИЕ ОБЛАКОВ */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; }
        .bar-content { position: relative; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        .cloud-btn {
            position: absolute; z-index: 100; background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--gold); padding: 10px 15px; border-radius: 25px;
            font-family: 'Share Tech Mono'; font-weight: 900; font-size: 11px; color: #000;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); white-space: nowrap;
        }
        #btn-tables { bottom: 52%; left: 12%; border-bottom-left-radius: 2px; }
        #btn-ai { bottom: 58%; right: 12%; border-bottom-right-radius: 2px; }

        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; margin-top: 10px; }
        .btn-inactive { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:5px; margin-bottom:15px; color:var(--gold);">GY-GY PRIVAT</div>
        <div style="width:260px; height:260px; -webkit-mask-image:radial-gradient(circle, black 55%, transparent 95%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:45px; margin-top:10px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-weight:900; font-size:16px; margin-bottom:25px; text-align:center;">«В КАЖДОЙ ШУТКЕ ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-weight:900;">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <span class="photo-label">ФОТО</span>
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp">
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-inactive" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.7;"></div>
        <h2 style="font-size:30px; color:#fff; text-shadow:0 0 15px var(--violet); z-index:100;">ВСЕ БУДЕТ GY-GY</h2>
        <div style="position: absolute; right: 20px; bottom: 20px; width: 210px; padding: 15px; border: 3px solid var(--gold); background: #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 110;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:75px; height:75px; border:1px solid var(--gold); object-fit:cover;">
                <div id="h-qr" style="width:75px; height:75px; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:12px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:11px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:11px; background:#000; display:none;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-content">
            <div style="position: absolute; top: 60px; font-weight: 900; color: var(--gold);">«Истина не в вине, а в его количестве»</div>
            
            <div id="btn-tables" class="cloud-btn" onclick="alert('Места забронированы!')">ЗА СТОЛИКИ</div>
            <div id="btn-ai" class="cloud-btn" onclick="window.location.href='ai_room.html'">В AI ROOM</div>
            
            <img src="charlie_bar.png" style="height: 85%; width: auto; pointer-events: none;">
        </div>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        const sndDoor = document.getElementById('snd-door');
        const sndAmbient = document.getElementById('snd-ambient');
        const sndJazz = document.getElementById('snd-jazz');

        function handleDoor() {
            sndDoor.play(); // Звук двери
            document.getElementById('main-door').classList.add('door-dissolve');
            
            // Запуск приветствия (ваш файл)
            new Audio('charlie_welcome.mp3').play().catch(e => console.log("Файл welcome еще не добавлен"));
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 90, height: 90 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                sndAmbient.play(); 
                portalTransition('block-welcome'); 
            }, 2500); 
        }

        function goToBar() {
            // Остановка звуков Холла
            sndAmbient.pause();
            sndAmbient.currentTime = 0;

            // Переход в бар
            portalTransition('block-bar');

            // Эффекты бара (ваш файл с пробкой и вином)
            const fx = new Audio('charlie_bar_fx.mp3');
            fx.play().catch(e => console.log("Файл FX не найден"));
            
            fx.onended = () => {
                sndJazz.play(); // Запуск джаза после эффектов
            };
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const target = document.getElementById(id);
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }, 800);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                const img = document.getElementById('pp');
                img.src = e.target.result; 
                img.style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').classList.remove('btn-inactive');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
