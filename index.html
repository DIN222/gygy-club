
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.187</title>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --black: #000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        #google_translate_element { position: fixed !important; top: 15px !important; left: 15px !important; z-index: 9999999 !important; }
        body { background: var(--black); color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; width: 100%; height: 100%; }

        /* ДВЕРЬ */
        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s ease-in, opacity 2s ease-in-out; }

        .btn-gy { 
            min-width: 240px; padding: 16px; background: var(--black); border: 3px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; letter-spacing: 2px; transition: 0.8s; margin: 10px;
        }
        .btn-gy:disabled { opacity: 0.1 !important; pointer-events: none; border-color: #444; color: #444; }

        .block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: var(--black); opacity: 0; transition: opacity 1.2s ease-in-out; z-index: 100; }
        .block.active { display: flex !important; opacity: 1; }

        /* ХОЛЛ - КАРТОЧКА ОПУЩЕНА */
        .hall-bg { position: absolute; width: 100%; height: 100%; background: url('hall_bg_jpg.jpg') center/cover no-repeat; z-index: -1; }
        .id-card { position: relative; margin-top: 15vh; width: 270px; padding: 25px; border: 3px solid var(--gold); background: #fdf5e6; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 500; }

        /* БАР - КНОПКИ РАЗДВИНУТЫ */
        .bar-controls { position: absolute; bottom: 45%; display: flex; flex-direction: column; gap: 20px; z-index: 500; }
        
        .qr-gold-frame { width: 90px; height: 90px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .square-box { width: 100px; height: 100px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:18px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 40vh; margin: 20px 0;">
        <h1 style="font-size:48px; margin-bottom:15px; font-weight:900;">WELCOME</h1>
        
        <button id="btn-member-go" class="btn-gy" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
        <button id="btn-guest-reg" class="btn-gy" onclick="portalTransition('block-identity')">АВТОГРАФ, ПОЖАЛУЙСТА</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:22px; text-align:center; margin-bottom:30px; font-weight:900;">В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ</div>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-size:11px; font-weight:900;">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute; z-index:5;">
                <span id="photo-txt" style="color:#000; font-size:10px; font-weight:900;">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="actionSave()">СОХРАНИТЕ</button>
        <button id="btn-final-go" class="btn-gy" disabled onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div class="hall-bg"></div>
        <div style="position:absolute; top:8%; width:100%; text-align:center; font-size:42px; color:#fff; font-weight:900; text-shadow:0 0 20px var(--gold);">ЭТО ВЫ?</div>
        
        <div class="id-card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div class="square-box" style="width:90px; height:90px;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="qr-gold-frame" style="width:90px; height:90px;"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; color:#000; font-size:14px; margin-bottom:15px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; margin:0; border-width:2px; padding:12px;" onclick="actionConfirm()">ПОДТВЕРЖДАЮ</button>
            <button id="h-tobar" class="btn-gy" disabled style="min-width:100%; margin:10px 0 0 0; border-width:2px; padding:12px;" onclick="transitionToBar()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="bar-controls" style="left:5%;">
            <button class="btn-gy" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        </div>
        <div class="bar-controls" style="right:5%;">
            <button class="btn-gy" onclick="alert('AI Room...')">AI ROOM</button>
        </div>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        const orderNum = localStorage.getItem('gy_order_num') || 1;
        const fullID = `#GY-${orderNum}-${Math.floor(1000 + Math.random() * 8999)}`;

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            const door = document.getElementById('main-door');
            door.style.transform = "scale(10)"; 
            door.style.opacity = "0";
            
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            setupProfile();

            setTimeout(() => { 
                document.getElementById('snd-ambient').play().catch(()=>{});
                portalTransition('block-welcome'); 
                // ВСЕГДА ВЫЗЫВАЕМ ЛОГИКУ НОВИЧКА ДЛЯ ТЕСТА
                document.getElementById('btn-member-go').disabled = true;
                document.getElementById('btn-guest-reg').disabled = false;
            }, 2200);
        }

        function setupProfile() {
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 80, height: 80 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
        }

        function actionSave() {
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').innerText = "АКЦЕПТ";
            document.getElementById('btn-save').style.opacity = "0.3";
            document.getElementById('btn-final-go').disabled = false;
        }

        function actionConfirm() {
            document.getElementById('h-confirm').innerText = "ГОТОВО";
            document.getElementById('h-confirm').style.opacity = "0.3";
            document.getElementById('h-tobar').disabled = false;
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 100);
            }, 800);
        }

        // ПЛАВНЫЙ ПЕРЕХОД В БАР С ЗАТУХАНИЕМ ЗВУКА
        function transitionToBar() {
            const ambient = document.getElementById('snd-ambient');
            let vol = 1.0;
            const fadeInterval = setInterval(() => {
                if (vol > 0.05) { vol -= 0.05; ambient.volume = vol; } 
                else { ambient.pause(); clearInterval(fadeInterval); }
            }, 100);

            portalTransition('block-bar');
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('photo-txt').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
    </script>
</body>
</html>
