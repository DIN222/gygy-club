<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY PRIVAT v4.3.96</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* --- СТЕЛС-ПЕРЕВОДЧИК --- */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 3000; opacity: 0.4; transition: 0.3s; }
        #google_translate_element:hover { opacity: 1; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; }
        #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip { display: none !important; }
        .goog-text-highlight { background: none !important; box-shadow: none !important; }
        .goog-te-gadget-simple { background: rgba(0,0,0,0.8) !important; border: 1px solid var(--gold) !important; padding: 5px !important; border-radius: 5px; }
        .goog-te-gadget-simple span { color: var(--gold) !important; font-family: 'Share Tech Mono' !important; }

        /* --- ЛОГИКА БЛОКОВ --- */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 2s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* Дверь */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 150; }
        .zoom-in-open { transform: scale(18); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* Чарли Welcome */
        .charlie-wrap {
            width: 270px; height: 270px;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 85%);
            mask-image: radial-gradient(circle, black 40%, transparent 85%);
            margin-bottom: 5px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-size: 55px; font-weight: 900; letter-spacing: 12px; margin-bottom: 30px; }

        /* Кнопки (Строгая статика) */
        .btn-gy { 
            min-width: 210px; padding: 12px 30px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0; outline: none;
        }
        .btn-disabled { border-color: #333; color: #333; pointer-events: none; opacity: 0.5; }

        /* Регистрация */
        .square-box { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
        .photo-box { background: #fff; border: 1px solid var(--gold); position: relative; color: #000; overflow: hidden; }

        /* Холл */
        .neon-text { 
            color: #fff; text-shadow: 0 0 15px var(--indigo), 0 0 30px var(--indigo); 
            letter-spacing: 5px; margin-bottom: 40px; font-size: 24px; font-weight: 900;
        }
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 195px; padding: 15px; border: 1px solid var(--cyan); 
            background: rgba(0,0,0,0.95); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .card-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .hall-mini-qr { width: 75px; height: 75px; background: #fff; padding: 2px; }

        /* Бар */
        .bar-container { width: 100%; height: 100%; position: relative; }
        .bar-bg { width: 100%; height: 100%; object-fit: contain; }
        .bar-label { position: absolute; top: 12%; width: 100%; text-align: center; font-size: 18px; color: #fff; text-shadow: 0 0 10px var(--cyan); font-style: italic; }
        .nav-zone { position: absolute; cursor: pointer; z-index: 20; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-champagne"><source src="champagne_sequence.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index: 200;">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block" style="transition: opacity 3.5s ease-in-out;">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px; opacity: 0.9;">GY-GY PRIVAT</p>
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-style: italic; margin-bottom: 35px; opacity: 0.8;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="border:1px solid var(--cyan); color:var(--cyan);">ID</div>
            <div id="qr-box-reg" class="square-box" style="background:#fff;"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1; opacity: 0.4;"></div>
        <h2 class="neon-text">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <div class="card-row">
                <img id="h-photo" style="width:75px; height:75px; background:#333; object-fit:cover;">
                <div id="h-qr" class="hall-mini-qr"></div>
            </div>
            <div id="h-id" style="color:var(--cyan); font-family:'Share Tech Mono'; font-size:10px; margin-bottom:15px; text-align: center;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; border-color:var(--cyan); color:var(--cyan);" onclick="startBar()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-container">
            <div class="bar-label">ИСТИНА НЕ В ВИНЕ, А В ЕГО КОЛИЧЕСТВЕ</div>
            <img src="charlie_bar.png" class="bar-bg">
            <div class="nav-zone" style="left:12%; bottom:35%; width:25%; height:25%;" onclick="location.href='tables.html'"></div>
            <div class="nav-zone" style="right:12%; bottom:25%; width:25%; height:25%;" onclick="location.href='ai_room.html'"></div>
        </div>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2600);
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const current = document.querySelector('.block.active');
            if(current) current.style.opacity = '0';
            setTimeout(() => {
                blocks.forEach(b => { b.classList.remove('active'); b.style.display = 'none'; b.style.opacity = '0'; });
                const next = document.getElementById(id);
                next.style.display = 'flex';
                void next.offsetWidth; 
                next.classList.add('active');
                next.style.opacity = '1';
            }, 1000);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.3';
            document.getElementById('btn-save').innerText = 'ГОТОВО';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display='none';
            document.getElementById('h-tobar').style.display='block';
        }

        function startBar() {
            document.getElementById('snd-ambient').pause();
            portalTransition('block-bar');
            setTimeout(() => { document.getElementById('snd-champagne').play(); }, 1000);
            setTimeout(() => {
                const jazz = document.getElementById('snd-jazz');
                jazz.volume = 0.6; jazz.play();
            }, 4500);
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
