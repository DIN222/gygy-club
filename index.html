<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY PRIVAT v4.3.98</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* --- ПЕРЕВОДЧИК С ФИКСОМ СКРОЛЛА --- */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 3000; opacity: 0.6; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        /* Разрешаем скролл списка языков */
        .goog-te-menu-frame { max-height: 350px !important; overflow-y: auto !important; }
        .goog-te-gadget-simple { background: rgba(0,0,0,0.8) !important; border: 1px solid var(--gold) !important; padding: 5px !important; border-radius: 4px; }
        .goog-te-gadget-simple span { color: var(--gold) !important; font-family: 'Share Tech Mono' !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 2s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* --- СЦЕНА 2: УМЕНЬШЕННЫЙ ЧАРЛИ --- */
        .charlie-welcome-wrap {
            width: 220px; height: 220px; /* Уменьшили с 270px */
            -webkit-mask-image: radial-gradient(circle, black 45%, transparent 90%);
            mask-image: radial-gradient(circle, black 45%, transparent 90%);
            margin-bottom: 20px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-size: 48px; font-weight: 900; letter-spacing: 10px; margin-bottom: 25px; }

        /* --- РЕГИСТРАЦИЯ --- */
        .qr-gold-frame { border: 2px solid var(--gold); background: #fff; padding: 4px; display: flex; }
        .photo-box-reg { background: #fff; border: 1px solid var(--gold); position: relative; color: #000; overflow: hidden; display: flex; align-items: center; justify-content: center;}

        /* --- ХОЛЛ: БЕЛЫЙ ФОН --- */
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 195px; padding: 15px; border: 1px solid var(--gold); 
            background: #ffffff; border-radius: 12px; /* Чисто белый фон */
            display: flex; flex-direction: column; align-items: center;
        }
        .hall-id-text { color: #000; font-family: 'Share Tech Mono'; font-size: 11px; margin-bottom: 12px; font-weight: bold; }

        .btn-gy { 
            min-width: 200px; padding: 12px 25px; background: #000; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0;
        }
        .btn-disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index: 100;">
        <img src="door_1.jpg" style="width:60vw; max-width:320px; cursor:pointer;" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 5px; font-size: 12px; margin-bottom: 15px;">GY-GY PRIVAT</p>
        <div class="charlie-welcome-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="margin-bottom: 25px; font-size: 14px; letter-spacing: 2px;">IDENTIFICATION</div>
        <div style="display:flex; gap:12px; margin-bottom:35px;">
            <div id="id-box" class="qr-gold-frame" style="width:75px; height:75px; color:#000; font-size:9px; align-items:center; justify-content:center; font-weight:bold;">ID</div>
            <div id="qr-box-reg" class="qr-gold-frame"></div> <div class="qr-gold-frame photo-box-reg" style="width:75px; height:75px;">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span style="font-size:9px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.4; z-index:-1;"></div>
        <h2 style="color:#fff; text-shadow:0 0 10px var(--indigo); letter-spacing:4px; margin-bottom:30px;">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <div style="border:1px solid #ddd; background:#fff;"><img id="h-photo" style="width:70px; height:70px; object-fit:cover;"></div>
                <div id="h-qr" style="width:70px; height:70px; background:#fff; border:1px solid #ddd; padding:2px;"></div>
            </div>
            <div id="h-id" class="hall-id-text"></div>
            <button class="btn-gy" style="min-width:100%; font-size:10px; background:#000; color:var(--gold);" onclick="alert('В БАР...')">В БАР</button>
        </div>
    </div>

    <script>
        // Генерация ID: № Порядковый-Случайный
        let visitCount = localStorage.getItem('visitCount') || 1;
        const randomNum = Math.floor(1000 + Math.random() * 8999);
        const fullID = `№${visitCount}-${randomNum}`;
        localStorage.setItem('visitCount', parseInt(visitCount) + 1);

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            // Генерация QR
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 67, height: 67 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 66, height: 66 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 1000);
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
            const next = document.getElementById(id);
            next.style.display = 'flex';
            setTimeout(() => { next.classList.add('active'); }, 50);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.3';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
