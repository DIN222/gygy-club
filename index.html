<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.4.52 | FULL MASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --door-wood: #3E2723; --violet: #8A2BE2; --neon-glow: rgba(138, 43, 226, 0.6); }
        
        * { -webkit-tap-highlight-color: transparent !important; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; outline: none !important; }
        a, button, input { -webkit-appearance: none; outline: none !important; pointer-events: auto !important; }
        img { -webkit-user-drag: none !important; pointer-events: none; border: none !important; }

        html, body { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; margin:0; }
        
        /* UI ЭЛЕМЕНТЫ */
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 1000001; }
        .ui-header-right { position: fixed; top: 18px; right: 25px; z-index: 1000000; font-size: 24px; letter-spacing: 5px; font-weight: bold; color: var(--gold); pointer-events: none; }
        
        .ui-back-to-bar { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000005;
            background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; cursor: pointer; font-family: 'Share Tech Mono'; 
            font-size: 14px; text-transform: uppercase; display: none; border-radius: 4px; opacity: 0; transition: opacity 0.5s ease;
        }

        .block { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
        .block.active { display: flex !important; opacity: 1; pointer-events: auto; }

        /* КРАСИВЫЙ ШРИФТ ДЛЯ ЦИТАТ */
        .quote-text { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; color: var(--gold); 
            text-align: center; max-width: 85%; line-height: 1.3; margin-bottom: 30px; letter-spacing: 1px;
        }

        .btn-gy { min-width: 270px; padding: 14px; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 900; margin: 8px 0; font-family: 'Share Tech Mono'; transition: 0.3s; pointer-events: auto !important; }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        /* БАРНЫЙ КОНТЕЙНЕР */
        .bar-ui-container { position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%); width: 100%; max-width: 380px; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .bar-side-buttons { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; pointer-events: none; }
        .bar-side-buttons button, .bar-bottom-button button { pointer-events: auto; min-width: 145px; background: rgba(0,0,0,0.6); }

        /* ID КАРТОЧКА В ХОЛЛЕ */
        .id-card-hall { position: absolute; top: 72%; left: 50%; transform: translate(-50%,-50%); width: 220px; padding: 15px; border: 2px solid var(--gold); background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; z-index: 30; }
        .box-final { width: 85px; height: 85px; border: 2px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        #main-door { width: 280px; cursor: pointer; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; z-index: 50; pointer-events: auto !important; }
        
        #block-tables { background: url('lounge.jpg') no-repeat center bottom / contain #000; }
        .lamp-zone { position: absolute; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; z-index: 100; background: radial-gradient(circle, var(--neon-glow) 0%, transparent 75%); border: 1px solid var(--violet); box-shadow: 0 0 18px var(--neon-glow); transform: translate(-50%, -50%); pointer-events: auto !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>
    <button class="ui-back-to-bar" id="btn-global-back" onclick="portalTransition('block-bar')">Назад в бар</button>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1; display: flex;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>

    <div id="block-welcome" class="block" style="height: 90vh; top: 55%; transform: translateY(-50%);">
       <div class="quote-text" style="margin-bottom: 10px;">«В каждой шутке есть доля виски»</div>
        <img src="horse_welcome.png" style="max-height: 45vh; width: auto; margin-bottom: 5px;">
       <div style="font-family: 'Inter', sans-serif; font-size:44px; font-weight:900; margin-bottom:5px; color:var(--gold);">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПОЛУЧИТЬ ID</button>
    </div>

    <div id="block-identity" class="block">
        <div class="quote-text">«Шампанского много не бывает»</div>
        
        <div style="display:flex; gap:12px; margin-bottom:25px; align-items:center;">
            <div class="box-final" style="background:transparent; border-color:var(--gold); color:var(--gold); font-size:11px; font-family:'Share Tech Mono';" id="id-label">#ID</div>
            <div class="box-final" id="qr-box-reg" style="border-color:var(--gold);"></div>
            <div class="box-final" style="border-color:var(--gold); position:relative;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОЙТИ В ХОЛЛ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:15;"></div>
        <div style="position:absolute; top: 8%; width: 100%; text-align: center; color: var(--door-wood); font-size: 38px; font-weight: 900; font-style: italic; font-family: 'Playfair Display', serif; z-index: 25;">«Всё будет GY-GY»</div>
        <div class="id-card-hall">
            <div id="h-id" style="font-weight:900; font-size:14px; margin-bottom:12px;">#ID</div>
            <div style="display:flex; gap:15px; margin-bottom:12px;">
                <div class="box-final"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="box-final" id="h-qr"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000; padding:10px;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000; padding:10px;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="quote-text" style="position:absolute; top:8vh; z-index:100;">«Истина не в вине, а в его количестве»</div>
        <div class="bar-ui-container">
            <div class="bar-side-buttons">
                <button class="btn-gy" style="font-size:12px;" onclick="portalTransition('block-tables')">ЗА СТОЛИКИ</button>
                <button class="btn-gy" style="font-size:12px;" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
            </div>
            <div class="bar-bottom-button">
                <button class="btn-gy" style="font-size:12px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
            </div>
        </div>
        <img src="charlie_bar.png" style="height: 82vh; width: auto; object-fit: contain;">
    </div>

    <div id="block-tables" class="block">
        <div id="table-1" class="lamp-zone" style="bottom: 49.2%; left: 49.9%;"></div>
        <div id="table-2" class="lamp-zone" style="bottom: 22.1%; left: 35.7%;"></div>
    </div>

    <div id="block-ai-room" class="block" style="background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important;"></div>

    <script>
        let currentID = "";

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            const backBtn = document.getElementById('btn-global-back');
            const amb = document.getElementById('snd-ambient');

            if(current) { current.style.opacity = "0"; current.style.pointerEvents = "none"; }
            backBtn.style.opacity = "0";

            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";

                setTimeout(() => { 
                    next.classList.add('active'); 
                    next.style.opacity = "1";
                    next.style.pointerEvents = "auto";

                    setTimeout(() => {
                        if (nextId === 'block-bar') fadeAudio(amb, 1, 800);
                        if (nextId === 'block-tables' || nextId === 'block-ai-room') {
                            backBtn.style.display = 'block';
                            setTimeout(() => { backBtn.style.opacity = "1"; }, 50);
                            fadeAudio(amb, 0, 800);
                        } else { backBtn.style.display = 'none'; }
                    }, 800);

                    if(nextId === 'block-bar' && (!current || (current.id !== 'block-ai-room' && current.id !== 'block-tables'))) {
                        setTimeout(() => { document.getElementById('snd-khe').play(); }, 800);
                        setTimeout(() => { document.getElementById('snd-pour').play(); }, 2200);
                    }
                }, 50);
            }, 800);
        }

        function handleDoor() {
            const d = document.getElementById('main-door');
            document.getElementById('snd-door').play();
            d.style.transform = "scale(5)"; d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            
            document.getElementById('qr-box-reg').innerHTML = "";
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            document.getElementById('h-qr').innerHTML = "";
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 75, height: 75 });
            
            setTimeout(() => { 
                portalTransition('block-welcome'); 
                const a = document.getElementById('snd-ambient'); a.volume = 0; a.play(); fadeAudio(a, 1, 2000); 
            }, 1800);
        }

        function fadeAudio(audio, target, duration) {
            const start = audio.volume; const startTime = Date.now();
            const interval = setInterval(() => {
                const progress = Math.min((Date.now() - startTime) / duration, 1);
                audio.volume = start + (target - start) * progress;
                if (progress === 1) clearInterval(interval);
            }, 50);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; document.getElementById('pp').style.display = "block";
                    document.getElementById('h-photo').src = e.target.result; document.getElementById('txt-photo').style.display = "none";
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function swapButtons(a, s) { 
            document.getElementById(a).classList.add('btn-sleep'); 
            document.getElementById(s).classList.remove('btn-sleep'); 
        }

        function googleTranslateElementInit() { 
            new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element'); 
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
