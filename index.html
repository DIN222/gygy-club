
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.90</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo-neon: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* Переводчик */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 1000; opacity: 0.7; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        /* Плавные переходы страниц */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 3s ease-in-out; /* Плавность появления Чарли */
        }
        .block.active { display: flex !important; opacity: 1; }

        /* Дверь */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-in-open { transform: scale(18); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* Чарли PRIVAT */
        .charlie-wrap {
            width: 270px; height: 270px;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 85%);
            mask-image: radial-gradient(circle, black 40%, transparent 85%);
            margin-bottom: 5px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-title { font-size: 55px; font-weight: 900; letter-spacing: 12px; margin-bottom: 30px; color: var(--gold); }

        /* СТАТИЧНЫЕ КНОПКИ (Без подсветки) */
        .btn-gy { 
            min-width: 210px; padding: 12px 30px; background: #000; 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px;
            transition: none; outline: none; margin: 5px 0;
        }

        .square-box { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
        .photo-upload-box { background: #fff; border: 1px solid var(--gold); position: relative; color: #000; overflow: hidden; }

        /* Холл и Карточка */
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 185px; padding: 15px; border: 1px solid var(--cyan); 
            background: rgba(0,0,0,0.92); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; /* Центрирование кнопок */
        }
        .hall-card img { width: 110px; height: 110px; background: #fff; margin-bottom: 10px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-champagne"><source src="champagne_sequence.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="transition: opacity 1s;">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px; opacity: 0.9; color: var(--gold);">GY-GY PRIVAT</p>
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 class="welcome-title">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block" style="transition: opacity 1s;">
        <div style="font-style: italic; margin-bottom: 35px; opacity: 0.8;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="border:1px solid var(--cyan); color:var(--cyan);">ID</div>
            <div id="qr-box" class="square-box" style="background:#fff;"></div>
            <div class="square-box photo-upload-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-final" class="btn-gy" style="border-color: #555; color: #555; pointer-events: none;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block" style="transition: opacity 1.5s;">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <h2 style="color:#fff; text-shadow:0 0 15px var(--indigo-neon); letter-spacing:5px; margin-bottom:30px;">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <img id="h-photo">
            <div id="h-id" style="color:var(--cyan); font-family:'Share Tech Mono'; font-size:11px; margin-bottom:15px; text-align: center;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:11px;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:11px; display:none;" onclick="startBar()">В БАР</button>
        </div>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            document.getElementById('id-box').innerText = fullID;
            new QRCode(document.getElementById("qr-box"), { text: fullID, width: 75, height: 75 });
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2500);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none"; // Текст исчезает полностью
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            const goBtn = document.getElementById('btn-go-final');
            document.getElementById('btn-save').style.opacity = '0.5';
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            goBtn.style.borderColor = var(--cyan);
            goBtn.style.color = var(--cyan);
            goBtn.style.pointerEvents = 'auto';
            document.getElementById('h-id').innerText = fullID;
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display='none';
            document.getElementById('h-tobar').style.display='block';
        }

        function startBar() {
            document.getElementById('snd-ambient').pause();
            portalTransition('block-bar'); // Добавь блок бара сам, если нужно
            document.getElementById('snd-champagne').play();
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            // Маленькая задержка для чистоты CSS анимации
            setTimeout(() => {
                document.getElementById(id).classList.add('active');
            }, 50);
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
