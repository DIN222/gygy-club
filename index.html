<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.114</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ: Попытка заставить меню скроллиться */
        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 5000; }
        .goog-te-menu-frame { max-height: 200px !important; overflow-y: scroll !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0;
        }
        /* Анимация проявления для всех блоков */
        .block.active { display: flex !important; z-index: 100; animation: fadeInBlock 1s forwards; }
        @keyframes fadeInBlock { to { opacity: 1; } }

        /* ДВЕРЬ (Блок 1) */
        #block-entrance { display: flex; opacity: 1; z-index: 1000; }
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .door-open-anim { transform: scale(20); opacity: 0; filter: blur(10px); pointer-events: none; }

        /* ЧАРЛИ */
        .charlie-wrap {
            width: 230px; height: 230px;
            -webkit-mask-image: radial-gradient(circle, black 45%, transparent 90%);
            margin-bottom: 10px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }

        /* КНОПКИ */
        .btn-gy { 
            min-width: 210px; padding: 12px; background: #000; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0;
        }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.5; }

        /* РЕГИСТРАЦИЯ */
        .square-box { width: 75px; height: 75px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .white-bg { background: #fff !important; }

        /* КАРТОЧКА ХОЛЛА */
        .hall-card { 
            position: absolute; right: 20px; bottom: 20px; width: 195px; padding: 15px; 
            border: 1px solid var(--gold); background: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; color: #000;
        }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 style="font-size: 40px; letter-spacing: 8px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="font-size:10px;">ID</div>
            <div id="qr-reg" class="square-box white-bg"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:20; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="p-label" style="font-size:10px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.5; z-index:-1;"></div>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" style="width:75px; height:75px; background:#fff; object-fit:cover; border:1px solid var(--gold);">
                <div id="h-qr" style="width:75px; height:75px; background:#fff; border:1px solid var(--gold);"></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-size:11px; font-weight:bold; margin-bottom:10px;"></div>
            <button class="btn-gy" style="min-width:100%; font-size:10px; background:#000;" onclick="window.location.href='ai_room.html'">В АЙ-РУМ</button>
        </div>
    </div>

    <script>
        // Идентификация
        let vCount = localStorage.getItem('vCount') || 1;
        const fullID = `№${vCount}-${Math.floor(1000 + Math.random() * 8999)}`;
        localStorage.setItem('vCount', parseInt(vCount) + 1);

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru'}, 'google_translate_element');
        }

        function handleDoor() {
            const door = document.getElementById('main-door');
            const snd = document.getElementById('snd-door');
            if(snd) snd.play();
            
            door.classList.add('door-open-anim');
            
            // Генерация данных заранее
            new QRCode(document.getElementById("qr-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            // РЕШАЮЩИЙ МОМЕНТ: Удаляем дверь и включаем Чарли
            setTimeout(() => {
                document.getElementById('block-entrance').style.display = 'none';
                document.getElementById('block-entrance').innerHTML = ''; // Очистка памяти
                portalTransition('block-welcome');
                const amb = document.getElementById('snd-ambient');
                if(amb) amb.play();
            }, 2300);
        }

        function portalTransition(targetId) {
            // Скрываем все блоки
            document.querySelectorAll('.block').forEach(b => {
                b.classList.remove('active');
                b.style.display = 'none';
            });
            // Показываем нужный
            const target = document.getElementById(targetId);
            target.style.display = 'flex';
            setTimeout(() => { target.classList.add('active'); }, 50);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').classList.add('btn-disabled');
            document.getElementById('btn-save').innerText = 'ГОТОВО';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
