<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.126</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ - ПРИНУДИТЕЛЬНЫЙ СТИЛЬ */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 9999; min-height: 30px; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; position: static !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 1s; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ДВЕРЬ */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.5s; }
        .door-open-anim { transform: scale(15); opacity: 0; filter: blur(20px); }

        /* РАМКИ */
        .square-box, .card-img-box { width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--gold) !important; background: #fff; position: relative; overflow: hidden; }

        /* КНОПКИ */
        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; }
        .btn-inactive { opacity: 0.2; pointer-events: none; }

        /* ХОЛЛ */
        .neon-title { font-size: 30px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #4B0082, 0 0 40px #4B0082; margin-bottom: 30px; text-align: center; }

        /* БАР */
        .bar-header { font-size: 18px; text-align: center; color: var(--gold); position: absolute; top: 80px; width: 80%; font-weight: 900; text-transform: uppercase; }
        .bartender-container { position: relative; width: 100%; height: 80vh; display: flex; align-items: flex-end; justify-content: center; }
        .bartender-img { height: 90%; width: auto; z-index: 5; pointer-events: none; }
        
        /* ОБЛАЧКА - ЗОНЫ КЛИКА */
        .bubble-link {
            position: absolute; z-index: 9999; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-family: 'Share Tech Mono'; font-weight: 900;
            font-size: 12px; color: transparent; /* Текст невидимый, так как он есть на картинке */
            /* background: rgba(255,255,255,0.2); */ /* Раскомментируй для теста */
        }
        #link-tables { width: 110px; height: 80px; bottom: 60%; left: 10%; }
        #link-ai { width: 130px; height: 90px; bottom: 65%; right: 5%; }

        .hall-card { position: absolute; right: 20px; bottom: 20px; width: 200px; padding: 15px; border: 2.5px solid var(--gold); background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px;">GY-GY PRIVAT</p>
        <div style="width:240px; height:240px; -webkit-mask-image:radial-gradient(circle, black 40%, transparent 85%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:45px; letter-spacing:10px; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-weight: 900; font-size: 20px; text-align: center; margin-bottom: 25px; text-transform: uppercase;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold);">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10; cursor:pointer;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label" style="color:#000; font-family:'Share Tech Mono';">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-inactive" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.9;"></div>
        <h2 class="neon-title">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" class="card-img-box" style="object-fit:cover;">
                <div id="h-qr" class="card-img-box"></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-size:11px; margin-bottom:15px; font-weight: 900;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; background:#000;" onclick="portalTransition('block-bar')">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-header">«Истина не в вине, а в его количестве»</div>
        <div class="bartender-container">
            <div id="link-tables" class="bubble-link" onclick="alert('Места за столиками забронированы!')">ЗА СТОЛИКИ</div>
            <div id="link-ai" class="bubble-link" onclick="window.location.href='ai_room.html'">ПОБОЛТАТЬ С ИИ</div>
            
            <img src="charlie_bar.png" class="bartender-img">
        </div>
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        // ПРИНУДИТЕЛЬНЫЙ ФИКС GOOGLE
        setInterval(() => {
            const frame = document.querySelector('.goog-te-menu-frame');
            if(frame) frame.style.boxShadow = '0 0 20px #d4af37';
            const combo = document.querySelector('.goog-te-combo');
            if(combo) {
                combo.style.background = 'black';
                combo.style.color = '#d4af37';
                combo.style.border = '1px solid #d4af37';
                combo.style.fontFamily = 'Share Tech Mono';
            }
        }, 1000);

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('door-open-anim');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2100); 
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const target = document.getElementById(id);
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.4';
            document.getElementById('btn-save').innerText = 'СОХРАНЕНО';
            document.getElementById('btn-go-hall').classList.remove('btn-inactive');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
