<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.121</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* --- ФИКС ЯЗЫКОВ (SCROLL & CLEAN) --- */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 5000; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; position: static !important; }
        /* Принудительный скролл для выпадающего списка */
        iframe.goog-te-menu-frame { 
            max-height: 400px !important; 
            overflow-y: auto !important; 
            box-shadow: 0 0 20px var(--gold) !important;
        }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 1s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* РЕГИСТРАЦИЯ & РАМКИ */
        .whiskey-quote { font-style: italic; margin-bottom: 30px; opacity: 0.9; font-size: 18px; text-align: center; padding: 0 20px; }
        .square-box { 
            width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; border: 1.5px solid var(--gold) !important; color: var(--gold); 
        }
        .photo-box { background: #fff; position: relative; overflow: hidden; border: 1.5px solid var(--gold) !important; }

        /* ХОЛЛ & ПРОПУСК */
        .neon-text { color: #fff; text-shadow: 0 0 15px #4B0082; letter-spacing: 5px; margin-bottom: 40px; font-size: 24px; font-weight: 900; }
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px; width: 200px; padding: 15px; 
            border: 1.5px solid var(--gold); background: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        /* Золотые рамки внутри пропуска */
        .card-img-box { width: 75px; height: 75px; background: #fff; object-fit: cover; border: 1.5px solid var(--gold) !important; }

        /* БАР & ОБЛАЧКА-КНОПКИ */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; justify-content: flex-end; }
        .bartender { width: 85vw; max-width: 450px; cursor: pointer; z-index: 5; margin-bottom: -10px; }
        
        .nav-bubbles { position: absolute; bottom: 58%; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; opacity: 0; pointer-events: none; transition: 0.5s; z-index: 20; }
        .nav-bubbles.show { opacity: 1; pointer-events: auto; transform: translateY(-10px); }
        
        .bubble-btn { 
            background: rgba(255, 255, 255, 0.98); color: #000; padding: 15px 25px; 
            border-radius: 30px; font-family: 'Share Tech Mono'; font-size: 14px; 
            font-weight: bold; border: 2px solid var(--gold); cursor: pointer; 
            min-width: 190px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Хвостик облачка */
        .bubble-btn.last::after { 
            content: ''; position: absolute; bottom: -12px; left: 50%; margin-left: -10px; 
            border-width: 12px 12px 0; border-style: solid; border-color: white transparent transparent; 
        }

        .btn-gy { min-width: 210px; padding: 12px 30px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; letter-spacing: 2px; margin: 8px 0; }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.4; }
        
        /* АНИМАЦИЯ ДВЕРИ */
        .door-img { width: 65vw; max-width: 350px; cursor: pointer; transition: 2.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-in-open { transform: scale(18); opacity: 0; filter: blur(20px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index: 200;">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px;">GY-GY PRIVAT</p>
        <div style="width:240px; height:240px; -webkit-mask-image:radial-gradient(circle, black 40%, transparent 85%);"><img src="charlie.png" style="width:100%; height:100%; object-fit:cover;"></div>
        <h1 style="font-size:45px; letter-spacing:10px; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div class="whiskey-quote">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box">ID</div>
            <div id="qr-box-reg" class="square-box" style="background:#fff;"></div> <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label" style="color:#000; font-family:'Share Tech Mono';">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.5;"></div>
        <h2 class="neon-text">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" class="card-img-box"> <div id="h-qr" class="card-img-box"></div> </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:11px; margin-bottom:15px; text-align: center; font-weight: bold;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px; background: #000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; background: #000;" onclick="portalTransition('block-bar')">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div id="bubbles-menu" class="nav-bubbles">
            <div class="bubble-btn" onclick="alert('Столики накрыты!')">ЗА СТОЛИКИ</div>
            <div class="bubble-btn last" onclick="window.location.href='ai_room.html'">В ИИ-РУМ</div>
        </div>
        <img src="charlie_bar.png" class="bartender" onclick="toggleMenu()">
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { document.getElementById('snd-ambient').play(); portalTransition('block-welcome'); }, 2100); 
        }
        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const target = document.getElementById(id);
            blocks.forEach(b => { if(b.classList.contains('active')) b.style.opacity = '0'; });
            setTimeout(() => {
                blocks.forEach(b => { b.classList.remove('active'); b.style.display = 'none'; });
                target.style.display = 'flex';
                void target.offsetWidth; 
                target.classList.add('active');
                target.style.opacity = '1';
                // Скрываем меню баблов при каждом входе в бар
                if(id === 'block-bar') document.getElementById('bubbles-menu').classList.remove('show');
            }, 800);
        }
        function toggleMenu() { document.getElementById('bubbles-menu').classList.toggle('show'); }
        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.3';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
