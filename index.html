
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.253 (Rollback 211-Base)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --rich-brown: #8B4513; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        .ui-header-left { position: fixed; top: 15px; left: 80px; z-index: 10000; font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; letter-spacing: 5px; color: var(--gold); }
        #google_translate_element { position: fixed; top: 15px; left: 15px; z-index: 10001; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; }

        .block { 
            position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000 !important; z-index: 10; opacity: 0; transition: opacity 0.7s ease-in-out;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ЦЕНТРОВКА ID ИЗ 211+ */
        .id-label-box { 
            width: 90px; height: 90px; border: 2px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; 
            text-align: center; font-family: 'Share Tech Mono'; font-size: 11px; padding: 5px; line-height: 1.1;
        }

        .btn-gy { 
            min-width: 260px; padding: 12px; background: transparent; 
            border: 2px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; 
            font-weight: 900; margin: 6px 0; transition: 0.3s;
        }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; filter: grayscale(1); }
        
        .id-card { 
            position: absolute; left: 50%; top: 70%; transform: translate(-50%, -50%); 
            width: 260px; padding: 15px; border: 2px solid var(--gold); 
            background: #F5F5DC; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: #000; 
        }
        .btn-id-fix { min-width: 100% !important; border-color: #000 !important; color: #000 !important; margin: 4px 0 !important; }

        #main-door { width: 280px; cursor: pointer; transition: transform 1.5s ease-out, opacity 1s ease; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>
    <div class="ui-header-left">GY-GY</div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe"><source src="khe_khe.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:8px; font-size:18px; margin-bottom:10px; font-weight:bold;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 30vh; margin-bottom: 20px;">
        <h1 style="font-size:38px; font-weight: 900; margin-bottom: 20px;">WELCOME</h1>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div class="id-label-box" id="id-label">ID</div>
            <div style="width:90px; height:90px; border:2px solid var(--gold); background:#fff; padding:4px;" id="qr-box-reg"></div>
            <div style="width:90px; height:90px; border:2px solid var(--gold); background:#fff; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="photo-text" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div style="font-size:32px; color: #8B4513; margin-top: -30vh; font-weight:900; font-style:italic;">«Все будет GY-GY»</div>
        <div class="id-card">
            <div style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:10px; font-size:13px;">PASS CONTROL</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div style="width:80px; height:80px; border:1px solid #000;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div id="h-qr" style="width:80px; height:80px; border:1px solid #000; background:#fff;"></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:13px; margin-bottom:10px; border-bottom:1px solid #000; width:100%; text-align:center;"></div>
            <button id="btn-confirm" class="btn-gy btn-id-fix" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-id-fix btn-sleep" onclick="goToBar()">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button style="position:absolute; bottom:15%; left:8%;" class="btn-gy" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto;">
    </div>

    <script>
        let currentID = "";

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            const d = document.getElementById('main-door');
            d.style.transform = "scale(2.5)"; d.style.opacity = "0";
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            setTimeout(() => {
                new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 80, height: 80 });
                new QRCode(document.getElementById("h-qr"), { text: currentID, width: 80, height: 80 });
                document.getElementById('id-label').innerText = currentID;
                document.getElementById('h-id').innerText = currentID;
            }, 50);
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play().catch(()=>{}); }, 1300);
        }

        function swapButtons(a, s) {
            if (a === 'btn-save') document.getElementById('snd-pour').play().catch(()=>{});
            document.getElementById(a).classList.add('btn-sleep');
            document.getElementById(s).classList.remove('btn-sleep');
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(current) {
                current.style.opacity = "0";
                setTimeout(() => {
                    current.classList.remove('active');
                    current.style.display = "none";
                    const next = document.getElementById(nextId);
                    next.style.display = "flex";
                    setTimeout(() => { 
                        next.classList.add('active'); 
                        if(nextId === 'block-bar') {
                             document.getElementById('snd-khe').play().catch(()=>{});
                             setTimeout(()=>document.getElementById('snd-pour').play(), 1000);
                        }
                    }, 50);
                }, 700);
            }
        }

        function goToBar() { portalTransition('block-bar'); }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('photo-text').style.display = "none";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
</body>
</html>
