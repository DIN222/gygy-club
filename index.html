<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GY-GY CLUB v4.3.145</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; 
            --bg: #050505; /* Максимальный контраст */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--gold); 
            font-family: 'Montserrat', sans-serif; overflow: hidden; 
        }

        /* КОНТРАСТНЫЙ ХОЛЛ */
        .hall {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        /* ВОЗВРАТ ЛУЧШЕЙ АНИМАЦИИ ДВЕРИ */
        .door-container {
            width: 180px; height: 280px; perspective: 1200px; cursor: pointer;
            margin-bottom: 40px; position: relative;
        }
        .door {
            width: 100%; height: 100%; background: #111;
            border: 2px solid var(--gold); border-radius: 8px;
            transform-origin: left;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.05);
        }
        .door::after { /* Ручка */
            content: ''; position: absolute; right: 15px; width: 12px; height: 12px;
            background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold);
        }
        .door-container:hover .door {
            transform: rotateY(-30deg); /* Эффект ожидания */
        }
        .door-container.open .door {
            transform: rotateY(-115deg); /* Глубокое открытие */
        }

        .btn-pour {
            padding: 12px 35px; font-size: 16px; font-weight: bold;
            background: none; border: 2px solid var(--gold); color: var(--gold);
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-pour:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }
        
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="hall">
        <div class="door-container" id="doorCont" onclick="enterRoom()">
            <div class="door">
                <span style="font-size: 9px; opacity: 0.4; letter-spacing: 1px;">AI ENTRANCE</span>
            </div>
        </div>
        <button class="btn-pour" onclick="startExperience()">Налить & Войти</button>
    </div>

    <div class="version-tag">build: v4.3.145</div>

    <audio id="pourSnd" src="https://www.soundjay.com/misc/sounds/pour-liquid-1.mp3"></audio>
    <audio id="jazzSnd" src="https://www.soundjay.com/free-music/sounds/jazz-piano-1.mp3" loop></audio>

    <script>
        console.log("GY-GY CLUB System: v4.3.145 Initialized");

        function startExperience() {
            const pourSnd = document.getElementById('pourSnd');
            const jazzSnd = document.getElementById('jazzSnd');
            
            pourSnd.volume = 0.5;
            pourSnd.play();

            // Плавный разгон джаза с 1.8с
            setTimeout(() => {
                jazzSnd.volume = 0;
                jazzSnd.play();
                
                let vol = 0;
                const fadeIn = setInterval(() => {
                    if (vol < 0.35) {
                        vol += 0.005; // Еще более мягкий шаг
                        jazzSnd.volume = vol;
                    } else {
                        clearInterval(fadeIn);
                    }
                }, 100);
            }, 1800);
        }

        function enterRoom() {
            document.getElementById('doorCont').classList.add('open');
            setTimeout(() => {
                window.location.href = 'ai_room.html';
            }, 1500);
        }
    </script>
</body>
</html>
