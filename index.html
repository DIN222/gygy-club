<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.127</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ - FORCE DISPLAY */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 10000 !important; opacity: 1 !important; visibility: visible !important; }
        .goog-te-banner-frame { display: none !important; }
        .goog-te-gadget { color: var(--gold) !important; font-family: 'Share Tech Mono' !important; }
        body { top: 0 !important; position: static !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 0.8s; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ХОЛЛ - УСИЛЕННЫЙ НЕОН */
        .neon-bright { 
            font-size: 32px; font-weight: 900; color: #fff; 
            text-shadow: 0 0 10px #fff, 0 0 20px var(--violet), 0 0 40px var(--violet), 0 0 60px var(--violet);
            margin-bottom: 30px; text-align: center; text-transform: uppercase; z-index: 100;
        }

        /* РАМКИ */
        .square-box, .card-img-box { width: 85px; height: 85px; border: 3px solid var(--gold) !important; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* БАР - ПРАВИЛЬНЫЕ СЛОИ */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; justify-content: space-between; padding: 80px 0 20px 0; }
        
        .bar-header-top { 
            z-index: 100; width: 90%; text-align: center; font-size: 20px; 
            font-weight: 900; color: var(--gold); text-shadow: 2px 2px 4px #000;
            text-transform: uppercase;
        }

        .bartender-wrap { position: relative; width: 100%; height: 65vh; display: flex; align-items: flex-end; justify-content: center; }
        .bartender-img { height: 100%; width: auto; z-index: 10; pointer-events: none; }

        /* ОБЛАКА КАК КНОПКИ */
        .cloud-btn {
            position: absolute; z-index: 150; background: rgba(255,255,255,0.9);
            color: #000; border: 2px solid var(--gold); border-radius: 50px;
            padding: 12px 18px; font-family: 'Share Tech Mono'; font-weight: 900;
            font-size: 13px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .cloud-btn:active { transform: scale(0.9); background: var(--gold); }
        
        #btn-tables { bottom: 50%; left: 8%; }
        #btn-ai { bottom: 55%; right: 8%; }

        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; }
        .btn-inactive { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" style="width: 300px;" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 5px; font-size: 12px; margin-bottom: 10px;">GY-GY PRIVAT</p>
        <div style="width:240px; height:240px; border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:40px; margin: 20px 0;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-weight:900; font-size:20px; margin-bottom:30px; text-align:center;">«В КАЖДОЙ ШУТКЕ ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold);">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:85px; height:85px; z-index:10;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label" style="color:#000; font-size:10px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-inactive" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.7;"></div>
        <h2 class="neon-bright">ВСЕ БУДЕТ GY-GY</h2>
        <div style="position: absolute; right: 20px; bottom: 20px; width: 210px; padding: 15px; border: 3px solid var(--gold); background: #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; z-index: 110;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" class="card-img-box" style="object-fit:cover;">
                <div id="h-qr" class="card-img-box"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-weight:900; margin-bottom:10px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:11px; background:#000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:11px; display:none; background:#000;" onclick="portalTransition('block-bar')">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-header-top">«Истина не в вине, а в его количестве»</div>
        <div class="bartender-wrap">
            <button id="btn-tables" class="cloud-btn" onclick="alert('Места забронированы!')">ЗА СТОЛИКИ</button>
            <button id="btn-ai" class="cloud-btn" onclick="window.location.href='ai_room.html'">ПОБОЛТАТЬ С ИИ</button>
            <img src="charlie_bar.png" class="bartender-img">
        </div>
        <button class="btn-gy" style="min-width:100px; font-size:10px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        // ЖЕСТКИЙ МОНИТОРИНГ GOOGLE
        setInterval(() => {
            const te = document.getElementById('google_translate_element');
            if(te) te.style.display = 'block';
            const combo = document.querySelector('.goog-te-combo');
            if(combo) combo.style.border = '2px solid #d4af37';
        }, 1500);

        function handleDoor() {
            document.getElementById('snd-door').play();
            const d = document.getElementById('main-door');
            d.style.transition = "2.5s";
            d.style.transform = "scale(15)";
            d.style.opacity = "0";
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 2100); 
        }

        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.opacity = '0.5';
            document.getElementById('btn-go-hall').classList.remove('btn-inactive');
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
