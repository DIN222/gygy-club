<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.287</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #000000; }
        
        /* Блокировка оцифровки и выделения */
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; margin: 0; padding: 0; 
            outline: none !important; 
            user-select: none !important; 
            -webkit-user-select: none !important; 
            -ms-user-select: none !important;
        }
        
        html, body { 
            width: 100%; height: 100%; background: #000 !important; color: var(--gold); 
            font-family: 'Playfair Display', serif; overflow: hidden; position: fixed; 
        }

        /* Скроллящийся язык */
        #google_translate_element { 
            position: fixed; top: 15px; left: 15px; z-index: 1000001; 
            max-width: 120px; overflow-x: auto; white-space: nowrap; 
        }
        #google_translate_element::-webkit-scrollbar { height: 2px; }
        #google_translate_element::-webkit-scrollbar-thumb { background: var(--gold); }

        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; 
            letter-spacing: 5px; color: var(--gold); pointer-events: none; 
        }

        .block { 
            position: fixed; inset: 0; display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: #000 !important; z-index: 10; 
            opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* Картинки с защитой от выделения */
        img { pointer-events: none; -webkit-user-drag: none; }

        .reg-photo-container { 
            width: 95px; height: 95px; border: 2px solid var(--gold); 
            background: #fff; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        #pp { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; inset: 0; }

        #main-door { width: 280px; cursor: pointer; pointer-events: auto !important; transition: transform 1.8s ease-in-out, opacity 1.8s ease-in-out; }

        .btn-gy { 
            min-width: 270px; padding: 15px; background: transparent; 
            border: 2px solid var(--gold); color: var(--gold); cursor: pointer; 
            font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; 
            margin: 10px 0; z-index: 1001; pointer-events: auto;
        }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        #black-veil { position: fixed; inset: 0; background: #000 !important; z-index: 2147483647; display: none; pointer-events: all; }
        
        .bar-quote { 
            font-family: 'Share Tech Mono'; font-size: 20px; font-weight: 900; 
            position: absolute; top: 8%; text-align: center; width: 100%; 
            z-index: 100; font-style: italic; padding: 0 10px; pointer-events: none;
        }
        
        .charlie-bar-img { height: 82vh; width: auto; object-fit: contain; }
        
        .nav-bar-btns { 
            position: absolute; bottom: 12%; z-index: 1000; width: 100%; 
            display: flex; justify-content: space-around; padding: 0 10px; 
        }

        #block-ai-room { background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important; }
    </style>
</head>
<body contenteditable="false" spellcheck="false">

    <div id="black-veil"></div>
    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door" preload="auto"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop preload="auto"><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe" preload="auto"><source src="charlie_bar_fx.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour" preload="auto"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; margin-bottom:20px; font-size:16px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 35vh; margin-bottom: 20px;">
        <div style="font-size:48px; font-weight:900; margin-bottom:20px; font-style:italic;">WELCOME</div>
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:22px; margin-bottom:30px; font-weight:900; text-align:center;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div style="width:95px; height:95px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-size:11px;" id="id-label">#ID</div>
            <div style="width:95px; height:95px; border:2px solid var(--gold); background:#fff; padding:5px; pointer-events:auto;" id="qr-box-reg"></div>
            <div class="reg-photo-container">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer; pointer-events:auto;">
                <img id="pp">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div style="position:absolute; left:50%; top:68%; transform:translate(-50%, -50%); width:280px; padding:25px; border:2px solid var(--gold); background:#F5F5DC; border-radius:15px; display:flex; flex-direction:column; align-items:center; color:#000;">
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; font-size:16px; margin-bottom:15px;">#GY-ID-PENDING</div>
            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div style="width:90px; height:90px; border:3px solid #000; background:#fff; overflow:hidden;"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div id="h-qr" style="width:90px; height:90px; border:3px solid #000; background:#fff; pointer-events:auto;"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div class="bar-quote">«Истина не в вине, а в его количестве»</div>
        <div class="nav-bar-btns">
            <button class="btn-gy" style="min-width:140px; font-size:12px;" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
            <button class="btn-gy" style="min-width:140px; font-size:12px;" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
        </div>
        <img src="charlie_bar.png" class="charlie-bar-img">
    </div>

    <div id="block-ai-room" class="block">
        <button class="btn-gy" style="position:absolute; bottom:10%; background:rgba(0,0,0,0.85);" onclick="portalTransition('block-bar')">НАЗАД В БАР</button>
    </div>

    <script>
        let currentID = "";

        function handleDoor() {
            const sounds = ['snd-door', 'snd-ambient', 'snd-khe', 'snd-pour'];
            sounds.forEach(id => {
                const a = document.getElementById(id);
                a.play().then(() => { if(id !== 'snd-door') { a.pause(); a.currentTime = 0; } }).catch(() => {});
            });
            const d = document.getElementById('main-door');
            setTimeout(() => { d.style.transform = "scale(4.5)"; d.style.opacity = "0"; }, 50);
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 85, height: 85 });
            setTimeout(() => { portalTransition('block-welcome'); document.getElementById('snd-ambient').play(); }, 1400);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(nextId === 'block-ai-room') {
                setTimeout(() => {
                    ['snd-ambient', 'snd-khe', 'snd-pour'].forEach(id => fadeAudio(document.getElementById(id), 0, 1000));
                }, 100);
            } else if (nextId === 'block-bar' && current && current.id === 'block-ai-room') {
                const amb = document.getElementById('snd-ambient');
                amb.play(); fadeAudio(amb, 1, 1000);
            }
            if(current) current.style.opacity = "0";
            setTimeout(() => {
                if(current) { current.classList.remove('active'); current.style.display = "none"; }
                const next = document.getElementById(nextId);
                next.style.display = "flex";
                setTimeout(() => { 
                    next.classList.add('active'); 
                    next.style.opacity = "1";
                    if(nextId === 'block-bar' && current && current.id === 'block-hall') {
                        setTimeout(() => {
                            const k = document.getElementById('snd-khe'); k.volume = 1; k.play();
                            setTimeout(() => { const p = document.getElementById('snd-pour'); p.volume = 1; p.play(); }, 1200);
                        }, 500);
                    }
                }, 50);
            }, 800);
        }

        function fadeAudio(audio, target, duration) {
            if (!audio) return;
            let start = audio.volume;
            let step = (target - start) / (duration / 50);
            let interval = setInterval(() => {
                start += step;
                if ((step > 0 && start >= target) || (step < 0 && start <= target)) {
                    audio.volume = target; if(target === 0) audio.pause();
                    clearInterval(interval);
                } else { audio.volume = Math.max(0, Math.min(1, start)); }
            }, 50);
        }

        function smoothLeave(url) {
            document.getElementById('black-veil').style.display = "block";
            ['snd-ambient', 'snd-khe', 'snd-pour'].forEach(id => fadeAudio(document.getElementById(id), 0, 800));
            setTimeout(() => { window.location.href = url; }, 850);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    const img = document.getElementById('pp'); img.src = e.target.result; img.style.display = "block";
                    document.getElementById('txt-photo').style.display = "none";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function swapButtons(a, s) {
            document.getElementById(a).classList.add('btn-sleep');
            document.getElementById(s).classList.remove('btn-sleep');
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
