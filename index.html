
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club v4.3.78</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --neon-purple: #9400D3;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--black);
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            overflow: hidden;
        }

        /* Контейнер для экранов */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease-in-out;
        }

        .active { display: flex; z-index: 10; }

        /* Экраны */
        #entrance { background-image: url('door_1.jpg'); cursor: pointer; }
        
        #welcome { background: var(--black); }
        .charlie-mask {
            width: 350px; height: 350px;
            object-fit: cover;
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 70%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 70%);
        }

        #registration { background: #111; }
        
        #hall { background-image: url('hall_bg_jpg.jpg'); }
        .neon-text {
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--neon-purple);
            font-weight: 700;
            text-transform: uppercase;
            paint-order: stroke fill;
            -webkit-text-stroke: 1.5px white;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        #bar { background-image: url('charlie_bar.png'); background-size: contain; background-repeat: no-repeat; }

        /* Элементы управления */
        .btn-gold {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-gold:hover { background: var(--gold); color: #000; }

        #qr-container { background: white; padding: 15px; border-radius: 10px; margin: 20px; }

        .cloud-link {
            position: absolute;
            padding: 20px 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid var(--gold);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .cloud-link:hover { transform: scale(1.1); background: rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <audio id="snd-door" src="door_open.mp3" preload="auto"></audio>
    <audio id="snd-hall" src="hall_ambient.mp3" loop preload="auto"></audio>
    <audio id="snd-pop" src="champagne_pop.mp3" preload="auto"></audio>
    <audio id="snd-jazz" src="bar_jazz.mp3" loop preload="auto"></audio>

    <div id="entrance" class="screen active" onclick="initEntry()">
        <h1 style="background: rgba(0,0,0,0.7); padding: 40px;">ENTER THE CLUB</h1>
    </div>

    <div id="welcome" class="screen">
        <img src="charlie.png" class="charlie-mask" alt="Charlie">
        <h2 style="font-size: 4rem; letter-spacing: 15px;">WELCOME</h2>
    </div>

    <div id="registration" class="screen">
        <h3>ГЕНЕРАЦИЯ ВАШЕГО ID</h3>
        <div id="qr-container"></div>
        <div id="id-text" style="font-size: 1.5rem; margin-bottom: 20px;"></div>
        <button id="save-btn" class="btn-gold" onclick="saveUserData()">Сохранить</button>
        <button id="pass-btn" class="btn-gold" style="display:none;" onclick="goHall()">Проходите</button>
    </div>

    <div id="hall" class="screen" onclick="goBar()">
        <div class="neon-text">ВСЕ БУДЕТ GY-GY</div>
    </div>

    <div id="bar" class="screen">
        <a href="tables.html" class="cloud-link" style="top: 30%; left: 20%;">TABLES</a>
        <a href="ai_room.html" class="cloud-link" style="top: 30%; right: 20%;">AI ROOM</a>
    </div>

    <script>
        // Инициализация ID (Unique Digital Trace)
        let userId = localStorage.getItem('gygy_user_id');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initEntry() {
            document.getElementById('snd-door').play();
            showScreen('welcome');

            setTimeout(() => {
                if (userId) {
                    goHall();
                } else {
                    startReg();
                }
            }, 3000);
        }

        function startReg() {
            userId = 'ID-' + Math.floor(Math.random() * 1000000);
            document.getElementById('id-text').innerText = userId;
            
            const qrBox = document.getElementById('qr-container');
            qrBox.innerHTML = '';
            new QRCode(qrBox, {
                text: userId,
                width: 160,
                height: 160
            });
            showScreen('registration');
        }

        function saveUserData() {
            localStorage.setItem('gygy_user_id', userId);
            // Куки для "автоматического распознавания" (Cookie-recognition)
            document.cookie = "gygy_recognized=true; max-age=" + (60*60*24*365) + "; path=/";
            
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('pass-btn').style.display = 'inline-block';
        }

        function goHall() {
            document.getElementById('snd-hall').play();
            showScreen('hall');
        }

        function goBar() {
            document.getElementById('snd-hall').pause();
            document.getElementById('snd-pop').play();
            setTimeout(() => {
                document.getElementById('snd-jazz').play();
            }, 500);
            showScreen('bar');
        }
    </script>
</body>
</html>
