
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY-GY Club v4.3.82 (Safe Entry)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --neon-purple: #9400D3;
            --tg-blue: #24A1DE;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--black); color: var(--gold);
            font-family: 'Playfair Display', serif; overflow: hidden;
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; width: 100vw;
            text-align: center; position: absolute; transition: opacity 0.5s ease;
        }

        .active { display: flex; }

        /* Вход и Приветствие */
        #entrance-screen { background: url('door_1.jpg') no-repeat center center; background-size: cover; cursor: pointer; }
        .charlie-mask {
            width: 300px; height: 300px; object-fit: cover;
            mask-image: radial-gradient(circle, black 50%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: radial-gradient(circle, black 50%, rgba(0,0,0,0) 70%);
        }
        .welcome-text { font-size: 3rem; letter-spacing: 10px; margin-top: 20px; font-weight: 700; }

        /* Кнопки */
        .btn-gold {
            background: transparent; border: 2px solid var(--gold);
            color: var(--gold); padding: 15px 40px; font-size: 1.1rem;
            cursor: pointer; text-transform: uppercase; margin: 10px; transition: 0.3s;
        }
        .btn-gold:hover { background: var(--gold); color: var(--black); }
        
        .btn-tg {
            background: var(--tg-blue); color: white; border: none;
            padding: 12px 30px; border-radius: 5px; font-family: sans-serif;
            font-weight: bold; cursor: pointer; margin-bottom: 20px;
        }

        /* Холл и Бар */
        #hall-screen { background: url('hall_bg_jpg.jpg') no-repeat center center; background-size: cover; }
        .neon-text {
            font-size: 3.5rem; color: var(--neon-purple);
            text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 0 20px var(--neon-purple);
            font-weight: 700;
        }

        #bar-screen { background: url('charlie_bar.png') no-repeat center center; background-size: contain; }
        .click-zone {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; cursor: pointer; padding: 25px;
            backdrop-filter: blur(5px); border: 1px solid var(--gold);
            color: white; text-decoration: none; font-weight: bold;
        }
        .zone-tables { top: 35%; left: 20%; }
        .zone-ai { top: 35%; right: 20%; }

        #qr-code { background: white; padding: 10px; margin: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <audio id="snd-door" src="door_open.mp3"></audio>
    <audio id="snd-ambient" src="hall_ambient.mp3" loop></audio>
    <audio id="snd-champagne" src="champagne_pop.mp3"></audio>
    <audio id="snd-jazz" src="bar_jazz.mp3" loop></audio>

    <div id="entrance-screen" class="screen active" onclick="handleInitialEntry()">
        <h1 style="background: rgba(0,0,0,0.6); padding: 20px;">GY-GY CLUB<br><small>TAP TO UNLOCK</small></h1>
    </div>

    <div id="welcome-screen" class="screen">
        <img src="charlie.png" class="charlie-mask" alt="Charlie">
        <div class="welcome-text">WELCOME</div>
    </div>

    <div id="auth-screen" class="screen">
        <h3>ВЫБЕРИТЕ СПОСОБ ВХОДА</h3>
        <button class="btn-tg" onclick="tgLogin()">LOG IN WITH TELEGRAM</button>
        <p>— ИЛИ —</p>
        <button class="btn-gold" onclick="startNewRegistration()">ПОЛУЧИТЬ ID ГОСТЯ</button>
    </div>

    <div id="reg-screen" class="screen">
        <h2>ВАШ МАГИЧЕСКИЙ КЛЮЧ</h2>
        <div id="qr-code"></div>
        <p id="user-id-display" style="letter-spacing: 2px;"></p>
        <button id="save-btn" class="btn-gold" onclick="confirmRegistration()">СОХРАНИТЬ И ВОЙТИ</button>
        <button id="proceed-btn" class="btn-gold" style="display: none;" onclick="enterHall()">ПРОХОДИТЕ</button>
    </div>

    <div id="hall-screen" class="screen" onclick="enterBar()">
        <h1 class="neon-text">ВСЕ БУДЕТ GY-GY</h1>
    </div>

    <div id="bar-screen" class="screen">
        <a href="tables.html" class="click-zone zone-tables">TABLES</a>
        <a href="ai_room.html" class="click-zone zone-ai">AI ROOM</a>
    </div>

    <script>
        const state = { id: null };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Логика входа
        function handleInitialEntry() {
            document.getElementById('snd-door').play();
            const savedId = getCookie('gygy_id');

            showScreen('welcome-screen');

            setTimeout(() => {
                if (savedId) {
                    state.id = savedId;
                    enterHall();
                } else {
                    showScreen('auth-screen');
                }
            }, 2500);
        }

        // Telegram Auth (Имитация для фронта)
        function tgLogin() {
            alert("Перенаправление в Telegram @GYGY_Bot для подтверждения...");
            // Здесь должна быть логика OAuth, но для прототипа:
            state.id = "TG-" + Math.floor(1000 + Math.random() * 9000);
            confirmRegistration();
        }

        function startNewRegistration() {
            state.id = 'GY-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('user-id-display').innerText = state.id;
            
            const qrContainer = document.getElementById("qr-code");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: state.id,
                width: 150, height: 150
            });
            showScreen('reg-screen');
        }

        function confirmRegistration() {
            setCookie('gygy_id', state.id, 365);
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('proceed-btn').style.display = 'inline-block';
            if(document.getElementById('auth-screen').classList.contains('active')) enterHall();
        }

        function enterHall() {
            document.getElementById('snd-ambient').play();
            showScreen('hall-screen');
        }

        function enterBar() {
            document.getElementById('snd-ambient').pause();
            document.getElementById('snd-champagne').play();
            setTimeout(() => document.getElementById('snd-jazz').play(), 600);
            showScreen('bar-screen');
        }

        // Cookie Helpers
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days*24*60*60*1000));
            document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
    </script>
</body>
</html>
