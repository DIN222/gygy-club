
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.170</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: fixed !important; top: 15px !important; left: 15px !important; z-index: 1000000 !important; }

        /* КНОПКИ: СТРОГИЙ ДИЗАЙН (v4.3) */
        .btn-gy { 
            min-width: 240px; padding: 16px; 
            background: #000; /* Всегда черный фон */
            border: 3px solid var(--gold); /* Золотая рамка */
            color: var(--gold); /* Золотые буквы */
            cursor: pointer; 
            font-family: 'Share Tech Mono'; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: 2px;
            transition: opacity 0.8s ease, transform 0.3s ease;
            opacity: 1;
            margin-top: 15px;
        }

        /* СОСТОЯНИЕ "СПИТ" (ТАИНСТВЕННОЕ ОЖИДАНИЕ) */
        .btn-gy:disabled { 
            opacity: 0.05; 
            cursor: not-allowed; 
            pointer-events: none;
        }

        /* КНОПКА ПОДТВЕРЖДЕНИЯ (ФИОЛЕТОВАЯ РАМКА) */
        .btn-confirm { border-color: var(--violet); color: var(--violet); }

        /* ОСТАЛЬНЫЕ СТИЛИ */
        .block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 100; padding: 40px; }
        .block.active { display: flex !important; opacity: 1; }

        #main-door { width: 280px; cursor: pointer; z-index: 99999; transition: 2s; transform-origin: center; }

        .id-card {
            position: absolute; right: 40px; bottom: 40px; width: 290px; padding: 25px; 
            border: 3px solid var(--gold); 
            background: linear-gradient(135deg, #fffaf0 0%, #fdf5e6 100%);
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            color:#000; z-index: 500; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .qr-gold-frame { width: 95px; height: 95px; border: 3px solid var(--gold); padding: 5px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .square-box { width: 105px; height: 105px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index:2000;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:20px; margin-bottom: 10px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 42vh; -webkit-mask-image: radial-gradient(circle, black 65%, transparent 98%); margin: 20px 0;">
        <h1 style="font-size:52px; font-weight: 900; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:20px; text-align:center; margin-bottom:35px;">«В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:35px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-size:11px;">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                <span style="color:#000; font-size:10px; font-weight:900;">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="actionSave()">СОХРАНИТЕ</button>
        <button id="btn-go-hall" class="btn-gy" disabled onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; filter:brightness(0.5); z-index:-1;"></div>
        
        <div class="id-card">
            <div style="display:flex; gap:12px; margin-bottom:15px;">
                <img id="h-photo" style="width:95px; height:95px; border:1px solid var(--gold); object-fit:cover; background:#ccc;">
                <div class="qr-gold-frame"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; color:#000; font-size:15px;"></div>
            
            <button id="h-confirm" class="btn-gy btn-confirm" style="min-width:100%; margin-top:0;" onclick="actionConfirm()">ПОДТВЕРДИТЕ</button>
            <button id="h-tobar" class="btn-gy" disabled style="min-width:100%;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button class="btn-gy" style="position:absolute; left:8%; bottom:50%; z-index:500;" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        let orderNum = localStorage.getItem('gy_order_num') || 1;
        const randomNum = Math.floor(1000 + Math.random() * 8999);
        const fullID = `#GY-${orderNum}-${randomNum}`;

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            document.getElementById('main-door').style.transform = "scale(15)"; 
            document.getElementById('main-door').style.opacity = "0";
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                document.getElementById('snd-ambient').play().catch(()=>{}); 
                portalTransition('block-welcome'); 
            }, 1800);
        }

        function actionSave() {
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').style.opacity = "0.3";
            document.getElementById('btn-save').innerText = "СОХРАНЕНО";
            document.getElementById('btn-go-hall').disabled = false;
        }

        function actionConfirm() {
            document.getElementById('h-confirm').style.opacity = "0.3";
            document.getElementById('h-confirm').innerText = "ПОДТВЕРЖДЕНО";
            document.getElementById('h-tobar').disabled = false;
        }

        function goToBar() { 
            portalTransition('block-bar'); 
            new Audio('charlie_bar_fx.mp3').play().catch(()=>{});
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
    </script>
</body>
</html>
