
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.219</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { 
            position: fixed !important; top: 15px !important; left: 15px !important; 
            z-index: 10000000 !important; background: rgba(0,0,0,0.8); border-radius: 5px;
        }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 10; padding: 15px;
        }
        .block.active { display: flex !important; opacity: 1; }

        .btn-gy { 
            min-width: 280px; padding: 14px; background: #000; border: 2px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; margin: 6px 0; transition: 0.3s;
        }
        .btn-sleep { opacity: 0.1 !important; pointer-events: none !important; }

        .qr-gold-frame { 
            width: 105px; height: 105px; border: 2px solid var(--gold); 
            padding: 4px; background: #fff; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; flex-shrink: 0; position: relative;
        }

        .id-card {
            position: absolute; left: 50%; top: 65%; 
            transform: translate(-50%, -50%);
            width: 280px; padding: 20px; 
            border: 3px solid var(--gold); 
            background: #F5F5DC; 
            border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            color: #000; 
            z-index: 500; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .hall-title {
            position: absolute; top: 15%; 
            font-size: 38px; color: #fff; 
            text-shadow: 0 0 15px var(--violet), 0 0 30px #000; 
            font-weight: 900; letter-spacing: 5px; text-align: center; width: 100%; z-index: 400;
        }

        .bar-btn-simple {
            position: absolute; z-index: 500; background: #000; border: 2px solid var(--gold); 
            padding: 12px 20px; font-family: 'Share Tech Mono'; 
            font-weight: 900; color: var(--gold); cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" style="width:260px; cursor:pointer; transition:2s;" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:8px; font-size:16px; margin-bottom: 5px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 30vh; -webkit-mask-image: radial-gradient(circle, black 65%, transparent 98%); margin: 5px 0;">
        <h1 style="font-size:38px; font-weight: 900; margin-bottom: 10px;">WELCOME</h1>
        <button id="btn-welcome-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ НА РЕГИСТРАЦИЮ</button>
