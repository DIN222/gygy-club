
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.168</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ */
        #google_translate_element { 
            position: fixed !important; top: 10px !important; left: 10px !important; 
            z-index: 1000000 !important; background: rgba(0,0,0,0.8); border-radius: 5px;
        }

        /* СТАТИСТИКА (НОВЫЙ БЛОК) */
        #club-stats {
            position: fixed; top: 10px; right: 10px; z-index: 1000000;
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold);
            padding: 10px; font-family: 'Share Tech Mono'; font-size: 10px; color: #fff;
            border-radius: 5px; min-width: 150px;
        }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-val { color: var(--gold); font-weight: bold; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 100; padding: 40px;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ВХОД */
        #block-entrance { z-index: 2000 !important; }
        #main-door { 
            width: 280px; cursor: pointer !important; position: relative !important; 
            z-index: 99999 !important; pointer-events: auto !important;
            transition: transform 2s ease, opacity 1.5s ease; transform-origin: center center;
        }

        /* ПРОПУСК В ХОЛЛЕ */
        .id-card {
            position: absolute; right: 40px; bottom: 40px; width: 280px; padding: 25px; 
            border: 3px solid var(--gold); background: #fff; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; color:#000; z-index: 500;
        }
        .qr-gold-frame { width: 95px; height: 95px; border: 3px solid var(--gold); padding: 5px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .square-box { width: 105px; height: 105px; border: 3px solid var(--gold); background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }

        .btn-gy { 
            min-width: 240px; padding: 15px; background: #000; border: 3px solid var(--gold); 
            color: var(--gold); cursor: pointer !important; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; position: relative; z-index: 2000;
            pointer-events: auto !important; margin-top: 10px; font-size: 13px;
        }
        
        .btn-confirm { background: var(--violet); color: #fff; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="club-stats">
        <div style="text-align:center; border-bottom:1px solid var(--gold); margin-bottom:5px; padding-bottom:2px;">CLUB MONITORING</div>
        <div class="stat-line"><span>ACTIVE USERS:</span> <span class="stat-val" id="st-total">128</span></div>
        <div class="stat-line"><span>ENTRANCE:</span> <span class="stat-val" id="st-ent">12</span></div>
        <div class="stat-line"><span>HALL:</span> <span class="stat-val" id="st-hall">45</span></div>
        <div class="stat-line"><span>BAR/TABLES:</span> <span class="stat-val" id="st-bar">71</span></div>
    </div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:22px; margin-bottom: 10px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 40vh; -webkit-mask-image: radial-gradient(circle, black 65%, transparent 98%); margin: 15px 0;">
        <h1 style="font-size:52px; font-weight: 900; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:20px; text-align:center; margin-bottom:30px;">«В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold); font-size:12px; text-align:center;">ID</div>
            <div class="qr-gold-frame" style="width:105px; height:105px;"><div id="qr-box-reg"></div></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                <span style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy" style="opacity:0.1; pointer-events:none;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; filter:contrast(1.2) brightness(0.65); z-index:-1;"></div>
        <h2 style="font-size:42px; color:#fff; text-shadow:0 0 25px var(--violet); font-weight: 900; letter-spacing: 5px;">ВСЕ БУДЕТ GY-GY</h2>
        
        <div class="id-card">
            <div style="display:flex; gap:12px; margin-bottom:15px;">
                <img id="h-photo" style="width:95px; height:95px; border:1px solid var(--gold); object-fit:cover; background:#eee;">
                <div class="qr-gold-frame"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; color:#000; font-size: 16px;"></div>
            
            <button id="h-confirm" class="btn-gy btn-confirm" style="min-width:100%; padding:10px;" onclick="confirmMember()">ПОДТВЕРЖДАЮ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; padding:10px; background:#000; display:none;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <div style="position: absolute; top: 80px; font-weight: 900; color: var(--gold); text-align: center; width:100%; font-size: 26px; z-index:100;">«Истина не в вине, а в его количестве»</div>
        <button id="btn-tables" class="cloud-btn" style="left: 8%; bottom: 50%;" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        <button id="btn-ai" class="cloud-btn" style="right: 8%; bottom: 58%;" onclick="window.location.href='ai_room.html'">В AI ROOM</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        // ГЕНЕРАЦИЯ ПОРЯДКОВОГО НОМЕРА
        let orderNum = localStorage.getItem('gy_order_num') || 1;
        const randomNum = Math.floor(1000 + Math.random() * 8999);
        const fullID = `#GY-${orderNum}-${randomNum}`;

        const sndAmbient = document.getElementById('snd-ambient');
        const sndJazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }

        function handleDoor() {
            const door = document.getElementById('main-door');
            document.getElementById('snd-door').play().catch(()=>{});
            door.style.transform = "scale(15)"; 
            door.style.opacity = "0";
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                sndAmbient.play().catch(()=>{}); 
                portalTransition('block-welcome'); 
                updateStats();
            }, 1800);
        }

        function saveReg() { 
            // Сохраняем номер для следующего раза
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').innerText = 'ДАННЫЕ ПРИНЯТЫ';
            document.getElementById('btn-go-hall').style.opacity = '1'; 
            document.getElementById('btn-go-hall').style.pointerEvents = 'auto'; 
        }

        function confirmMember() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
            alert("Статус подтвержден. Добро пожаловать!");
        }

        function goToBar() { 
            let fadeOut = setInterval(() => {
                if (sndAmbient.volume > 0.1) { sndAmbient.volume -= 0.1; }
                else { clearInterval(fadeOut); sndAmbient.pause(); sndAmbient.volume = 1.0; }
            }, 100);
            
            portalTransition('block-bar'); 
            const charlieFX = new Audio('charlie_bar_fx.mp3');
            charlieFX.play().catch(()=>{});

            charlieFX.onended = () => {
                sndJazz.volume = 0;
                sndJazz.play().catch(()=>{});
                let fadeIn = setInterval(() => {
                    if (sndJazz.volume < 0.6) { sndJazz.volume += 0.05; }
                    else { clearInterval(fadeIn); }
                }, 200);
            };
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function updateStats() {
            // Симуляция динамики для блока мониторинга
            document.getElementById('st-total').innerText = 100 + Math.floor(Math.random()*50);
            document.getElementById('st-ent').innerText = Math.floor(Math.random()*20);
            document.getElementById('st-hall').innerText = Math.floor(Math.random()*40);
            document.getElementById('st-bar').innerText = Math.floor(Math.random()*60);
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
