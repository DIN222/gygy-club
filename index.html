<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY PRIVAT v4.3.101</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; --indigo: #4B0082; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* --- ЯЗЫКОВОЙ СЕРВИС: ВЫСШИЙ ПРИОРИТЕТ --- */
        #google_translate_element { 
            position: fixed; top: 15px; left: 15px; z-index: 9999 !important; 
            opacity: 0.8; pointer-events: auto !important; 
        }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        /* Фикс скролла выпадающего списка */
        .goog-te-menu-frame { 
            max-height: 350px !important; 
            overflow-y: auto !important; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.8) !important;
        }

        /* --- БЛОКИ --- */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* --- СЦЕНА 1: ДВЕРЬ --- */
        #block-entrance { z-index: 500; }
        .door-img { width: 60vw; max-width: 320px; cursor: pointer; transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-in-open { transform: scale(20); opacity: 0; filter: blur(15px); pointer-events: none; }

        /* --- СЦЕНА 2: ЧАРЛИ ПРИВЕТСТВИЕ --- */
        .charlie-welcome-wrap {
            width: 200px; height: 200px;
            -webkit-mask-image: radial-gradient(circle, black 45%, transparent 90%);
            mask-image: radial-gradient(circle, black 45%, transparent 90%);
            margin-bottom: 20px;
        }

        /* --- РЕГИСТРАЦИЯ И ХОЛЛ --- */
        .qr-gold-frame { border: 2px solid var(--gold); background: #fff; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .hall-card { 
            position: absolute; right: 25px; bottom: 25px;
            width: 195px; padding: 15px; border: 1px solid var(--gold); 
            background: #ffffff; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hall-id-text { color: #000; font-family: 'Share Tech Mono'; font-size: 11px; margin-bottom: 12px; font-weight: bold; }

        /* --- БАР --- */
        .bar-container { width: 100vw; height: 100vh; position: relative; }
        .bar-bg { width: 100%; height: 100%; object-fit: cover; }

        .btn-gy { 
            min-width: 210px; padding: 12px 25px; background: #000; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0; outline: none;
        }
        .btn-disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-intro"><source src="bar_intro.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="charlie-welcome-wrap"><img src="charlie.png" style="width:100%; height:100%; object-fit:cover;"></div>
        <h1 style="font-size: 40px; letter-spacing: 8px; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;">IDENTIFICATION</div>
        <div style="display:flex; gap:10px; margin-bottom:30px;">
            <div id="id-box" class="qr-gold-frame" style="width:75px; height:75px; color:#000; font-size:9px; font-weight:bold; text-align:center;">ID</div>
            <div id="qr-box-reg" class="qr-gold-frame"></div>
            <div class="qr-gold-frame" style="width:75px; height:75px; position:relative;">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:20;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span style="font-size:9px; color:#000;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.4; z-index:-1;"></div>
        <div class="hall-card">
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <img id="h-photo" style="width:70px; height:70px; object-fit:cover; border:1px solid #ddd; background:#fff;">
                <div id="h-qr" style="width:70px; height:70px; border:1px solid #ddd; background:#fff;"></div>
            </div>
            <div id="h-id" class="hall-id-text"></div>
            <button class="btn-gy" style="min-width:100%; font-size:10px; background:#000;" onclick="startBarTransition()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-container"><img src="charlie_bar.png" class="bar-bg"></div>
    </div>

    <script>
        let visitCount = localStorage.getItem('visitCount') || 1;
        const fullID = `№${visitCount}-${Math.floor(1000 + Math.random() * 8999)}`;
        localStorage.setItem('visitCount', parseInt(visitCount) + 1);

        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-in-open');
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 67, height: 67 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 66, height: 66 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            // Через 1.2 сек начинаем переход, чтобы дверь успела «разлететься»
            setTimeout(() => { 
                document.getElementById('snd-ambient').play(); 
                portalTransition('block-welcome'); 
            }, 1200);
        }

        function portalTransition(id) {
            const current = document.querySelector('.block.active');
            if(current) current.style.opacity = '0';
            
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => { 
                    b.classList.remove('active'); 
                    b.style.display = 'none'; 
                    b.style.opacity = '0'; 
                });
                const next = document.getElementById(id);
                next.style.display = 'flex';
                void next.offsetWidth; 
                next.classList.add('active');
                next.style.opacity = '1';
            }, 800);
        }

        function startBarTransition() {
            const amb = document.getElementById('snd-ambient');
            const intro = document.getElementById('snd-intro');
            const jazz = document.getElementById('snd-jazz');

            let vol = 1.0;
            const fadeOut = setInterval(() => {
                if (vol > 0.1) { vol -= 0.1; amb.volume = vol; } 
                else { clearInterval(fadeOut); amb.pause(); }
            }, 150);

            portalTransition('block-bar');
            setTimeout(() => { intro.play(); }, 1200);
            setTimeout(() => {
                jazz.volume = 0; jazz.play();
                let jVol = 0;
                const fadeIn = setInterval(() => {
                    if (jVol < 0.6) { jVol += 0.05; jazz.volume = jVol; }
                    else { clearInterval(fadeIn); }
                }, 250);
            }, 7000);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').innerText = 'OK';
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
