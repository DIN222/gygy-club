
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.77 | Neon & Sound Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: fixed; top: 10px; left: 10px; z-index: 10001; opacity: 0.8; }

        /* Плавные переходы страниц */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 1s, transform 1s;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ВХОДНАЯ ДВЕРЬ */
        .door-img { width: 60vw; max-width: 320px; cursor: pointer; transition: 2s cubic-bezier(0.4, 0, 0.2, 1); }
        .zoom-out { transform: scale(10); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* ЧАРЛИ: ПРИВЕТСТВИЕ */
        .charlie-welcome-img { 
            width: 280px; height: 280px; object-fit: cover; margin-bottom: 20px;
            mask-image: radial-gradient(circle, black 50%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 100%);
            animation: fadeIn 3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* НЕОНОВЫЙ СЛОГАН В ХОЛЛЕ */
        .neon-cyan {
            color: var(--cyan); font-size: 26px; letter-spacing: 4px;
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
            margin-bottom: 30px; text-align: center;
        }

        /* КНОПКИ */
        .btn-gy { 
            min-width: 200px; padding: 12px 25px; background: transparent; 
            border: 2px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-gy:hover { box-shadow: 0 0 15px var(--gold); }

        /* КАРТА В ХОЛЛЕ */
        .hall-card { 
            position: absolute; right: 30px; bottom: 30px;
            width: 170px; padding: 15px; border: 1px solid var(--cyan); 
            background: rgba(0,0,0,0.8); border-radius: 10px; text-align: center;
        }

        /* БАР И ОБЛАЧКА */
        .bar-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .bar-img { width: 100%; height: 100%; object-fit: contain; }
        .bubble-link { 
            position: absolute; cursor: pointer; z-index: 50; 
            background: rgba(255,255,255,0.01); border-radius: 50%;
            transition: 0.3s;
        }
        .bubble-link:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 20px var(--cyan); }

        .square-box { width: 80px; height: 80px; background: #fff; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; overflow: hidden; position: relative; }
    </style>
</head>
<body>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-champagne"><source src="champagne_sequence.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" crossorigin="anonymous"><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="google_translate_element"></div>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <h1 style="color:var(--gold); letter-spacing:10px; margin-bottom:10px;">WELCOME</h1>
        <h2 style="font-size:14px; margin-bottom:25px; opacity:0.7;">GY-GY PRIVAT CLUB</h2>
        <img src="charlie.png" class="charlie-welcome-img">
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-style: italic; margin-bottom: 30px;">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:#000; color:var(--cyan); font-family:'Share Tech Mono'; border-color:var(--cyan);">ID</div>
            <div id="qr-box" class="square-box">QR</div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:5;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go" class="btn-gy" style="display:none;" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div class="neon-cyan">ВСЕ БУДЕТ GY-GY</div>
        <div class="hall-card">
            <img id="h-photo" style="width:100px; height:100px; background:#fff; margin:0 auto 10px; display:block; object-fit:cover;">
            <div id="h-qr" style="width:80px; height:80px; background:#fff; margin:0 auto 10px;"></div>
            <div id="h-id" style="color:var(--cyan); font-family:'Share Tech Mono'; font-size:10px; margin-bottom:15px;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none;" onclick="startBar()">В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bar-wrap">
            <div style="position:absolute; top:12%; width:100%; text-align:center; font-size:20px; color:#fff; text-shadow: 0 0 10px var(--cyan);">ИСТИНА НЕ В ВИНЕ, А В ЕГО КОЛИЧЕСТВЕ</div>
            <img src="charlie_bar.png" class="bar-img">
            <div class="bubble-link" style="left:15%; bottom:35%; width:150px; height:120px;" onclick="window.location.href='tables.html'"></div>
            <div class="bubble-link" style="right:15%; bottom:25%; width:150px; height:120px;" onclick="window.location.href='ai_room.html'"></div>
        </div>
    </div>

    <script>
        let aCtx;
        const fullID = `#0042-${Math.floor(1000 + Math.random() * 9999)}`;
        
        function initA() {
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') aCtx.resume();
        }

        function handleDoor() {
            initA();
            document.getElementById('snd-door').play();
            document.getElementById('main-door').classList.add('zoom-out');
            document.getElementById('id-box').innerText = fullID;
            new QRCode(document.getElementById("qr-box"), { text: fullID, width: 80, height: 80 });
            setTimeout(() => { document.getElementById('snd-ambient').play(); portalTransition('block-welcome'); }, 1500);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').style.display = 'none';
            document.getElementById('btn-go').style.display = 'inline-block';
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => {
                const img = document.querySelector("#qr-box img");
                if(img) document.getElementById('h-qr').innerHTML = `<img src="${img.src}" style="width:100%">`;
            }, 200);
        }

        function confirmH() {
            document.getElementById('h-confirm').style.display='none';
            document.getElementById('h-tobar').style.display='block';
        }

        function startBar() {
            initA();
            document.getElementById('snd-ambient').pause();
            portalTransition('block-bar');
            const ch = document.getElementById('snd-champagne');
            ch.currentTime = 0;
            ch.play().catch(e => console.log("Sound error"));
            
            setTimeout(() => {
                const j = document.getElementById('snd-jazz');
                j.volume = 0; j.play();
                let v = 0;
                const f = setInterval(() => { if(v<0.6){v+=0.05; j.volume=v;} else clearInterval(f); }, 200);
            }, 4000);
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
