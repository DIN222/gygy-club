<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.147</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; --bg: #050505; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        #google_translate_element { position: absolute; top: 10px; left: 10px; z-index: 10000; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 10; padding: 20px;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* --- НОВАЯ 3D ДВЕРЬ --- */
        .door-perspective {
            width: 200px; height: 300px; perspective: 1200px; cursor: pointer;
            position: relative; margin-bottom: 30px;
        }
        .door-frame {
            width: 100%; height: 100%; border: 3px solid #1a1a1a; position: relative;
            background: #000; overflow: visible;
        }
        .door-leaf {
            width: 100%; height: 100%; background: #111;
            border: 2px solid var(--gold); border-radius: 4px;
            transform-origin: left;
            transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 2;
        }
        .door-leaf::after { /* Ручка */
            content: ''; position: absolute; right: 15px; width: 12px; height: 12px;
            background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold);
        }
        .door-perspective.open .door-leaf {
            transform: rotateY(-110deg);
        }
        .entrance-text { font-size: 10px; letter-spacing: 4px; opacity: 0.5; text-transform: uppercase; }

        /* --- ОСТАЛЬНЫЕ СТИЛИ --- */
        .welcome-charlie { 
            max-height: 40vh; width: auto; margin: 10px 0;
            -webkit-mask-image: radial-gradient(circle, black 65%, transparent 98%);
        }

        .whiskey-quote-huge {
            font-weight: 900; font-size: 38px; margin-bottom: 25px;
            text-align: center; line-height: 0.95; text-transform: uppercase;
            color: var(--gold); text-shadow: 2px 2px 0px #000, 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .hall-bg {
            position: absolute; width: 100%; height: 100%; 
            background: url('hall_bg_jpg.jpg') center/cover;
            filter: brightness(0.4); z-index: -1;
        }

        .cloud-bubble {
            position: absolute; z-index: 500; 
            background: #fff; border: 2px solid var(--gold); 
            padding: 14px 22px; border-radius: 40px;
            font-family: 'Share Tech Mono'; font-weight: 900; font-size: 14px; 
            color: #000; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            white-space: nowrap; transition: 0.2s;
        }
        .cloud-bubble:after {
            content: ''; position: absolute; bottom: -8px; width: 15px; height: 15px;
            background: #fff; border-right: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
        }
        #cloud-left { bottom: 52%; left: 8%; border-bottom-left-radius: 2px; }
        #cloud-left:after { left: 15px; transform: rotate(45deg); }
        #cloud-right { bottom: 60%; right: 8%; border-bottom-right-radius: 2px; }
        #cloud-right:after { right: 15px; transform: rotate(-45deg); }

        .btn-gy { min-width: 240px; padding: 18px; background: #000; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: 900; border-radius: 50px;
