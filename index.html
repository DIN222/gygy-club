
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.262</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --rich-brown: #8B4513; --bg: #000000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; outline: none !important; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg) !important; 
            color: var(--gold); 
            font-family: 'Playfair Display', serif; 
            overflow: hidden; 
            position: fixed;
        }

        /* --- UI ELEMENTS: ОТРАБОТАННЫЙ ВАРИАНТ --- */
        #google_translate_element { 
            position: fixed; top: 15px; left: 15px; z-index: 1000001; 
            min-height: 40px;
        }
        /* Логотип справа */
        .ui-header-right { 
            position: fixed; top: 18px; right: 25px; z-index: 1000000; 
            font-family: 'Share Tech Mono'; font-weight: bold; font-size: 24px; 
            letter-spacing: 5px; color: var(--gold); pointer-events: none; 
        }

        /* Системные правки для Google Translate (чтобы не ломали верстку) */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        .goog-te-gadget-simple { 
            background-color: rgba(0,0,0,0.5) !important; 
            border: 1px solid var(--gold) !important; 
            padding: 5px !important; 
            border-radius: 4px !important;
        }
        .goog-te-gadget-simple a, .goog-te-gadget-simple span { color: var(--gold) !important; }

        /* --- BLOCKS SYSTEM --- */
        .block { 
            position: fixed; inset: 0; display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: var(--bg) !important; z-index: 10; 
            opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        .block.active { display: flex !important; opacity: 1; }

        .btn-gy { 
            min-width: 270px; padding: 15px; background: transparent; 
            border: 2px solid var(--gold); color: var(--gold); 
            cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; margin: 10px 0; 
        }
        .btn-sleep { opacity: 0.15 !important; pointer-events: none !important; }

        /* --- HALL CARD --- */
        .id-card { 
            position: absolute; left: 50%; top: 68%; transform: translate(-50%, -50%); 
            width: 280px; padding: 25px; border: 2px solid var(--gold); 
            background: #F5F5DC; border-radius: 15px; display: flex; 
            flex-direction: column; align-items: center; color: #000; 
        }
        .hall-frame { 
            width: 90px; height: 90px; border: 3px solid #000 !important; 
            background: #fff; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; 
        }
        #h-id { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 16px; margin-bottom: 15px; color: #000; }

        /* --- NAVIGATION --- */
        .bar-btn-nav { position: absolute; bottom: 15%; z-index: 1000; min-width: 135px; }
        #block-ai-room { background: url('OIG2_vintage_tv_room.jpg') center/cover no-repeat !important; }

        #main-door { width: 280px; cursor: pointer; transition: transform 2s, opacity 1s; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>
    <div class="ui-header-right">GY-GY</div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-khe"><source src="khe_khe.mp3" type="audio/mpeg"></audio>
    <audio id="snd-pour"><source src="pour_whisky.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="opacity: 1;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <img src="charlie.png" style="max-height: 35vh; margin-bottom: 25px;">
        <button id="btn-w-hall" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ В ХОЛЛ</button>
        <button class="btn-gy" onclick="portalTransition('block-identity')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:12px; margin-bottom:30px;">
            <div style="width:95px; height:95px; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-size:11px; text-align:center;" id="id-label">#ID</div>
            <div style="width:95px; height:95px; border:2px solid var(--gold); background:#fff; padding:5px;" id="qr-box-reg"></div>
            <div style="width:95px; height:95px; border:2px solid var(--gold); background:#fff; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;">
                <input type="file" onchange="preview(this)" style="position:absolute; inset:0; opacity:0; z-index:10; cursor:pointer;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="txt-photo" style="color:#000; font-size:10px; font-weight:900;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="swapButtons('btn-save', 'btn-pass')">СОХРАНИТЬ</button>
        <button id="btn-pass" class="btn-gy btn-sleep" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; inset:0; background:url('hall_bg_jpg.jpg') center/cover; z-index:-1;"></div>
        <div style="font-size:38px; color: var(--rich-brown); position:absolute; top:4%; font-weight:900; font-style:italic;">«Все будет GY-GY»</div>
        <div class="id-card">
            <div id="h-id">#GY-ID-PENDING</div>
            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div class="hall-frame"><img id="h-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div id="h-qr" class="hall-frame"></div>
            </div>
            <button id="btn-confirm" class="btn-gy" style="min-width:100%; border-color:#000; color:#000;" onclick="swapButtons('btn-confirm', 'btn-enter-bar')">ПОДТВЕРДИТЬ</button>
            <button id="btn-enter-bar" class="btn-gy btn-sleep" style="min-width:100%; border-color:#000; color:#000;" onclick="portalTransition('block-bar')">ВХОД В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button style="left:5%;" class="btn-gy bar-btn-nav" onclick="smoothLeave('tables.html')">ЗА СТОЛИКИ</button>
        <button style="right:5%;" class="btn-gy bar-btn-nav" onclick="portalTransition('block-ai-room')">В AI ROOM</button>
        <img src="charlie_bar.png" style="height: 88vh; width: auto; pointer-events:none;">
    </div>

    <div id="block-ai-room" class="block">
        <button class="btn-gy" style="position:absolute; bottom:10%; background:rgba(0,0,0,0.7);" onclick="portalTransition('block-bar')">НАЗАД В БАР</button>
    </div>

    <script>
        let currentID = "";

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            const d = document.getElementById('main-door');
            d.style.transform = "scale(3.5)"; d.style.opacity = "0";
            
            currentID = `#GY-${Math.floor(100+Math.random()*899)}-${Math.floor(1000+Math.random()*8999)}`;
            document.getElementById('id-label').innerText = currentID;
            document.getElementById('h-id').innerText = currentID;
            
            new QRCode(document.getElementById("qr-box-reg"), { text: currentID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: currentID, width: 85, height: 85 });

            setTimeout(() => {
                portalTransition('block-welcome');
                document.getElementById('snd-ambient').play().catch(()=>{});
            }, 1300);
        }

        function portalTransition(nextId) {
            const current = document.querySelector('.block.active');
            if(current) {
                current.style.opacity = "0";
                setTimeout(() => {
                    current.classList.remove('active');
                    current.style.display = "none";
                    const next = document.getElementById(nextId);
                    next.style.display = "flex";
                    setTimeout(() => { 
                        next.classList.add('active'); 
                        if(nextId === 'block-bar') {
                            setTimeout(() => {
                                document.getElementById('snd-khe').play().catch(()=>{});
                                setTimeout(() => document.getElementById('snd-pour').play(), 900);
                            }, 500);
                        }
                    }, 50);
                }, 700);
            }
        }

        function swapButtons(a, s) {
            document.getElementById(a).classList.add('btn-sleep');
            document.getElementById(s).classList.remove('btn-sleep');
            if(a === 'btn-save') document.getElementById('snd-pour').play().catch(()=>{});
        }

        function smoothLeave(url) {
            const current = document.querySelector('.block.active');
            if(current) current.style.opacity = "0";
            document.body.style.backgroundColor = "#000";
            setTimeout(() => { window.location.href = url; }, 850);
        }

        function preview(i) {
            if(i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('pp').src = e.target.result; 
                    document.getElementById('pp').style.display = "block";
                    document.getElementById('txt-photo').style.display = "none";
                    document.getElementById('h-photo').src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
