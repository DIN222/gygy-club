<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.123</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ: РАСШИРЕННЫЙ СПИСОК */
        #google_translate_element { position: absolute; top: 15px; left: 15px; z-index: 9999; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; position: static !important; }
        iframe.goog-te-menu-frame { height: 90vh !important; width: 300px !important; border: 2px solid var(--gold) !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; opacity: 0; transition: opacity 0.6s; 
        }
        .block.active { display: flex !important; opacity: 1; }

        /* ЗОЛОТЫЕ РАМКИ */
        .square-box, .card-img-box { 
            width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; 
            outline: 2px solid var(--gold); background: #fff; position: relative;
            box-shadow: 0 0 10px var(--gold);
        }

        .whiskey-quote { font-weight: 900; font-style: italic; margin-bottom: 25px; font-size: 22px; text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* БАР: ЧАРЛИ И СКРЫТЫЕ КНОПКИ НА ОБЛАЧКАХ */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; }
        
        .bartender-container {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: flex-end; justify-content: center;
        }
        .bartender-img { width: 90vw; max-width: 500px; z-index: 5; pointer-events: none; }

        /* ЗОНЫ КЛИКА НА РИСОВАННЫЕ ОБЛАЧКА */
        .bubble-zone {
            position: absolute; z-index: 100; cursor: pointer;
            /* background: rgba(255,0,0,0.2); */ /* Раскомментируй, чтобы увидеть зоны при настройке */
            border-radius: 50%;
        }
        /* Зона для левого облачка (Столики) */
        #zone-tables { width: 120px; height: 100px; bottom: 65%; left: 15%; }
        /* Зона для правого облачка (ИИ-РУМ) */
        #zone-ai { width: 120px; height: 100px; bottom: 70%; right: 15%; }

        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; }
        .hall-card { position: absolute; right: 25px; bottom: 25px; width: 200px; padding: 15px; border: 2px solid var(--gold); background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" style="width: 65vw; max-width: 350px;" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <p style="letter-spacing: 6px; font-size: 13px; margin-bottom: 12px;">GY-GY PRIVAT</p>
        <div style="width:240px; height:240px; -webkit-mask-image:radial-gradient(circle, black 40%, transparent 85%);"><img src="charlie.png" style="width:100%; height:100%; object-fit:cover;"></div>
        <h1 style="font-size:45px; letter-spacing:10px; margin-bottom: 25px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div class="whiskey-quote">«В каждой шутке есть доля виски»</div>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div id="id-box" class="square-box" style="background:transparent; color:var(--gold);">ID</div>
            <div id="qr-box-reg" class="square-box"></div>
            <div class="square-box photo-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="p-label" style="color:#000;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; opacity: 0.5;"></div>
        <h2 style="color:#fff; text-shadow:0 0 15px #4B0082; letter-spacing:5px; margin-bottom:30px; font-size:24px; font-weight:900;">ВСЕ БУДЕТ GY-GY</h2>
        <div class="hall-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <img id="h-photo" class="card-img-box">
                <div id="h-qr" class="card-img-box"></div>
            </div>
            <div id="h-id" style="color:#000; font-family:'Share Tech Mono'; font-size:11px; margin-bottom:15px; text-align: center; font-weight: bold;"></div>
            <button id="h-confirm" class="btn-gy" style="min-width:100%; font-size:10px; background: #000;" onclick="confirmH()">ПОДТВЕРДИТЬ</button>
            <button id="h-tobar" class="btn-gy" style="min-width:100%; font-size:10px; display:none; background: #000;" onclick="portalTransition('block-bar')">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block">
        <div class="bartender-container">
            <div id="zone-tables" class="bubble-zone" onclick="alert('Столики забронированы!')"></div>
            <div id="zone-ai" class="bubble-zone" onclick="window.location.href='ai_room.html'"></div>
            
            <img src="charlie_bar.png" class="bartender-img">
        </div>
        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="portalTransition('block-hall')">В ХОЛЛ</button>
    </div>

    <script>
        const fullID = `#GY-${Math.floor(1000 + Math.random() * 8999)}`;
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
        function handleDoor() {
            document.getElementById('snd-door').play();
            document.getElementById('main-door').style.transform = "scale(18)";
            document.getElementById('main-door').style.opacity = "0";
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 85, height: 85 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 75, height: 75 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            setTimeout(() => { document.getElementById('snd-ambient').play(); portalTransition('block-welcome'); }, 2100); 
        }
        function portalTransition(id) {
            const blocks = document.querySelectorAll('.block');
            const target = document.getElementById(id);
            blocks.forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                blocks.forEach(b => b.style.display = 'none');
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }, 600);
        }
        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
        function saveReg() {
            document.getElementById('btn-save').innerText = "ГОТОВО";
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
        function confirmH() {
            document.getElementById('h-confirm').style.display = 'none';
            document.getElementById('h-tobar').style.display = 'block';
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
