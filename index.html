<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.112</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --cyan: #00E5FF; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* СКРОЛЛ ЯЗЫКОВ - Радикальный подход */
        #google_translate_element { 
            position: absolute; top: 10px; left: 10px; z-index: 9999; 
            max-height: 50px; overflow: visible; 
        }
        /* Попытка пробить стили гугла */
        .goog-te-menu-frame { max-height: 200px !important; overflow-y: auto !important; }
        iframe.goog-te-menu-frame { height: 200px !important; }

        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; /* Возвращаем дисплей для чистоты */
            flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10;
        }
        
        .block.active { display: flex !important; z-index: 100; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ДВЕРЬ */
        #block-entrance { display: flex; z-index: 500; opacity: 1; }
        .door-img { width: 65vw; max-width: 320px; cursor: pointer; transition: 2s ease-in; }
        .zoom-open { transform: scale(20); opacity: 0; pointer-events: none; }

        /* ЧАРЛИ */
        .charlie-wrap {
            width: 220px; height: 220px;
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 95%);
            margin-bottom: 10px;
        }
        .charlie-img { width: 100%; height: 100%; object-fit: cover; }

        .btn-gy { 
            min-width: 210px; padding: 12px; background: #000; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; letter-spacing: 2px; margin: 8px 0;
        }
        .btn-disabled { border-color: #333 !important; color: #333 !important; pointer-events: none; opacity: 0.5; }

        .square-box { width: 75px; height: 75px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; }
        .white { background: #fff !important; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="block-entrance">
        <img src="door_1.jpg" class="door-img" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="charlie-wrap"><img src="charlie.png" class="charlie-img"></div>
        <h1 style="font-size: 35px; letter-spacing: 5px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="id-box" class="square-box" style="font-size:9px;">ID</div>
            <div id="qr-reg" class="square-box white"></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="p-label" style="font-size:10px;">ФОТО</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="saveReg()">СОХРАНИТЬ</button>
        <button id="btn-go-hall" class="btn-gy btn-disabled" onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="background: white; padding: 15px; border-radius: 10px; color: #000; text-align: center;">
            <div style="display:flex; gap:5px;">
                <img id="h-photo" style="width:70px; height:70px; background:#fff; border:1px solid var(--gold);">
                <div id="h-qr" style="width:70px; height:70px; background:#fff;"></div>
            </div>
            <div id="h-id" style="font-size:10px; margin: 10px 0;"></div>
            <button class="btn-gy" style="min-width:100%; background:#000;" onclick="window.location.href='ai_room.html'">В АЙ-РУМ</button>
        </div>
    </div>

    <script>
        let vCount = localStorage.getItem('vCount') || 1;
        const fullID = `№${vCount}-${Math.floor(1000 + Math.random() * 8999)}`;
        localStorage.setItem('vCount', parseInt(vCount) + 1);

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        function handleDoor() {
            const door = document.getElementById('main-door');
            door.classList.add('zoom-open');
            
            // Сразу генерим QR
            new QRCode(document.getElementById("qr-reg"), { text: fullID, width: 75, height: 75 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 70, height: 70 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;

            // Переход через 1.5 секунды
            setTimeout(() => {
                document.getElementById('block-entrance').remove(); // УДАЛЯЕМ ДВЕРЬ ИЗ КОДА
                portalTransition('block-welcome');
            }, 1500);
        }

        function portalTransition(targetId) {
            // Скрываем всё
            const blocks = ['block-welcome', 'block-identity', 'block-hall'];
            blocks.forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.classList.remove('active'); el.style.display = 'none'; }
            });

            // Показываем нужный
            const target = document.getElementById(targetId);
            if(target) {
                target.style.display = 'flex';
                target.classList.add('active');
            }
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('p-label').style.display = "none";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        function saveReg() {
            document.getElementById('btn-save').classList.add('btn-disabled');
            document.getElementById('btn-go-hall').classList.remove('btn-disabled');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
