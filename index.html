<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.138</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; position: static !important; top: 0 !important; }

        /* ЯЗЫК: РАДИКАЛЬНОЕ РЕШЕНИЕ */
        #google_translate_element { 
            position: absolute; top: 15px; left: 15px; z-index: 99999 !important; 
            pointer-events: auto !important; display: block !important;
        }
        .goog-te-gadget-simple { 
            background: rgba(0,0,0,0.8) !important; border: 1px solid var(--gold) !important; 
            padding: 8px !important; border-radius: 5px !important; cursor: pointer !important;
        }
        iframe.goog-te-menu-frame { z-index: 100000 !important; pointer-events: auto !important; }

        /* БЛОКИ */
        .block { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; opacity: 0; transition: opacity 1s ease-in-out; z-index: 10;
        }
        .block.active { display: flex !important; opacity: 1; }

        /* БАР: ИНТЕРАКТИВНАЯ ЗОНА ЧАРЛИ */
        #block-bar { background: url('bar_bg.jpg') center/cover no-repeat; }
        
        .charlie-container {
            position: relative;
            height: 85vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .charlie-art {
            height: 100%;
            width: auto;
            z-index: 5;
            pointer-events: none;
        }

        /* ОБЛАКА, ПРИВЯЗАННЫЕ К АРТУ */
        .speech-bubble {
            position: absolute;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--gold);
            padding: 12px 18px;
            border-radius: 40px;
            font-family: 'Share Tech Mono';
            font-weight: 900;
            font-size: 12px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            white-space: nowrap;
            transition: transform 0.2s;
        }
        .speech-bubble:active { transform: scale(0.9); background: var(--gold); }

        /* Координаты относительно центра/низа */
        #bubble-tables { bottom: 50%; left: 10%; border-radius: 40px 40px 40px 5px; }
        #bubble-ai { bottom: 58%; right: 10%; border-radius: 40px 40px 5px 40px; }

        /* ВЕРХНЯЯ НАДПИСЬ В WELCOME */
        .gy-privat-label {
            font-family: 'Share Tech Mono';
            letter-spacing: 5px;
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .btn-gy { min-width: 220px; padding: 14px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase; }
        .btn-inactive { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>
    <audio id="snd-jazz" loop><source src="charlie_jazz_duet.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active">
        <img src="door_1.jpg" style="width:350px;" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div class="gy-privat-label">GY-GY PRIVAT</div>
        <div style="width:260px; height:260px; -webkit-mask-image:radial-gradient(circle, black 55%, transparent 95%);">
            <img src="charlie.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size:45px; margin-top:10px;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-bar" class="block">
        <div style="position: absolute; top: 60px; color: var(--gold); font-weight: 900; z-index: 10;">«Истина не в вине, а в его количестве»</div>
        
        <div class="charlie-container">
            <div id="bubble-tables" class="speech-bubble" onclick="alert('Забронировано!')">ЗА СТОЛИКИ</div>
            <div id="bubble-ai" class="speech-bubble" onclick="window.location.href='ai_room.html'">В AI ROOM</div>
            
            <img src="charlie_bar.png" class="charlie-art">
        </div>

        <button class="btn-gy" style="position:absolute; top:20px; right:20px; min-width:80px; font-size:9px;" onclick="location.reload()">ВЫХОД</button>
    </div>

    <script>
        const ambient = document.getElementById('snd-ambient');
        const jazz = document.getElementById('snd-jazz');

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Исправление для языка: принудительный клик
        document.addEventListener('click', function(e) {
            if(e.target.closest('#google_translate_element')) {
                const select = document.querySelector('.goog-te-combo');
                if(select) select.style.display = 'block';
            }
        });

        function handleDoor() {
            document.getElementById('main-door').style.transform = "scale(10)";
            document.getElementById('main-door').style.opacity = "0";
            setTimeout(() => {
                ambient.play();
                portalTransition('block-welcome');
                // Здесь запускай свой записанный файл приветствия
                new Audio('charlie_welcome.mp3').play().catch(e => console.log("Ждем файл"));
            }, 1500);
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 600);
        }

        // Твой идеальный переход в Бар
        function goToBar() {
            // ... (логика из v4.3.137 с твоими новыми файлами charlie_bar_fx.mp3)
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
