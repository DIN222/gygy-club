
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GY-GY Club v4.3.174</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --violet: #8A2BE2; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: #000 !important; color: var(--gold); font-family: 'Playfair Display', serif; overflow: hidden; }

        /* ЯЗЫКИ */
        #google_translate_element { 
            position: fixed !important; top: 15px !important; left: 15px !important; 
            z-index: 2000000 !important; background: rgba(0,0,0,0.5); border-radius: 4px;
        }

        /* ПАСХАЛКА */
        #secret-trigger { position: fixed; top: 15px; right: 15px; width: 30px; height: 30px; z-index: 1000001; cursor: help; display: flex; align-items: center; justify-content: center; }
        #secret-trigger:after { content: '·'; color: rgba(212, 175, 55, 0.3); font-size: 20px; }
        #secret-monitor {
            position: fixed; top: 50px; right: 20px; background: rgba(0,0,0,0.9);
            border: 1px solid var(--gold); padding: 15px; border-radius: 8px;
            font-family: 'Share Tech Mono'; font-size: 11px; color: #fff;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 1000000;
        }
        #secret-trigger:hover + #secret-monitor { opacity: 1; }

        /* СТАНДАРТ ЗОЛОТОЙ КНОПКИ */
        .btn-gy { 
            min-width: 240px; padding: 16px; background: #000; border: 3px solid var(--gold); 
            color: var(--gold); cursor: pointer; font-family: 'Share Tech Mono'; 
            text-transform: uppercase; font-weight: 900; letter-spacing: 2px;
            transition: 0.5s; opacity: 1; margin-top: 15px;
        }
        .btn-gy:disabled { opacity: 0.05; border-color: rgba(212, 175, 55, 0.1); color: rgba(212, 175, 55, 0.1); pointer-events: none; }

        .block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; opacity: 0; transition: opacity 0.8s ease; z-index: 100; padding: 40px; }
        .block.active { display: flex !important; opacity: 1; }

        #main-door { width: 280px; cursor: pointer; z-index: 99999; transition: 2s; transform-origin: center; }

        /* НАДПИСЬ В ХОЛЛЕ - ТЕПЕРЬ С ЗОЛОТОЙ ТЕНЬЮ */
        .hall-title {
            position: absolute; top: 15%; width: 100%; text-align: center;
            font-size: 48px; color: #fff; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            font-weight: 900; letter-spacing: 8px; z-index: 10;
        }

        /* КАРТОЧКА */
        .id-card {
            position: absolute; right: 40px; bottom: 60px; width: 260px; padding: 20px; 
            border: 3px solid var(--gold); background: linear-gradient(135deg, #fffaf0 0%, #fdf5e6 100%);
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; 
            color:#000; z-index: 500; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .qr-gold-frame { width: 90px; height: 90px; border: 2px solid var(--gold); padding: 5px; background: #fff; display: flex; align-items: center; justify-content: center; }
        
        /* ФОТО С БЕЛЫМ ФОНОМ */
        .square-box { width: 100px; height: 100px; border: 2px solid var(--gold); background: #fff !important; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #h-photo { width: 90px; height: 90px; border: 1px solid #ddd; object-fit: cover; background: #fff !important; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="secret-trigger"></div>
    <div id="secret-monitor">
        <div style="color:var(--gold); border-bottom:1px solid var(--gold); margin-bottom:8px;">SYSTEM INSIGHT</div>
        <div>ACTIVE USERS: 142</div>
        <div>ATMOSPHERE: PREMIUM</div>
    </div>

    <audio id="snd-door"><source src="door_open.mp3" type="audio/mpeg"></audio>
    <audio id="snd-ambient" loop><source src="bar_ambient.mp3" type="audio/mpeg"></audio>

    <div id="block-entrance" class="block active" style="z-index:1000;">
        <img src="door_1.jpg" id="main-door" onclick="handleDoor()">
    </div>
    
    <div id="block-welcome" class="block">
        <div style="font-family:'Share Tech Mono'; letter-spacing:10px; font-size:20px;">GY-GY PRIVAT</div>
        <img src="charlie.png" style="max-height: 40vh; margin: 20px 0;">
        <h1 style="font-size:52px; font-weight: 900;">WELCOME</h1>
        <button class="btn-gy" onclick="portalTransition('block-identity')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-identity" class="block">
        <div style="font-family:'Share Tech Mono'; font-size:18px; text-align:center; margin-bottom:30px;">«В КАЖДОЙ ШУТКЕ<br>ЕСТЬ ДОЛЯ ВИСКИ»</div>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div id="id-box" class="square-box" style="background:transparent !important; color:var(--gold); font-size:10px;">ID</div>
            <div class="qr-gold-frame"><div id="qr-box-reg"></div></div>
            <div class="square-box">
                <input type="file" onchange="preview(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:10;">
                <img id="pp" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                <span style="color:#000; font-size:10px; font-weight:900;">PHOTO</span>
            </div>
        </div>
        <button id="btn-save" class="btn-gy" onclick="actionSave()">СОХРАНИТЕ</button>
        <button id="btn-go-hall" class="btn-gy" disabled onclick="portalTransition('block-hall')">ПРОХОДИТЕ</button>
    </div>

    <div id="block-hall" class="block">
        <div style="position:absolute; width:100%; height:100%; background:url('hall_bg_jpg.jpg') center/cover; filter:brightness(0.5); z-index:-1;"></div>
        
        <div class="hall-title">ВСЕ БУДЕТ GY-GY</div>
        
        <div class="id-card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div class="square-box" style="width:90px; height:90px;"><img id="h-photo"></div>
                <div class="qr-gold-frame" style="width:90px; height:90px;"><div id="h-qr"></div></div>
            </div>
            <div id="h-id" style="font-family:'Share Tech Mono'; font-weight:900; margin-bottom:15px; color:#000; font-size:14px;"></div>
            
            <button id="h-confirm" class="btn-gy" style="min-width:100%; padding:12px; margin-top:0;" onclick="actionConfirm()">ПОДТВЕРДИТЕ</button>
            <button id="h-tobar" class="btn-gy" disabled style="min-width:100%; padding:12px;" onclick="goToBar()">ПРОХОДИТЕ В БАР</button>
        </div>
    </div>

    <div id="block-bar" class="block" style="padding:0; justify-content: flex-end;">
        <button class="btn-gy" style="position:absolute; left:8%; bottom:50%; z-index:500;" onclick="window.location.href='tables.html'">ЗА СТОЛИКИ</button>
        <img src="charlie_bar.png" style="height: 85vh; width: auto; pointer-events: none; z-index: 10;">
    </div>

    <script>
        let orderNum = localStorage.getItem('gy_order_num') || 1;
        const randomNum = Math.floor(1000 + Math.random() * 8999);
        const fullID = `#GY-${orderNum}-${randomNum}`;

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ru', autoDisplay: false }, 'google_translate_element');
        }

        function handleDoor() {
            document.getElementById('snd-door').play().catch(()=>{});
            document.getElementById('main-door').style.transform = "scale(15)"; 
            document.getElementById('main-door').style.opacity = "0";
            new Audio('charlie_welcome.mp3').play().catch(()=>{});
            
            new QRCode(document.getElementById("qr-box-reg"), { text: fullID, width: 80, height: 80 });
            new QRCode(document.getElementById("h-qr"), { text: fullID, width: 80, height: 80 });
            document.getElementById('id-box').innerText = fullID;
            document.getElementById('h-id').innerText = fullID;
            
            setTimeout(() => { 
                document.getElementById('snd-ambient').play().catch(()=>{}); 
                portalTransition('block-welcome'); 
            }, 1800);
        }

        function actionSave() {
            localStorage.setItem('gy_order_num', parseInt(orderNum) + 1);
            document.getElementById('btn-save').style.opacity = "0.2";
            document.getElementById('btn-save').innerText = "СОХРАНЕНО";
            document.getElementById('btn-go-hall').disabled = false;
        }

        function actionConfirm() {
            document.getElementById('h-confirm').style.opacity = "0.2";
            document.getElementById('h-confirm').innerText = "ПОДТВЕРЖДЕНО";
            document.getElementById('h-tobar').disabled = false;
        }

        function goToBar() { 
            portalTransition('block-bar'); 
            new Audio('charlie_bar_fx.mp3').play().catch(()=>{});
        }

        function portalTransition(id) {
            document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.block').forEach(b => b.style.display = 'none');
                const t = document.getElementById(id);
                t.style.display = 'flex';
                setTimeout(() => t.classList.add('active'), 50);
            }, 600);
        }

        function preview(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pp').src = e.target.result; 
                document.getElementById('pp').style.display = "block";
                document.getElementById('h-photo').src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
/* --- END OF CODE v4.3.174 --- */
